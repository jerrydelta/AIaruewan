<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>本地优先 Passkey 管理器</title>
<style>
:root{
  --coral:#FF6B6B;
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}

</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">productivity</span><span class="tag">password_manager</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">本地优先 Passkey 管理器</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Open-source / local-first passkey manager (device-bound + self-host)</p>
  </div>
  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">Passkey 正快速替代密码，本地优先、可自托管、开源的 passkey 管理器仍是蓝海。</p>
  </div>
  <div class="card">
    <b>🛠 工具</b>
    
<label>网站/服务</label><input id="pSite" placeholder="github.com">
<label>账号/用户名</label><input id="pUser" placeholder="user@x.com">
<label>备注（密码等，仅本地）</label><input id="pNote" type="password" placeholder="本地保存，不上传">
<button class="btn" onclick="addP()">保存凭证</button>
  </div>

  <div class="card" id="list"></div>
  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://f-droid.org" target="_blank" style="color:var(--coral)">Open Passkey Authenticator · Cloaked · Proton Pass</a>
  </div>
<script>

const KEY='P15-20260719-009';
let items=JSON.parse(localStorage.getItem(KEY)||'[]');
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function addP(){
 var s=document.getElementById('pSite').value.trim();
 var u=document.getElementById('pUser').value.trim();
 var n=document.getElementById('pNote').value;
 if(!s){alert('网站');return;}
 items.unshift({id:Date.now(),s:s,u:u,n:n,show:false});
 document.getElementById('pSite').value='';document.getElementById('pUser').value='';document.getElementById('pNote').value='';save();
}
function toggleShow(id){var x=items.find(i=>i.id==id);if(x)x.show=!x.show;save();}
function del(id){items=items.filter(i=>i.id!=id);save();}
function render(){
 var box=document.getElementById('list');
 box.innerHTML='<b>🔑 本地凭证库 ('+items.length+')</b>'+(items.length?'':'<p style="font-size:13px;color:#999">仅存本地，不上传服务器</p>');
 box.innerHTML+=items.map(i=>'<div class="card" style="margin:6px 0;padding:10px"><div style="font-weight:600">'+esc(i.s)+'</div><div style="font-size:13px;color:#555">'+esc(i.u||'')+'</div><div style="font-size:12px;color:#999">密码: '+(i.show?esc(i.n):'••••••')+' <a style="color:var(--coral);cursor:pointer" onclick="toggleShow('+i.id+')">'+(i.show?'隐藏':'显示')+'</a></div><a style="color:#999;cursor:pointer;font-size:12px" onclick="del('+i.id+')">删除</a></div>').join('');
}
function esc(s){return (s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
render();

</script>
</body>
</html>
