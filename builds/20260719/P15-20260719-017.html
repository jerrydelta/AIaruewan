<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>高准确率票据 OCR 记账</title>
<style>
:root{
  --coral:#FF6B6B;
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}

</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">productivity</span><span class="tag">file_management</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">高准确率票据 OCR 记账</h1>
    <p class="h-coral" style="font-size:13px;margin:0">High-accuracy receipt OCR expense tool (multi-page + multi-currency + report)</p>
  </div>
  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">票据 OCR 扫描 + 报销是高频刚需，准确性（多页 / 识别率）仍是痛点。</p>
  </div>
  <div class="card">
    <b>🛠 工具</b>
    
<label>金额</label><input id="exAmt" type="number" placeholder="88.5">
<div class="row"><input id="exCur" placeholder="CNY" value="CNY"><select id="exCat"><option>餐饮</option><option>交通</option><option>办公</option><option>差旅</option><option>其他</option></select></div>
<label>备注</label><input id="exNote" placeholder="午餐">
<button class="btn" onclick="addEx()">记一笔</button>
<button class="btn" onclick="exportReport()" style="background:var(--muted)">导出报销表</button>
<div id="exStat" style="font-size:13px;color:#555;margin-top:8px"></div>
  </div>

  <div class="card" id="list"></div>
  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.receiptscannerapp.com" target="_blank" style="color:var(--coral)">ReceiptScanner · Expensify · Saldo Receipt Scanner</a>
  </div>
<script>

const KEY='P15-20260719-017';
let items=JSON.parse(localStorage.getItem(KEY)||'[]');
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function addEx(){
 var a=Number(document.getElementById('exAmt').value)||0;
 var c=document.getElementById('exCur').value.trim()||'CNY';
 var cat=document.getElementById('exCat').value;
 var note=document.getElementById('exNote').value.trim();
 if(!a){alert('金额');return;}
 items.unshift({id:Date.now(),a:a,c:c,cat:cat,note:note,ts:new Date().toLocaleDateString()});
 document.getElementById('exAmt').value='';document.getElementById('exNote').value='';save();
}
function del(id){items=items.filter(i=>i.id!=id);save();}
function exportReport(){
 var rows=items.map(i=>i.ts+'\t'+i.cat+'\t'+i.a+' '+i.c+'\t'+(i.note||'')).join('\n');
 var blob=new Blob(['日期\t类别\t金额\t备注\n'+rows],{type:'text/csv'});
 var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='expenses.csv';a.click();
}
function render(){
 var box=document.getElementById('list');
 var bycur={};
 items.forEach(i=>{bycur[i.c]=(bycur[i.c]||0)+i.a;});
 document.getElementById('exStat').textContent='共 '+items.length+' 笔 · '+Object.keys(bycur).map(k=>k+' '+bycur[k].toFixed(2)).join(' · ');
 box.innerHTML='<b>🧾 支出记录</b>';
 if(!items.length){box.innerHTML+='<p style="font-size:13px;color:#999">记一笔</p>';return;}
 box.innerHTML+=items.map(i=>'<div class="card" style="margin:6px 0;padding:10px"><div style="display:flex;justify-content:space-between"><span style="font-weight:600">'+i.a+' '+esc(i.c)+'</span><span class="tag">'+esc(i.cat)+'</span></div><div style="font-size:12px;color:#999">'+esc(i.note||'')+' · '+i.ts+'</div><a style="color:#999;cursor:pointer;font-size:12px" onclick="del('+i.id+')">删除</a></div>').join('');
}
function esc(s){return (s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
render();

</script>
</body>
</html>
