<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>本地化可食用菜园规划器</title>
<style>
:root{
  --coral:#FF6B6B; --coral-dark:#E85555; --ink:#2D2D2D; --muted:#8A8A8A;
  --bg:#F7F7F7; --card:#FFFFFF; --line:#ECECEC; --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.item .t{font-weight:600}.item .s{font-size:13px;color:var(--muted)}
.mini{display:inline-block;padding:6px 10px;border:none;border-radius:8px;font-size:13px;cursor:pointer;margin:6px 6px 0 0}
.mini.ok{background:var(--ok);color:#fff}.mini.del{background:#eee;color:#999}
.due{color:var(--coral);font-weight:600}.done{color:var(--ok);font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">plant</span><span class="tag">garden_planning</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">本地化可食用菜园规划器</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Localized edible-garden planner (port Seed to Spoon to JP/UK)</p>
  </div>
  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">From Seed to Spoon 高度美国中心（USDA 分区），英国/日本气候与作物差异大、缺乏本地化。非美家庭菜园用户想要"按本地气候规划 + 病虫害诊断"。本工具按本地播种历算收获日。</p>
  </div>
  <div class="card">
    <b>🛠 工具 · 播种 / 收获日历</b>
    <label>作物名称</label>
    <input id="cName" placeholder="如：番茄 / 小松菜">
    <label>播种日期</label>
    <input id="cSow" type="date">
    <label>本地生长天数（播种→收获）</label>
    <input id="cDays" type="number" value="70" min="1">
    <label>所在地气候带（备注）</label>
    <input id="cZone" placeholder="如：日本关东 / 英国南区">
    <button class="btn" onclick="addCrop()">加入菜园</button>
  </div>
  <div class="card" id="list">
    <b>📋 菜园计划</b>
    <div id="items"></div>
  </div>
  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.seedtospoon.net/" target="_blank" style="color:var(--coral)">From Seed to Spoon</a>
  </div>
<script>
const KEY="P11-20260719-002";
let items = JSON.parse(localStorage.getItem(KEY) || "[]");
function save(){ localStorage.setItem(KEY, JSON.stringify(items)); render(); }
function addDays(d,n){ return new Date(new Date(d).getTime()+n*86400000).toISOString().slice(0,10); }
function addCrop(){
  const name=document.getElementById('cName').value.trim();
  const sow=document.getElementById('cSow').value;
  const days=parseInt(document.getElementById('cDays').value)||70;
  const zone=document.getElementById('cZone').value.trim();
  if(!name||!sow){ alert('请填写作物名称和播种日期'); return; }
  items.push({id:Date.now(),name,sow,days,zone,harvest:addDays(sow,days)});
  document.getElementById('cName').value='';
  save();
}
function del(id){ items=items.filter(x=>x.id!==id); save(); }
function render(){
  const box=document.getElementById('items');
  if(!items.length){ box.innerHTML='<p style="font-size:13px;color:var(--muted)">还没有作物，添加第一颗吧。</p>'; return; }
  box.innerHTML=items.map(it=>
    '<div class="item"><div class="t">'+it.name+'</div>'+
    '<div class="s">播种 '+it.sow+' · 预计收获 <b class="due">'+it.harvest+'</b></div>'+
    '<div class="s">生长 '+it.days+' 天'+(it.zone?(' · '+it.zone):'')+'</div>'+
    '<button class="mini del" onclick="del('+it.id+')">删除</button></div>'
  ).join('');
}
render();
</script>
</body>
</html>
