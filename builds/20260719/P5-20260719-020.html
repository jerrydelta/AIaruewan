<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>银发安全智能手表</title>
<style>
:root{
  --coral:#FF6B6B;        /* 主品牌色 */
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">elderly</span><span class="tag">silver_safety_smartwatch_korea</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">银发安全智能手表</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Consumer smartwatch + family safety app</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">智能手表跌倒/晕厥预测成银发安全新入口。三星Galaxy Watch获AI实时晕厥预测(误报率<5%)。痛点：老人不愿戴专用医疗吊坠(病耻感)，消费电子手表去污名化。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:#666;margin:8px 0">每日登记手表佩戴与安全状态，家属端可查看异常。</p>
<label>日期</label><input type="date" id="f_sdate" placeholder="">
<label>佩戴手表</label><select id="f_woreWatch"><option value="是">是</option><option value="否">否</option></select>
<label>同步状态</label><select id="f_syncStatus"><option value="已同步">已同步</option><option value="未同步">未同步</option></select>
<label>警报</label><select id="f_fallAlert"><option value="无">无</option><option value="晕厥预警">晕厥预警</option><option value="跌倒">跌倒</option></select>
<label>家属通知</label><select id="f_familyNotified"><option value="是">是</option><option value="否">否</option></select>
    <button class="btn" onclick="addItem()">保存记录</button>
    <div id="derive" style="font-size:13px;color:var(--coral);margin-top:8px"></div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="#" style="color:var(--coral)">Samsung Galaxy Watch / Apple Watch / 华为/小米跌倒警报手表</a>
  </div>

<script>
const KEY="P5-20260719-020";
const FIELDS=[{"label":"日期","key":"sdate"},{"label":"佩戴手表","key":"woreWatch"},{"label":"同步状态","key":"syncStatus"},{"label":"警报","key":"fallAlert"},{"label":"家属通知","key":"familyNotified"}];
let items = JSON.parse(localStorage.getItem(KEY) || "[]");
function save(){ localStorage.setItem(KEY, JSON.stringify(items)); render(); }
function addItem(){
const v_sdate=document.getElementById('f_sdate').value;
const v_woreWatch=document.getElementById('f_woreWatch').value;
const v_syncStatus=document.getElementById('f_syncStatus').value;
const v_fallAlert=document.getElementById('f_fallAlert').value;
const v_familyNotified=document.getElementById('f_familyNotified').value;
  const item={ ts:Date.now() , sdate:v_sdate, woreWatch:v_woreWatch, syncStatus:v_syncStatus, fallAlert:v_fallAlert, familyNotified:v_familyNotified };
  items.unshift(item);
  save();
  document.getElementById('f_sdate').value='';
document.getElementById('f_woreWatch').value='';
document.getElementById('f_syncStatus').value='';
document.getElementById('f_fallAlert').value='';
document.getElementById('f_familyNotified').value='';
  const dv=derive(item);
  document.getElementById('derive').textContent = dv?('已保存 ✓ '+dv):'已保存 ✓';
}
function derive(it){ if(it.fallAlert&&it.fallAlert!=='无') return '🚨 '+it.fallAlert+'，家属通知：'+it.familyNotified; if(it.woreWatch==='否') return '⚠️ 今日未佩戴手表'; return '🟢 安全状态正常'; return ''; }
function rowHTML(it){
  let h='<div style="font-size:12px;color:var(--muted)">'+(new Date(it.ts).toLocaleString())+'</div>';
  FIELDS.forEach(f=>{ if(it[f.key]!==''){ h+='<div style="font-size:14px;margin:2px 0"><b>'+f.label+'：</b>'+it[f.key]+'</div>'; } });
  const d=derive(it); if(d) h+='<div style="font-size:13px;color:var(--coral);margin-top:4px">'+d+'</div>';
  return h;
}
function render(){
  const el=document.getElementById('list');
  if(!items.length){ el.innerHTML='<div style="font-size:13px;color:var(--muted)">暂无记录，添加第一条吧。</div>'; return; }
  el.innerHTML='<b style="font-size:13px">📋 记录 ('+items.length+')</b>'+items.map((it,i)=>'<div style="border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:8px">'+rowHTML(it)+'<button class="btn" style="background:#bbb;margin-top:8px" onclick="del('+i+')">删除</button></div>').join('');
}
function del(i){ items.splice(i,1); save(); }
render();

</script>
</body>
</html>
