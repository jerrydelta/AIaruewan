<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>韓日クロスボーダー安心デートマッチング｜韩日跨国约会</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.result{background:#FFF7F0;border:1px solid #FFE0CC;border-radius:10px;padding:12px;margin-top:10px;font-size:14px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">relationship</span><span class="tag">dating_journal</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">韓日クロスボーダー安心デートマッチング</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Korea-Japan cross-border trust-focused dating matching</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">韓国デートアプリ市場はレッドオーシャン・信頼危機(20-30代の70%が拒否も80%が恋愛希望)。Wippyは8.2Mユーザー・日本展開で韓日マッチ2.2倍。痛点：国境またぐ安心・信頼の仕組み不足。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 安心・相性診断</b>
    <div class="row">
      <input id="a" placeholder="あなた（国籍：JP/KR）">
      <input id="b" placeholder="相手（国籍：JP/KR）">
    </div>
    <label>安心・信頼チェック</label>
    <div style="font-size:13px">
      <label style="margin:2px 0"><input type="checkbox" class="c" style="width:auto;margin:0 6px 0 0">本人認証済</label>
      <label style="margin:2px 0"><input type="checkbox" class="c" style="width:auto;margin:0 6px 0 0">SNS/友達確認</label>
      <label style="margin:2px 0"><input type="checkbox" class="c" style="width:auto;margin:0 6px 0 0">ビデオ通話OK</label>
      <label style="margin:2px 0"><input type="checkbox" class="c" style="width:auto;margin:0 6px 0 0">言語・文化理解</label>
    </div>
    <label>価値観の一致（0-5）</label>
    <input id="val" type="range" min="0" max="5" value="3">
    <button class="btn" onclick="diag()">診断する</button>
    <div id="res" class="result" style="display:none"></div>
  </div>

  <div class="card" id="list"><b>📋 診断履歴</b></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.globaldatinginsights.com/featured/wippy-dating-app-sees-earnings-growth-by-korea-japan-matches" target="_blank" style="color:var(--coral)">위피(Wippy) / 심쿵 / 듀오</a>
  </div>

<script>
const KEY="P2-20260719-013";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function diag(){
  const a=document.getElementById("a").value.trim(),b=document.getElementById("b").value.trim();
  if(!a||!b){alert("二人の情報を入力");return;}
  const trust=document.querySelectorAll(".c:checked").length*16; // 64
  const val=(parseInt(document.getElementById("val").value)/5)*36; // 36
  const score=Math.round(trust+val);
  const cross=(a.includes("KR")||b.includes("KR"))&&(a.includes("JP")||b.includes("JP"));
  let msg=score>=80?"安心・相性◎。クロスボードなら異文化を楽しんで":score>=60?"安心基盤あり。少しずつ深めよう":score>=40?"普通。本人確認を進めよう":"⚠ 信頼構築が急務";
  if(cross) msg+=" ｜ 韓日クロスなので言語・文化の確認を";
  const res=document.getElementById("res");res.style.display="block";
  res.innerHTML="🛡 "+a+" × "+b+" 安心相性："+score+"点<br>"+msg;
  items.unshift({a,b,score,cross,date:new Date().toLocaleDateString()});
  localStorage.setItem(KEY,JSON.stringify(items));render();
}
function del(i){items.splice(i,1);localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const box=document.getElementById("list");
  if(!items.length){box.innerHTML="<b>📋 診断履歴</b><p style='font-size:13px;color:var(--muted);margin:6px 0 0'>暂无记录</p>";return;}
  box.innerHTML="<b>📋 診断履歴（"+items.length+"）</b>"+items.map((it,i)=>
    "<div style='display:flex;justify-content:space-between;padding:9px;border:1px solid var(--line);border-radius:10px;margin-top:8px'>"+
    "<div style='font-size:14px'>"+it.a+" × "+it.b+(it.cross?" 🌏":"")+" <span style='color:var(--muted);font-size:11px'>"+it.date+"</span></div>"+
    "<div><span class='h-coral' style='font-weight:700'>"+it.score+"</span> <button class='del' onclick='del("+i+")'>删</button></div></div>").join("");
}
render();
</script>
</body>
</html>
