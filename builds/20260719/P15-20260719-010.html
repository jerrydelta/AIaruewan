<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>AI 邮件分诊工具</title>
<style>
:root{
  --coral:#FF6B6B;
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}

</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">productivity</span><span class="tag">automation</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">AI 邮件分诊工具</h1>
    <p class="h-coral" style="font-size:13px;margin:0">AI email triage tool (auto-classify + summarize + unsubscribe)</p>
  </div>
  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">AI 邮件分诊是高价赛道，开源 / 低价 + AI 自动清理 + 隐私仍有差异化窗口。</p>
  </div>
  <div class="card">
    <b>🛠 工具</b>
    
<label>邮件主题</label><input id="eSub" placeholder="Q3 财报审阅">
<label>发件人</label><input id="eFrom" placeholder="finance@x.com">
<label>分类</label><select id="eCat"><option value="重要">重要</option><option value="订阅">订阅</option><option value="推广">推广</option><option value="垃圾">垃圾</option></select>
<button class="btn" onclick="addE()">归档邮件</button>
<div class="row" style="margin-top:8px"><select id="eFilter" onchange="render()"><option value="all">全部</option><option value="重要">仅重要</option><option value="订阅">仅订阅</option><option value="推广">仅推广</option><option value="垃圾">仅垃圾</option></select></div>
  </div>

  <div class="card" id="list"></div>
  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://getinboxzero.com" target="_blank" style="color:var(--coral)">Inbox Zero · Superhuman · Shortwave · SaneBox</a>
  </div>
<script>

const KEY='P15-20260719-010';
let items=JSON.parse(localStorage.getItem(KEY)||'[]');
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function addE(){
 var s=document.getElementById('eSub').value.trim();
 var f=document.getElementById('eFrom').value.trim();
 var c=document.getElementById('eCat').value;
 if(!s){alert('主题');return;}
 items.unshift({id:Date.now(),s:s,f:f,c:c,done:false});
 document.getElementById('eSub').value='';document.getElementById('eFrom').value='';save();
}
function toggle(id){var x=items.find(i=>i.id==id);if(x)x.done=!x.done;save();}
function del(id){items=items.filter(i=>i.id!=id);save();}
var colors={重要:'var(--coral)',订阅:'#74C0FC',推广:'#FFA94D',垃圾:'#999'};
function render(){
 var box=document.getElementById('list');
 var f=document.getElementById('eFilter').value;
 var view=items.filter(i=>f=='all'||i.c==f);
 box.innerHTML='<b>📥 收件箱 ('+items.filter(i=>!i.done).length+' 未处理)</b>';
 if(!view.length){box.innerHTML+='<p style="font-size:13px;color:#999">空的</p>';return;}
 box.innerHTML+=view.map(i=>'<div class="card" style="margin:6px 0;padding:10px"><div style="display:flex;justify-content:space-between"><span style="'+(i.done?'text-decoration:line-through;color:#aaa':'font-weight:600')+'">'+esc(i.s)+'</span><span class="tag" style="color:'+colors[i.c]+';background:#fff;border-color:#eee">'+i.c+'</span></div><div style="font-size:12px;color:#999">'+esc(i.f||'')+'</div><a style="color:var(--coral);cursor:pointer;font-size:12px" onclick="toggle('+i.id+')">'+(i.done?'↩':'已处理')+'</a> <a style="color:#999;cursor:pointer;font-size:12px" onclick="del('+i.id+')">删除</a></div>').join('');
}
function esc(s){return (s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
render();

</script>
</body>
</html>
