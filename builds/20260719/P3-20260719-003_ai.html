<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>情侣纪念日倒数+礼物提醒（AI版）</title>
<style>
:root{--coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;--bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
.small{font-size:12px;color:var(--muted)}
.del{color:var(--coral);font-size:12px;cursor:pointer;float:right;margin-left:8px}
.item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line);font-size:14px}
.big{font-size:22px;font-weight:700}
.warn{color:#E8913B}
.over{color:var(--coral)}
.ai-bg{background:linear-gradient(135deg,#FFF0F0 0%,#F0F8FF 100%)}
.ai-border{border:2px solid var(--coral)}
.ai-card .collapse-header{background:var(--coral);color:#fff;padding:12px 16px;border-radius:12px 12px 0 0;cursor:pointer;font-weight:600}
.ai-card .collapse-body{padding:16px;background:#fff;border-radius:0 0 12px 12px}
#aiChat{height:200px;overflow-y:auto;border:1px solid var(--line);border-radius:8px;padding:8px;margin:8px 0;background:#fafafa}
.ai-msg{margin:6px 0;padding:8px 12px;border-radius:12px;font-size:13px}
.ai-msg.user{background:var(--coral);color:#fff;margin-left:40px}
.ai-msg.assistant{background:#f0f0f0;color:var(--ink);margin-right:40px}
.collapsed{display:none}
</style>
</head>
<body>
<div class="card">
  <div><span class="tag">lifestyle</span><span class="tag">anniversary</span></div>
  <h1 style="font-size:20px;margin:8px 0 4px">情侣纪念日倒数 + 礼物提醒</h1>
  <p class="h-coral" style="font-size:13px;margin:0">Couples anniversary countdown + gift/deal reminder app</p>
</div>
<div class="card">
  <b>💡 痛点</b>
  <p style="font-size:14px;color:#555;margin:6px 0 0">纪念日/倒数提醒应用是忠诚的小众品类。但多数要么太泛，要么仅限地区；一个英文优先、面向情侣、含"临近自动礼物提醒"的应用在欧美市场供给不足。</p>
</div>
<div class="card">
  <b>🛠 工具 · 重要日子</b>
  <label>名称</label><input id="eName" placeholder="如：恋爱纪念日">
  <div class="row">
    <div><label>类型</label><select id="eType"><option>纪念日</option><option>生日</option><option>其他</option></select></div>
    <div><label>日期</label><input type="date" id="eDate"></div>
  </div>
  <button class="btn" onclick="addEvent()">+ 添加日子</button>
</div>
<div class="card" id="list"><b>⏳ 倒数清单</b><div id="events"></div></div>
<div class="card ai-card ai-bg ai-border" id="aiCard">
  <div class="collapse-header" onclick="toggleAI()">🤖 AI 助手（用户自带Key · 零成本）</div>
  <div class="collapse-body collapsed" id="aiBody">
    <div id="aiKeySection">
      <label>Hy3 API Key（用户自带，零成本运营）</label>
      <input type="password" id="aiKey" placeholder="sk-..." style="margin:6px 0">
      <button class="btn" onclick="saveKey()" style="background:#3FB984;margin:4px 0">保存Key</button>
      <div class="small">使用腾讯混元Hy3 API，按量计费。Key存储在本地，不上传服务器。</div>
    </div>
    <div id="aiChatSection" style="display:none">
      <div id="aiChat"></div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <input type="text" id="aiInput" placeholder="问AI，如：纪念日送什么礼物？" style="flex:1">
        <button class="btn" onclick="sendAI()" style="width:auto;padding:8px 16px">发送</button>
      </div>
    </div>
  </div>
</div>
<div class="card" style="font-size:12px;color:var(--muted)">
  <b>来源参考</b><br>
  <a href="https://apps.apple.com/us/app/thedaybefore-countdown/id1456815996" target="_blank" style="color:var(--coral)">TheDayBefore / WidgetClub / 倒数纪念日</a>
</div>
<script>
const KEY="P3-20260719-003";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function addEvent(){const name=eName.value.trim();const date=eDate.value;if(!name||!date){alert('请填名称和日期');return;}
  items.push({name,type:eType.value,date,t:Date.now()});eName.value='';eDate.value='';save();}
function del(i){items.splice(i,1);save();}
function daysLeft(d){const t=new Date(d+'T00:00:00');const n=new Date();n.setHours(0,0,0,0);
  return Math.round((t-n)/86400000);}
function render(){const sorted=[...items].sort((a,b)=>daysLeft(a.date)-daysLeft(b.date));
  events.innerHTML=sorted.length?sorted.map(x=>{const d=daysLeft(x.date);
    const cls=d<0?'over':(d<=7?'warn':'');const txt=d<0?`已过 ${-d} 天`:`还有 ${d} 天`;
    const gi=items.indexOf(x);
    return `<div class="item"><div><b>${x.name}</b> <span class="small">${x.type}</span><br><span class="small">${x.date}</span></div><div style="text-align:right"><div class="big ${cls}">${txt}</div><span class="del" onclick="del(${gi})">删除</span></div></div>`;}).join(''):'<p class="small">还没有日子，先添加一个吧。</p>';}
render();
let aiKey=localStorage.getItem('hy3_key')||'';
let aiHistory=[];
function toggleAI(){document.getElementById('aiBody').classList.toggle('collapsed');}
function saveKey(){aiKey=document.getElementById('aiKey').value.trim();if(!aiKey){alert('请输入API Key');return;}
  localStorage.setItem('hy3_key',aiKey);document.getElementById('aiKeySection').style.display='none';document.getElementById('aiChatSection').style.display='block';
  addAIMessage('assistant','Key已保存！我是你的礼物/惊喜策划助手，可以帮你想点子。');}
async function sendAI(){if(!aiKey){alert('请先保存API Key');return;}
  const input=document.getElementById('aiInput');const msg=input.value.trim();if(!msg)return;
  addAIMessage('user',msg);input.value='';aiHistory.push({role:'user',content:msg});
  const ctx=items.map(x=>`${x.name}(${x.type},${x.date})`).join('、')||'（暂无记录）';
  const sys={role:'system',content:'你是情侣礼物/惊喜策划助手。用户的重要日子：'+ctx+'。请给简洁中文建议。'};
  try{const res=await fetch('https://tokenhub.tencentmaas.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+aiKey},body:JSON.stringify({model:'hunyuan-pro',messages:[sys,...aiHistory],stream:false})});
    const data=await res.json();const reply=data.choices?.[0]?.message?.content||'AI响应失败';
    aiHistory.push({role:'assistant',content:reply});addAIMessage('assistant',reply);}catch(e){addAIMessage('assistant','调用失败：'+e.message);}}
function addAIMessage(role,content){const chat=document.getElementById('aiChat');const div=document.createElement('div');div.className='ai-msg '+role;div.textContent=content;chat.appendChild(div);chat.scrollTop=chat.scrollHeight;}
if(aiKey){document.getElementById('aiKeySection').style.display='none';document.getElementById('aiChatSection').style.display='block';}
</script>
</body>
</html>
