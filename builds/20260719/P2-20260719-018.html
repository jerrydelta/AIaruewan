<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>韓国語相手別ギフト履歴・自動提案SaaS｜韩礼物记录</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.item{display:flex;justify-content:space-between;align-items:flex-start;
  padding:10px;border:1px solid var(--line);border-radius:10px;margin-top:8px}
.del{color:var(--muted);font-size:13px;cursor:pointer;border:none;background:none}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">relationship</span><span class="tag">gift_planner</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">韓国語相手別ギフト履歴・自動提案SaaS</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Korean per-recipient gift history &amp; auto-recommendation SaaS</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">韓国の贈り物は쿠팡/배민等のギフト機能が主力だが、「相手別履歴・自動リマインド・予算別提案」特化SaaSは断片化。記念日忘れ防止ニーズ大。痛点：去年何をあげたか忘れる。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 선물 기록</b>
    <input id="person" placeholder="받는 사람（例：어머니）">
    <div class="row"><input id="gift" placeholder="선물한 것"><input id="date" type="date"></div>
    <div class="row"><input id="occasion" placeholder="기회（생일 등）"><input id="budget" type="number" placeholder="예산원"></div>
    <button class="btn" onclick="add()">기록</button>
  </div>

  <div class="card" id="list"><b>📋 선물 기록</b></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.koreaherald.com/article/10714677" target="_blank" style="color:var(--coral)">기프트몰 / 쿠팡선물하기 / 배민선물하기</a>
  </div>

<script>
const KEY="P2-20260719-018";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function add(){
  const person=document.getElementById("person").value.trim();
  const gift=document.getElementById("gift").value.trim();
  if(!person||!gift){alert("받는 사람과 선물을 입력하세요");return;}
  items.unshift({person,gift,date:document.getElementById("date").value||new Date().toLocaleDateString(),
    occasion:document.getElementById("occasion").value.trim(),budget:document.getElementById("budget").value||""});
  localStorage.setItem(KEY,JSON.stringify(items));
  document.getElementById("person").value="";document.getElementById("gift").value="";document.getElementById("date").value="";
  document.getElementById("occasion").value="";document.getElementById("budget").value="";
  render();
}
function del(i){items.splice(i,1);localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const box=document.getElementById("list");
  if(!items.length){box.innerHTML="<b>📋 선물 기록</b><p style='font-size:13px;color:var(--muted);margin:6px 0 0'>暂无记录</p>";return;}
  box.innerHTML="<b>📋 선물 기록（"+items.length+"）</b>"+items.map((it,i)=>
    "<div class='item'><div style='flex:1'><div style='font-size:14px'>"+it.person+" 에게 <b>"+it.gift+"</b></div>"+
    "<div style='font-size:11px;color:var(--muted)'>"+it.date+(it.occasion?(" ・ "+it.occasion):"")+(it.budget?(" ・ "+it.budget+"원"):"")+"</div></div>"+
    "<button class='del' onclick='del("+i+")'>删除</button></div>").join("");
}
render();
</script>
</body>
</html>
