<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>跨国婚礼 AI 分组 + WhatsApp 提醒</title>
<style>
:root{
  --coral:#FF6B6B; --coral-dark:#E85555; --ink:#2D2D2D; --muted:#8A8A8A;
  --bg:#F7F7F7; --card:#FFFFFF; --line:#ECECEC; --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
.item{display:flex;justify-content:space-between;align-items:center;
  padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
.item:last-child{border-bottom:none}
.del{color:var(--coral);font-size:13px;cursor:pointer}
.sum{font-size:13px;color:var(--muted)}
.wa{display:inline-block;margin-top:4px;color:#25D366;font-size:12px;text-decoration:none;font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">wedding</span><span class="tag">multicultural_rsvp</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">跨国婚礼 AI 分组 + WhatsApp 提醒</h1>
    <p class="h-coral" style="font-size:13px;margin:0">AI-grouped RSVP with WhatsApp reminders for cross-border weddings</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">多元文化/跨国婚礼宾客分布多国多事件，RSVP 极复杂。Wedd.ai 用 AI 自动分组 + WhatsApp 提醒。跨城跨国跟进靠电话/WhatsApp 混乱。</p>
  </div>

  <div class="card">
    <b>🛠 工具：多事件宾客</b>
    <label>添加婚礼事件（如 迎宾宴 / 主婚宴）</label>
    <div class="row">
      <div><input type="text" id="ename" placeholder="事件名"></div>
      <div><button class="btn" onclick="addEvent()" style="margin-top:6px">添加</button></div>
    </div>
    <div id="events" class="sum" style="margin-top:6px"></div>
  </div>

  <div class="card">
    <b>👥 宾客 + WhatsApp 提醒</b>
    <label>姓名</label><input type="text" id="gname" placeholder="姓名">
    <div class="row">
      <div><label>分组</label><input type="text" id="ggrp" placeholder="德里亲戚"></div>
      <div><label>手机号(含区号)</label><input type="text" id="gphone" placeholder="9188888888"></div>
    </div>
    <div class="row">
      <div><label>参加事件</label><select id="gev"></select></div>
      <div><label>RSVP</label><select id="grsvp"><option value="wait">待定</option><option value="yes">出席</option><option value="no">缺席</option></select></div>
    </div>
    <button class="btn" onclick="addGuest()">＋ 添加宾客</button>
    <button class="btn" onclick="autoGroup()" style="background:#3FB984">🤖 按姓氏智能分组</button>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.wedd.ai/blog/best-online-rsvp-tools-for-wedding-planning" target="_blank" style="color:var(--coral)">Wedd.ai / Joy / The Knot</a>
  </div>

<script>
const KEY="P13-20260719-009";
let events=JSON.parse(localStorage.getItem(KEY+"_e")||'["主婚宴"]');
let guests=JSON.parse(localStorage.getItem(KEY+"_g")||"[]");
function save(){localStorage.setItem(KEY+"_e",JSON.stringify(events));localStorage.setItem(KEY+"_g",JSON.stringify(guests));render();}
function addEvent(){
  const n=document.getElementById('ename').value.trim();
  if(!n){alert('请填写事件名');return;}
  events.push(n);document.getElementById('ename').value='';save();
}
function addGuest(){
  const n=document.getElementById('gname').value.trim();
  if(!n){alert('请填写姓名');return;}
  guests.push({name:n,grp:document.getElementById('ggrp').value.trim(),
    phone:document.getElementById('gphone').value.trim(),
    ev:document.getElementById('gev').value,rsvp:document.getElementById('grsvp').value});
  document.getElementById('gname').value='';document.getElementById('ggrp').value='';document.getElementById('gphone').value='';
  save();
}
function delG(i){guests.splice(i,1);save();}
function autoGroup(){guests.forEach(g=>{if(!g.grp)g.grp=(g.name[0]||'?')+'姓';});save();}
function render(){
  document.getElementById('events').innerHTML='事件：'+events.map(e=>'<span class="tag">'+e+'</span>').join('');
  const sel='<option value="all">全部事件</option>'+events.map(e=>'<option>'+e+'</option>').join('');
  document.getElementById('gev').innerHTML=sel;
  const list=document.getElementById('list');
  let html='<b>📋 宾客 ('+guests.length+')</b>';
  guests.forEach((g,i)=>{
    const wa=g.phone?'<a class="wa" href="https://wa.me/'+g.phone.replace(/[^0-9]/g,'')+'?text='+encodeURIComponent('Hi '+g.name+'，期待您参加我们的婚礼 '+g.ev+'！请回复是否出席 🙏')+'" target="_blank">📲 WhatsApp 提醒</a>':'<span class="sum">填手机号可发提醒</span>';
    html+='<div class="item"><div><b>'+g.name+'</b> <span class="sum">· '+g.grp+' · '+g.ev+' · '+(g.rsvp==='yes'?'出席':g.rsvp==='no'?'缺席':'待定')+'</span><br>'+wa+'</div><span class="del" onclick="delG('+i+')">删</span></div>';
  });
  if(!guests.length) html+='<div class="sum">添加宾客开始管理。</div>';
  list.innerHTML=html;
}
render();
</script>
</body>
</html>
