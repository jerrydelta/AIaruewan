<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>约稿进度+担保管理</title>
<style>
:root{
  --coral:#FF6B6B; --coral-dark:#E85555; --ink:#2D2D2D; --muted:#8A8A8A;
  --bg:#F7F7F7; --card:#FFFFFF; --line:#ECECEC; --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn.s{width:auto;display:inline-block;padding:8px 12px;margin:4px 4px 0 0;font-size:13px}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">hobby</span><span class="tag">painting_drawing</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">约稿进度 + 担保管理</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Illustrator commission manager with stage + escrow</p>
  </div>
  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">约稿最怕"联系分散、中途消失、代金纠纷"。用四阶段进度 + 担保交易状态，让双方都看得见走到哪步、钱到没到。</p>
  </div>
  <div class="card">
    <b>🛠 工具</b>
    <label>客户 / 需求</label><input id="client" placeholder="如：小红书用户 A · 头像约稿">
    <div class="row">
      <div><label>金额(¥)</label><input id="amt" type="number" value="0"></div>
      <div><label>当前阶段</label><select id="stage"><option>草稿</option><option>线稿</option><option>上色</option><option>成稿</option></select></div>
    </div>
    <label>付款状态</label>
    <select id="pay"><option value="pending">待付（担保中）</option><option value="paid">已确认打款</option></select>
    <button class="btn" onclick="add()">创建约稿</button>
  </div>
  <div class="card" id="list"></div>
  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://m.6137.net/soft/750249.html" target="_blank" style="color:var(--coral)">米画师</a>
  </div>
<script>
const KEY="P6-20260719-019";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
const STAGES=['草稿','线稿','上色','成稿'];
function add(){
  const client=document.getElementById('client').value.trim();
  if(!client){alert('填需求');return;}
  items.unshift({client,amt:+document.getElementById('amt').value||0,stage:document.getElementById('stage').value,
    pay:document.getElementById('pay').value,id:Date.now()});
  document.getElementById('client').value='';save();
}
function setStage(id,s){items.find(x=>x.id===id).stage=s;save();}
function togglePay(id){const it=items.find(x=>x.id===id);it.pay=it.pay==='paid'?'pending':'paid';save();}
function del(id){items=items.filter(x=>x.id!==id);save();}
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const el=document.getElementById('list');
  if(!items.length){el.innerHTML='<b>🎨 约稿</b><p style="font-size:13px;color:#999">还没有约稿。</p>';return;}
  let total=0,got=0;items.forEach(x=>{total+=x.amt;if(x.pay==='paid')got+=x.amt;});
  el.innerHTML='<b>🎨 约稿 '+items.length+' 单</b><div style="font-size:13px;color:#555">总额 ¥'+total+' ｜ 已收 ¥'+got+'</div>'+
    items.map(x=>{
      const idx=STAGES.indexOf(x.stage);
      const bar=STAGES.map((s,i)=>(i<=idx?'●':'○')).join('');
      return '<div style="border-top:1px solid var(--line);padding:8px 0">'+
        '<div style="font-weight:600">'+esc(x.client)+'</div>'+
        '<div style="font-size:13px;color:#555">'+bar+' '+x.stage+' ｜ ¥'+x.amt+' <span style="color:'+(x.pay==='paid'?'var(--ok)':'#E8A100')+'">'+(x.pay==='paid'?'已收':'担保中')+'</span></div>'+
        '<button class="btn s" onclick="togglePay('+x.id+')">切换收款</button>'+
        '<button class="btn s" style="background:#bbb" onclick="del('+x.id+')">删除</button></div>';
    }).join('');
}
function esc(s){return (s||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
render();
</script>
</body>
</html>
