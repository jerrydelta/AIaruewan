<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>离线语音转写笔记</title>
<style>
:root{
  --coral:#FF6B6B;
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}

</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">productivity</span><span class="tag">note_taking</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">离线语音转写笔记</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Offline voice-to-notes tool (local Whisper model, one-time purchase)</p>
  </div>
  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">本地离线语音转写因隐私与离线需求走热，离线 + 买断是清晰卖点。</p>
  </div>
  <div class="card">
    <b>🛠 工具</b>
    
<label>语音转写文本（粘贴 / 输入，离线 Whisper 模拟）</label>
<textarea id="vText" rows="5" placeholder="在此粘贴转录内容..."></textarea>
<button class="btn" onclick="saveNote()">保存为笔记</button>
<button class="btn" onclick="exportAll()" style="background:var(--muted)">导出全部 Markdown</button>
  </div>

  <div class="card" id="list"></div>
  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://github.com/ggerganov/whisper.cpp" target="_blank" style="color:var(--coral)">Whisper Notes · MacWhisper · Aiko · superwhisper</a>
  </div>
<script>

const KEY='P15-20260719-007';
let items=JSON.parse(localStorage.getItem(KEY)||'[]');
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function saveNote(){
 var t=document.getElementById('vText').value.trim();
 if(!t){alert('空');return;}
 items.unshift({id:Date.now(),t:t,ts:new Date().toLocaleString()});
 document.getElementById('vText').value='';save();
}
function del(id){items=items.filter(i=>i.id!=id);save();}
function exportAll(){
 var md=items.map(i=>'# '+i.ts+'\n\n'+i.t).join('\n\n---\n\n');
 var blob=new Blob([md],{type:'text/markdown'});
 var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='notes.md';a.click();
}
function render(){
 var box=document.getElementById('list');
 box.innerHTML='<b>🎙 笔记 ('+items.length+')</b>'+(items.length?'':'<p style="font-size:13px;color:#999">还没有</p>');
 box.innerHTML+=items.map(i=>'<div class="card" style="margin:6px 0;padding:10px"><div style="font-size:13px;white-space:pre-wrap">'+esc(i.t.slice(0,200))+(i.t.length>200?'…':'')+'</div><div style="font-size:11px;color:#aaa;margin-top:4px">'+i.ts+' <a style="color:var(--coral);cursor:pointer" onclick="del('+i.id+')">删除</a></div></div>').join('');
}
function esc(s){return (s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
render();

</script>
</body>
</html>
