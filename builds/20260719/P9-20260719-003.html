<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>外卖众包骑手净收入看板 + 接单策略</title>
<style>
:root{
  --coral:#FF6B6B; --coral-dark:#E85555; --ink:#2D2D2D; --muted:#8A8A8A;
  --bg:#F7F7F7; --card:#FFFFFF; --line:#ECECEC; --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.small{font-size:12px;color:var(--muted)}
.stat{display:flex;justify-content:space-between;font-size:14px;padding:5px 0;border-bottom:1px dashed var(--line)}
.stat b{color:var(--coral)}
.del{color:var(--muted);font-size:12px;text-decoration:underline}
.item{font-size:13px;padding:8px 0;border-bottom:1px solid var(--line)}
.tip{background:#FFF7E6;border:1px solid #FFE0A3;border-radius:10px;padding:10px;font-size:13px;margin-top:8px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">gig_economy</span><span class="tag">delivery</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">外卖众包骑手净收入看板 + 接单策略</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Delivery courier net-income dashboard + dispatch-strategy</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">中国外卖众包骑手规模千万级，对"单均收入、时段热力、扣费明细、到账记录"有强需求。现有助手类 App 多为信息聚合，缺乏"实时净收入看板 + 接单策略建议"。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 班次入账</b>
    <label>日期</label>
    <input type="date" id="date">
    <div class="row">
      <div><label>平台</label><select id="platform"><option>美团</option><option>饿了么</option><option>京东</option><option>其他</option></select></div>
      <div><label>订单数</label><input type="number" id="orders" placeholder="单"></div>
    </div>
    <div class="row">
      <div><label>总收入(元)</label><input type="number" id="gross" placeholder="含奖励"></div>
      <div><label>平台抽成(元)</label><input type="number" id="cut" placeholder="0"></div>
    </div>
    <label>额外奖励(元)</label>
    <input type="number" id="bonus" placeholder="0">
    <button class="btn" onclick="add()">记录班次</button>
    <div class="small" style="margin-top:8px">净收入 = 总收入 − 抽成 + 奖励；单均 = 净收入 ÷ 订单数。</div>
  </div>

  <div class="card">
    <b>📊 净收入看板</b>
    <div id="summary"></div>
    <div id="strategy"></div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://apps.apple.com/cn/search?term=%E9%AA%91%E6%89%8B%E4%BC%97%E5%8C%85%E5%8A%A9%E6%89%8B" target="_blank" style="color:var(--coral)">骑手众包助手 / 美饿京众包骑手助手 / 外卖众包助手</a>
  </div>

<script>
const KEY="P9-20260719-003";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function add(){
  const date=document.getElementById("date").value||new Date().toISOString().slice(0,10);
  const platform=document.getElementById("platform").value;
  const orders=parseFloat(document.getElementById("orders").value)||0;
  const gross=parseFloat(document.getElementById("gross").value)||0;
  const cut=parseFloat(document.getElementById("cut").value)||0;
  const bonus=parseFloat(document.getElementById("bonus").value)||0;
  const net=gross-cut+bonus;
  const per=orders>0?net/orders:0;
  items.unshift({date,platform,orders,gross,cut,bonus,net,per,id:Date.now()});
  save();
}
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function del(id){items=items.filter(x=>x.id!==id);save();}
function render(){
  const totalNet=items.reduce((s,x)=>s+x.net,0);
  const totalOrders=items.reduce((s,x)=>s+x.orders,0);
  const avgPer=totalOrders>0?totalNet/totalOrders:0;
  // 近7天
  const days={};
  items.forEach(x=>days[x.date]=(days[x.date]||0)+x.net);
  const keys=Object.keys(days).sort().slice(-7);
  const trend=keys.map(k=>k.slice(5)+":"+Math.round(days[k])).join("  ");
  const sum=document.getElementById("summary");
  sum.innerHTML='<div class="stat"><span>净收入合计</span><b>'+totalNet.toLocaleString()+' 元</b></div>'+
    '<div class="stat"><span>总单量</span><span>'+totalOrders+' 单</span></div>'+
    '<div class="stat"><span>平均单均净收</span><b>'+avgPer.toFixed(1)+' 元</b></div>'+
    '<div class="small" style="margin-top:6px">近7天：'+trend+'</div>';
  // 接单策略
  const st=document.getElementById("strategy");
  if(items.length){
    const rec=items[0];
    let msg='';
    if(rec.per<6) msg='⚠️ 当前单均 '+rec.per.toFixed(1)+' 元偏低，建议错峰（午晚高峰/恶劣天气）接单或优先跑远单奖励。';
    else if(rec.per>=10) msg='✅ 当前单均 '+rec.per.toFixed(1)+' 元优秀，保持当前时段策略。';
    else msg='👍 单均 '+rec.per.toFixed(1)+' 元中等，可尝试叠加平台冲单奖励提升收益。';
    st.innerHTML='<div class="tip">'+msg+'</div>';
  } else st.innerHTML='';
  const list=document.getElementById("list");
  list.innerHTML='<b>📋 班次记录（'+items.length+'）</b>'+
    (items.length?items.map(x=>'<div class="item"><div style="display:flex;justify-content:space-between"><b>'+x.platform+' · '+x.date+'</b><span class="del" onclick="del('+x.id+')">删除</span></div><div class="small">'+x.orders+'单 · 净 <b>'+x.net.toLocaleString()+'</b> 元 · 单均 '+x.per.toFixed(1)+'</div></div>').join(""):'<p class="small">暂无记录</p>');
}
render();
</script>
</body>
</html>
