<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>轻量小红书数据分析（个人低价版）</title>
<style>:root{
  --coral:#FF6B6B;
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
.item{border-top:1px solid var(--line);padding:10px 0;position:relative}
.del{position:absolute;right:0;top:10px;background:#fff;color:var(--coral);
  border:1px solid #FFD9D9;border-radius:8px;font-size:12px;padding:4px 10px;cursor:pointer}
.mini{font-size:13px;color:var(--ink);background:#FAFAFA;border:1px solid var(--line);
  border-radius:10px;padding:10px;margin-top:8px}
.hr{height:1px;background:var(--line);border:none;margin:14px 0}</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">social</span><span class="tag">analytics</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">轻量小红书数据分析（个人低价版）</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Lightweight Xiaohongshu analytics (low-cost/on-demand for solo creators)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">小红书官方后台数据维度有限，深度分析依赖第三方。千瓜基础版300-500元/月、专业版1000-2000元/月。粉丝画像、竞品投放、热搜词挖词是核心需求。痛点：价格高（个人难承担）、数据延迟、免费版极弱。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <div class="row">
<div><label>日期</label><input type="date" id="d1"></div>
<div><label>粉丝数</label><input type="number" id="d2" placeholder="0"></div></div>
<div class="row">
<div><label>笔记数</label><input type="number" id="d3" placeholder="0"></div>
<div><label>赞藏数</label><input type="number" id="d4" placeholder="0"></div></div>
<label>阅读数</label><input type="number" id="d5" placeholder="0">
<button class="btn" onclick="addDay()">记录当日数据</button>
<div id="sum" class="mini"></div>
  </div>

  <div class="card" id="list"></div>

  

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://qian-gua.com" target="_blank" style="color:var(--coral)">千瓜数据 / 新红数据 / 极致了数据 / 灰豚数据</a>
  </div>

<script>
const KEY="P4-20260719-003";
let items = JSON.parse(localStorage.getItem(KEY) || "[]");
function save(){ localStorage.setItem(KEY, JSON.stringify(items)); render(); }
function addDay(){
 var fans=+document.getElementById('d2').value||0;
 items.push({date:document.getElementById('d1').value||'未填',fans:fans,notes:+document.getElementById('d3').value||0,like:+document.getElementById('d4').value||0,read:+document.getElementById('d5').value||0,ts:Date.now()});
 save();
 document.getElementById('d1').value='';document.getElementById('d2').value='';document.getElementById('d3').value='';document.getElementById('d4').value='';document.getElementById('d5').value='';
}
function render(){
 var el=document.getElementById('list');
 if(!items.length){el.innerHTML='<b>📊 数据记录</b><p style="font-size:13px;color:var(--muted)">还没有数据，记录第一天吧。</p>';return;}
 items.sort(function(a,b){return a.ts-b.ts;});
 var s='';for(var i=0;i<items.length;i++){
  var g=(i>0)?(items[i].fans-items[i-1].fans):0;
  var gs=g>0?('+'+g):(''+g);
  s+='<div class="item"><div><b>'+items[i].date+'</b> · 粉丝 '+items[i].fans+' <span style="color:'+(g>=0?'var(--ok)':'var(--coral)')+'">('+gs+')</span></div><div style="font-size:12px;color:var(--muted)">笔记'+items[i].notes+' · 赞藏'+items[i].like+' · 阅读'+items[i].read+'</div><button class="del" onclick="del('+i+')">删</button></div>';
 }
 var tot=items.length>1?(items[items.length-1].fans-items[0].fans):0;
 document.getElementById('sum').innerHTML='累计粉丝增长：<b class="h-coral">'+tot+'</b> ｜ 记录天数：'+items.length;
 el.innerHTML='<b>📊 数据记录（'+items.length+'天）</b>'+s;
}
function del(i){items.splice(i,1);save();}
render();
</script>
</body>
</html>
