<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>戒赌账本 · 资金+触发预警</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.big{font-size:26px;font-weight:700;color:var(--coral)}
.muted{color:var(--muted);font-size:13px}
.del{color:var(--coral);font-size:12px;cursor:pointer;float:right}
.warn{background:#FFF0F0;color:var(--coral);padding:8px;border-radius:10px;margin-top:8px;font-size:13px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">addiction_recovery</span><span class="tag">quit_gambling</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">戒赌账本 · 资金 + 触发预警</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Gambling fund tracker + trigger alert (cross-cultural gap)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">日本有官方戒赌 App、患病率高；中国同样有庞大赌瘾人群却缺权威数字产品。本工具做"资金记录 + 触发预警"轻量账本：每笔下注都记下来，累计超阈值即红色预警，帮你看见真实的钱去哪了。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <label>预警阈值（元 / 周期累计）</label>
    <input type="number" id="limit" placeholder="如 500" value="500">
    <div class="row">
      <div><label>日期</label><input type="date" id="date"></div>
      <div><label>金额(元)</label><input type="number" id="amt" placeholder="0 为无下注"></div>
    </div>
    <label>触发场景</label>
    <input id="trigger" placeholder="如 手机推送彩票开奖">
    <button class="btn" onclick="addLog()">记一笔</button>
    <div style="text-align:center;margin-top:10px">
      <div class="big" id="total">¥0</div><div class="muted">本期累计下注</div>
    </div>
    <div id="alert"></div>
  </div>

  <div class="card" id="list"><b>💰 资金记录</b><div id="listBody" style="margin-top:8px"></div></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://apps.apple.com/cm/app/day-see-%E3%82%AE%E3%83%A3%E3%83%B3%E3%83%96%E3%83%AB%E7%AD%89%E4%BE%9D%E5%AD%98%E7%97%87%E7%9B%B8%E8%AB%87%E6%94%AF%E6%8F%B4%E3%82%A2%E3%83%97%E3%83%AA/id6446186680" target="_blank" style="color:var(--coral)">Day-See 戒赌App（对照）</a>
  </div>

<script>
const KEY="P14-20260719-006";
let data=JSON.parse(localStorage.getItem(KEY)||'{"limit":500,"logs":[]}');
function addLog(){
  const rec={date:document.getElementById('date').value||new Date().toISOString().slice(0,10),
    amt:+document.getElementById('amt').value||0,trigger:document.getElementById('trigger').value.trim()};
  data.logs.push(rec);save();
}
function save(){
  data.limit=+document.getElementById('limit').value||data.limit;
  localStorage.setItem(KEY,JSON.stringify(data));render();
}
function render(){
  document.getElementById('limit').value=data.limit;
  const total=data.logs.reduce((s,l)=>s+l.amt,0);
  document.getElementById('total').textContent="¥"+total.toLocaleString();
  const al=document.getElementById('alert');
  if(total>=data.limit)al.innerHTML='<div class="warn">🚨 已超预警阈值 ¥'+data.limit+'！请立刻停止并求助。</div>';
  else if(total>=data.limit*0.7)al.innerHTML='<div class="warn">⚠️ 已接近阈值 '+Math.round(total/data.limit*100)+'%，注意克制。</div>';
  else al.innerHTML='';
  const body=document.getElementById('listBody');
  if(!data.logs.length){body.innerHTML='<div class="muted">暂无记录</div>';return;}
  body.innerHTML=data.logs.slice().reverse().map((l,i)=>
    '<div style="padding:6px 0;border-bottom:1px solid var(--line)">'+l.date+' · ¥'+l.amt+
    (l.trigger?' · '+l.trigger:'')+' <span class="del" onclick="del('+i+')">删除</span></div>').join('');
}
function del(i){data.logs.splice(i,1);save();}
save();
</script>
</body>
</html>
