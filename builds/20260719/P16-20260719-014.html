<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>部署配置生成器</title>
<style>
:root{
  --coral:#FF6B6B;
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">tech</span><span class="tag">deploy_tools</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">部署配置生成器</h1>
    <p class="h-coral" style="font-size:13px;margin:0">KO dev helper that templates Cloudflare/Railway deploy + local CDN.</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">个人开发者偏爱免费额度大的 Cloudflare Pages（带宽无限免费）与 Railway（月 $5 额度）。韩国 Okky 上"免费发布+CI 联动"需求很大</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    
<label>平台</label><select id="p_plat"><option>Cloudflare Pages</option><option>Railway</option></select>
<label>项目名</label><input id="p_name" placeholder="my-app">
<label>构建命令</label><input id="p_build" placeholder="npm run build">
<label>输出目录</label><input id="p_out" placeholder="dist">
<button class="btn" onclick="gen()">⚙️ 生成配置</button>
<label>配置内容</label><textarea id="p_res" rows="6" readonly style="background:#fafafa"></textarea>
<button class="btn" onclick="saveCfg()" style="background:var(--ok)">保存配置</button>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://pages.cloudflare.com" target="_blank" style="color:var(--coral)">Cloudflare Pages / Railway / Vercel / Netlify</a>
  </div>

<script>

const KEY="P16-20260719-014";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
let lastCfg='';
function gen(){
  const plat=document.getElementById('p_plat').value;
  const name=document.getElementById('p_name').value.trim()||'my-app';
  const build=document.getElementById('p_build').value.trim()||'npm run build';
  const out=document.getElementById('p_out').value.trim()||'dist';
  let cfg='';
  if(plat==='Cloudflare Pages'){
    cfg='# wrangler.toml\nname = "'+name+'"\ntype = "static"\n\n[build]\ncommand = "'+build+'"\ndestination = "'+out+'"';
  }else{
    cfg='{\n  "name": "'+name+'",\n  "build": {\n    "builder": "NIXPACKS",\n    "buildCommand": "'+build+'",\n    "outputDirectory": "'+out+'"\n  }\n}';
  }
  lastCfg=cfg;
  document.getElementById('p_res').value=cfg;
}
function saveCfg(){
  if(!lastCfg){alert('请先生成配置');return;}
  items.push({cfg:lastCfg,added:new Date().toLocaleString()});
  save();
}
function del(i){items.splice(i,1);save();}
function render(){
  const el=document.getElementById('list');
  if(!items.length){el.innerHTML='<p style="font-size:13px;color:var(--muted)">暂无配置</p>';return;}
  el.innerHTML='<b>📦 配置库（'+items.length+'）</b>'+items.map((it,idx)=>
    '<div style="border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px">'+
    '<pre style="font-size:12px;background:#fafafa;border:1px solid var(--line);border-radius:8px;padding:8px;overflow:auto;white-space:pre-wrap;margin:0">'+esc(it.cfg)+'</pre>'+
    '<button class="btn" style="background:#fff;color:var(--coral);border:1px solid var(--line);margin-top:6px" onclick="del('+idx+')">删除</button>'+
    '</div>'
  ).join('');
}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
render();
</script>
</body>
</html>
