<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>本地优先加密日记+AI摘要（日本）</title>
<style>
:root{--coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;--bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn.ok{background:var(--ok)}
.tag{display:inline-block;font-size:11px;color:var(--coral);background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.small{font-size:12px;color:var(--muted)}
.del{color:var(--coral);font-size:13px;cursor:pointer;float:right}
</style>
</head>
<body>
<div class="card">
  <div><span class="tag">privacy</span><span class="tag">encrypted_notes</span></div>
  <h1 style="font-size:20px;margin:8px 0 4px">本地优先加密日记 ＋ AI 摘要（日本）</h1>
  <p class="h-coral" style="font-size:13px;margin:0">Local-first encrypted diary + AI summary, Japan</p>
</div>
<div class="card">
  <b>💡 痛点</b>
  <p style="font-size:14px;color:#555;margin:6px 0 0">日本「离线·私密日记」需求明显，Journelly 以离线优先、买断制受欢迎。但「E2E 加密＋（可选）云同步＋本地 AI 日记摘要」仍不足。</p>
</div>
<div class="card">
  <b>🛠 工具 · 加密日记</b>
  <label>解锁密码（用于加密/解密，仅存于本次会话）</label>
  <div class="row"><input id="pw" type="password" placeholder="设置或输入密码"><button class="btn" style="width:auto;padding:8px 16px" onclick="unlock()">解锁</button></div>
  <hr style="border:none;border-top:1px solid var(--line);margin:14px 0">
  <label>日记标题</label><input id="dt" placeholder="今天的心情">
  <label>正文</label><textarea id="dc" rows="3" placeholder="写下今天发生的事…"></textarea>
  <button class="btn ok" onclick="addDiary()">加密保存（仅存本机）</button>
  <p class="small" style="margin-top:6px">🔒 演示级本地加密（XOR+Base64）：日记以密文存于 localStorage，不上传服务器。密码不持久化，关闭页面即需重新输入。</p>
</div>
<div class="card" id="list"></div>
<div class="card" style="font-size:12px;color:var(--muted)">
  <b>来源参考</b><br>
  <a href="https://apps.apple.com/cn/app/journelly/id6470714669" target="_blank" style="color:var(--coral)">Journelly（离线优先买断制日记）</a>
</div>
<script>
const KEY="P8-20260719-011";
let sessionPW="";
let diaries=JSON.parse(localStorage.getItem(KEY)||"[]");
function xor(t,k){let o="";for(let i=0;i<t.length;i++)o+=String.fromCharCode(t.charCodeAt(i)^k.charCodeAt(i%k.length));return o;}
function enc(t,k){return btoa(unescape(encodeURIComponent(xor(t,k))));}
function dec(b,k){try{return xor(decodeURIComponent(escape(atob(b))),k);}catch(e){return "【解密失败·密码可能错误】";}}
function unlock(){sessionPW=pw.value;if(!sessionPW){alert("请输入密码");return;}render();}
function addDiary(){if(!sessionPW){alert("请先输入解锁密码");return;}const t=dt.value.trim(),c=dc.value.trim();if(!t||!c){alert("请填标题和正文");return;}diaries.unshift({t:enc(t,sessionPW),c:enc(c,sessionPW),d:new Date().toISOString().slice(0,10)});localStorage.setItem(KEY,JSON.stringify(diaries));dt.value=dc.value="";render();}
function del(i){diaries.splice(i,1);localStorage.setItem(KEY,JSON.stringify(diaries));render();}
function render(){let o=`<b>🔐 加密日记（${diaries.length}）</b>`;if(!diaries.length)o+="<p class='small'>还没有日记。</p>";if(!sessionPW){o+="<p class='small'>请输入密码以查看/新增。</p>";list.innerHTML=o;return;}diaries.forEach((x,i)=>{const tt=dec(x.t,sessionPW),cc=dec(x.c,sessionPW);o+=`<div class='item'><span class='del' onclick='del(${i})'>删除</span><b>${tt}</b> <span class='small'>${x.d}</span><div class='small' style='margin-top:4px;white-space:pre-wrap'>${cc}</div></div>`;});list.innerHTML=o;}
render();
</script>
</body>
</html>
