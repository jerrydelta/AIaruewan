<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>团队知识片段库</title>
<style>
:root{
  --coral:#FF6B6B;
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">tech</span><span class="tag">code_snippets</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">团队知识片段库</h1>
    <p class="h-coral" style="font-size:13px;margin:0">KO-localized lifetime + self-hosted snippet vault for SIers.</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">对订阅疲劳的个人开发者寻求"买断/自托管"的代码片段管理。Snippetly 提供 Free（50 片段）+ Pro $29 买断</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    
<label>标题</label><input id="k_title" placeholder="如 DB 连接池配置">
<label>类型</label><select id="k_type"><option>代码</option><option>知识点</option><option>排错笔记</option></select>
<label>团队 / 项目</label><input id="k_team" placeholder="如 支付组">
<label>内容</label><textarea id="k_body" rows="4" placeholder="代码或知识要点..."></textarea>
<label>筛选团队</label><input id="k_f" oninput="render()" placeholder="留空显示全部">
<button class="btn" onclick="addItem()">+ 存入知识库</button>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://snippetly.xyz/" target="_blank" style="color:var(--coral)">Snippetly / ByteStash / Snipit</a>
  </div>

<script>

const KEY="P16-20260719-007";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function addItem(){
  const title=document.getElementById('k_title').value.trim();
  const type=document.getElementById('k_type').value;
  const team=document.getElementById('k_team').value.trim();
  const body=document.getElementById('k_body').value;
  if(!title){alert('请填写标题');return;}
  items.push({title,type,team,body,added:new Date().toLocaleString()});
  save();
  document.getElementById('k_title').value='';document.getElementById('k_team').value='';document.getElementById('k_body').value='';
}
function del(i){items.splice(i,1);save();}
function render(){
  const el=document.getElementById('list');
  const f=document.getElementById('k_f').value.trim().toLowerCase();
  let list=items;
  if(f){ list=items.filter(it=>(it.team||'').toLowerCase().indexOf(f)>=0); }
  if(!list.length){el.innerHTML='<p style="font-size:13px;color:var(--muted)">暂无内容</p>';return;}
  el.innerHTML='<b>🗂 知识库（'+list.length+'/'+items.length+'）</b>'+list.map((it,idx)=>{
    const realIdx=items.indexOf(it);
    return '<div style="border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px">'+
      '<div style="font-weight:600">'+esc(it.title)+' <span class="tag">'+esc(it.type)+'</span></div>'+
      (it.team?'<div style="font-size:12px;color:var(--muted)">'+esc(it.team)+'</div>':'')+
      '<pre style="font-size:12px;background:#fafafa;border:1px solid var(--line);border-radius:8px;padding:8px;overflow:auto;white-space:pre-wrap;margin:6px 0">'+esc(it.body)+'</pre>'+
      '<button class="btn" style="background:#fff;color:var(--coral);border:1px solid var(--line)" onclick="del('+realIdx+')">删除</button>'+
      '</div>';
  }).join('');
}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
render();
</script>
</body>
</html>
