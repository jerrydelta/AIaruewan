<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>戒断/习惯计数 App</title>
<style>
:root{
  --coral:#FF6B6B;
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}

</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">productivity</span><span class="tag">habit_tracker</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">戒断/习惯计数 App</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Sobriety/habit counter app (day milestones + trigger journaling)</p>
  </div>
  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">戒断 / sober 计数是习惯追踪里的强付费细分，低复杂度计数 + 社区即可产生收入。</p>
  </div>
  <div class="card">
    <b>🛠 工具</b>
    
<label>戒断目标（例如：戒酒/戒手机/戒糖）</label>
<input id="sName" placeholder="戒手机">
<button class="btn" onclick="startS()">开始打卡</button>
<div id="counter" style="text-align:center;margin:12px 0"></div>
<label>破戒记录 / 触发因素</label>
<input id="rTrig" placeholder="例如：睡前无聊刷手机">
<button class="btn" onclick="logRelapse()" style="background:var(--muted)">记录一次破戒</button>
  </div>

  <div class="card" id="list"></div>
  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://apps.apple.com" target="_blank" style="color:var(--coral)">Sober Wagon · Sober Tracker · Embr · I Am Sober</a>
  </div>
<script>

const KEY='P15-20260719-005';
let items=JSON.parse(localStorage.getItem(KEY)||'[]');
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function startS(){
 var n=document.getElementById('sName').value.trim();
 if(!n){alert('写个目标');return;}
 items.unshift({id:Date.now(),n:n,start:new Date().toISOString().slice(0,10),relapses:[]});
 document.getElementById('sName').value='';save();
}
function days(start){var s=new Date(start);var d=new Date();return Math.floor((d-s)/86400000);}
function logRelapse(){
 var t=document.getElementById('rTrig').value.trim();
 if(!items.length){alert('先开始一个目标');return;}
 items[0].relapses.unshift({t:t||'未填写',ts:new Date().toLocaleString()});
 document.getElementById('rTrig').value='';save();
}
function render(){
 var box=document.getElementById('list');
 if(!items.length){box.innerHTML='<b>🔥 戒断计数</b><p style="font-size:13px;color:#999">还没有目标</p>';return;}
 var cur=items[0];
 document.getElementById('counter').innerHTML='<div style="font-size:40px;font-weight:800;color:var(--coral)">'+days(cur.start)+'</div><div style="font-size:13px;color:#999">天 · '+esc(cur.n)+' · 始于 '+cur.start+'</div>';
 box.innerHTML='<b>📜 我的目标 ('+items.length+')</b>'+items.map(i=>'<div class="card" style="margin:6px 0;padding:10px"><div style="font-weight:600">'+esc(i.n)+' — '+days(i.start)+' 天</div><div style="font-size:12px;color:#999">破戒 '+i.relapses.length+' 次</div></div>').join('');
}
function esc(s){return (s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
render();

</script>
</body>
</html>
