<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>隐私/离线 AI 会议转录</title>
<style>
:root{
  --coral:#FF6B6B;
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}

</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">productivity</span><span class="tag">automation</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">隐私/离线 AI 会议转录</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Privacy/offline AI meeting transcription (local model, on-prem)</p>
  </div>
  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">AI 会议转录 / 纪要是高增长高价赛道，「本地离线 / 数据不出境」未充分满足。</p>
  </div>
  <div class="card">
    <b>🛠 工具</b>
    
<label>会议转录文本</label><textarea id="mtText" rows="5" placeholder="粘贴转录..."></textarea>
<button class="btn" onclick="saveMt()">保存纪要</button>
<label>行动项（Action Item）</label><input id="mtAct" placeholder="例如：小王周五前发方案">
<button class="btn" onclick="addAct()" style="background:var(--muted)">添加行动项</button>
  </div>

  <div class="card" id="list"></div>
  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://fathom.video" target="_blank" style="color:var(--coral)">Fathom · Otter.ai · Notta · Fireflies.ai</a>
  </div>
<script>

const KEY='P15-20260719-019';
let items=JSON.parse(localStorage.getItem(KEY)||'[]');
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function saveMt(){
 var t=document.getElementById('mtText').value.trim();
 if(!t){alert('空');return;}
 items.unshift({id:Date.now(),t:t,acts:[],ts:new Date().toLocaleString()});
 document.getElementById('mtText').value='';save();
}
function addAct(){
 var a=document.getElementById('mtAct').value.trim();
 if(!a){return;}
 if(!items.length){alert('先保存一份纪要');return;}
 items[0].acts.unshift(a);
 document.getElementById('mtAct').value='';save();
}
function del(id){items=items.filter(i=>i.id!=id);save();}
function render(){
 var box=document.getElementById('list');
 box.innerHTML='<b>🎤 会议纪要 ('+items.length+')</b>'+(items.length?'':'<p style="font-size:13px;color:#999">粘贴转录保存</p>');
 box.innerHTML+=items.map(i=>'<div class="card" style="margin:6px 0;padding:10px"><div style="font-weight:600">纪要 '+i.ts+'</div><div style="font-size:13px;color:#555;white-space:pre-wrap;max-height:120px;overflow:auto">'+esc(i.t.slice(0,300))+(i.t.length>300?'…':'')+'</div><div style="font-size:12px;color:#999;margin-top:4px">行动项('+i.acts.length+')：'+(i.acts.map(function(x){return '·'+esc(x);}).join(' ')||'无')+'</div><a style="color:#999;cursor:pointer;font-size:12px" onclick="del('+i.id+')">删除</a></div>').join('');
}
function esc(s){return (s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
render();

</script>
</body>
</html>
