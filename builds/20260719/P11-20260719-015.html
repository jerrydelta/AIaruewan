<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>NISA 枠自动最适化</title>
<style>
:root{
  --coral:#FF6B6B; --coral-dark:#E85555; --ink:#2D2D2D; --muted:#8A8A8A;
  --bg:#F7F7F7; --card:#FFFFFF; --line:#ECECEC; --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.bar{height:10px;background:#eee;border-radius:999px;overflow:hidden;margin-top:6px}
.bar > i{display:block;height:100%;background:var(--coral)}
.binfo{font-size:13px;color:var(--muted);margin-top:4px}
.sum{font-size:14px;font-weight:600;color:var(--coral)}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">finance</span><span class="tag">investment_tracking</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">NISA 枠自动最适化</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Third-party NISA quota auto-optimization (beginner allocation)</p>
  </div>
  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">新 NISA 带动资产形成 app 爆发，但新手不知如何配置、NISA 枠用不满。本工具按年度上限（つみたて 120万 / 成長 240万）跟踪已用额度并提示剩余。</p>
  </div>
  <div class="card">
    <b>🛠 工具 · 本年投入记录</b>
    <div class="row">
      <div><label>つみたてNISA 已投入(円)</label><input id="nT" type="number" value="0" min="0"></div>
      <div><label>成長NISA 已投入(円)</label><input id="nG" type="number" value="0" min="0"></div>
    </div>
    <button class="btn" onclick="calc()">计算剩余枠 / 建议</button>
  </div>
  <div class="card" id="list">
    <b>📋 额度可视化</b>
    <div id="summary"></div>
  </div>
  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.rakuten-sec.co.jp/web/company/newsrelease/pdf/press20260218.pdf" target="_blank" style="color:var(--coral)">楽天証券 iGrow / PayPay証券</a>
  </div>
<script>
const KEY="P11-20260719-015";
const CAP_T=1200000, CAP_G=2400000;
let st = JSON.parse(localStorage.getItem(KEY) || '{"t":0,"g":0}');
function save(){ localStorage.setItem(KEY, JSON.stringify(st)); }
function calc(){
  st.t=Math.max(0,parseInt(document.getElementById('nT').value)||0);
  st.g=Math.max(0,parseInt(document.getElementById('nG').value)||0);
  save(); render();
}
function pct(v,cap){ return Math.min(100, v/cap*100); }
function render(){
  document.getElementById('nT').value=st.t;
  document.getElementById('nG').value=st.g;
  const rt=CAP_T-st.t, rg=CAP_G-st.g;
  let html='';
  html+='<div class="sum">つみたてNISA</div><div class="bar"><i style="width:'+pct(st.t,CAP_T)+'%"></i></div>'+
    '<div class="binfo">已用 ¥'+st.t.toLocaleString()+' / 上限 ¥'+CAP_T.toLocaleString()+' · 剩余 <b>¥'+rt.toLocaleString()+'</b></div>';
  html+='<div class="sum" style="margin-top:12px">成長NISA</div><div class="bar"><i style="width:'+pct(st.g,CAP_G)+'%"></i></div>'+
    '<div class="binfo">已用 ¥'+st.g.toLocaleString()+' / 上限 ¥'+CAP_G.toLocaleString()+' · 剩余 <b>¥'+rg.toLocaleString()+'</b></div>';
  let tip='';
  if(rt>0||rg>0) tip='<div class="sum" style="margin-top:12px">建议：本年度还有 ¥'+(rt+rg).toLocaleString()+' 枠未用，可定投补齐以免税务优惠浪费。</div>';
  else tip='<div class="sum" style="margin-top:12px">🎉 本年度 NISA 枠已用满。</div>';
  document.getElementById('summary').innerHTML=html+tip;
}
render();
</script>
</body>
</html>
