<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>触发地图 · 清醒计数</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.big{font-size:30px;font-weight:700;color:var(--coral);text-align:center}
.muted{color:var(--muted);font-size:13px}
.del{color:var(--coral);font-size:12px;cursor:pointer;float:right}
.bar{height:10px;background:var(--line);border-radius:6px;overflow:hidden;margin-top:4px}
.bar>i{display:block;height:100%;background:var(--coral)}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">addiction_recovery</span><span class="tag">trigger_mgmt</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">触发地图 · 清醒计数</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Trigger analysis + sobriety counter (11.9M installs)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">I Am Sober 以"触发分析 + 每日质押"全球验证 1190 万安装。中日本地化（酒桌/熬夜/短视频等文化触发场景）弱。本工具记录每次冲动/复发的触发因素，自动分析最高频触发，并统计清醒天数。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <label>清醒开始日</label>
    <input type="date" id="startDate">
    <button class="btn" onclick="saveProfile()">保存</button>
    <div class="big" id="sober">0</div><div class="muted" style="text-align:center">连续清醒天数</div>
    <hr style="border:none;border-top:1px solid var(--line);margin:12px 0">
    <label>记录一次触发 / 冲动</label>
    <input id="trigger" placeholder="如 酒桌应酬 / 深夜emo / 短视频">
    <button class="btn" onclick="addTrigger()">＋ 记触发</button>
    <div style="margin-top:10px"><b>🔥 高频触发排行</b><div id="rank" style="margin-top:8px"></div></div>
  </div>

  <div class="card" id="list"><b>🧭 触发记录</b><div id="listBody" style="margin-top:8px"></div></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://apkzip.com/zh-TW/com.thehungrywasp.iamsober" target="_blank" style="color:var(--coral)">I Am Sober（1190万安装）</a>
  </div>

<script>
const KEY="P14-20260719-010";
let data=JSON.parse(localStorage.getItem(KEY)||'{"startDate":"","triggers":[]}');
function saveProfile(){data.startDate=document.getElementById('startDate').value;save();}
function addTrigger(){
  const t=document.getElementById('trigger').value.trim();
  if(!t){alert("输入触发因素");return;}
  data.triggers.push({t,date:new Date().toLocaleDateString('zh-CN')});
  document.getElementById('trigger').value='';save();
}
function save(){localStorage.setItem(KEY,JSON.stringify(data));
  document.getElementById('startDate').value=data.startDate;render();}
function render(){
  let days=0;
  if(data.startDate)days=Math.floor((new Date()-new Date(data.startDate))/86400000);
  if(days<0)days=0;
  document.getElementById('sober').textContent=days;
  const cnt={};data.triggers.forEach(x=>cnt[x.t]=(cnt[x.t]||0)+1);
  const arr=Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
  const max=arr.length?arr[0][1]:1;
  document.getElementById('rank').innerHTML=arr.length?arr.map(([k,v])=>
    '<div style="margin:6px 0"><div style="font-size:13px">'+k+' <span class="muted">'+v+'次</span></div><div class="bar"><i style="width:'+(v/max*100)+'%"></i></div></div>').join(''):'<div class="muted">暂无触发记录</div>';
  const body=document.getElementById('listBody');
  body.innerHTML=data.triggers.length?data.triggers.slice().reverse().map((x,i)=>
    '<div style="padding:6px 0;border-bottom:1px solid var(--line)">'+x.date+' · '+x.t+' <span class="del" onclick="del('+i+')">删除</span></div>').join(''):'<div class="muted">暂无记录</div>';
}
function del(i){data.triggers.splice(i,1);save();}
save();
</script>
</body>
</html>
