<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>AI相性診断・恋愛相談マッチング（日本語）｜AI契合度诊断</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.range{display:flex;align-items:center;gap:8px;margin-top:6px}
.range span{flex:1;font-size:13px}
.result{background:#FFF7F0;border:1px solid #FFE0CC;border-radius:10px;padding:12px;margin-top:10px;font-size:14px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">relationship</span><span class="tag">dating_journal</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">AI相性診断・恋愛相談マッチング（日本語）</h1>
    <p class="h-coral" style="font-size:13px;margin:0">AI compatibility-diagnosis &amp; romance-advice focused dating app (Japanese)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">日本恋愛・婚活マッチング最大手Pairsは累計2,500〜2,700万人。AIマッチング導入で男性マッチ率2.4倍。痛点：マッチしても「本当に相性がいいか」が分からず、すれ違いが多い。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 二人の相性診断</b>
    <div class="row">
      <input id="a" placeholder="あなたの名前">
      <input id="b" placeholder="相手の名前">
    </div>
    <div id="qs"></div>
    <button class="btn" onclick="diag()">相性を診断する</button>
    <div id="res" class="result" style="display:none"></div>
  </div>

  <div class="card" id="list"><b>📋 診断履歴</b></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.iid.co.jp/contents-marriage/buzzlist/pairs-app/" target="_blank" style="color:var(--coral)">Pairs / with / Omiai / タップル</a>
  </div>

<script>
const KEY="P2-20260719-005";
const QUESTIONS=[
  ["価値観（将来・暮らし方）",1],["コミュニケーション頻度",1],
  ["趣味・興味の共通点",1],["喧嘩後の価値観",1],["金銭感覚",1]
];
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
(function(){document.getElementById("qs").innerHTML=QUESTIONS.map((q,i)=>
  "<div class='range'><span>"+q[0]+"</span><input type='range' min='0' max='5' value='3' id='q"+i+"' style='flex:1'></div>").join("");})();
function diag(){
  const a=document.getElementById("a").value.trim(),b=document.getElementById("b").value.trim();
  if(!a||!b){alert("二人の名前を入力してください");return;}
  let sum=0;QUESTIONS.forEach((q,i)=>sum+=parseInt(document.getElementById("q"+i).value));
  const score=Math.round(sum/QUESTIONS.length/5*100);
  const advice=score>=80?"とても相性良好！価値観を言語化して深めよう":score>=60?"良好。すれ違いは「価値観」で解消しやすい":score>=40?"普通。共通趣味を増やすと◎":"注意。コミュニケーション頻度を見直そう";
  const res=document.getElementById("res");res.style.display="block";
  res.innerHTML="💞 "+a+" × "+b+" の相性："+score+"点<br>"+advice;
  items.unshift({a,b,score,date:new Date().toLocaleDateString()});
  localStorage.setItem(KEY,JSON.stringify(items));render();
}
function del(i){items.splice(i,1);localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const box=document.getElementById("list");
  if(!items.length){box.innerHTML="<b>📋 診断履歴</b><p style='font-size:13px;color:var(--muted);margin:6px 0 0'>暂无记录</p>";return;}
  box.innerHTML="<b>📋 診断履歴（"+items.length+"）</b>"+items.map((it,i)=>
    "<div style='display:flex;justify-content:space-between;padding:9px;border:1px solid var(--line);border-radius:10px;margin-top:8px'>"+
    "<div style='font-size:14px'>"+it.a+" × "+it.b+" <span style='color:var(--muted);font-size:11px'>"+it.date+"</span></div>"+
    "<div><span class='h-coral' style='font-weight:700'>"+it.score+"</span> <button class='del' onclick='del("+i+")'>删</button></div></div>").join("");
}
render();
</script>
</body>
</html>
