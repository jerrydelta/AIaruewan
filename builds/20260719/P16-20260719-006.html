<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>代码片段保险库</title>
<style>
:root{
  --coral:#FF6B6B;
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">tech</span><span class="tag">code_snippets</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">代码片段保险库</h1>
    <p class="h-coral" style="font-size:13px;margin:0">JA-search + GitHub-sync snippet vault for Japanese solo devs.</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">日本开发者用 Gist 或备忘录应用管理代码片段，十分分散。Snipit（€5/月 Pro，140 语言，IDE 扩展）与 OSS 的 massCode 以"统一管理+搜索+IDE 扩展"获得支持</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    
<label>搜索（标题 / 标签 / 代码）</label><input id="q" oninput="render()" placeholder="输入关键词">
<label>标题</label><input id="c_title" placeholder="如 防抖函数">
<label>语言</label><input id="c_lang" placeholder="JavaScript">
<label>标签（逗号分隔）</label><input id="c_tags" placeholder="util,前端">
<label>代码</label><textarea id="c_code" rows="4" placeholder="代码内容..."></textarea>
<button class="btn" onclick="addItem()">+ 保存片段</button>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://snipit.io/" target="_blank" style="color:var(--coral)">Snipit / massCode / GitHub Gist</a>
  </div>

<script>

const KEY="P16-20260719-006";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function addItem(){
  const title=document.getElementById('c_title').value.trim();
  const lang=document.getElementById('c_lang').value.trim();
  const tags=document.getElementById('c_tags').value.split(',').map(s=>s.trim()).filter(Boolean);
  const code=document.getElementById('c_code').value;
  if(!title){alert('请填写标题');return;}
  items.push({title,lang,tags,code,added:new Date().toLocaleString()});
  save();
  document.getElementById('c_title').value='';document.getElementById('c_lang').value='';document.getElementById('c_tags').value='';document.getElementById('c_code').value='';
}
function del(i){items.splice(i,1);save();}
function render(){
  const el=document.getElementById('list');
  const q=document.getElementById('q').value.trim().toLowerCase();
  let list=items;
  if(q){ list=items.filter(it=>(it.title+' '+it.lang+' '+it.tags.join(' ')+' '+it.code).toLowerCase().indexOf(q)>=0); }
  if(!list.length){el.innerHTML='<p style="font-size:13px;color:var(--muted)">无匹配片段</p>';return;}
  el.innerHTML='<b>🔐 片段库（'+list.length+'/'+items.length+'）</b>'+list.map((it,idx)=>{
    const realIdx=items.indexOf(it);
    return '<div style="border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px">'+
      '<div style="font-weight:600">'+esc(it.title)+' <span class="tag">'+(esc(it.lang)||'代码')+'</span></div>'+
      (it.tags.length?'<div>'+it.tags.map(t=>'<span class="tag">'+esc(t)+'</span>').join('')+'</div>':'')+
      '<pre style="font-size:12px;background:#fafafa;border:1px solid var(--line);border-radius:8px;padding:8px;overflow:auto;white-space:pre-wrap;margin:6px 0">'+esc(it.code)+'</pre>'+
      '<button class="btn" style="background:#fff;color:var(--coral);border:1px solid var(--line)" onclick="del('+realIdx+')">删除</button>'+
      '</div>';
  }).join('');
}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
render();
</script>
</body>
</html>
