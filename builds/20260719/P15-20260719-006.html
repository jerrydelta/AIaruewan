<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>轻量 AI 时间块排程器</title>
<style>
:root{
  --coral:#FF6B6B;
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}

</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">productivity</span><span class="tag">calendar_planner</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">轻量 AI 时间块排程器</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Lightweight AI time-blocking scheduler (auto-reschedule, Motion alternative)</p>
  </div>
  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">时间块自动排程是高价赛道，但「AI 自动重排 + 轻量 + 低价 / 买断」仍有差异化空间。</p>
  </div>
  <div class="card">
    <b>🛠 工具</b>
    
<label>任务名</label><input id="bName" placeholder="写方案">
<div class="row"><input id="bDur" type="number" value="60" placeholder="分钟"><select id="bPri"><option value="3">高</option><option value="2">中</option><option value="1">低</option></select></div>
<button class="btn" onclick="addB()">加入排程</button>
<label>起始时间</label><input id="bStart" type="time" value="09:00">
  </div>

  <div class="card" id="list"></div>
  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.usemotion.com" target="_blank" style="color:var(--coral)">Motion · Reclaim · Sunsama · Akiflow · FlowSavvy</a>
  </div>
<script>

const KEY='P15-20260719-006';
let items=JSON.parse(localStorage.getItem(KEY)||'[]');
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function addB(){
 var n=document.getElementById('bName').value.trim();
 var d=Number(document.getElementById('bDur').value)||60;
 var p=Number(document.getElementById('bPri').value);
 if(!n){alert('写任务');return;}
 items.push({id:Date.now(),n:n,d:d,p:p});
 document.getElementById('bName').value='';save();
}
function del(id){items=items.filter(i=>i.id!=id);save();}
function render(){
 var box=document.getElementById('list');
 if(!items.length){box.innerHTML='<b>🗓 时间块</b><p style="font-size:13px;color:#999">添加任务自动排程</p>';return;}
 var start=document.getElementById('bStart').value||'09:00';
 var parts=start.split(':');var cur=Number(parts[0])*60+Number(parts[1]);
 var sorted=items.slice().sort(function(a,b){return b.p-a.p;});
 var html='<b>🗓 今日排程（自动时间块）</b>';
 sorted.forEach(i=>{
  var hh=String(Math.floor(cur/60)).padStart(2,'0');
  var mm=String(cur%60).padStart(2,'0');
  var end=cur+i.d;
  var eh=String(Math.floor(end/60)).padStart(2,'0');
  var em=String(end%60).padStart(2,'0');
  html+='<div class="card" style="margin:6px 0;padding:10px;border-left:4px solid '+(i.p==3?'var(--coral)':i.p==2?'#FFA94D':'#74C0FC')+'"><div style="font-weight:600">'+hh+':'+mm+'–'+eh+':'+em+'　'+esc(i.n)+'</div><div style="font-size:12px;color:#999">'+i.d+'分钟 · 优先级'+(i.p==3?'高':i.p==2?'中':'低')+' <a style="color:#999;cursor:pointer" onclick="del('+i.id+')">删除</a></div></div>';
  cur=end;
 });
 box.innerHTML=html;
}
function esc(s){return (s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
render();

</script>
</body>
</html>
