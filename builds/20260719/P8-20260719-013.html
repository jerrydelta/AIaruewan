<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>本地优先笔记（买断·无广告）日本</title>
<style>
:root{--coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;--bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.small{font-size:12px;color:var(--muted)}
.del{color:var(--coral);font-size:13px;cursor:pointer;float:right}
</style>
</head>
<body>
<div class="card">
  <div><span class="tag">privacy</span><span class="tag">local_storage</span></div>
  <h1 style="font-size:20px;margin:8px 0 4px">本地优先笔记（买断·无广告）</h1>
  <p class="h-coral" style="font-size:13px;margin:0">Local-first notes (buy-once, ad-free), Japan</p>
</div>
<div class="card">
  <b>💡 痛点</b>
  <p style="font-size:14px;color:#555;margin:6px 0 0">日本「本地保存·无广告」备忘录需求明显，BlueNote5Offline 以本地优先差异化，面向重视数据所有权、不想上云的人群。</p>
</div>
<div class="card">
  <b>🛠 工具 · 分层笔记</b>
  <label>文件夹</label>
  <input id="folder" placeholder="如：工作 / 生活">
  <label>笔记标题</label><input id="nt" placeholder="会议要点">
  <label>内容</label><textarea id="nc" rows="3" placeholder="笔记正文…"></textarea>
  <button class="btn" onclick="addNote()">保存到本机</button>
  <p class="small" style="margin-top:6px">📁 数据按文件夹分层，仅存本机 localStorage，无广告、无云。</p>
</div>
<div class="card" id="list"></div>
<div class="card" style="font-size:12px;color:var(--muted)">
  <b>来源参考</b><br>
  <a href="https://bluenote5offline.software.informer.com/" target="_blank" style="color:var(--coral)">BlueNote5Offline（本地优先笔记）</a>
</div>
<script>
const KEY="P8-20260719-013";
let notes=JSON.parse(localStorage.getItem(KEY)||"[]");
function save(){localStorage.setItem(KEY,JSON.stringify(notes));render();}
function addNote(){const f=folder.value.trim()||"未分类",t=nt.value.trim(),c=nc.value.trim();if(!t){alert("请填标题");return;}notes.unshift({f,t,c});folder.value=nt.value=nc.value="";save();}
function del(i){notes.splice(i,1);save();}
function render(){const groups={};notes.forEach(x=>{(groups[x.f]=groups[x.f]||[]).push(x);});let o=`<b>📒 笔记（${notes.length} 条）</b>`;if(!notes.length)o+="<p class='small'>还没有笔记。</p>";Object.keys(groups).forEach(g=>{o+=`<div style='margin-top:10px'><b>📁 ${g}（${groups[g].length}）</b></div>`;groups[g].forEach(x=>{const idx=notes.indexOf(x);o+=`<div class='item'><span class='del' onclick='del(${idx})'>删除</span><b>${x.t}</b><div class='small' style='margin-top:4px;white-space:pre-wrap'>${x.c||""}</div></div>`;});});list.innerHTML=o;}
render();
</script>
</body>
</html>
