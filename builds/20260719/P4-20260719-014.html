<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>场景化Excel/PPT模板（财务/项目管理/述职）自动发货</title>
<style>:root{
  --coral:#FF6B6B;
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
.item{border-top:1px solid var(--line);padding:10px 0;position:relative}
.del{position:absolute;right:0;top:10px;background:#fff;color:var(--coral);
  border:1px solid #FFD9D9;border-radius:8px;font-size:12px;padding:4px 10px;cursor:pointer}
.mini{font-size:13px;color:var(--ink);background:#FAFAFA;border:1px solid var(--line);
  border-radius:10px;padding:10px;margin-top:8px}
.hr{height:1px;background:var(--line);border:none;margin:14px 0}</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">digital_product</span><span class="tag">excel_template</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">场景化Excel/PPT模板（财务/项目管理/述职）自动发货</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Scenario-based Excel/PPT templates (finance/PM/review) auto-delivery</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">Excel/PPT模板是国内高频数字商品：财务记账9.9-49元、项目管理甘特图。案例：Excel财务模板29.9元日均3份=月入2691元。痛点：同质化、盗版、需教程降退单、平台抽成。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <label>场景</label><input id="x1" placeholder="如：财务记账表">
<label>渠道</label><select id="x2"><option>闲鱼</option><option>小红书</option><option>千图网</option></select>
<label>定价(元)</label><input type="number" id="x3" placeholder="29.9">
<label>日均单量</label><input type="number" id="x4" placeholder="3">
<button class="btn" onclick="addX()">上架</button>
  </div>

  <div class="card" id="list"></div>

  

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.toutiao.com/article/7648818472465613321" target="_blank" style="color:var(--coral)">千图网 / 包图网 / 猪八戒 / 创客贴 / 闲鱼</a>
  </div>

<script>
const KEY="P4-20260719-014";
let items = JSON.parse(localStorage.getItem(KEY) || "[]");
function save(){ localStorage.setItem(KEY, JSON.stringify(items)); render(); }
function addX(){
 var n=document.getElementById('x1').value.trim();
 if(!n){alert('输入场景');return;}
 var price=+document.getElementById('x3').value||0,day=+document.getElementById('x4').value||0;
 items.push({scene:n,ch:document.getElementById('x2').value,price:price,day:day,month:price*day*30,ts:Date.now()});
 save();document.getElementById('x1').value='';document.getElementById('x3').value='';document.getElementById('x4').value='';
}
function render(){
 var el=document.getElementById('list');
 if(!items.length){el.innerHTML='<b>📊 Excel/PPT模板</b><p style="font-size:13px;color:var(--muted)">上架模板。</p>';return;}
 var tot=0;items.forEach(function(x){tot+=x.month;});
 el.innerHTML='<b>📊 Excel/PPT模板（'+items.length+' · 月估¥'+tot+'）</b>'+items.map(function(x,i){
  return '<div class="item"><div><b>'+esc(x.scene)+'</b> · '+x.ch+'</div><div style="font-size:12px;color:var(--muted)">¥'+x.price+' · 日'+x.day+'单 · 月估¥'+x.month+'</div><button class="del" onclick="del('+i+')">下架</button></div>';
 }).join('');
}
function del(i){items.splice(i,1);save();}
function esc(s){return (s||'').replace(/[<>&]/g,function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;'}[c];});}
render();
</script>
</body>
</html>
