<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>视觉化日程时间块 · 轻量日程</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.del{color:var(--muted);font-size:12px;cursor:pointer;border:none;background:none}
.item{border-bottom:1px dashed var(--line);padding:8px 0;font-size:14px}
.bar{height:24px;border-radius:6px;color:#fff;font-size:12px;display:flex;align-items:center;padding:0 8px;margin:2px 0}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">neurodiversity</span><span class="tag">executive_function</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">视觉化日程时间块 · 轻量日程</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Visual timeline scheduler (Tiimo-style)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">Tiimo 以"视觉化日程时间轴"服务 ADHD/自闭人群，2025 年获 iPhone App of the Year，订阅 $5.99/月。证明"视觉日程"付费模型成立。中文视觉日程工具较少，可本地化。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <label>事项</label>
    <input type="text" id="title" placeholder="如：写报告">
    <label>开始</label>
    <input type="time" id="start">
    <label>结束</label>
    <input type="time" id="end">
    <label>颜色</label>
    <select id="color"><option value="#FF6B6B">红</option><option value="#4D96FF">蓝</option><option value="#3FB984">绿</option><option value="#9B6BFF">紫</option><option value="#FFB84D">橙</option></select>
    <button class="btn" onclick="addEv()">+ 加入日程</button>
    <div id="day" style="margin-top:10px"></div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://tiimo.app/" target="_blank" style="color:var(--coral)">Tiimo · Structured · Finch</a>
  </div>

<script>
const KEY="P9-20260719-013";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function save(){localStorage.setItem(KEY,JSON.stringify(items));render()}
function toMin(t){const[h,m]=t.split(":").map(Number);return h*60+m;}
function addEv(){
  const title=document.getElementById("title").value.trim();
  const start=document.getElementById("start").value;
  const end=document.getElementById("end").value;
  const color=document.getElementById("color").value;
  if(!title||!start||!end){alert("请填完整");return}
  if(toMin(end)<=toMin(start)){alert("结束需晚于开始");return}
  items.push({title,start,end,color,dur:toMin(end)-toMin(start)});
  document.getElementById("title").value="";
  save();
}
function render(){
  const day=document.getElementById("day");
  if(items.length===0)day.innerHTML="<p style='font-size:13px;color:var(--muted)'>还没有安排</p>";
  else{
    const sorted=items.slice().sort((a,b)=>toMin(a.start)-toMin(b.start));
    day.innerHTML=sorted.map(i=>`<div class="bar" style="background:${i.color}">${i.start}-${i.end} ${i.title} (${i.dur}min)</div>`).join("");
  }
  let html="<b>📋 今日日程（共 "+items.length+" 项）</b>";
  items.slice().sort((a,b)=>toMin(a.start)-toMin(b.start)).forEach((i,idx)=>{
    const real=items.findIndex(x=>x===i);
    html+=`<div class="item"><div class="row"><div><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${i.color};margin-right:6px"></span>${i.title}<br>${i.start}-${i.end}</div><button class="del" onclick="del(${real})">删除</button></div></div>`;
  });
  document.getElementById("list").innerHTML=html;
}
function del(i){items.splice(i,1);save()}
render();
</script>
</body>
</html>
