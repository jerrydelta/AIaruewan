<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>日式温和习惯养成</title>
<style>
:root{--coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;--bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
.small{font-size:12px;color:var(--muted)}
.del{color:var(--coral);font-size:12px;cursor:pointer;float:right;margin-left:8px}
.item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px}
</style>
</head>
<body>
<div class="card">
  <div><span class="tag">lifestyle</span><span class="tag">daily_checklist</span></div>
  <h1 style="font-size:20px;margin:8px 0 4px">日式温和习惯养成</h1>
  <p class="h-coral" style="font-size:13px;margin:0">Japan-style gentle habit tracker, light accountability</p>
</div>
<div class="card">
  <b>💡 痛点</b>
  <p style="font-size:14px;color:#555;margin:6px 0 0">日本習慣化应用强调"継続"与温和提醒，常带轻社交。用户抱怨过度游戏化或复杂的追踪器。一个日式 calm 设计、灵活频率、轻社区（非全社交）的习惯应用是已验证缺口。</p>
</div>
<div class="card">
  <b>🛠 工具 · 習慣を追加</b>
  <label>習慣名</label><input id="hName" placeholder="如：ストレッチ">
  <label>頻度</label><select id="hFreq"><option>毎日</option><option>週3回</option><option>週5回</option></select>
  <button class="btn" onclick="addHabit()">+ 習慣を追加</button>
</div>
<div class="card" id="list"><b>🌱 習慣リスト</b><div id="habits"></div></div>
<div class="card" style="font-size:12px;color:var(--muted)">
  <b>来源参考</b><br>
  <a href="https://apps.apple.com/jp/app/habitify/id1110173996" target="_blank" style="color:var(--coral)">Habitify (JP) / みんチャレ</a>
</div>
<script>
const KEY="P3-20260719-010";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function today(){return new Date().toISOString().slice(0,10);}
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function addHabit(){const name=hName.value.trim();if(!name){alert('習慣名を入力');return;}
  items.push({name,freq:hFreq.value,log:[],t:Date.now()});hName.value='';save();}
function del(i){items.splice(i,1);save();}
function check(i){const d=today();const k=items[i].log;
  if(k.includes(d)){items[i].log=k.filter(x=>x!==d);}else{k.push(d);}save();}
function streak(i){const k=[...items[i].log].sort();let n=0;let d=new Date();
  for(let j=k.length-1;j>=0;j--){if(k[j]===d.toISOString().slice(0,10)){n++;d.setDate(d.getDate()-1);}else break;}
  return n;}
function render(){habits.innerHTML=items.length?items.map((x,i)=>`<div class="item"><div><b>${x.name}</b> <span class="small">${x.freq} · 継続 ${streak(i)}日</span></div><button class="btn" style="width:auto;padding:8px 14px;margin:0" onclick="check(${i})">${x.log.includes(today())?'達成✓':'チェック'}</button></div>`).join(''):'<p class="small">まだ習慣がありません。</p>';}
render();
</script>
</body>
</html>
