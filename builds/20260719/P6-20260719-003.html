<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>新生儿语音记录（免手动）</title>
<style>
:root{
  --coral:#FF6B6B; --coral-dark:#E85555; --ink:#2D2D2D; --muted:#8A8A8A;
  --bg:#F7F7F7; --card:#FFFFFF; --line:#ECECEC; --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn.s{width:auto;display:inline-block;padding:10px 14px;margin:4px 4px 0 0;font-size:14px}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">parenting</span><span class="tag">newborn_record</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">新生儿记录（免手动·一句话就记）</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Voice-AI auto-logging newborn feeding/sleep/diaper</p>
  </div>
  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">新手爸妈最烦"手忙脚乱还要记"。用户明确说"语音输入自动生成记录，科技改变生活"。这里用"一句话自然语言 → 自动结构化"代替手动填表，做饭/抱娃时也能记。</p>
  </div>
  <div class="card">
    <b>🛠 工具</b>
    <label>用一句话记录（自然语言）</label>
    <input id="say" placeholder="如：刚喂奶 120ml / 宝宝睡了 / 换了尿布">
    <button class="btn" onclick="parseSay()">智能解析并记录</button>
    <div style="margin-top:10px;font-size:13px;color:#999">或快速点：</div>
    <button class="btn s" onclick="quick('feed','母乳')">🍼 喂奶</button>
    <button class="btn s" onclick="quick('sleep','睡着')">😴 睡觉</button>
    <button class="btn s" onclick="quick('diaper','湿')">💧 换尿布</button>
  </div>
  <div class="card" id="list"></div>
  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://apps.apple.com/cn/app/%E8%90%8C%E5%A8%83%E5%96%82%E5%85%BB%E8%AE%B0%E5%BD%95/id6743667324" target="_blank" style="color:var(--coral)">萌娃喂养记录</a>
  </div>
<script>
const KEY="P6-20260719-003";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function parseSay(){
  const v=document.getElementById('say').value.trim();
  if(!v){alert('说点什么');return;}
  let type='note',detail=v;
  if(/奶|喂|吃|瓶/.test(v)){type='feed';detail=v;}
  else if(/睡|觉|眯/.test(v)){type='sleep';detail=v;}
  else if(/尿布|换|拉|屎|尿/.test(v)){type='diaper';detail=v;}
  items.unshift({type,detail,t:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}),id:Date.now()});
  document.getElementById('say').value='';save();
}
function quick(t,d){items.unshift({type:t,detail:d,t:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}),id:Date.now()});save();}
function icon(t){return t==='feed'?'🍼':t==='sleep'?'😴':t==='diaper'?'💧':'📝';}
function del(id){items=items.filter(x=>x.id!==id);save();}
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const el=document.getElementById('list');
  if(!items.length){el.innerHTML='<b>📋 记录</b><p style="font-size:13px;color:#999">还没有记录。</p>';return;}
  const last=items.find(x=>x.type==='feed');
  el.innerHTML='<b>📋 已记录 '+items.length+' 条</b>'+(last?'<div style="font-size:13px;color:var(--ok)">上次喂奶：'+last.t+'</div>':'')+
    items.map(x=>'<div style="border-top:1px solid var(--line);padding:7px 0;font-size:14px">'+icon(x.type)+' '+esc(x.detail)+' <span style="font-size:11px;color:#999">'+x.t+'</span> <button onclick="del('+x.id+')" style="background:none;border:none;color:#bbb;font-size:11px;cursor:pointer">删</button></div>').join('');
}
function esc(s){return (s||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
render();
</script>
</body>
</html>
