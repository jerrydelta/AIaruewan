<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>日式疗愈情绪日记</title>
<style>
:root{--coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;--bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.small{font-size:12px;color:var(--muted)}
.del{color:var(--coral);font-size:12px;cursor:pointer;float:right;margin-left:8px}
.emo{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.emo span{font-size:26px;padding:6px 8px;border:1px solid var(--line);border-radius:12px;cursor:pointer}
.emo span.on{background:#FFF0F0;border-color:var(--coral)}
.item{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px}
</style>
</head>
<body>
<div class="card">
  <div><span class="tag">lifestyle</span><span class="tag">mood</span></div>
  <h1 style="font-size:20px;margin:8px 0 4px">日式疗愈情绪日记</h1>
  <p class="h-coral" style="font-size:13px;margin:0">Japan-style calming mood journal, one-tap check-in, buyout</p>
</div>
<div class="card">
  <b>💡 痛点</b>
  <p style="font-size:14px;color:#555;margin:6px 0 0">日本情绪记录应用是安静但稳定的细分。Sphera、Moodflow 领先；Daylio、Moodistory（一次性买断）服务厌倦订阅的用户。需求集中在漂亮 UI、一键打卡、隐私。一个日式疗愈风+可导出的情绪日记是已验证方向。</p>
</div>
<div class="card">
  <b>🛠 工具 · 一键打卡</b>
  <label>今天感觉如何？</label>
  <div class="emo" id="emo">
    <span onclick="pick('😊')">😊</span><span onclick="pick('😌')">😌</span><span onclick="pick('😐')">😐</span><span onclick="pick('😟')">😟</span><span onclick="pick('😢')">😢</span><span onclick="pick('😡')">😡</span><span onclick="pick('😴')">😴</span>
  </div>
  <label>标签（可选，逗号分隔）</label><input id="mTag" placeholder="如：工作,加班">
  <label>备注（可选）</label><textarea id="mNote" rows="2" placeholder="发生了什么…"></textarea>
  <button class="btn" onclick="addMood()">+ 记录此刻</button>
</div>
<div class="card" id="list"><b>🌿 情绪记录</b><div id="moods"></div></div>
<div class="card" style="font-size:12px;color:var(--muted)">
  <b>来源参考</b><br>
  <a href="https://apps.apple.com/jp/app/sphera-mood-tracker/id1598311441" target="_blank" style="color:var(--coral)">Sphera / Moodflow / Daylio</a>
</div>
<script>
const KEY="P3-20260719-008";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
let cur='';
function pick(e){cur=e;document.querySelectorAll('#emo span').forEach(s=>s.classList.toggle('on',s.textContent===e));}
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function addMood(){if(!cur){alert('请先选一个表情');return;}
  items.push({e:cur,tag:mTag.value.trim(),note:mNote.value.trim(),t:Date.now()});
  mTag.value='';mNote.value='';cur='';document.querySelectorAll('#emo span').forEach(s=>s.classList.remove('on'));save();}
function del(i){items.splice(i,1);save();}
function render(){moods.innerHTML=items.slice().reverse().map((x,i)=>{const gi=items.indexOf(x);
  return `<div class="item"><div><span style="font-size:22px">${x.e}</span> <span class="small">${new Date(x.t).toLocaleString()}</span><br><span class="small">${x.tag?('#'+x.tag.split(',').join(' #')):''} ${x.note||''}</span></div><span class="del" onclick="del(${gi})">删除</span></div>`;}).join('')||'<p class="small">还没有记录，点一个表情开始吧。</p>';}
render();
</script>
</body>
</html>
