<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>戒烟军团 · 戒断追踪+部落</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.big{font-size:30px;font-weight:700;color:var(--coral)}
.muted{color:var(--muted);font-size:13px}
.del{color:var(--coral);font-size:12px;cursor:pointer;float:right}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">addiction_recovery</span><span class="tag">quit_smoking</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">戒烟军团 · 戒断追踪 + 部落</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Quit-smoking community + streak tracker (military-rank + tribe)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">戒烟最难的是"坚持"和"孤独"。中国戒烟军团以千万级下载验证了"抱团 + 军衔升级 + 部落机制"能显著提升复购式坚持。本工具让你用军衔激励自己、用部落代号找到归属，把枯燥的戒断变成一场升级打怪。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <label>戒烟开始日</label>
    <input type="date" id="startDate">
    <label>以前每天香烟花费（元）</label>
    <input type="number" id="dailyCost" placeholder="如 25" value="25">
    <div class="row" style="margin-top:10px">
      <div><label>我的部落</label><input id="tribe" placeholder="如 钢铁连"></div>
      <div><label>我的代号</label><input id="code" placeholder="如 老兵07"></div>
    </div>
    <button class="btn" onclick="saveProfile()">保存资料</button>

    <div style="text-align:center;margin-top:14px">
      <div class="muted">当前军衔</div>
      <div class="big" id="rank">列兵</div>
      <div style="font-size:24px;font-weight:700" id="streak">0</div>
      <div class="muted">连续戒断天数</div>
      <div style="font-size:20px;color:var(--ok);font-weight:700;margin-top:6px" id="saved">已省 ¥0</div>
    </div>
    <button class="btn" onclick="checkIn()">✅ 今天我没抽烟（打卡）</button>
    <div class="muted" id="todayState" style="text-align:center;margin-top:6px"></div>
  </div>

  <div class="card" id="list"><b>📜 打卡记录</b><div id="listBody" style="margin-top:8px"></div></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.jieyanjuntuan.com/" target="_blank" style="color:var(--coral)">戒烟军团</a> ·
    <a href="https://sj.qq.com/appdetail/100864065" target="_blank" style="color:var(--coral)">应用宝下载页</a>
  </div>

<script>
const KEY="P14-20260719-001";
let data=JSON.parse(localStorage.getItem(KEY)||'{"startDate":"","dailyCost":25,"tribe":"","code":"","checkins":[]}');

function saveProfile(){
  data.startDate=document.getElementById('startDate').value;
  data.dailyCost=parseFloat(document.getElementById('dailyCost').value)||0;
  data.tribe=document.getElementById('tribe').value.trim();
  data.code=document.getElementById('code').value.trim();
  save();
}
function rankOf(d){
  if(d>=181)return"将军";if(d>=61)return"校官";if(d>=21)return"尉官";
  if(d>=7)return"士官";return"列兵";
}
function todayStr(){return new Date().toISOString().slice(0,10);}
function calcStreak(){
  if(!data.startDate)return 0;
  const s=new Date(data.startDate);const t=new Date();
  let d=Math.floor((t-s)/86400000);return d<0?0:d;
}
function checkIn(){
  if(!data.startDate){alert("请先保存戒烟开始日");return;}
  const t=todayStr();
  if(data.checkins.includes(t)){alert("今天已打卡");return;}
  data.checkins.push(t);save();
}
function save(){
  localStorage.setItem(KEY,JSON.stringify(data));
  document.getElementById('startDate').value=data.startDate;
  document.getElementById('dailyCost').value=data.dailyCost;
  document.getElementById('tribe').value=data.tribe;
  document.getElementById('code').value=data.code;
  render();
}
function render(){
  const st=calcStreak();
  document.getElementById('rank').textContent=rankOf(st);
  document.getElementById('streak').textContent=st;
  document.getElementById('saved').textContent="已省 ¥"+(st*(data.dailyCost||0)).toLocaleString();
  const t=todayStr();
  document.getElementById('todayState').textContent=data.checkins.includes(t)?"✓ 今日已打卡，继续保持":"";
  const body=document.getElementById('listBody');
  if(!data.checkins.length){body.innerHTML='<div class="muted">还没有打卡记录</div>';return;}
  body.innerHTML=data.checkins.slice().reverse().map(d=>{
    const r=rankOf(calcFromDate(d));
    return '<div style="padding:6px 0;border-bottom:1px solid var(--line)">'+d+' <span class="tag">'+r+'</span></div>';
  }).join('');
}
function calcFromDate(d){
  const s=new Date(data.startDate);const e=new Date(d);
  let diff=Math.floor((e-s)/86400000);return diff<0?0:diff;
}
save();
</script>
</body>
</html>
