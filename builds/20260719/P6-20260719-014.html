<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>手工成本利润计算器</title>
<style>
:root{
  --coral:#FF6B6B; --coral-dark:#E85555; --ink:#2D2D2D; --muted:#8A8A8A;
  --bg:#F7F7F7; --card:#FFFFFF; --line:#ECECEC; --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">hobby</span><span class="tag">handicraft_diy</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">手工成本利润计算器</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Craft cost/profit calculator (fair pricing)</p>
  </div>
  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">手工人常"几小时做完，卖了才发现勉强保本"。把材料+工时+平台抽成算清楚，定个不亏的价，副业才能真正赚到钱。</p>
  </div>
  <div class="card">
    <b>🛠 工具</b>
    <label>作品名</label><input id="pname" placeholder="如：钩针玩偶">
    <div class="row">
      <div><label>材料成本(¥)</label><input id="mat" type="number" value="0"></div>
      <div><label>工时(小时)</label><input id="hr" type="number" value="0"></div>
    </div>
    <div class="row">
      <div><label>时薪(¥)</label><input id="rate" type="number" value="30"></div>
      <div><label>平台</label>
        <select id="plat"><option value="0.02">闲鱼 2%</option><option value="0.05">淘宝 5%</option><option value="0.1">小红书 10%</option><option value="0.12">Etsy 12%</option><option value="0">私下 0%</option></select>
      </div>
    </div>
    <label>打算卖价(¥)</label><input id="price" type="number" value="0">
    <button class="btn" onclick="calc()">算利润</button>
    <div id="out" style="margin-top:8px;font-size:14px"></div>
    <button class="btn" onclick="saveItem()" style="background:var(--ok)">存为作品</button>
  </div>
  <div class="card" id="list"></div>
  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://apps.apple.com/cn/app/crafttok-%E6%89%8B%E5%B7%A5%E6%88%90%E6%9C%AC%E8%AE%A1%E7%AE%97%E5%99%A8/id6761536181" target="_blank" style="color:var(--coral)">CraftTok</a>
  </div>
<script>
const KEY="P6-20260719-014";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
let last=null;
function calc(){
  const mat=+document.getElementById('mat').value||0,hr=+document.getElementById('hr').value||0,
        rate=+document.getElementById('rate').value||0,price=+document.getElementById('price').value||0,
        fee=+document.getElementById('plat').value;
  const labor=hr*rate, cost=mat+labor, feeAmt=price*fee, profit=price-cost-feeAmt;
  const margin=cost>0?((profit/cost)*100).toFixed(0):0;
  last={mat,hr,rate,price,fee,profit};
  document.getElementById('out').innerHTML='成本 ¥'+cost.toFixed(2)+'（料'+mat+'+工'+labor.toFixed(2)+'）｜ 平台抽 ¥'+feeAmt.toFixed(2)+
    ' ｜ <b style="color:'+(profit>=0?'var(--ok)':'#E85555')+'">利润 ¥'+profit.toFixed(2)+'（'+margin+'%）</b>';
}
function saveItem(){
  if(!last){alert('先算一次');return;}
  const pname=document.getElementById('pname').value.trim()||'未命名';
  items.unshift({pname,...last,id:Date.now()});save();
}
function del(id){items=items.filter(x=>x.id!==id);save();}
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const el=document.getElementById('list');
  if(!items.length){el.innerHTML='<b>📦 作品账本</b><p style="font-size:13px;color:#999">还没有保存的作品。</p>';return;}
  el.innerHTML='<b>📦 作品账本 '+items.length+' 件</b>'+items.map(x=>{
    const cost=x.mat+x.hr*x.rate;const p=x.price-cost-x.price*x.fee;
    return '<div style="border-top:1px solid var(--line);padding:7px 0;font-size:13px"><b>'+esc(x.pname)+'</b> ｜ 卖¥'+x.price+' ｜ 成本¥'+cost.toFixed(1)+' ｜ <span style="color:'+(p>=0?'var(--ok)':'#E85555')+'">利¥'+p.toFixed(1)+'</span> <button onclick="del('+x.id+')" style="background:none;border:none;color:#bbb;font-size:11px;cursor:pointer">删</button></div>';
  }).join('');
}
function esc(s){return (s||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
render();
</script>
</body>
</html>
