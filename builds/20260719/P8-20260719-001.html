<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>日本考生轻量考试管理+AI学习计划</title>
<style>
:root{--coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;--bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.days{font-size:28px;font-weight:700;color:var(--coral)}
.small{font-size:12px;color:var(--muted)}
.del{color:var(--coral);font-size:13px;cursor:pointer;float:right}
</style>
</head>
<body>
<div class="card">
  <div><span class="tag">education</span><span class="tag">exam_prep</span></div>
  <h1 style="font-size:20px;margin:8px 0 4px">日本考生轻量考试管理+AI学习计划</h1>
  <p class="h-coral" style="font-size:13px;margin:0">Lightweight exam-countdown + AI study-plan app for Japanese exam takers</p>
</div>
<div class="card">
  <b>💡 痛点</b>
  <p style="font-size:14px;color:#555;margin:6px 0 0">日本考生与社会人学习者有巨大的「学习记录共享」需求，Studyplus 会员已破 1000 万。但功能过重，缺少轻量的「考试倒计时＋薄弱诊断＋AI 学习计划」单功能工具。</p>
</div>
<div class="card">
  <b>🛠 工具 · 考试管理</b>
  <label>考试名称</label>
  <input id="exName" placeholder="如：JLPT N1 / 宅建">
  <label>考试日期</label>
  <input id="exDate" type="date">
  <button class="btn" onclick="addExam()">添加考试</button>
  <hr style="border:none;border-top:1px solid var(--line);margin:14px 0">
  <label>记录今日学习（分钟）</label>
  <div class="row">
    <select id="logExam"></select>
    <input id="logMin" type="number" placeholder="分钟" style="max-width:110px">
  </div>
  <label>今日薄弱单元（可选）</label>
  <input id="logWeak" placeholder="如：听力 / 古文">
  <button class="btn" onclick="addLog()">保存学习记录</button>
</div>
<div class="card" id="list"></div>
<div class="card" style="font-size:12px;color:var(--muted)">
  <b>来源参考</b><br>
  <a href="https://prtimes.jp/main/html/rd/p/000000294.000047308.html" target="_blank" style="color:var(--coral)">Studyplus（日本1000万+会员学习SNS）</a>
</div>
<script>
const KEY="P8-20260719-001";
let exams=JSON.parse(localStorage.getItem(KEY)||"[]");
let logs=JSON.parse(localStorage.getItem(KEY+"_log")||"[]");
function save(){localStorage.setItem(KEY,JSON.stringify(exams));localStorage.setItem(KEY+"_log",JSON.stringify(logs));render();}
function daysLeft(d){const ms=new Date(d+"T00:00:00")-new Date();return Math.ceil(ms/86400000);}
function addExam(){const n=exName.value.trim(),d=exDate.value;if(!n||!d){alert("请填写名称和日期");return;}exams.push({n,d});exName.value="";exDate.value="";save();}
function addLog(){const e=logExam.value,m=+logMin.value,weak=logWeak.value.trim();if(!e||!m){alert("请选择考试并填写分钟");return;}logs.push({e,m,weak,t:Date.now()});logMin.value="";logWeak.value="";save();}
function del(i){exams.splice(i,1);save();}
function render(){
  let o="<b>📋 我的考试</b>";
  if(!exams.length)o+="<p class='small'>还没有考试，先添加一个吧。</p>";
  exams.forEach((x,i)=>{const dl=daysLeft(x.d);o+=`<div class='item'><span class='del' onclick='del(${i})'>删除</span><div><b>${x.n}</b></div><div class='days'>${dl>0?dl+" 天":"已到期"}</div><div class='small'>考试日 ${x.d}</div></div>`;});
  const total=logs.reduce((s,l)=>s+l.m,0);
  const weak={};logs.forEach(l=>{if(l.weak)weak[l.weak]=(weak[l.weak]||0)+1;});
  o+="<hr style='border:none;border-top:1px solid var(--line);margin:14px 0'><b>📊 学习统计</b>";
  o+=`<div class='item'>累计学习 <b>${total}</b> 分钟（${logs.length} 次）</div>`;
  const wk=Object.entries(weak);
  if(wk.length){o+="<div class='small' style='margin-top:6px'>高频薄弱单元：</div>";wk.slice(0,6).forEach(([k,v])=>{o+=`<span class='tag'>${k} ×${v}</span>`;});}
  logExam.innerHTML=exams.map(e=>`<option>${e.n}</option>`).join("");
  list.innerHTML=o;
}
render();
</script>
</body>
</html>
