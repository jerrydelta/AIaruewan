<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>請求書+消込+催促</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn.ok{background:var(--ok)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.big{font-size:20px;font-weight:700}
.muted{color:var(--muted);font-size:13px}
.del{color:var(--coral);font-size:12px;cursor:pointer;float:right}
.warn{background:#FFF0F0;color:var(--coral);padding:8px;border-radius:10px;margin-top:6px;font-size:13px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">micro_saas</span><span class="tag">invoice_system</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">請求書 + 消込 + 催促</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Automated invoicing + reconciliation + dunning</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">日本"請求書発行→消込→催促"一体化由上市公司（1000 社+）验证强需求；中国中小企业/个体多用 Excel 或开票软件，缺轻量"自动催款 + 消込"的低价工具。本 MVP 管理发票、记录入金（消込）、自动标识逾期并生成催促话术。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <label>客户名</label><input id="client" placeholder="如 株式会社ABC">
    <div class="row">
      <div><label>金额(元)</label><input type="number" id="amt" placeholder="100000"></div>
      <div><label>开票日</label><input type="date" id="date"></div>
    </div>
    <label>支付期限(天)</label><input type="number" id="term" value="30">
    <button class="btn" onclick="addInv()">＋ 开发票</button>
    <div class="row" style="margin-top:8px">
      <select id="paySel"></select>
      <button class="btn ok" onclick="reconcile()" style="width:auto;padding:8px 12px">消込(标记已收)</button>
    </div>
    <div class="sum" style="display:flex;gap:8px;margin-top:8px">
      <div style="flex:1;text-align:center;background:#FAFAFA;border-radius:10px;padding:8px"><div class="muted">未收</div><div class="big h-coral" id="unpaid">¥0</div></div>
      <div style="flex:1;text-align:center;background:#FAFAFA;border-radius:10px;padding:8px"><div class="muted">已收</div><div class="big" style="color:var(--ok)" id="paid">¥0</div></div>
    </div>
    <div id="dun"></div>
  </div>

  <div class="card" id="list"><b>🧾 发票</b><div id="listBody" style="margin-top:8px"></div></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.robotpayment.co.jp/lan/keiri_main/keshikomi" target="_blank" style="color:var(--coral)">robot payment 消込</a> ·
    <a href="http://www.robotpayment.co.jp/service/mikata/" target="_blank" style="color:var(--coral)">請求書催促</a>
  </div>

<script>
const KEY="P14-20260719-015";
let data=JSON.parse(localStorage.getItem(KEY)||'{"invs":[]}');
function addInv(){
  const c=document.getElementById('client').value.trim();if(!c){alert("填客户");return;}
  data.invs.push({client:c,amt:+document.getElementById('amt').value||0,
    date:document.getElementById('date').value||new Date().toISOString().slice(0,10),
    term:+document.getElementById('term').value||30,paid:false});
  document.getElementById('client').value='';document.getElementById('amt').value='';
  save();
}
function reconcile(){
  const i=+document.getElementById('paySel').value;
  if(isNaN(i)){alert("选一张未收发票");return;}
  data.invs[i].paid=true;save();
}
function save(){localStorage.setItem(KEY,JSON.stringify(data));render();}
function render(){
  const unpaid=data.invs.filter(x=>!x.paid).reduce((s,x)=>s+x.amt,0);
  const paid=data.invs.filter(x=>x.paid).reduce((s,x)=>s+x.amt,0);
  document.getElementById('unpaid').textContent='¥'+unpaid.toLocaleString();
  document.getElementById('paid').textContent='¥'+paid.toLocaleString();
  const sel=document.getElementById('paySel');
  sel.innerHTML=data.invs.map((x,i)=>x.paid?'':'<option value="'+i+'">'+x.client+' ¥'+x.amt+'</option>').join('');
  const today=new Date();
  const over=data.invs.filter(x=>!x.paid);
  let dun='';
  over.forEach(x=>{
    const due=new Date(x.date);due.setDate(due.getDate()+x.term);
    const days=Math.floor((today-due)/86400000);
    if(days>0)dun+='<div class="warn">⏰ '+x.client+' 已逾期 '+days+' 天，金额 ¥'+x.amt+'。催促：'+
      '「'+x.client+' 您好，发票¥'+x.amt+'已于'+x.date+'开立，烦请于近日安排付款，谢谢。」</div>';
  });
  document.getElementById('dun').innerHTML=dun||'<div class="muted">无逾期，棒。</div>';
  const body=document.getElementById('listBody');
  body.innerHTML=data.invs.length?data.invs.map((x,i)=>
    '<div style="padding:6px 0;border-bottom:1px solid var(--line)">'+x.client+' · ¥'+x.amt+' · '+x.date+
    (x.paid?' <span class="tag">已收</span>':' <span style="color:var(--coral)">未收</span>')+
    ' <span class="del" onclick="del('+i+')">删除</span></div>').join(''):'<div class="muted">还没有发票</div>';
}
function del(i){data.invs.splice(i,1);save();}
save();
</script>
</body>
</html>
