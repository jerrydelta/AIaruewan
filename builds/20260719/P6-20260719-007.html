<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>儿童安全位置打卡</title>
<style>
:root{
  --coral:#FF6B6B; --coral-dark:#E85555; --ink:#2D2D2D; --muted:#8A8A8A;
  --bg:#F7F7F7; --card:#FFFFFF; --line:#ECECEC; --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn.s{width:auto;display:inline-block;padding:10px 12px;margin:4px 4px 0 0;font-size:13px}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px;flex-wrap:wrap}
.row>*{flex:1}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">parenting</span><span class="tag">child_safety</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">儿童安全位置打卡（轻量版）</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Low-cost kid safety check-in (station/school alerts)</p>
  </div>
  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">高精度 GPS 硬件月费动辄数千日元，门槛高。本工具用"到达打卡 + 安全区"思路，家长随时知道孩子到没到、是否安全，零月费。</p>
  </div>
  <div class="card">
    <b>🛠 工具</b>
    <label>孩子姓名</label>
    <input id="cname" placeholder="如：小明">
    <label>本次位置 / 打卡点</label>
    <input id="place" placeholder="如：学校 / 地铁站A口 / 奶奶家">
    <div class="row">
      <button class="btn s" style="background:var(--ok)" onclick="checkin(true)">✅ 安全到达</button>
      <button class="btn s" onclick="checkin(false)">⚠️ 异常/未达</button>
    </div>
    <div style="margin-top:8px;font-size:13px;color:#999">快捷场景：</div>
    <button class="btn s" onclick="q('到校')">🏫 到校</button>
    <button class="btn s" onclick="q('到家')">🏠 到家</button>
    <button class="btn s" onclick="q('出站')">🚉 出站</button>
  </div>
  <div class="card" id="list"></div>
  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://prtimes.jp/main/html/rd/p/000000598.000034467.html" target="_blank" style="color:var(--coral)">みてねみまもりGPS</a>
  </div>
<script>
const KEY="P6-20260719-007";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function q(p){document.getElementById('place').value=p;checkin(true);}
function checkin(safe){
  const name=document.getElementById('cname').value.trim()||'孩子';
  const place=document.getElementById('place').value.trim();
  if(!place){alert('填打卡点');return;}
  items.unshift({name,place,safe,t:new Date().toLocaleString('zh-CN'),id:Date.now()});
  document.getElementById('place').value='';save();
}
function del(id){items=items.filter(x=>x.id!==id);save();}
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const el=document.getElementById('list');
  if(!items.length){el.innerHTML='<b>📍 打卡记录</b><p style="font-size:13px;color:#999">还没有打卡。</p>';return;}
  const warn=items.filter(x=>!x.safe).length;
  el.innerHTML='<b>📍 打卡 '+items.length+' 次</b>'+(warn?'<div style="color:#E85555;font-size:13px">⚠ 异常 '+warn+' 次</div>':'<div style="color:var(--ok);font-size:13px">全部安全 ✓</div>')+
    items.map(x=>'<div style="border-top:1px solid var(--line);padding:7px 0;font-size:14px">'+(x.safe?'✅':'⚠️')+' <b>'+esc(x.name)+'</b> → '+esc(x.place)+' <span style="font-size:11px;color:#999">'+x.t+'</span> <button onclick="del('+x.id+')" style="background:none;border:none;color:#bbb;font-size:11px;cursor:pointer">删</button></div>').join('');
}
function esc(s){return (s||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
render();
</script>
</body>
</html>
