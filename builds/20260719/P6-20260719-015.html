<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>手办潮玩价值追踪</title>
<style>
:root{
  --coral:#FF6B6B; --coral-dark:#E85555; --ink:#2D2D2D; --muted:#8A8A8A;
  --bg:#F7F7F7; --card:#FFFFFF; --line:#ECECEC; --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn.s{width:auto;display:inline-block;padding:8px 12px;margin:4px 4px 0 0;font-size:13px}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">hobby</span><span class="tag">collection</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">手办 / 潮玩价值追踪</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Figure value-tracker with auto-valuation & sell alerts</p>
  </div>
  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">潮玩/手办市场超 5000 亿，价格散在各平台。记录入手价与当前估值，到价提醒"该出手了"，把收藏变成会管理的资产。</p>
  </div>
  <div class="card">
    <b>🛠 工具</b>
    <label>名称</label><input id="fname" placeholder="如：初音未来 限定">
    <div class="row">
      <div><label>入手价(¥)</label><input id="buy" type="number" value="0"></div>
      <div><label>当前估值(¥)</label><input id="now" type="number" value="0"></div>
    </div>
    <label>想出手价(¥)</label><input id="target" type="number" value="0">
    <button class="btn" onclick="add()">加入收藏</button>
  </div>
  <div class="card" id="list"></div>
  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.qjtrip.com/appdown/1560.html" target="_blank" style="color:var(--coral)">Hpoi手办维基</a>
  </div>
<script>
const KEY="P6-20260719-015";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function add(){
  const fname=document.getElementById('fname').value.trim();
  if(!fname){alert('填名称');return;}
  items.unshift({fname,buy:+document.getElementById('buy').value||0,now:+document.getElementById('now').value||0,
    target:+document.getElementById('target').value||0,id:Date.now()});
  document.getElementById('fname').value='';save();
}
function del(id){items=items.filter(x=>x.id!==id);save();}
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const el=document.getElementById('list');
  if(!items.length){el.innerHTML='<b>🎎 收藏</b><p style="font-size:13px;color:#999">还没有藏品。</p>';return;}
  let totalBuy=0,totalNow=0;
  items.forEach(x=>{totalBuy+=x.buy;totalNow+=x.now;});
  el.innerHTML='<b>🎎 收藏 '+items.length+' 件</b><div style="font-size:13px;color:#555">总投入 ¥'+totalBuy+' ｜ 当前估值 ¥'+totalNow+'（'+(totalNow>=totalBuy?'+':'')+(totalNow-totalBuy).toFixed(0)+'）</div>'+
    items.map(x=>{
      const ch=x.buy?( (x.now-x.buy)/x.buy*100).toFixed(0):0;
      const hit=x.target&&x.now>=x.target;
      return '<div style="border-top:1px solid var(--line);padding:8px 0">'+
        '<div style="font-weight:600">'+esc(x.fname)+(hit?' <span style="color:var(--ok);font-size:11px">🔔到价出手</span>':'')+'</div>'+
        '<div style="font-size:13px;color:#555">入手¥'+x.buy+' → 估值¥'+x.now+' <span style="color:'+(ch>=0?'var(--ok)':'#E85555')+'">('+ch+'%)</span>'+(x.target?' ｜ 目标¥'+x.target:'')+'</div>'+
        '<button class="btn s" style="background:#bbb" onclick="del('+x.id+')">删除</button></div>';
    }).join('');
}
function esc(s){return (s||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
render();
</script>
</body>
</html>
