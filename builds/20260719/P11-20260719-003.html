<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>家庭水培 pH/EC 监测</title>
<style>
:root{
  --coral:#FF6B6B; --coral-dark:#E85555; --ink:#2D2D2D; --muted:#8A8A8A;
  --bg:#F7F7F7; --card:#FFFFFF; --line:#ECECEC; --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.item .t{font-weight:600}.item .s{font-size:13px;color:var(--muted)}
.mini{display:inline-block;padding:6px 10px;border:none;border-radius:8px;font-size:13px;cursor:pointer;margin:6px 6px 0 0}
.mini.del{background:#eee;color:#999}
.warn{color:var(--coral);font-weight:600}.ok{color:var(--ok);font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">plant</span><span class="tag">succulent_care</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">家庭水培 pH / EC 监测</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Home-hydroponics pH/EC smart monitor (like Hydrofy)</p>
  </div>
  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">主流植物 app 不覆盖 pH/EC/TDS/水温等水培核心指标。水培新手被营养液配比、pH 波动搞崩，缺轻量可视化工具。本工具记录多系统 pH/EC/水温并提示是否越界。</p>
  </div>
  <div class="card">
    <b>🛠 工具 · 录入一次测量</b>
    <label>系统名称</label>
    <input id="sName" placeholder="如：DWC 生菜 1 号">
    <div class="row">
      <div><label>pH（5.5–6.5）</label><input id="sPh" type="number" step="0.1" placeholder="6.0"></div>
      <div><label>EC（mS/cm）</label><input id="sEc" type="number" step="0.1" placeholder="1.5"></div>
    </div>
    <label>水温 ℃</label>
    <input id="sTemp" type="number" step="0.1" placeholder="22">
    <button class="btn" onclick="addReading()">记录测量</button>
  </div>
  <div class="card" id="list">
    <b>📋 测量记录（按系统显示最新）</b>
    <div id="items"></div>
  </div>
  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.hydrofygarden.com" target="_blank" style="color:var(--coral)">Hydrofy</a>
  </div>
<script>
const KEY="P11-20260719-003";
let items = JSON.parse(localStorage.getItem(KEY) || "[]");
function save(){ localStorage.setItem(KEY, JSON.stringify(items)); render(); }
function status(d){
  let r=[];
  if(d.ph!==''&&d.ph!==null){ r.push((d.ph>=5.5&&d.ph<=6.5)?'<span class="ok">pH 正常</span>':'<span class="warn">pH 越界</span>'); }
  if(d.ec!==''&&d.ec!==null){ r.push((d.ec>=0.8&&d.ec<=2.5)?'<span class="ok">EC 正常</span>':'<span class="warn">EC 越界</span>'); }
  return r.join(' · ')||'—';
}
function addReading(){
  const name=document.getElementById('sName').value.trim();
  if(!name){ alert('请输入系统名称'); return; }
  const ph=document.getElementById('sPh').value;
  const ec=document.getElementById('sEc').value;
  const temp=document.getElementById('sTemp').value;
  items.push({id:Date.now(),name,ph,ec,temp,date:new Date().toLocaleString('zh')});
  document.getElementById('sName').value='';
  document.getElementById('sPh').value='';document.getElementById('sEc').value='';document.getElementById('sTemp').value='';
  save();
}
function del(id){ items=items.filter(x=>x.id!==id); save(); }
function render(){
  const box=document.getElementById('items');
  if(!items.length){ box.innerHTML='<p style="font-size:13px;color:var(--muted)">还没有测量记录。</p>'; return; }
  const latest={};
  [...items].reverse().forEach(it=>{ if(!latest[it.name]) latest[it.name]=it; });
  box.innerHTML=Object.values(latest).map(it=>
    '<div class="item"><div class="t">'+it.name+'</div>'+
    '<div class="s">pH '+it.ph+' · EC '+it.ec+' · '+it.temp+'℃ · '+it.date+'</div>'+
    '<div class="s">'+status(it)+'</div></div>'
  ).join('');
}
render();
</script>
</body>
</html>
