<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>分支任务看板</title>
<style>
:root{
  --coral:#FF6B6B;
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">tech</span><span class="tag">git_tools</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">分支任务看板</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Lightweight Git client specialized for Jira/Kakao/GitLab for KO teams.</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">韩国团队开发中使用 GitKraken（Jira/GitHub 联动），但对 $4.95/月的订阅与笨重颇有不满。Tower 是 $69/年、仅 Mac/Win</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    
<label>分支名称</label><input id="b_name" placeholder="如 feat/cart">
<label>关联任务 ID（Jira / Kakao）</label><input id="b_task" placeholder="PROJ-42">
<label>状态</label><select id="b_status"><option>待开发</option><option>进行中</option><option>代码评审</option><option>已完成</option></select>
<button class="btn" onclick="addItem()">+ 添加分支</button>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.gitkraken.com" target="_blank" style="color:var(--coral)">GitKraken / Tower / Fork / SourceTree</a>
  </div>

<script>

const KEY="P16-20260719-009";
const ST=['待开发','进行中','代码评审','已完成'];
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function addItem(){
  const name=document.getElementById('b_name').value.trim();
  const task=document.getElementById('b_task').value.trim();
  const status=document.getElementById('b_status').value;
  if(!name){alert('请填写分支名称');return;}
  items.push({name,task,status,added:new Date().toLocaleString()});
  save();
  document.getElementById('b_name').value='';document.getElementById('b_task').value='';
}
function setStatus(i,si){ items[i].status=ST[si]; save(); }
function del(i){items.splice(i,1);save();}
function render(){
  const el=document.getElementById('list');
  if(!items.length){el.innerHTML='<p style="font-size:13px;color:var(--muted)">暂无分支</p>';return;}
  el.innerHTML='<b>🌿 分支看板（'+items.length+'）</b>'+items.map((it,idx)=>
    '<div style="border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px">'+
    '<div style="font-weight:600">'+esc(it.name)+'</div>'+
    (it.task?'<div style="font-size:12px;color:var(--muted)">任务：'+esc(it.task)+'</div>':'')+
    '<div style="margin:6px 0">状态：<b class="h-coral">'+esc(it.status)+'</b></div>'+
    '<div class="row" style="flex-wrap:wrap">'+ST.map((s,si)=>'<button class="btn" style="flex:1 1 40%;margin:2px;padding:8px;font-size:12px;background:'+(s===it.status?'var(--coral)':'#fff')+';color:'+(s===it.status?'#fff':'var(--coral)')+';border:1px solid var(--line)" onclick="setStatus('+idx+','+si+')">'+s+'</button>').join('')+'</div>'+
    '<button class="btn" style="background:#fff;color:var(--coral);border:1px solid var(--line);margin-top:6px" onclick="del('+idx+')">删除</button>'+
    '</div>'
  ).join('');
}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
render();
</script>
</body>
</html>
