<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>极简周计划+时间块</title>
<style>
:root{--coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;--bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
.small{font-size:12px;color:var(--muted)}
.del{color:var(--coral);font-size:12px;cursor:pointer;margin-left:8px}
.day{margin-top:10px}
.day b{color:var(--coral)}
.blk{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:#FFF7F7;border-radius:10px;margin-top:6px;font-size:14px}
</style>
</head>
<body>
<div class="card">
  <div><span class="tag">lifestyle</span><span class="tag">weekly_planner</span></div>
  <h1 style="font-size:20px;margin:8px 0 4px">极简周计划 + 时间块</h1>
  <p class="h-coral" style="font-size:13px;margin:0">Minimalist weekly planner with one-click time-blocking</p>
</div>
<div class="card">
  <b>💡 痛点</b>
  <p style="font-size:14px;color:#555;margin:6px 0 0">日/周计划应用头部拥挤（Motion $29-49/月、Sunsama ~$16/月），用户抱怨过度复杂、昂贵、偏团队。一个轻量、日历优先、把任务拖进时间块的极简规划器，对 ADHD/低认知负担用户尤其有吸引力。</p>
</div>
<div class="card">
  <b>🛠 工具 · 安排任务</b>
  <label>任务内容</label><input id="tName" placeholder="如：写周报">
  <div class="row">
    <div><label>星期</label><select id="tDay"><option>周一</option><option>周二</option><option>周三</option><option>周四</option><option>周五</option><option>周六</option><option>周日</option></select></div>
    <div><label>时间段</label><select id="tTime"><option>上午</option><option>下午</option><option>晚上</option><option>其他</option></select></div>
  </div>
  <button class="btn" onclick="addTask()">+ 加入周计划</button>
</div>
<div class="card" id="list"><b>🗓 本周时间块</b><div id="plan"></div></div>
<div class="card" style="font-size:12px;color:var(--muted)">
  <b>来源参考</b><br>
  <a href="https://apps.apple.com/us/app/structured/id1581916213" target="_blank" style="color:var(--coral)">Structured / Sunsama / Arch Calendar</a>
</div>
<script>
const KEY="P3-20260719-005";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
const DAYS=["周一","周二","周三","周四","周五","周六","周日"];
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function addTask(){const name=tName.value.trim();if(!name){alert('请输入任务');return;}
  items.push({name,day:tDay.value,time:tTime.value,t:Date.now()});tName.value='';save();}
function del(i){items.splice(i,1);save();}
function render(){let h='';
  DAYS.forEach(d=>{const arr=items.filter(x=>x.day===d);
    if(arr.length){h+=`<div class="day"><b>${d}</b>`;
      arr.forEach(x=>{const gi=items.indexOf(x);
        h+=`<div class="blk"><span>${x.time} · ${x.name}</span><span class="del" onclick="del(${gi})">✕</span></div>`;});
      h+='</div>';}});
  plan.innerHTML=h||'<p class="small">还没有安排，把任务拖进时间块吧。</p>';}
render();
</script>
</body>
</html>
