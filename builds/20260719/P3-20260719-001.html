<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>胶囊衣橱与穿搭推荐</title>
<style>
:root{--coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;--bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
.small{font-size:12px;color:var(--muted)}
.del{color:var(--coral);font-size:12px;cursor:pointer;float:right;margin-left:8px}
.item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
.combo{background:#FFF7F7;border:1px dashed var(--coral);border-radius:12px;padding:12px;margin-top:10px;font-size:14px}
.combo b{color:var(--coral)}
</style>
</head>
<body>
<div class="card">
  <div><span class="tag">lifestyle</span><span class="tag">wardrobe</span></div>
  <h1 style="font-size:20px;margin:8px 0 4px">胶囊衣橱与穿搭推荐</h1>
  <p class="h-coral" style="font-size:13px;margin:0">Capsule-wardrobe outfit planner with AI daily outfit recommendations from owned items</p>
</div>
<div class="card">
  <b>💡 痛点</b>
  <p style="font-size:14px;color:#555;margin:6px 0 0">胶囊衣橱/数字衣橱应用是已验证但仍增长的小众市场，2025年全球市场约18亿美元，73.4%为个人消费者。现有头部产品（Cladwell订阅、Stylebook买断）界面老化，缺少"从已有衣物智能生成每日搭配"的轻量工具。</p>
</div>
<div class="card">
  <b>🛠 工具 · 我的胶囊衣橱</b>
  <label>衣物名称</label><input id="cName" placeholder="如：白衬衫">
  <div class="row">
    <div><label>类别</label><select id="cCat"><option>上装</option><option>下装</option><option>外套</option><option>鞋</option><option>配饰</option></select></div>
    <div><label>颜色</label><input id="cColor" placeholder="如：白"></div>
  </div>
  <div class="row">
    <div><label>季节</label><select id="cSeason"><option>春</option><option>夏</option><option>秋</option><option>冬</option><option>四季</option></select></div>
    <div><label>风格</label><input id="cStyle" placeholder="如：通勤"></div>
  </div>
  <button class="btn" onclick="addCloth()">+ 加入衣橱</button>
  <button class="btn" onclick="genOutfit()" style="background:var(--ok)">🎲 生成今日穿搭</button>
  <div id="combo"></div>
</div>
<div class="card" id="list"><b>👗 我的衣橱</b><div id="clothes"></div></div>
<div class="card" style="font-size:12px;color:var(--muted)">
  <b>来源参考</b><br>
  <a href="https://www.whering.co/" target="_blank" style="color:var(--coral)">Whering / Cladwell / Stylebook</a>
</div>
<script>
const KEY="P3-20260719-001";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function addCloth(){const name=cName.value.trim();if(!name){alert('请输入衣物名称');return;}
  items.push({name,cat:cCat.value,color:cColor.value,season:cSeason.value,style:cStyle.value,t:Date.now()});
  cName.value='';cColor.value='';cStyle.value='';save();}
function del(i){items.splice(i,1);save();}
function genOutfit(){const tops=items.filter(x=>x.cat==='上装'||x.cat==='外套');const bots=items.filter(x=>x.cat==='下装');const shoes=items.filter(x=>x.cat==='鞋');
  if(!tops.length||!bots.length||!shoes.length){combo.innerHTML='<div class="combo">衣橱里还缺「上装/外套、下装、鞋」各一件才能搭配，先去添加吧～</div>';return;}
  const pick=a=>a[Math.floor(Math.random()*a.length)];
  combo.innerHTML=`<div class="combo">今日推荐搭配：<br>上装：<b>${pick(tops).name}</b><br>下装：<b>${pick(bots).name}</b><br>鞋：<b>${pick(shoes).name}</b><br><span class="small">（可多次点击换一套）</span></div>`;}
function render(){clothes.innerHTML=items.length?items.map((x,i)=>`<div class="item"><span>${x.name} <span class="small">${x.cat}·${x.color}·${x.season}</span></span><span class="del" onclick="del(${i})">删除</span></div>`).join(''):'<p class="small">还没有衣物，先添加几件吧。</p>';}
render();
</script>
</body>
</html>
