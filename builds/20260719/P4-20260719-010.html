<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>AI优先的韩文社媒收件箱（按会话量计费）</title>
<style>:root{
  --coral:#FF6B6B;
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
.item{border-top:1px solid var(--line);padding:10px 0;position:relative}
.del{position:absolute;right:0;top:10px;background:#fff;color:var(--coral);
  border:1px solid #FFD9D9;border-radius:8px;font-size:12px;padding:4px 10px;cursor:pointer}
.mini{font-size:13px;color:var(--ink);background:#FAFAFA;border:1px solid var(--line);
  border-radius:10px;padding:10px;margin-top:8px}
.hr{height:1px;background:var(--line);border:none;margin:14px 0}</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">social</span><span class="tag">comment_manager</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">AI优先的韩文社媒收件箱（按会话量计费）</h1>
    <p class="h-coral" style="font-size:13px;margin:0">AI-first KR social inbox (usage-based, not per-seat)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">2026趋势：社媒收件箱+AI自动回复成标配。Manychat $15/월做DM/댓글自动化。痛点：AI韩文回复质量、Kakao/Naver覆盖、按席位计费贵。机会：AI优先的韩文轻量客服，按会话量而非席位计费。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <label>플랫폼 (平台)</label><select id="u1"><option>인스타그램</option><option>카카오톡</option><option>네이버</option></select>
<label>세션 수 (会话量)</label><input type="number" id="u2" placeholder="如：120">
<label>톤 (语气)</label><select id="u3"><option>친절함</option><option>전문적</option><option>캐주얼</option></select>
<button class="btn" onclick="addSess()">세션 기록</button>
<div id="cost" class="mini"></div>
<hr class="hr">
<label>톤별 샘플 답변</label>
<button class="btn" style="background:#3FB984" onclick="sample()">생성 샘플</button>
<div id="samp" class="mini" style="color:var(--coral)"></div>
  </div>

  <div class="card" id="list"></div>

  

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://postplanify.com/blog/best-social-inbox-tools" target="_blank" style="color:var(--coral)">Manychat / PostPlanify / Vista Social</a>
  </div>

<script>
const KEY="P4-20260719-010";
let items = JSON.parse(localStorage.getItem(KEY) || "[]");
function save(){ localStorage.setItem(KEY, JSON.stringify(items)); render(); }
function addSess(){
 var n=+document.getElementById('u2').value||0;
 if(!n){alert('세션 수를 입력하세요');return;}
 items.push({plat:document.getElementById('u1').value,sess:n,tone:document.getElementById('u3').value,ts:Date.now()});
 save();document.getElementById('u2').value='';
}
function costPer(s){return 0.05*s;}
function sample(){
 var t=document.getElementById('u3').value;
 var m={ '친절함':'안녕하세요! 무엇을 도와드릴까요? 😊','전문적':'문의 주셔서 감사합니다. 전문 상담사가 확인 후 회신드리겠습니다.','캐주얼':'어서오세요~ 궁금한 거 있으면 편하게 물어보세요!'}[t]||'';
 document.getElementById('samp').innerHTML='['+t+'] '+m;
}
function render(){
 var el=document.getElementById('list');
 if(!items.length){el.innerHTML='<b>💬 세션 관리 (按会话计费)</b><p style="font-size:13px;color:var(--muted)">세션을 기록하세요.</p>';return;}
 var tot=0;items.forEach(function(x){tot+=x.sess;});
 document.getElementById('cost').innerHTML='총 세션: <b class="h-coral">'+tot+'</b> ｜ 예상 비용(세션당 $0.05): <b class="h-coral">$'+(tot*0.05).toFixed(2)+'</b>';
 el.innerHTML='<b>💬 세션 관리（'+items.length+'）</b>'+items.map(function(x,i){
  return '<div class="item"><div><b>'+x.plat+'</b> · '+x.tone+'</div><div style="font-size:12px;color:var(--muted)">세션 '+x.sess+' · 예상 $'+(x.sess*0.05).toFixed(2)+'</div><button class="del" onclick="del('+i+')">삭제</button></div>';
 }).join('');
}
function del(i){items.splice(i,1);save();}
render();
</script>
</body>
</html>
