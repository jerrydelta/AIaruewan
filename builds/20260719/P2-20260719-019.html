<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>日韓両語個人向けAIキャリアコーチ｜日韩双语职业教练</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.road{background:#FFF7F0;border:1px solid #FFE0CC;border-radius:10px;padding:12px;margin-top:10px;font-size:14px;white-space:pre-wrap}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">career</span><span class="tag">career_development</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">日韓両語個人向けAIキャリアコーチ</h1>
    <p class="h-coral" style="font-size:13px;margin:0">JP+KR bilingual AI career-coach (diagnosis + learning roadmap)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">日韓ともに「AIキャリア診断・転職・リスキリング」需要上昇。JAは就活AI(519,861利用)・KOはAI자소서(Saramin)で個別検証済み。痛点：自分のスキルギャップと学習道筋が分からない。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · キャリア診断＋ロードマップ</b>
    <input id="cur" placeholder="現在の職/スキル（例：営業）">
    <input id="goal" placeholder="目標職（例：データ分析）">
    <input id="have" placeholder="保有スキル（カンマ：Excel,SQL）">
    <input id="need" placeholder="目標に必要なスキル（カンマ：Python,統計）">
    <button class="btn" onclick="gen()">診断・ロードマップ生成</button>
    <div id="road" class="road" style="display:none"></div>
  </div>

  <div class="card" id="list"><b>📋 保存した診断</b></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://sai.jaic-g.com/" target="_blank" style="color:var(--coral)">就活AI (JA) / Saramin AI자소서 (KO)</a>
  </div>

<script>
const KEY="P2-20260719-019";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function splitArr(s){return (s||"").split(/[,，、]/).map(x=>x.trim()).filter(Boolean);}
function gen(){
  const cur=document.getElementById("cur").value.trim();
  const goal=document.getElementById("goal").value.trim();
  if(!cur||!goal){alert("現在と目標を入力してください");return;}
  const have=splitArr(document.getElementById("have").value);
  const need=splitArr(document.getElementById("need").value);
  const gap=need.filter(s=>!have.includes(s));
  const cover=need.filter(s=>have.includes(s));
  const rate=need.length?Math.round(cover.length/need.length*100):0;
  const road=document.getElementById("road");road.style.display="block";
  road.textContent="🎯 "+cur+" → "+goal+"\n"+
    "✅ 既存スキル活用："+(cover.length?cover.join("、"):"なし")+"\n"+
    "📉 スキルギャップ（"+gap.length+"）："+(gap.length?gap.join("、"):"なし")+"\n"+
    "📊 達成度："+rate+"%\n"+
    "🗺 ロードマップ：\n"+(gap.length?gap.map((g,i)=>"  "+(i+1)+". "+g+" を基礎から学ぶ（入門→実践課題）").join("\n"):"  目標スキルはほぼ充足。ポートフォリオ作成へ");
  items.unshift({cur,goal,rate,gap:gap.length,date:new Date().toLocaleDateString()});
  localStorage.setItem(KEY,JSON.stringify(items));render();
}
function del(i){items.splice(i,1);localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const box=document.getElementById("list");
  if(!items.length){box.innerHTML="<b>📋 保存した診断</b><p style='font-size:13px;color:var(--muted);margin:6px 0 0'>暂无记录</p>";return;}
  box.innerHTML="<b>📋 保存した診断（"+items.length+"）</b>"+items.map((it,i)=>
    "<div style='display:flex;justify-content:space-between;padding:9px;border:1px solid var(--line);border-radius:10px;margin-top:8px'>"+
    "<div style='font-size:14px'>"+it.cur+" → "+it.goal+" <span style='color:var(--muted);font-size:11px'>"+it.date+"</span></div>"+
    "<div><span class='h-coral' style='font-weight:700'>"+it.rate+"%</span> <button class='del' onclick='del("+i+")'>删</button></div></div>").join("");
}
render();
</script>
</body>
</html>
