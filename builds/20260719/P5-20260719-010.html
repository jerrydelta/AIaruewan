<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>可穿戴恢复自适应教练</title>
<style>
:root{
  --coral:#FF6B6B;        /* 主品牌色 */
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">fitness</span><span class="tag">wearable_integrated_ai_coaching</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">可穿戴恢复自适应教练</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Wearable-integrated recovery-adaptive AI coach</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">真正「第三层AI教练」读取Apple Watch/Garmin/Oura的HRV、睡眠、训练负荷，据恢复状态改写当日训练(SensAi)。多数app仍盲于训练外信号，睡4小时和8小时拿到相同计划。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:#666;margin:8px 0">结合HRV与睡眠评估恢复状态，给出当日训练调整建议。</p>
<label>日期</label><input type="date" id="f_rdate" placeholder="">
<label>HRV(ms)</label><input type="number" id="f_hrv" placeholder="如 55">
<label>睡眠(小时)</label><input type="number" id="f_sleepHours" placeholder="如 7">
<label>原计划</label><select id="f_planToday"><option value="高强度">高强度</option><option value="中强度">中强度</option><option value="低强度">低强度</option><option value="休息">休息</option></select>
    <button class="btn" onclick="addItem()">保存记录</button>
    <div id="derive" style="font-size:13px;color:var(--coral);margin-top:8px"></div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="#" style="color:var(--coral)">SensAi / Whoop / Oura / Garmin</a>
  </div>

<script>
const KEY="P5-20260719-010";
const FIELDS=[{"label":"日期","key":"rdate"},{"label":"HRV(ms)","key":"hrv"},{"label":"睡眠(小时)","key":"sleepHours"},{"label":"原计划","key":"planToday"}];
let items = JSON.parse(localStorage.getItem(KEY) || "[]");
function save(){ localStorage.setItem(KEY, JSON.stringify(items)); render(); }
function addItem(){
const v_rdate=document.getElementById('f_rdate').value;
const v_hrv=document.getElementById('f_hrv').value;
const v_sleepHours=document.getElementById('f_sleepHours').value;
const v_planToday=document.getElementById('f_planToday').value;
  const item={ ts:Date.now() , rdate:v_rdate, hrv:v_hrv, sleepHours:v_sleepHours, planToday:v_planToday };
  items.unshift(item);
  save();
  document.getElementById('f_rdate').value='';
document.getElementById('f_hrv').value='';
document.getElementById('f_sleepHours').value='';
document.getElementById('f_planToday').value='';
  const dv=derive(item);
  document.getElementById('derive').textContent = dv?('已保存 ✓ '+dv):'已保存 ✓';
}
function derive(it){ const h=Number(it.hrv)||0,s=Number(it.sleepHours)||0; if(!h||!s) return ''; if(s<6||h<40) return '🛌 恢复不足，建议改为低强度/休息'; if(s>=7&&h>=55) return '⚡ 恢复良好，可执行原计划'; return '➡️ 恢复一般，建议中低强度'; return ''; }
function rowHTML(it){
  let h='<div style="font-size:12px;color:var(--muted)">'+(new Date(it.ts).toLocaleString())+'</div>';
  FIELDS.forEach(f=>{ if(it[f.key]!==''){ h+='<div style="font-size:14px;margin:2px 0"><b>'+f.label+'：</b>'+it[f.key]+'</div>'; } });
  const d=derive(it); if(d) h+='<div style="font-size:13px;color:var(--coral);margin-top:4px">'+d+'</div>';
  return h;
}
function render(){
  const el=document.getElementById('list');
  if(!items.length){ el.innerHTML='<div style="font-size:13px;color:var(--muted)">暂无记录，添加第一条吧。</div>'; return; }
  el.innerHTML='<b style="font-size:13px">📋 记录 ('+items.length+')</b>'+items.map((it,i)=>'<div style="border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:8px">'+rowHTML(it)+'<button class="btn" style="background:#bbb;margin-top:8px" onclick="del('+i+')">删除</button></div>').join('');
}
function del(i){ items.splice(i,1); save(); }
render();

</script>
</body>
</html>
