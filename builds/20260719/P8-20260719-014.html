<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>日本向本地/自托管PW管理</title>
<style>
:root{--coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;--bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn.ok{background:var(--ok)}
.tag{display:inline-block;font-size:11px;color:var(--coral);background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.small{font-size:12px;color:var(--muted)}
.del{color:var(--coral);font-size:13px;cursor:pointer;float:right}
</style>
</head>
<body>
<div class="card">
  <div><span class="tag">privacy</span><span class="tag">password_manager</span></div>
  <h1 style="font-size:20px;margin:8px 0 4px">日本向 本地／自托管密码管理</h1>
  <p class="h-coral" style="font-size:13px;margin:0">Japan-facing local / self-hosted password manager</p>
</div>
<div class="card">
  <b>💡 痛点</b>
  <p style="font-size:14px;color:#555;margin:6px 0 0">日本「买断·国产代理」密码管理需求明显，1Password 经 SourceNext 买断 12,800 日元。但订阅疲劳、重视数据主权的人群缺少「本地／自托管」选项。</p>
</div>
<div class="card">
  <b>🛠 工具 · 密码保险箱（本地）</b>
  <label>网站 / 服务</label><input id="site" placeholder="amazon.co.jp">
  <div class="row"><div><label>账号</label><input id="acc" placeholder="user"></div><div><label>密码</label><input id="pw" placeholder="密码"></div></div>
  <button class="btn ok" onclick="genpw()">生成强密码</button>
  <button class="btn" onclick="addPW()">保存到本机</button>
  <p class="small" style="margin-top:6px">🔒 条目仅存本机 localStorage，不上传。生成器用随机字符，建议 12 位以上。</p>
</div>
<div class="card" id="list"></div>
<div class="card" style="font-size:12px;color:var(--muted)">
  <b>来源参考</b><br>
  <a href="https://www.sourcenext.com/product/1password/" target="_blank" style="color:var(--coral)">1Password 日本买断版（SourceNext）</a>
</div>
<script>
const KEY="P8-20260719-014";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function strength(p){let s=0;if(p.length>=8)s++;if(p.length>=12)s++;if(/[A-Z]/.test(p))s++;if(/[0-9]/.test(p))s++;if(/[^A-Za-z0-9]/.test(p))s++;return s;}
function genpw(){const c="ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789!@#$%";let o="";for(let i=0;i<14;i++)o+=c[Math.floor(Math.random()*c.length)];pw.value=o;check();}
function check(){const s=strength(pw.value);const lab=["极弱","弱","一般","强","很强","极强"][s];if(pw.value)document.getElementById("strength").textContent="强度："+lab;}
function addPW(){const s=site.value.trim(),a=acc.value.trim(),p=pw.value;if(!s||!p){alert("请填网站和密码");return;}items.unshift({s,a,p});site.value=acc.value=pw.value="";document.getElementById("strength").textContent="";save();}
function del(i){items.splice(i,1);save();}
function render(){let o=`<b>🔑 密码保险箱（${items.length}）</b>`;if(!items.length)o+="<p class='small'>还没有条目。</p>";items.forEach((x,i)=>{const sc=["极弱","弱","一般","强","很强","极强"][strength(x.p)];o+=`<div class='item'><span class='del' onclick='del(${i})'>删除</span><b>${x.s}</b> <span class='tag'>${x.a||""}</span><div class='small'>密码：${x.p} · 强度 ${sc}</div></div>`;});list.innerHTML=o;document.getElementById("strength").textContent="";}
render();
</script>
</body>
</html>
