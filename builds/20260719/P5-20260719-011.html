<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>跌倒检测吊坠+家属报警</title>
<style>
:root{
  --coral:#FF6B6B;        /* 主品牌色 */
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">elderly</span><span class="tag">fall_detection_pendant</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">跌倒检测吊坠+家属报警</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Fall-detection pendant with caregiver alert</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">跌倒检测吊坠市场2025年$48亿、预计2033年$92亿。痛点：独居老人跌倒后无人知，专用吊坠需充电、佩戴依从性低。机会：带照护者实时报警+GPS+双向语音的吊坠/手表。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:#666;margin:8px 0">管理紧急联系人并记录跌倒/演练事件，模拟向家属报警闭环。</p>
<label>紧急联系人</label><input type="text" id="f_contactName" placeholder="如 子女小王">
<label>电话</label><input type="text" id="f_phone" placeholder="如 138…">
<label>事件</label><select id="f_event"><option value="正常">正常</option><option value="误报">误报</option><option value="真实跌倒演练">真实跌倒演练</option><option value="真实触发">真实触发</option></select>
<label>备注</label><textarea id="f_note" rows="2" placeholder="地点/情况"></textarea>
    <button class="btn" onclick="addItem()">保存记录</button>
    <div id="derive" style="font-size:13px;color:var(--coral);margin-top:8px"></div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="#" style="color:var(--coral)">Medical Guardian / Philips Lifeline / Life Alert / Apple Watch / Samsung</a>
  </div>

<script>
const KEY="P5-20260719-011";
const FIELDS=[{"label":"紧急联系人","key":"contactName"},{"label":"电话","key":"phone"},{"label":"事件","key":"event"},{"label":"备注","key":"note"}];
let items = JSON.parse(localStorage.getItem(KEY) || "[]");
function save(){ localStorage.setItem(KEY, JSON.stringify(items)); render(); }
function addItem(){
const v_contactName=document.getElementById('f_contactName').value;
const v_phone=document.getElementById('f_phone').value;
const v_event=document.getElementById('f_event').value;
const v_note=document.getElementById('f_note').value;
  const item={ ts:Date.now() , contactName:v_contactName, phone:v_phone, event:v_event, note:v_note };
  items.unshift(item);
  save();
  document.getElementById('f_contactName').value='';
document.getElementById('f_phone').value='';
document.getElementById('f_event').value='';
document.getElementById('f_note').value='';
  const dv=derive(item);
  document.getElementById('derive').textContent = dv?('已保存 ✓ '+dv):'已保存 ✓';
}
function derive(it){ if(it.event==='真实跌倒演练'||it.event==='真实触发') return '🚨 已触发：向家属 '+it.contactName+' 报警'; return '🟢 设备正常'; return ''; }
function rowHTML(it){
  let h='<div style="font-size:12px;color:var(--muted)">'+(new Date(it.ts).toLocaleString())+'</div>';
  FIELDS.forEach(f=>{ if(it[f.key]!==''){ h+='<div style="font-size:14px;margin:2px 0"><b>'+f.label+'：</b>'+it[f.key]+'</div>'; } });
  const d=derive(it); if(d) h+='<div style="font-size:13px;color:var(--coral);margin-top:4px">'+d+'</div>';
  return h;
}
function render(){
  const el=document.getElementById('list');
  if(!items.length){ el.innerHTML='<div style="font-size:13px;color:var(--muted)">暂无记录，添加第一条吧。</div>'; return; }
  el.innerHTML='<b style="font-size:13px">📋 记录 ('+items.length+')</b>'+items.map((it,i)=>'<div style="border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:8px">'+rowHTML(it)+'<button class="btn" style="background:#bbb;margin-top:8px" onclick="del('+i+')">删除</button></div>').join('');
}
function del(i){ items.splice(i,1); save(); }
render();

</script>
</body>
</html>
