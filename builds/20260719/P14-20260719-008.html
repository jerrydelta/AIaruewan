<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>冲动暂停 · 正念拦截</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.big{font-size:40px;font-weight:700;color:var(--coral);text-align:center}
.muted{color:var(--muted);font-size:13px}
.circle{width:160px;height:160px;border-radius:50%;background:var(--coral);margin:14px auto;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;text-align:center;
  transition:transform .3s}
.del{color:var(--coral);font-size:12px;cursor:pointer;float:right}
.hidden{display:none}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">addiction_recovery</span><span class="tag">mindful_abstinence</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">冲动暂停 · 正念拦截</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Urge-intercepting mindfulness (pause + breathing)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">欧美出现"不惩罚式"冲动拦截新范式（Mindful Shift）：不硬性禁 App，而是"暂停 + 呼吸"让冲动自然退潮，且隐私优先、不收集数据。本工具在你冲动来袭时，引导一次 4-7-8 呼吸，帮冲动降温。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <button class="btn" onclick="startUrge()">⚡ 冲动来了，暂停一下</button>
    <div id="breath" class="hidden" style="text-align:center">
      <div class="circle" id="circle">准备…</div>
      <div class="big" id="count">4</div>
      <div class="muted">跟随圆圈吸气—屏息—呼气</div>
    </div>
    <div id="after" class="hidden">
      <label>这次是什么冲动？</label>
      <input id="urge" placeholder="如 想刷短视频 / 想抽烟">
      <div class="row">
        <button class="btn ok" style="background:var(--ok)" onclick="logUrge(true)">度过了 ✓</button>
        <button class="btn" style="background:var(--muted)" onclick="logUrge(false)">没忍住</button>
      </div>
    </div>
    <div style="text-align:center;margin-top:10px" class="big" id="passed" style="font-size:20px;color:var(--ok)">0</div>
    <div class="muted" style="text-align:center">累计度过次数</div>
  </div>

  <div class="card" id="list"><b>📿 冲动记录</b><div id="listBody" style="margin-top:8px"></div></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://apps.apple.com/ca/app/mindful-shift/id6758112030" target="_blank" style="color:var(--coral)">Mindful Shift（冲动拦截范式）</a>
  </div>

<script>
const KEY="P14-20260719-008";
let data=JSON.parse(localStorage.getItem(KEY)||'{"logs":[]}');
let phase=0,cycle=[['吸气',4],['屏息',7],['呼气',8]],pi=0,si=0,iv=null;
function startUrge(){
  document.getElementById('breath').classList.remove('hidden');
  document.getElementById('after').classList.add('hidden');
  pi=0;si=0;nextPhase();
}
function nextPhase(){
  if(pi>=cycle.length){showAfter();return;}
  const[ name,sec]=cycle[pi];si=sec;
  document.getElementById('circle').textContent=name;
  document.getElementById('count').textContent=sec;
  iv=setInterval(()=>{
    si--;document.getElementById('count').textContent=si;
    if(si<=0){clearInterval(iv);pi++;nextPhase();}
  },1000);
}
function showAfter(){
  document.getElementById('breath').classList.add('hidden');
  document.getElementById('after').classList.remove('hidden');
}
function logUrge(ok){
  data.logs.push({date:new Date().toLocaleString('zh-CN'),urge:document.getElementById('urge').value.trim(),passed:ok});
  document.getElementById('urge').value='';
  document.getElementById('after').classList.add('hidden');
  save();
}
function save(){localStorage.setItem(KEY,JSON.stringify(data));render();}
function render(){
  document.getElementById('passed').textContent=data.logs.filter(l=>l.passed).length;
  const body=document.getElementById('listBody');
  if(!data.logs.length){body.innerHTML='<div class="muted">暂无记录</div>';return;}
  body.innerHTML=data.logs.slice().reverse().map((l,i)=>
    '<div style="padding:6px 0;border-bottom:1px solid var(--line)">'+l.date+' · '+
    (l.passed?'<span class="tag">度过</span>':'<span style="color:var(--muted)">未忍住</span>')+
    (l.urge?' '+l.urge:'')+' <span class="del" onclick="del('+i+')">删除</span></div>').join('');
}
function del(i){data.logs.splice(i,1);save();}
save();
</script>
</body>
</html>
