<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>API用量计费台</title>
<style>
:root{--coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;--bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.item .meta{font-size:11px;color:var(--muted)}
.mini{display:inline-block;padding:6px 10px;border:none;border-radius:8px;font-size:12px;cursor:pointer;background:#FFF0F0;color:var(--coral);margin:4px 4px 0 0}
.mini.del{background:#FDECEC;color:#E85555}
pre{white-space:pre-wrap;word-break:break-all;font-size:13px;background:#fafafa;border:1px solid var(--line);border-radius:8px;padding:8px;margin:6px 0 0}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">micro_saas</span><span class="tag">api_billing</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">API用量计费台</h1>
    <p class="h-coral" style="font-size:13px;margin:0">AI-model API pay-as-you-go aggregation (unified dashboard)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">CometAPI证明"聚合多模型+按量计费+用量可视化"是开发者刚需且能独立运营；中日AI应用开发者同样需要成本控制/多模型路由，但多用官方直连——可做区域化计费中间层。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <label>模型名</label>
    <input id="model" placeholder="如：hunyuan-pro">
    <label>调用次数</label>
    <input id="calls" type="number" placeholder="1000">
    <label>单价（元/千次）</label>
    <input id="price" type="number" step="0.01" placeholder="2.0">
    <button class="btn" onclick="add()">记录用量</button>
  </div>

  <div class="card" id="list">
    <b>📊 用量仪表盘</b>
    <div id="sum" style="font-size:14px;margin:8px 0"></div>
    <div id="items"></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.cometapi.com/pricing" target="_blank" style="color:var(--coral)">CometAPI 聚合计费</a>
  </div>

<script>
const KEY="P14-20260719-018";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function add(){
  const model=document.getElementById('model').value.trim();
  const calls=parseFloat(document.getElementById('calls').value||"0");
  const price=parseFloat(document.getElementById('price').value||"0");
  if(!model){alert('请填写模型名');return;}
  items.unshift({model,calls,cost:calls/1000*price,ts:Date.now()});
  document.getElementById('model').value='';document.getElementById('calls').value='';document.getElementById('price').value='';
  save();
}
function del(i){items.splice(i,1);save();}
function render(){
  const total=items.reduce((s,x)=>s+x.cost,0);
  document.getElementById('sum').innerHTML=`总花费 <b class="h-coral">¥${total.toFixed(2)}</b> · 模型 ${items.length} 个`;
  const box=document.getElementById('items');
  if(!items.length){box.innerHTML='<p style="font-size:13px;color:var(--muted)">还没有用量记录。</p>';return;}
  box.innerHTML=items.map((it,i)=>`<div class="item"><div><b>${esc(it.model)}</b> · ${it.calls}次</div><div class="meta">¥${it.cost.toFixed(2)}</div><button class="mini del" onclick="del(${i})">删除</button></div>`).join('');
}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
render();
</script>
</body>
</html>
