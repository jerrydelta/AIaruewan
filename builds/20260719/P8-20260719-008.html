<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>离线优先隐私学习笔记（韩国）</title>
<style>
:root{--coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;--bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.small{font-size:12px;color:var(--muted)}
.del{color:var(--coral);font-size:13px;cursor:pointer;float:right}
</style>
</head>
<body>
<div class="card">
  <div><span class="tag">education</span><span class="tag">error_notebook</span></div>
  <h1 style="font-size:20px;margin:8px 0 4px">离线优先隐私学习笔记（韩国）</h1>
  <p class="h-coral" style="font-size:13px;margin:0">Offline-first privacy study notebook, Korea</p>
</div>
<div class="card">
  <b>💡 痛点</b>
  <p style="font-size:14px;color:#555;margin:6px 0 0">韩国「100% 离线」错题/学习笔记受欢迎，CUTERS 以离线优先、隐私为重差异化，无需云、无广告人群需求明确。</p>
</div>
<div class="card">
  <b>🛠 工具 · 离线笔记（数据仅存本机）</b>
  <label>标题</label><input id="nt" placeholder="如：二次方程式整理">
  <label>科目</label><input id="ns" placeholder="数学">
  <label>内容</label><textarea id="nc" rows="3" placeholder="手写要点或照片说明…"></textarea>
  <label>记录类型</label>
  <select id="ntype"><option>文字</option><option>手写</option><option>照片</option></select>
  <button class="btn" onclick="addNote()">保存到本机</button>
  <p class="small" style="margin-top:6px">🔒 本工具完全离线，所有笔记仅保存在你这台设备的 localStorage，不上传任何服务器。</p>
</div>
<div class="card" id="list"></div>
<div class="card" style="font-size:12px;color:var(--muted)">
  <b>来源参考</b><br>
  <a href="https://mergeek.com/zh/latest/VjvLrnEqbzYn4B9a" target="_blank" style="color:var(--coral)">CUTERS（离线优先隐私学习笔记）</a>
</div>
<script>
const KEY="P8-20260719-008";
let notes=JSON.parse(localStorage.getItem(KEY)||"[]");
function save(){localStorage.setItem(KEY,JSON.stringify(notes));render();}
function addNote(){const t=nt.value.trim(),s=ns.value.trim(),c=nc.value.trim(),ty=ntype.value;if(!t){alert("请填标题");return;}notes.unshift({t,s,c,ty,t:Date.now()});nt.value=ns.value=nc.value="";save();}
function del(i){notes.splice(i,1);save();}
function render(){let o=`<b>📝 离线笔记（${notes.length}）</b>`;if(!notes.length)o+="<p class='small'>还没有笔记。</p>";notes.forEach((x,i)=>{o+=`<div class='item'><span class='del' onclick='del(${i})'>删除</span><b>${x.t}</b> <span class='tag'>${x.s||"未分类"}</span> <span class='tag'>${x.ty}</span><div class='small' style='margin-top:4px'>${x.c||""}</div></div>`;});list.innerHTML=o;}
render();
</script>
</body>
</html>
