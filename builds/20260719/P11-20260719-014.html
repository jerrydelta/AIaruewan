<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>隐私优先投资 + 股息追踪</title>
<style>
:root{
  --coral:#FF6B6B; --coral-dark:#E85555; --ink:#2D2D2D; --muted:#8A8A8A;
  --bg:#F7F7F7; --card:#FFFFFF; --line:#ECECEC; --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.item .t{font-weight:600}.item .s{font-size:13px;color:var(--muted)}
.mini{display:inline-block;padding:6px 10px;border:none;border-radius:8px;font-size:13px;cursor:pointer;margin:6px 6px 0 0}
.mini.del{background:#eee;color:#999}
.sum{font-size:15px;font-weight:600;color:var(--coral)}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">finance</span><span class="tag">investment_tracking</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">隐私优先投资 + 股息追踪</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Privacy-first multi-currency dividend tracker (like Capitally)</p>
  </div>
  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">隐私派用户不想把券商凭据交给聚合器；股息投资者要自动化 DRIP 与税务。本工具本地加密式手动记录持仓，算年化股息与组合成本（多币种折算）。</p>
  </div>
  <div class="card">
    <b>🛠 工具 · 添加持仓</b>
    <label>名称 / 代码</label>
    <input id="iName" placeholder="如：VYM / 米国高配当ETF">
    <div class="row">
      <div><label>股数</label><input id="iShares" type="number" step="0.0001" placeholder="0"></div>
      <div><label>每股年股息</label><input id="iDiv" type="number" step="0.01" placeholder="0"></div>
    </div>
    <div class="row">
      <div><label>成本/股</label><input id="iCost" type="number" step="0.01" placeholder="0"></div>
      <div><label>币种</label><select id="iCur"><option>USD</option><option>JPY</option><option>EUR</option><option>CNY</option></select></div>
    </div>
    <button class="btn" onclick="addHold()">添加</button>
  </div>
  <div class="card" id="list">
    <b>📋 组合（折算 JPY）</b>
    <div id="summary"></div>
    <div id="items" style="margin-top:8px"></div>
  </div>
  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.mycapitally.com/blog/best-portfolio-tracker-for-the-modern-diy-investor" target="_blank" style="color:var(--coral)">Capitally / Sharesight / Snowball</a>
  </div>
<script>
const KEY="P11-20260719-014";
const RATE={"USD":150,"JPY":1,"EUR":165,"CNY":21};
let items = JSON.parse(localStorage.getItem(KEY) || "[]");
function save(){ localStorage.setItem(KEY, JSON.stringify(items)); render(); }
function addHold(){
  const name=document.getElementById('iName').value.trim();
  const shares=parseFloat(document.getElementById('iShares').value);
  const div=parseFloat(document.getElementById('iDiv').value);
  const cost=parseFloat(document.getElementById('iCost').value);
  const cur=document.getElementById('iCur').value;
  if(!name||isNaN(shares)){ alert('请填名称和股数'); return; }
  const annualDiv=(shares*div)*(RATE[cur]||1);
  const totalCost=(shares*cost)*(RATE[cur]||1);
  items.push({id:Date.now(),name,shares,div,cost,cur,annualDiv,totalCost});
  document.getElementById('iName').value='';
  save();
}
function del(id){ items=items.filter(x=>x.id!==id); save(); }
function render(){
  const totalDiv=items.reduce((s,x)=>s+x.annualDiv,0);
  const totalCost=items.reduce((s,x)=>s+x.totalCost,0);
  document.getElementById('summary').innerHTML='<div class="sum">预计年股息 ≈ ¥'+totalDiv.toFixed(0)+' · 成本 ≈ ¥'+totalCost.toFixed(0)+'</div>';
  const box=document.getElementById('items');
  if(!items.length){ box.innerHTML='<p style="font-size:13px;color:var(--muted)">还没有持仓。</p>'; return; }
  box.innerHTML=items.map(x=>
    '<div class="item"><div class="t">'+x.name+' <span style="float:right">'+x.cur+' '+x.shares+' 股</span></div>'+
    '<div class="s">年股息≈¥'+x.annualDiv.toFixed(0)+'<button class="mini del" onclick="del('+x.id+')" style="float:right">删除</button></div></div>'
  ).join('');
}
render();
</script>
</body>
</html>
