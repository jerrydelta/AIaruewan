<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>韩文Instagram粉丝诊断</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin:8px 0}
.item .meta{font-size:12px;color:var(--muted)}
.mini{font-size:13px;padding:7px 12px;border:none;border-radius:9px;cursor:pointer;margin-top:6px}
.mini.del{background:#f3f3f3;color:#c33}
.sum{background:#FFF0F0;border-radius:12px;padding:12px;font-size:13px;margin-bottom:8px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">social</span><span class="tag">follower_growth</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">韩文Instagram粉丝质量与掉粉诊断</h1>
    <p class="h-coral" style="font-size:13px;margin:0">KR Instagram follower-quality & unfollow diagnostics</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">韩国Instagram用户1800만，创作者/品牌频繁掉粉却难洞察。Instagram原生Insights只给增长数不给取关列表。痛点：免费版有广告功能限、无内容建议、难定位掉粉原因。</p>
  </div>

  <div class="card">
    <b>🛠 工具 (팔로워 진단)</b>
    <p style="font-size:13px;color:var(--muted);margin:6px 0 0">날짜별 신규/언팔로워/참여율을 기록하면 순증·이탈률을 계산합니다.</p>
    <label>날짜 (日期)</label>
    <input id="date" type="date">
    <div class="row">
      <div><label>신규 (新增)</label><input id="gain" type="number" placeholder="0"></div>
      <div><label>언팔로워 (取关)</label><input id="loss" type="number" placeholder="0"></div>
    </div>
    <label>참여율 % (互动率)</label>
    <input id="er" type="number" step="0.01" placeholder="예: 3.2">
    <button class="btn" onclick="addRec()">기록 추가 (记录)</button>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>출처 (来源)</b><br>
    <a href="https://digitah.com/best-instagram-follower-tracker-apps/" target="_blank" style="color:var(--coral)">FollowMeter / Dolphin Radar</a>
  </div>

<script>
const KEY="P4-20260719-008";
let items = JSON.parse(localStorage.getItem(KEY) || "[]");
function addRec(){
  const date=document.getElementById('date').value;
  const gain=Number(document.getElementById('gain').value)||0;
  const loss=Number(document.getElementById('loss').value)||0;
  const er=document.getElementById('er').value;
  if(!date){ alert('날짜를 선택하세요'); return; }
  items.push({id:Date.now(),date,gain,loss,net:gain-loss,er:er===''?'':Number(er)});
  document.getElementById('date').value='';
  document.getElementById('gain').value='';
  document.getElementById('loss').value='';
  document.getElementById('er').value='';
  save();
}
function del(id){ items=items.filter(x=>x.id!==id); save(); }
function save(){ localStorage.setItem(KEY, JSON.stringify(items)); render(); }
function render(){
  const el=document.getElementById('list');
  if(items.length===0){ el.innerHTML='<b>📉 팔로워 진단 (粉丝诊断)</b><p style="font-size:13px;color:var(--muted)">기록이 없습니다.</p>'; return; }
  const totNet=items.reduce((s,x)=>s+x.net,0);
  let h='<b>📉 팔로워 진단 (粉丝诊断)</b><div class="sum">누적 순증 <b style="color:var(--coral)">'+totNet+'</b> · 기록 '+items.length+' 회</div>';
  items.slice().reverse().forEach(it=>{
    const netC=it.net>=0?'var(--ok)':'var(--coral)';
    h+='<div class="item"><div class="meta">'+it.date+' · 순증 <b style="color:'+netC+'">'+(it.net>=0?'+':'')+it.net+'</b>'+(it.er!==''?' · 참여율 '+it.er+'%':'')+'</div>';
    h+='<div class="meta">신규 '+it.gain+' / 언팔로워 '+it.loss+'</div>';
    h+='<button class="mini del" onclick="del('+it.id+')">삭제</button></div>';
  });
  el.innerHTML=h;
}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
render();
</script>
</body>
</html>
