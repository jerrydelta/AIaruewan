<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>日本外卖司机收支管理 + 确定申告助手</title>
<style>
:root{
  --coral:#FF6B6B; --coral-dark:#E85555; --ink:#2D2D2D; --muted:#8A8A8A;
  --bg:#F7F7F7; --card:#FFFFFF; --line:#ECECEC; --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.small{font-size:12px;color:var(--muted)}
.stat{display:flex;justify-content:space-between;font-size:14px;padding:5px 0;border-bottom:1px dashed var(--line)}
.stat b{color:var(--coral)}
.del{color:var(--muted);font-size:12px;text-decoration:underline}
.item{font-size:13px;padding:8px 0;border-bottom:1px solid var(--line)}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">gig_economy</span><span class="tag">route_optimize</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">日本外卖司机收支管理 + 确定申告助手</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Japan delivery-driver income/expense + tax-filing assistant</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">日本 UberEats 等外卖司机缺乏好用的收支/税务管理工具。Hanro 订阅 ¥490/月验证了"单一市场窄人群付费"可行。相比中国同类工具供给充足，日本市场工具稀缺。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 日收支记录</b>
    <label>日期</label>
    <input type="date" id="date">
    <div class="row">
      <div><label>平台</label><select id="platform"><option>UberEats</option><option>出前館</option><option>其他</option></select></div>
      <div><label>收入(円)</label><input type="number" id="income" placeholder="0"></div>
    </div>
    <div class="row">
      <div><label>燃费(円)</label><input type="number" id="fuel" placeholder="0"></div>
      <div><label>自损/其他(円)</label><input type="number" id="other" placeholder="0"></div>
    </div>
    <button class="btn" onclick="add()">记录</button>
    <div class="small" style="margin-top:8px">净收入 = 收入 − 燃费 − 其他扣费；下方按月汇总可直接用于確定申告。</div>
  </div>

  <div class="card">
    <b>📊 月额报表（確定申告用）</b>
    <div id="summary"></div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://apps.apple.com/jp/search?term=Hanro%20%E5%A4%96%E5%8D%91%E9%85%8D%E9%81%94" target="_blank" style="color:var(--coral)">Hanro / UberEats 配達員用収支管理</a>
  </div>

<script>
const KEY="P9-20260719-004";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function add(){
  const date=document.getElementById("date").value||new Date().toISOString().slice(0,10);
  const platform=document.getElementById("platform").value;
  const income=parseFloat(document.getElementById("income").value)||0;
  const fuel=parseFloat(document.getElementById("fuel").value)||0;
  const other=parseFloat(document.getElementById("other").value)||0;
  const net=income-fuel-other;
  items.unshift({date,platform,income,fuel,other,net,id:Date.now()});
  save();
}
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function del(id){items=items.filter(x=>x.id!==id);save();}
function render(){
  const totalInc=items.reduce((s,x)=>s+x.income,0);
  const totalExp=items.reduce((s,x)=>s+x.fuel+x.other,0);
  const totalNet=items.reduce((s,x)=>s+x.net,0);
  const months={};
  items.forEach(x=>{const m=x.date.slice(0,7);months[m]=(months[m]||0)+x.net;});
  const mkeys=Object.keys(months).sort();
  const sum=document.getElementById("summary");
  sum.innerHTML='<div class="stat"><span>总收入</span><b>'+totalInc.toLocaleString()+' 円</b></div>'+
    '<div class="stat"><span>总扣费</span><span>'+totalExp.toLocaleString()+' 円</span></div>'+
    '<div class="stat"><span>净收入（申告基準）</span><b>'+totalNet.toLocaleString()+' 円</b></div>'+
    mkeys.map(m=>'<div class="stat"><span>'+m+' 月净收</span><span>'+Math.round(months[m]).toLocaleString()+' 円</span></div>').join("");
  const list=document.getElementById("list");
  list.innerHTML='<b>📋 收支记录（'+items.length+'）</b>'+
    (items.length?items.map(x=>'<div class="item"><div style="display:flex;justify-content:space-between"><b>'+x.platform+' · '+x.date+'</b><span class="del" onclick="del('+x.id+')">删除</span></div><div class="small">收 '+x.income.toLocaleString()+' − 燃 '+x.fuel.toLocaleString()+' − 他 '+x.other.toLocaleString()+' = 净 <b>'+x.net.toLocaleString()+'</b></div></div>').join(""):'<p class="small">暂无记录</p>');
}
render();
</script>
</body>
</html>
