<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>社内 AI 编码规约库</title>
<style>
:root{
  --coral:#FF6B6B;
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">tech</span><span class="tag">ai_coding</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">社内 AI 编码规约库</h1>
    <p class="h-coral" style="font-size:13px;margin:0">JA enterprise on-prem AI coding agent with JA prompts, internal rules.</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">在 AI 编码辅助领域，对"代码保密、避免供应商锁定"的关注急剧上升。LocalForge（MIT，完全本地，4,200+ GitHub stars，曾登 HN 第一）是离线运行的 Codex/Claude 兼容代理</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    
<label>规约条目</label><input id="u_title" placeholder="如 变量命名用 camelCase">
<label>分类</label><select id="u_cat"><option>命名</option><option>安全</option><option>风格</option><option>注释</option><option>测试</option></select>
<label>适用语言</label><input id="u_lang" placeholder="JavaScript / 全部">
<label>内容</label><textarea id="u_body" rows="3" placeholder="具体规则说明..."></textarea>
<button class="btn" onclick="addItem()">+ 添加规约</button>
<button class="btn" onclick="genRules()" style="background:var(--ok)">🧠 生成 AI 编码指示</button>
<label>汇总指示（可粘贴给本地 Agent）</label><textarea id="u_out" rows="6" readonly style="background:#fafafa"></textarea>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://localforge.dev" target="_blank" style="color:var(--coral)">LocalForge / Cursor / Claude Code / Continue</a>
  </div>

<script>

const KEY="P16-20260719-015";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function addItem(){
  const title=document.getElementById('u_title').value.trim();
  const cat=document.getElementById('u_cat').value;
  const lang=document.getElementById('u_lang').value.trim();
  const body=document.getElementById('u_body').value.trim();
  if(!title){alert('请填写规约');return;}
  items.push({title,cat,lang,body,added:new Date().toLocaleString()});
  save();
  document.getElementById('u_title').value='';document.getElementById('u_lang').value='';document.getElementById('u_body').value='';
}
function genRules(){
  const lines=items.map(it=>'- ['+it.cat+']'+(it.lang?('('+it.lang+')'):'')+' '+it.title+(it.body?('：'+it.body):''));
  const txt='你是本团队的本地编码助手。请严格遵守以下编码规约：\n'+lines.join('\n')+'\n\n所有代码不得离开本机，使用本地 LLM 推理。';
  document.getElementById('u_out').value=txt;
  prompt('复制 AI 编码指示：',txt);
}
function del(i){items.splice(i,1);save();}
function render(){
  const el=document.getElementById('list');
  if(!items.length){el.innerHTML='<p style="font-size:13px;color:var(--muted)">暂无规约</p>';return;}
  el.innerHTML='<b>📏 规约库（'+items.length+'）</b>'+items.map((it,idx)=>
    '<div style="border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px">'+
    '<div style="font-weight:600">'+esc(it.title)+' <span class="tag">'+esc(it.cat)+'</span></div>'+
    (it.lang?'<div style="font-size:12px;color:var(--muted)">'+esc(it.lang)+'</div>':'')+
    (it.body?'<div style="font-size:13px;color:#555;margin-top:4px">'+esc(it.body)+'</div>':'')+
    '<button class="btn" style="background:#fff;color:var(--coral);border:1px solid var(--line);margin-top:6px" onclick="del('+idx+')">删除</button>'+
    '</div>'
  ).join('');
}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
render();
</script>
</body>
</html>
