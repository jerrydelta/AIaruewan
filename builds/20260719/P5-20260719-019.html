<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>适老语音用药+家属监督</title>
<style>
:root{
  --coral:#FF6B6B;        /* 主品牌色 */
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">elderly</span><span class="tag">medication_voice_reminder_korea</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">适老语音用药+家属监督</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Senior voice med reminder + family cloud</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">用药管理向「语音+家属云监督」演进。三星Samsung Health Medications可记录处方药、到点与续方提醒。中国「药准时」做长辈超大字+子女云监督。痛点：老人看不清/记不住/子女不在身边。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:#666;margin:8px 0">记录用药与语音提醒开关，同步家属监督状态。</p>
<label>药名</label><input type="text" id="f_medName" placeholder="如 降糖药">
<label>剂量</label><input type="text" id="f_dose" placeholder="如 1粒">
<label>服药时间</label><input type="time" id="f_time" placeholder="">
<label>语音提醒</label><select id="f_voiceReminder"><option value="开">开</option><option value="关">关</option></select>
<label>家属已通知</label><select id="f_familyNotified"><option value="是">是</option><option value="否">否</option></select>
<label>是否已服</label><select id="f_taken"><option value="已服">已服</option><option value="未服">未服</option></select>
    <button class="btn" onclick="addItem()">保存记录</button>
    <div id="derive" style="font-size:13px;color:var(--coral);margin-top:8px"></div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="#" style="color:var(--coral)">Samsung Health Medications / 药准时 / 智守护APP / MedMinder</a>
  </div>

<script>
const KEY="P5-20260719-019";
const FIELDS=[{"label":"药名","key":"medName"},{"label":"剂量","key":"dose"},{"label":"服药时间","key":"time"},{"label":"语音提醒","key":"voiceReminder"},{"label":"家属已通知","key":"familyNotified"},{"label":"是否已服","key":"taken"}];
let items = JSON.parse(localStorage.getItem(KEY) || "[]");
function save(){ localStorage.setItem(KEY, JSON.stringify(items)); render(); }
function addItem(){
const v_medName=document.getElementById('f_medName').value;
const v_dose=document.getElementById('f_dose').value;
const v_time=document.getElementById('f_time').value;
const v_voiceReminder=document.getElementById('f_voiceReminder').value;
const v_familyNotified=document.getElementById('f_familyNotified').value;
const v_taken=document.getElementById('f_taken').value;
  const item={ ts:Date.now() , medName:v_medName, dose:v_dose, time:v_time, voiceReminder:v_voiceReminder, familyNotified:v_familyNotified, taken:v_taken };
  items.unshift(item);
  save();
  document.getElementById('f_medName').value='';
document.getElementById('f_dose').value='';
document.getElementById('f_time').value='';
document.getElementById('f_voiceReminder').value='';
document.getElementById('f_familyNotified').value='';
document.getElementById('f_taken').value='';
  const dv=derive(item);
  document.getElementById('derive').textContent = dv?('已保存 ✓ '+dv):'已保存 ✓';
}
function derive(it){ if(it.taken!=='已服'&&it.familyNotified==='是') return '📞 家属已收到未服药提醒'; if(it.taken==='已服') return '✅ 已服药，家属可见'; return '⏳ 待服药'; return ''; }
function rowHTML(it){
  let h='<div style="font-size:12px;color:var(--muted)">'+(new Date(it.ts).toLocaleString())+'</div>';
  FIELDS.forEach(f=>{ if(it[f.key]!==''){ h+='<div style="font-size:14px;margin:2px 0"><b>'+f.label+'：</b>'+it[f.key]+'</div>'; } });
  const d=derive(it); if(d) h+='<div style="font-size:13px;color:var(--coral);margin-top:4px">'+d+'</div>';
  return h;
}
function render(){
  const el=document.getElementById('list');
  if(!items.length){ el.innerHTML='<div style="font-size:13px;color:var(--muted)">暂无记录，添加第一条吧。</div>'; return; }
  el.innerHTML='<b style="font-size:13px">📋 记录 ('+items.length+')</b>'+items.map((it,i)=>'<div style="border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:8px">'+rowHTML(it)+'<button class="btn" style="background:#bbb;margin-top:8px" onclick="del('+i+')">删除</button></div>').join('');
}
function del(i){ items.splice(i,1); save(); }
render();

</script>
</body>
</html>
