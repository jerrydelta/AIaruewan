<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>离乳食食材记录</title>
<style>
:root{
  --coral:#FF6B6B; --coral-dark:#E85555; --ink:#2D2D2D; --muted:#8A8A8A;
  --bg:#F7F7F7; --card:#FFFFFF; --line:#ECECEC; --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">parenting</span><span class="tag">baby_food</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">离乳食食材记录（拍照即记）</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Weaning ingredient auto-log (zero manual input, allergy-aware)</p>
  </div>
  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">手输入类离乳食 App 最大摩擦是"记录负担"：一次能吃很多食材、输入很麻烦，出门在外容易忘记，爸爸也不会记。用"拍包装→自动识别食材"来彻底解决输入负担，并自动标记过敏原。</p>
  </div>
  <div class="card">
    <b>🛠 工具</b>
    <label>食物 / 包装名称</label>
    <input id="foodName" placeholder="如：南瓜泥辅食罐">
    <label>识别出的食材（逗号分隔，模拟拍照识别）</label>
    <input id="ingredients" placeholder="南瓜, 米粉, 胡萝卜">
    <label>过敏提示（勾选含哪种）</label>
    <div class="row">
      <label style="margin:0"><input type="checkbox" id="al_egg" style="width:auto;margin:0 4px 0 0">蛋</label>
      <label style="margin:0"><input type="checkbox" id="al_wheat" style="width:auto;margin:0 4px 0 0">小麦</label>
      <label style="margin:0"><input type="checkbox" id="al_milk" style="width:auto;margin:0 4px 0 0">奶</label>
      <label style="margin:0"><input type="checkbox" id="al_nut" style="width:auto;margin:0 4px 0 0">坚果</label>
    </div>
    <button class="btn" onclick="addLog()">记录这一餐</button>
  </div>
  <div class="card" id="list"></div>
  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://prtimes.jp/main/html/rd/p/000000260.000031718.html" target="_blank" style="color:var(--coral)">ステップ離乳食(カラダノート)</a>
  </div>
<script>
const KEY="P6-20260719-001";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function addLog(){
  const name=document.getElementById('foodName').value.trim();
  const ing=document.getElementById('ingredients').value.trim();
  if(!name&&!ing){alert('请填写食物名称或食材');return;}
  const al=[];
  if(document.getElementById('al_egg').checked)al.push('蛋');
  if(document.getElementById('al_wheat').checked)al.push('小麦');
  if(document.getElementById('al_milk').checked)al.push('奶');
  if(document.getElementById('al_nut').checked)al.push('坚果');
  items.unshift({t:new Date().toLocaleString('zh-CN'),name,ing:ing.split(/[,，]/).filter(Boolean),al,id:Date.now()});
  save();
  document.getElementById('foodName').value='';
  document.getElementById('ingredients').value='';
  ['al_egg','al_wheat','al_milk','al_nut'].forEach(i=>document.getElementById(i).checked=false);
}
function del(id){items=items.filter(x=>x.id!==id);save();}
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const el=document.getElementById('list');
  if(!items.length){el.innerHTML='<b>📋 今日记录</b><p style="font-size:13px;color:#999">还没有记录，先添加一餐吧。</p>';return;}
  el.innerHTML='<b>📋 已记录 '+items.length+' 餐</b>'+items.map(x=>{
    const als=x.al.length?' <span style="color:#E85555">⚠含:'+x.al.join('/')+'</span>':'';
    return '<div style="border-top:1px solid var(--line);padding:8px 0">'+
      '<div style="font-weight:600">'+esc(x.name||'未命名')+'</div>'+
      '<div style="font-size:13px;color:#555">食材：'+(x.ing.join('、')||'—')+'</div>'+
      '<div style="font-size:12px;color:#999">'+x.t+als+'</div>'+
      '<button onclick="del('+x.id+')" style="background:none;border:none;color:#bbb;font-size:12px;cursor:pointer;padding:0">删除</button>'+
    '</div>';
  }).join('');
}
function esc(s){return (s||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
render();
</script>
</body>
</html>
