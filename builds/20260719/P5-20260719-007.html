<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>走路赚钱步数奖励</title>
<style>
:root{
  --coral:#FF6B6B;        /* 主品牌色 */
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">fitness</span><span class="tag">step_reward_walking_korea</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">走路赚钱步数奖励</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Walk-to-earn step-reward app</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">韩国「앱테크」现象：CashWalk一年超500万下载，MoneyWalk MAU破130万、已盈利。靠广告分成返给用户。欧美缺「纯走路返现金/礼券」的轻量成瘾机制。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:#666;margin:8px 0">记录每日步数并换算步币收益，跟踪兑换情况。</p>
<label>日期</label><input type="date" id="f_wdate" placeholder="">
<label>步数</label><input type="number" id="f_steps" placeholder="如 8000">
<label>每千步奖励(币)</label><select id="f_ratePer1k"><option value="1" selected>1</option><option value="2">2</option><option value="5">5</option></select>
<label>已兑换</label><select id="f_redeemed"><option value="否">否</option><option value="是">是</option></select>
    <button class="btn" onclick="addItem()">保存记录</button>
    <div id="derive" style="font-size:13px;color:var(--coral);margin-top:8px"></div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="#" style="color:var(--coral)">CashWalk(캐시워크) / MoneyWalk(머니워크) / OLOCK(오락) / 챌린저스 / 돈이돼지</a>
  </div>

<script>
const KEY="P5-20260719-007";
const FIELDS=[{"label":"日期","key":"wdate"},{"label":"步数","key":"steps"},{"label":"每千步奖励(币)","key":"ratePer1k"},{"label":"已兑换","key":"redeemed"}];
let items = JSON.parse(localStorage.getItem(KEY) || "[]");
function save(){ localStorage.setItem(KEY, JSON.stringify(items)); render(); }
function addItem(){
const v_wdate=document.getElementById('f_wdate').value;
const v_steps=document.getElementById('f_steps').value;
const v_ratePer1k=document.getElementById('f_ratePer1k').value;
const v_redeemed=document.getElementById('f_redeemed').value;
  const item={ ts:Date.now() , wdate:v_wdate, steps:v_steps, ratePer1k:v_ratePer1k, redeemed:v_redeemed };
  items.unshift(item);
  save();
  document.getElementById('f_wdate').value='';
document.getElementById('f_steps').value='';
document.getElementById('f_ratePer1k').value='';
document.getElementById('f_redeemed').value='';
  const dv=derive(item);
  document.getElementById('derive').textContent = dv?('已保存 ✓ '+dv):'已保存 ✓';
}
function derive(it){ const st=Number(it.steps)||0, rate=Number(it.ratePer1k)||1; if(!st) return ''; return '🪙 本次获得 '+Math.floor(st/1000)*rate+' 步币'; return ''; }
function rowHTML(it){
  let h='<div style="font-size:12px;color:var(--muted)">'+(new Date(it.ts).toLocaleString())+'</div>';
  FIELDS.forEach(f=>{ if(it[f.key]!==''){ h+='<div style="font-size:14px;margin:2px 0"><b>'+f.label+'：</b>'+it[f.key]+'</div>'; } });
  const d=derive(it); if(d) h+='<div style="font-size:13px;color:var(--coral);margin-top:4px">'+d+'</div>';
  return h;
}
function render(){
  const el=document.getElementById('list');
  if(!items.length){ el.innerHTML='<div style="font-size:13px;color:var(--muted)">暂无记录，添加第一条吧。</div>'; return; }
  el.innerHTML='<b style="font-size:13px">📋 记录 ('+items.length+')</b>'+items.map((it,i)=>'<div style="border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:8px">'+rowHTML(it)+'<button class="btn" style="background:#bbb;margin-top:8px" onclick="del('+i+')">删除</button></div>').join('');
}
function del(i){ items.splice(i,1); save(); }
render();

</script>
</body>
</html>
