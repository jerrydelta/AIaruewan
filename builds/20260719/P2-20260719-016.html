<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ハングル特化中小企業向け議事録AI要約SaaS｜韩文会议纪要</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.item{display:flex;justify-content:space-between;align-items:flex-start;
  padding:10px;border:1px solid var(--line);border-radius:10px;margin-top:8px}
.del{color:var(--muted);font-size:13px;cursor:pointer;border:none;background:none}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">career</span><span class="tag">meeting_notes</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">ハングル特化中小企業向け議事録AI要約SaaS</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Korean-SME-focused AI meeting minutes &amp; summarization SaaS</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">韓国の議事録・音声文字起こし市場はNaver「CLOVA Note」が先行。企業の会議効率化・ハングル特化文字起こし需要大。痛点：議事録作成が遅く、ToDoが共有されない。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 회의록 메모＋ToDo 추출</b>
    <input id="topic" placeholder="회의 주제">
    <textarea id="notes" rows="5" placeholder="내용 메모…（「ToDo: 할일 @담당자 마감7/30」 형식으로 쓰면 자동추출）"></textarea>
    <button class="btn" onclick="save()">저장</button>
    <div id="ex" style="font-size:13px;margin-top:8px;color:var(--coral)"></div>
  </div>

  <div class="card" id="list"><b>📋 저장된 회의록</b></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.koreabizwire.com/" target="_blank" style="color:var(--coral)">CLOVA Note (Naver) / MeetGeek / Meeting Ink</a>
  </div>

<script>
const KEY="P2-20260719-016";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function save(){
  const topic=document.getElementById("topic").value.trim();
  const notes=document.getElementById("notes").value.trim();
  if(!topic){alert("회의 주제를 입력하세요");return;}
  const todos=[...notes.matchAll(/ToDo[:：]\s*([^@\n]+?)\s*@?([^\n]*?)(?:마감|기한)?([0-9\/월일.-]*)/gi)]
    .map(m=>("• "+m[1].trim()+(m[2]?(" @"+m[2].trim()):"")+(m[3]?(" 마감"+m[3].trim()):"")));
  document.getElementById("ex").textContent=todos.length?("추출 ToDo："+todos.length+"건"):"ToDo 표시 없음";
  items.unshift({topic,notes,todos,date:new Date().toLocaleString()});
  localStorage.setItem(KEY,JSON.stringify(items));
  document.getElementById("topic").value="";document.getElementById("notes").value="";document.getElementById("ex").textContent="";
  render();
}
function del(i){items.splice(i,1);localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const box=document.getElementById("list");
  if(!items.length){box.innerHTML="<b>📋 저장된 회의록</b><p style='font-size:13px;color:var(--muted);margin:6px 0 0'>暂无记录</p>";return;}
  box.innerHTML="<b>📋 저장된 회의록（"+items.length+"）</b>"+items.map((it,i)=>
    "<div class='item'><div style='flex:1'><div style='font-size:14px'>"+it.topic+
    "</div><div style='font-size:11px;color:var(--muted)'>"+it.date+(it.todos.length?(" ｜ ToDo "+it.todos.length+"건"):"")+"</div></div>"+
    "<button class='del' onclick='del("+i+")'>删除</button></div>").join("");
}
render();
</script>
</body>
</html>
