<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>睡眠分析（无订阅）</title>
<style>
:root{--coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;--bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
.small{font-size:12px;color:var(--muted)}
.del{color:var(--coral);font-size:12px;cursor:pointer;float:right;margin-left:8px}
.item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
.stat{display:flex;justify-content:space-around;text-align:center;margin:6px 0}
.stat div b{font-size:20px;color:var(--coral)}
</style>
</head>
<body>
<div class="card">
  <div><span class="tag">lifestyle</span><span class="tag">sleep</span></div>
  <h1 style="font-size:20px;margin:8px 0 4px">睡眠分析（无订阅）</h1>
  <p class="h-coral" style="font-size:13px;margin:0">Japan-local sleep analytics with trend dashboard, no subscription</p>
</div>
<div class="card">
  <b>💡 痛点</b>
  <p style="font-size:14px;color:#555;margin:6px 0 0">日本睡眠应用需求强且游戏化（Pokémon Sleep 带动）。用户厌倦订阅疲劳，想要一次性买断、数据丰富的睡眠应用。一个聚焦趋势分析、无月费的睡眠记录器是清晰的细分方向。</p>
</div>
<div class="card">
  <b>🛠 工具 · 睡眠记录</b>
  <div class="row">
    <div><label>入睡时间</label><input type="time" id="sBed"></div>
    <div><label>起床时间</label><input type="time" id="sWake"></div>
  </div>
  <label>睡眠质量（1-5）</label><input type="number" id="sQ" min="1" max="5" value="3">
  <button class="btn" onclick="addSleep()">+ 记录今晚睡眠</button>
</div>
<div class="card" id="list"><b>😴 睡眠趋势</b>
  <div class="stat" id="stat"></div>
  <div id="sleeps"></div>
</div>
<div class="card" style="font-size:12px;color:var(--muted)">
  <b>来源参考</b><br>
  <a href="https://www.sleepcycle.com/" target="_blank" style="color:var(--coral)">睡眠観測 / Sleep Cycle / Pokémon Sleep</a>
</div>
<script>
const KEY="P3-20260719-007";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function dur(b,w){if(!b||!w)return 0;let[bh,bm]=b.split(':').map(Number);let[wh,wm]=w.split(':').map(Number);
  let m=(wh*60+wm)-(bh*60+bm);if(m<=0)m+=1440;return m;}
function addSleep(){const b=sBed.value,w=sWake.value,q=+sQ.value;
  if(!b||!w){alert('请填入睡和起床时间');return;}
  const m=dur(b,w);items.push({b,w,m,q,t:Date.now()});sBed.value='';sWake.value='';save();}
function del(i){items.splice(i,1);save();}
function fmt(m){return Math.floor(m/60)+'h'+(m%60)+'m';}
function render(){const avg=items.length?Math.round(items.reduce((a,x)=>a+x.m,0)/items.length):0;
  const aq=items.length?(items.reduce((a,x)=>a+x.q,0)/items.length).toFixed(1):'-';
  stat.innerHTML=`<div><b>${items.length}</b><span class="small">晚</span></div><div><b>${avg?fmt(avg):'-'}</b><span class="small">平均时长</span></div><div><b>${aq}</b><span class="small">平均质量</span></div>`;
  sleeps.innerHTML=items.slice().reverse().map((x,i)=>{const gi=items.indexOf(x);
    return `<div class="item"><span>${new Date(x.t).toLocaleDateString()}<br><span class="small">${x.b}→${x.w} · ${fmt(x.m)} · 质量${x.q}</span></span><span class="del" onclick="del(${gi})">删除</span></div>`;}).join('')||'<p class="small">还没有记录。</p>';}
render();
</script>
</body>
</html>
