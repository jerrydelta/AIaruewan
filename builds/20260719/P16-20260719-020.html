<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>本地文档生成器</title>
<style>
:root{
  --coral:#FF6B6B;
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">tech</span><span class="tag">docs_tools</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">本地文档生成器</h1>
    <p class="h-coral" style="font-size:13px;margin:0">JA/KO local-first docs tool with AI doc generation from code, on-prem only.</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">开发团队"为了保护 IP 不愿把社内文档放到外部云"，因而寻求自托管文档工具。日本、韩国都有"API 文档+技术规格"的社内保管与检索需求</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    
<label>标题</label><input id="x_title" placeholder="如 用户服务 API">
<label>类型</label><select id="x_type"><option>API 文档</option><option>技术规格</option><option>接口说明</option></select>
<label>来源代码片段</label><textarea id="x_code" rows="4" placeholder="粘贴相关代码..."></textarea>
<label>说明 / 要点</label><textarea id="x_desc" rows="3" placeholder="该模块的职责与边界..."></textarea>
<button class="btn" onclick="addItem()">📄 生成并保存</button>
<label>检索</label><input id="x_q" oninput="render()" placeholder="类型或关键词">
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://zenn.dev" target="_blank" style="color:var(--coral)">Outline / Mintlify / Docusaurus / local-first docs</a>
  </div>

<script>

const KEY="P16-20260719-020";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function addItem(){
  const title=document.getElementById('x_title').value.trim();
  const type=document.getElementById('x_type').value;
  const code=document.getElementById('x_code').value;
  const desc=document.getElementById('x_desc').value.trim();
  if(!title){alert('请填写标题');return;}
  const md='# '+title+'（'+type+'）\n\n'+(desc?desc+'\n\n':'')+(code?'```\n'+code+'\n```\n':'');
  items.push({title,type,code,desc,md,added:new Date().toLocaleString()});
  save();
  document.getElementById('x_title').value='';document.getElementById('x_code').value='';document.getElementById('x_desc').value='';
}
function copyMd(i){ prompt('复制 Markdown：',items[i].md); }
function del(i){items.splice(i,1);save();}
function render(){
  const el=document.getElementById('list');
  const q=document.getElementById('x_q').value.trim().toLowerCase();
  let list=items;
  if(q) list=items.filter(it=>(it.type+it.title+it.desc).toLowerCase().indexOf(q)>=0);
  if(!list.length){el.innerHTML='<p style="font-size:13px;color:var(--muted)">暂无文档</p>';return;}
  el.innerHTML='<b>📚 文档库（'+list.length+'/'+items.length+'）</b>'+list.map((it,idx)=>{
    const realIdx=items.indexOf(it);
    return '<div style="border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px">'+
      '<div style="font-weight:600">'+esc(it.title)+' <span class="tag">'+esc(it.type)+'</span></div>'+
      (it.desc?'<div style="font-size:13px;color:#555;margin-top:4px">'+esc(it.desc)+'</div>':'')+
      (it.code?'<pre style="font-size:11px;background:#fafafa;border:1px solid var(--line);border-radius:8px;padding:8px;overflow:auto;white-space:pre-wrap;margin:6px 0">'+esc(it.code)+'</pre>':'')+
      '<div class="row" style="margin-top:4px"><button class="btn" style="background:var(--ok);margin:0 4px 0 0" onclick="copyMd('+realIdx+')">复制 MD</button>'+
      '<button class="btn" style="background:#fff;color:var(--coral);border:1px solid var(--line);margin:0" onclick="del('+realIdx+')">删除</button></div>'+
      '</div>';
  }).join('');
}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
render();
</script>
</body>
</html>
