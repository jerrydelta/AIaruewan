<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>专注种树 · 数字排毒</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.big{font-size:34px;font-weight:700;color:var(--coral);text-align:center}
.muted{color:var(--muted);font-size:13px}
.forest{font-size:22px;line-height:1.8;word-break:break-all}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">addiction_recovery</span><span class="tag">digital_detox</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">专注种树 · 数字排毒</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Digital detox / focus timer (gamified tree-planting)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">Forest 等全球产品以 6000 万用户验证了"专注 + 种树"模型。中日用户同样手机成瘾，但本地化冲动拦截弱。本工具让你设定专注时长，期间不碰手机就"种成一棵树"，用看得见的森林对抗分心。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <label>专注时长（分钟）</label>
    <input type="number" id="dur" value="25" min="1">
    <div class="big" id="timer">25:00</div>
    <button class="btn" onclick="startTimer()">🌱 开始专注（种树）</button>
    <button class="btn" onclick="giveUp()" style="background:var(--muted)">放弃（树枯死）</button>
    <div style="text-align:center;margin-top:10px">
      <div class="muted">我的森林</div>
      <div class="forest" id="forest"></div>
      <div class="big" id="count" style="font-size:20px;color:var(--ok)">0 棵</div>
    </div>
  </div>

  <div class="card" id="list"><b>🌳 种植记录</b><div id="listBody" style="margin-top:8px"></div></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.forestapp.cc/" target="_blank" style="color:var(--coral)">Forest 专注种树</a>
  </div>

<script>
const KEY="P14-20260719-007";
let data=JSON.parse(localStorage.getItem(KEY)||'{"trees":[],"dead":0}');
let timer=null,left=0;
function startTimer(){
  const m=+document.getElementById('dur').value||25;left=m*60;
  clearInterval(timer);
  tick();timer=setInterval(tick,1000);
}
function tick(){
  const mm=String(Math.floor(left/60)).padStart(2,'0'),ss=String(left%60).padStart(2,'0');
  document.getElementById('timer').textContent=mm+':'+ss;
  if(left<=0){clearInterval(timer);plant();}
  left--;
}
function plant(){data.trees.push({date:new Date().toLocaleDateString('zh-CN'),min:+document.getElementById('dur').value||25});save();}
function giveUp(){clearInterval(timer);data.dead++;document.getElementById('timer').textContent='枯死';save();}
function save(){localStorage.setItem(KEY,JSON.stringify(data));render();}
function render(){
  document.getElementById('forest').textContent='🌳'.repeat(data.trees.length)||'—';
  document.getElementById('count').textContent=data.trees.length+' 棵 · 枯死 '+data.dead;
  const body=document.getElementById('listBody');
  if(!data.trees.length){body.innerHTML='<div class="muted">还没有种成树，开始第一次专注吧</div>';return;}
  body.innerHTML=data.trees.slice().reverse().map(t=>'<div style="padding:6px 0;border-bottom:1px solid var(--line)">'+t.date+' · 专注 '+t.min+' 分钟 🌳</div>').join('');
}
save();
</script>
</body>
</html>
