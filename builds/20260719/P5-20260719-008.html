<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>一体化健康管家(饮食+运动+血糖)</title>
<style>
:root{
  --coral:#FF6B6B;        /* 主品牌色 */
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">fitness</span><span class="tag">allinone_health_korea</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">一体化健康管家(饮食+运动+血糖)</h1>
    <p class="h-coral" style="font-size:13px;margin:0">All-in-one health butler (diet+exercise+glucose)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">韩国健康app呈「饮食+运动+血糖一体化」趋势且榜单强势。用户厌倦在多个app间切换。欧美多为单一功能(MyFitnessPal管饮食、Strava管运动)，缺韩式一体化闭环。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:#666;margin:8px 0">在单一入口记录体重/饮食/运动/血糖，查看每日健康状态。</p>
<label>日期</label><input type="date" id="f_hdate" placeholder="">
<label>体重(kg)</label><input type="number" id="f_weight" placeholder="如 65">
<label>热量(kcal)</label><input type="number" id="f_calories" placeholder="如 1800">
<label>运动(分钟)</label><input type="number" id="f_exerciseMin" placeholder="如 30">
<label>血糖(mmol/L)</label><input type="number" id="f_glucose" placeholder="如 5.6">
    <button class="btn" onclick="addItem()">保存记录</button>
    <div id="derive" style="font-size:13px;color:var(--coral);margin-top:8px"></div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="#" style="color:var(--coral)">인아웃(INOUT) / 필라이즈(Pillyze) / 파스타(PASTA,Kakao) / 지니어트 / 칼로그</a>
  </div>

<script>
const KEY="P5-20260719-008";
const FIELDS=[{"label":"日期","key":"hdate"},{"label":"体重(kg)","key":"weight"},{"label":"热量(kcal)","key":"calories"},{"label":"运动(分钟)","key":"exerciseMin"},{"label":"血糖(mmol/L)","key":"glucose"}];
let items = JSON.parse(localStorage.getItem(KEY) || "[]");
function save(){ localStorage.setItem(KEY, JSON.stringify(items)); render(); }
function addItem(){
const v_hdate=document.getElementById('f_hdate').value;
const v_weight=document.getElementById('f_weight').value;
const v_calories=document.getElementById('f_calories').value;
const v_exerciseMin=document.getElementById('f_exerciseMin').value;
const v_glucose=document.getElementById('f_glucose').value;
  const item={ ts:Date.now() , hdate:v_hdate, weight:v_weight, calories:v_calories, exerciseMin:v_exerciseMin, glucose:v_glucose };
  items.unshift(item);
  save();
  document.getElementById('f_hdate').value='';
document.getElementById('f_weight').value='';
document.getElementById('f_calories').value='';
document.getElementById('f_exerciseMin').value='';
document.getElementById('f_glucose').value='';
  const dv=derive(item);
  document.getElementById('derive').textContent = dv?('已保存 ✓ '+dv):'已保存 ✓';
}
function derive(it){ const g=Number(it.glucose)||0; if(!g) return ''; if(g>7.8) return '📈 血糖偏高，注意餐后运动'; if(g<3.9) return '📉 血糖偏低，及时补充'; return '📊 血糖平稳'; return ''; }
function rowHTML(it){
  let h='<div style="font-size:12px;color:var(--muted)">'+(new Date(it.ts).toLocaleString())+'</div>';
  FIELDS.forEach(f=>{ if(it[f.key]!==''){ h+='<div style="font-size:14px;margin:2px 0"><b>'+f.label+'：</b>'+it[f.key]+'</div>'; } });
  const d=derive(it); if(d) h+='<div style="font-size:13px;color:var(--coral);margin-top:4px">'+d+'</div>';
  return h;
}
function render(){
  const el=document.getElementById('list');
  if(!items.length){ el.innerHTML='<div style="font-size:13px;color:var(--muted)">暂无记录，添加第一条吧。</div>'; return; }
  el.innerHTML='<b style="font-size:13px">📋 记录 ('+items.length+')</b>'+items.map((it,i)=>'<div style="border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:8px">'+rowHTML(it)+'<button class="btn" style="background:#bbb;margin-top:8px" onclick="del('+i+')">删除</button></div>').join('');
}
function del(i){ items.splice(i,1); save(); }
render();

</script>
</body>
</html>
