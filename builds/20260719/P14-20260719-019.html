<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>更新日志生成器</title>
<style>
:root{--coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;--bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.item .meta{font-size:11px;color:var(--muted)}
.mini{display:inline-block;padding:6px 10px;border:none;border-radius:8px;font-size:12px;cursor:pointer;background:#FFF0F0;color:var(--coral);margin:4px 4px 0 0}
.mini.del{background:#FDECEC;color:#E85555}
pre{white-space:pre-wrap;word-break:break-all;font-size:13px;background:#fafafa;border:1px solid var(--line);border-radius:8px;padding:8px;margin:6px 0 0}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">micro_saas</span><span class="tag">changelog</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">更新日志生成器</h1>
    <p class="h-coral" style="font-size:13px;margin:0">AI changelog / release-note generator (PR → friendly notes)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">欧美changelog工具(ReleasePad等)验证"发布沟通=留存信号"且独立开发者愿用；中日独立黑客多忽略更新日志或手写，缺低价/AI生成工具——可手搓支持中日语言的版本。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <label>版本号</label>
    <input id="ver" placeholder="如：v1.2.0">
    <label>原始改动（每行一条，可带 fix/feat/优化 前缀）</label>
    <textarea id="raw" rows="4" placeholder="feat: 新增导出&#10;fix: 修复登录崩溃&#10;优化: 加快首页加载"></textarea>
    <button class="btn" onclick="gen()">生成发布说明</button>
    <pre id="out"></pre>
    <button class="btn" style="background:var(--ok)" onclick="saveLog()">保存到日志库</button>
  </div>

  <div class="card" id="list">
    <b>📜 更新日志库</b>
    <div id="items"></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.releasepad.io" target="_blank" style="color:var(--coral)">ReleasePad</a>
  </div>

<script>
const KEY="P14-20260719-019";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
let cur='';
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function classify(line){
  const s=line.toLowerCase();
  if(s.startsWith('feat')||s.includes('新功能')||s.includes('新增'))return '✨ 新功能';
  if(s.startsWith('fix')||s.includes('修复')||s.includes('bug'))return '🐛 修复';
  return '⚡ 优化';
}
function gen(){
  const ver=document.getElementById('ver').value.trim()||'v?.?.?';
  const lines=document.getElementById('raw').value.split('\n').map(x=>x.trim()).filter(Boolean);
  if(!lines.length){alert('请填写改动');return;}
  const groups={};
  lines.forEach(l=>{const g=classify(l);(groups[g]=groups[g]||[]).push(l.replace(/^(feat|fix|优化|新功能|修复)\s*[:：]?\s*/i,''));});
  let txt=`【${ver} 更新说明】\n`;
  for(const g in groups)txt+=`\n${g}\n`+groups[g].map(x=>'· '+x).join('\n');
  cur=txt;
  document.getElementById('out').textContent=txt;
  if(navigator.clipboard)navigator.clipboard.writeText(txt);
}
function saveLog(){
  if(!cur){alert('请先生成');return;}
  items.unshift({ver:document.getElementById('ver').value.trim()||'v?.?.?',note:cur,ts:Date.now()});
  save();
}
function del(i){items.splice(i,1);save();}
function render(){
  const box=document.getElementById('items');
  if(!items.length){box.innerHTML='<p style="font-size:13px;color:var(--muted)">还没有保存的日志。</p>';return;}
  box.innerHTML=items.map((it,i)=>`<div class="item"><div><b>${esc(it.ver)}</b> <span class="meta">· ${new Date(it.ts).toLocaleDateString('zh')}</span></div><pre>${esc(it.note)}</pre><button class="mini del" onclick="del(${i})">删除</button></div>`).join('');
}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
render();
</script>
</body>
</html>
