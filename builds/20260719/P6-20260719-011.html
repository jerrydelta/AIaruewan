<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>植物浇水提醒</title>
<style>
:root{
  --coral:#FF6B6B; --coral-dark:#E85555; --ink:#2D2D2D; --muted:#8A8A8A;
  --bg:#F7F7F7; --card:#FFFFFF; --line:#ECECEC; --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn.s{width:auto;display:inline-block;padding:8px 12px;margin:4px 4px 0 0;font-size:13px}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">hobby</span><span class="tag">gardening</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">植物浇水提醒</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Garden care with watering reminders (AI diagnosis in AI版)</p>
  </div>
  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">养植物最容易"忘记浇水"或"浇太多"。给每盆设定浇水周期，到点提醒，从此不再养死绿植。</p>
  </div>
  <div class="card">
    <b>🛠 工具</b>
    <label>植物名称</label>
    <input id="pname" placeholder="如：龟背竹">
    <div class="row">
      <div><label>浇水周期(天)</label><input id="iv" type="number" value="7"></div>
      <div><label>位置</label><input id="loc" placeholder="阳台"></div>
    </div>
    <button class="btn" onclick="addPlant()">添加植物</button>
  </div>
  <div class="card" id="list"></div>
  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://apps.apple.com/cn/app/yun-garden/id6744845888" target="_blank" style="color:var(--coral)">小芸田园</a>
  </div>
<script>
const KEY="P6-20260719-011";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function today(){return new Date().toISOString().slice(0,10);}
function addPlant(){
  const name=document.getElementById('pname').value.trim();
  const iv=+document.getElementById('iv').value||7;
  const loc=document.getElementById('loc').value.trim();
  if(!name){alert('填名称');return;}
  items.push({name,iv,loc,last:today(),id:Date.now()});
  document.getElementById('pname').value='';document.getElementById('loc').value='';save();
}
function watered(id){(items.find(x=>x.id===id)).last=today();save();}
function del(id){items=items.filter(x=>x.id!==id);save();}
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const el=document.getElementById('list');
  if(!items.length){el.innerHTML='<b>🪴 我的植物</b><p style="font-size:13px;color:#999">还没有植物。</p>';return;}
  const t=new Date(today());
  el.innerHTML='<b>🪴 我的植物 '+items.length+' 盆</b>'+items.map(x=>{
    const last=new Date(x.last);const next=new Date(last);next.setDate(last.getDate()+x.iv);
    const diff=Math.round((next-t)/86400000);
    let st=diff>1?'<span style="color:var(--ok)">还有 '+diff+' 天</span>':diff===1?'<span style="color:#E8A100">明天该浇</span>':'<span style="color:#E85555;font-weight:600">⏰ 该浇水了</span>';
    return '<div style="border-top:1px solid var(--line);padding:8px 0">'+
      '<div style="font-weight:600">'+esc(x.name)+(x.loc?' <span style="font-size:12px;color:#999">· '+esc(x.loc)+'</span>':'')+'</div>'+
      '<div style="font-size:13px">'+st+' ｜ 周期 '+x.iv+'天</div>'+
      '<button class="btn s" onclick="watered('+x.id+')">刚浇过</button>'+
      '<button class="btn s" style="background:#bbb" onclick="del('+x.id+')">删除</button></div>';
  }).join('');
}
function esc(s){return (s||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
render();
</script>
</body>
</html>
