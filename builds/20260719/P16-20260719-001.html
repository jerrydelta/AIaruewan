<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>自托管服务监控清单</title>
<style>
:root{
  --coral:#FF6B6B;
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">tech</span><span class="tag">server_monitor</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">自托管服务监控清单</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Ultra-lightweight, JA/KO-localized self-hosted uptime monitor for solo devs.</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">日本的个人开发者与中小团队中，"自托管型监控"已逐渐成为标配。Uptime Kuma 在 GitHub 获得 87,000+ stars（截至 2026 年 6 月）</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    
<label>服务名称</label><input id="m_name" placeholder="如 My Blog">
<label>监控地址 URL</label><input id="m_url" placeholder="https://...">
<label>检查间隔（分钟）</label><input id="m_int" type="number" value="5">
<label>类型</label>
<select id="m_type"><option>HTTP 探活</option><option>Ping</option><option>端口</option></select>
<button class="btn" onclick="addItem()">+ 添加监控项</button>
<p style="font-size:12px;color:var(--muted);margin-top:10px">点击列表中「检查」记录一次状态，自动统计可用率。</p>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://github.com/louislam/uptime-kuma" target="_blank" style="color:var(--coral)">Uptime Kuma / Komari / Beszel</a>
  </div>

<script>

const KEY="P16-20260719-001";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function addItem(){
  const name=document.getElementById('m_name').value.trim();
  const url=document.getElementById('m_url').value.trim();
  const intv=document.getElementById('m_int').value||'5';
  const type=document.getElementById('m_type').value;
  if(!name||!url){alert('名称和地址必填');return;}
  items.push({name,url,intv,type,checks:[],added:new Date().toLocaleString()});
  save();
  document.getElementById('m_name').value='';document.getElementById('m_url').value='';
}
function check(i,ok){ items[i].checks.push({ok,t:new Date().toLocaleString()}); save(); }
function del(i){items.splice(i,1);save();}
function render(){
  const el=document.getElementById('list');
  if(!items.length){el.innerHTML='<p style="font-size:13px;color:var(--muted)">暂无监控项</p>';return;}
  el.innerHTML='<b>📡 监控项（'+items.length+'）</b>'+items.map((it,idx)=>{
    const tot=it.checks.length;
    const up=it.checks.filter(c=>c.ok).length;
    const rate=tot?Math.round(up/tot*100):'-';
    return '<div style="border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px">'+
      '<div style="font-weight:600">'+esc(it.name)+' <span class="tag">'+esc(it.type)+'</span></div>'+
      '<div style="font-size:12px;color:var(--muted)">'+esc(it.url)+' · 每'+esc(it.intv)+'分</div>'+
      '<div style="font-size:13px;margin:6px 0">可用率：<b class="h-coral">'+rate+'%</b>（'+up+'/'+tot+'）</div>'+
      '<div class="row"><button class="btn" style="background:var(--ok);margin:4px 4px 0 0" onclick="check('+idx+',true)">✓ 正常</button>'+
      '<button class="btn" style="background:var(--muted);margin:4px 0 0 0" onclick="check('+idx+',false)">✗ 异常</button></div>'+
      '<button class="btn" style="background:#fff;color:var(--coral);border:1px solid var(--line);margin-top:6px" onclick="del('+idx+')">删除</button>'+
      '</div>';
  }).join('');
}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
render();
</script>
</body>
</html>
