<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>MVP 启动清单</title>
<style>
:root{
  --coral:#FF6B6B;
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">tech</span><span class="tag">micro_saas</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">MVP 启动清单</h1>
    <p class="h-coral" style="font-size:13px;margin:0">KO micro-SaaS starter kit: local payments, tax, app-store templates.</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">韩国"一人开发（1인개발）""微服务 SaaS（마이크로SaaS）"正快速扩大。实绩：Marc Lou 用 Next.js 模板 ShipFast 在 5 个月做到 $250K，2024 年 4 月达 $133K/月，毛利率 91%，员工 0</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    
<label>项目名称</label><input id="m_name" placeholder="如 SaaS MVP">
<div id="steps"></div>
<button class="btn" onclick="addItem()">💾 保存进度</button>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.codetalenthub.io/micro-saas-launch-guide" target="_blank" style="color:var(--coral)">ShipFast (Marc Lou) / 마이크로SaaS 케이스</a>
  </div>

<script>

const KEY="P16-20260719-018";
const STEPS=['支付接入 (Toss/KakaoPay)','税务/开票设置','应用商店上架','analytics 接入','部署 CI/CD','域名/SSL'];
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
(function(){
  const box=document.getElementById('steps');
  box.innerHTML=STEPS.map((s,i)=>'<label style="display:flex;align-items:center;gap:8px;margin-top:8px;font-size:14px"><input type="checkbox" id="st'+i+'" style="width:auto;margin:0"> '+s+'</label>').join('');
})();
function addItem(){
  const name=document.getElementById('m_name').value.trim();
  if(!name){alert('请填写项目名称');return;}
  const done=STEPS.map((s,i)=>document.getElementById('st'+i).checked);
  items.push({name,done,added:new Date().toLocaleString()});
  save();
}
function toggle(i,si){ items[i].done[si]=!items[i].done[si]; save(); }
function del(i){items.splice(i,1);save();}
function render(){
  const el=document.getElementById('list');
  if(!items.length){el.innerHTML='<p style="font-size:13px;color:var(--muted)">暂无项目</p>';return;}
  el.innerHTML='<b>🚀 启动清单（'+items.length+'）</b>'+items.map((it,idx)=>{
    const done=it.done.filter(Boolean).length;
    const pct=Math.round(done/STEPS.length*100);
    return '<div style="border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px">'+
      '<div style="font-weight:600">'+esc(it.name)+' <span class="tag">'+done+'/'+STEPS.length+'</span></div>'+
      '<div style="height:8px;background:#eee;border-radius:4px;margin:6px 0;overflow:hidden"><div style="width:'+pct+'%;background:var(--ok);height:100%"></div></div>'+
      STEPS.map((s,si)=>'<label style="display:flex;align-items:center;gap:6px;font-size:13px;margin-top:3px"><input type="checkbox" '+(it.done[si]?'checked':'')+' onchange="toggle('+idx+','+si+')" style="width:auto;margin:0"> '+s+'</label>').join('')+
      '<button class="btn" style="background:#fff;color:var(--coral);border:1px solid var(--line);margin-top:6px" onclick="del('+idx+')">删除</button>'+
      '</div>';
  }).join('');
}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
render();
</script>
</body>
</html>
