<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>院外戒烟辅助 · NRT记录</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.big{font-size:30px;font-weight:700;color:var(--coral)}
.muted{color:var(--muted);font-size:13px}
.del{color:var(--coral);font-size:12px;cursor:pointer;float:right}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">addiction_recovery</span><span class="tag">quit_smoking</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">院外戒烟辅助 · NRT 记录</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Prescription DTx aid (off-prescription NRT tracker)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">日本 CureApp 已验证"处方 + 医保"数字疗法范式，但个人无法复制。本工具做合规的"院外非处方辅助"版：记录尼古丁替代疗法（贴片/口香糖）用量、每日 craving 强度，估算省钱与减害进度，帮你在医生指导下平稳过渡。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <label>戒烟开始日</label>
    <input type="date" id="startDate">
    <label>以前每天吸烟量（支）</label>
    <input type="number" id="cigNum" placeholder="如 20" value="20">
    <button class="btn" onclick="saveProfile()">保存计划</button>

    <div style="margin-top:12px">
      <label>今日 craving 强度（1-10）</label>
      <input type="range" id="craving" min="1" max="10" value="5" oninput="document.getElementById('cv').textContent=this.value">
      <div style="text-align:center" class="big"><span id="cv">5</span></div>
    </div>
    <div class="row">
      <div><label>NRT 类型</label>
        <select id="nrt"><option>贴片</option><option>口香糖</option><option>含片</option><option>无</option></select></div>
      <div><label>用量（mg/片）</label><input type="number" id="nrtAmt" placeholder="如 2"></div>
    </div>
    <button class="btn" onclick="addLog()">➕ 记录今日</button>
    <div style="text-align:center;margin-top:12px">
      <div class="big" id="days">0</div><div class="muted">坚持天数</div>
      <div style="color:var(--ok);font-weight:700" id="saveAmt">已省 ¥0</div>
    </div>
  </div>

  <div class="card" id="list"><b>📋 每日记录</b><div id="listBody" style="margin-top:8px"></div></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.businesswire.com/news/home/20201130006039/en/4876810/CureApp-SC-Digital-Therapeutic-for-Nicotine-Addiction" target="_blank" style="color:var(--coral)">CureApp-SC（日本医保处方 DTx）</a>
  </div>

<script>
const KEY="P14-20260719-002";
let data=JSON.parse(localStorage.getItem(KEY)||'{"startDate":"","cigNum":20,"logs":[]}');
function saveProfile(){
  data.startDate=document.getElementById('startDate').value;
  data.cigNum=parseFloat(document.getElementById('cigNum').value)||0;
  save();
}
function todayStr(){return new Date().toISOString().slice(0,10);}
function addLog(){
  if(!data.startDate){alert("请先保存戒烟开始日");return;}
  const t=todayStr();
  const exist=data.logs.find(l=>l.date===t);
  const rec={date:t,craving:+document.getElementById('craving').value,
    nrt:document.getElementById('nrt').value,amt:document.getElementById('nrtAmt').value||0};
  if(exist){Object.assign(exist,rec);}else{data.logs.push(rec);}
  save();
}
function save(){
  localStorage.setItem(KEY,JSON.stringify(data));
  document.getElementById('startDate').value=data.startDate;
  document.getElementById('cigNum').value=data.cigNum;
  render();
}
function render(){
  let days=0;
  if(data.startDate){days=Math.floor((new Date()-new Date(data.startDate))/86400000);if(days<0)days=0;}
  document.getElementById('days').textContent=days;
  const price=2.5; // 单支估算成本
  document.getElementById('saveAmt').textContent="已省 ¥"+(days*(data.cigNum||0)*price).toLocaleString();
  const body=document.getElementById('listBody');
  if(!data.logs.length){body.innerHTML='<div class="muted">暂无记录</div>';return;}
  body.innerHTML=data.logs.slice().reverse().map(l=>
    '<div style="padding:6px 0;border-bottom:1px solid var(--line)">'+l.date+
    ' · 渴求'+l.craving+'/10 · '+l.nrt+' '+l.amt+'mg'+
    ' <span class="del" onclick="del(\''+l.date+'\')">删除</span></div>').join('');
}
function del(d){data.logs=data.logs.filter(l=>l.date!==d);save();}
save();
</script>
</body>
</html>
