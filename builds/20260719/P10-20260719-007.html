<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>韩国搬家比价匹配</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">home</span><span class="tag">moving_checklist</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">韩国搬家比价匹配</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Korean moving-matching app comparing up to 9 vetted movers with safe booking</p>
  </div>
  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">韩国짐싸自称"大韩民国第一搬家app"，累计见积700万+，最多比9社报价预约。搬家伙伴经面接与货运资质审查，预约前隐私不公开、安全号联络，看用户评价选。痛点：韩国也需向多家电话见积繁琐。机会：比价+验证业者+评价一体化搬家匹配。</p>
  </div>
  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:var(--muted);margin:0 0 6px">添加搬家公司报价，自动按"评分/价格"性价比排序，推荐最优。</p>
    <label>公司名</label>
    <input id="name" placeholder="如：짐싸">
    <div class="row">
      <div><label>评分(1-5)</label><input id="rate" type="number" step="0.1" placeholder="4.5"></div>
      <div><label>报价(¥)</label><input id="price" type="number" placeholder="300000"></div>
    </div>
    <label>评价数</label>
    <input id="rev" type="number" placeholder="如 1200">
    <button class="btn" onclick="add()">+ 添加公司</button>
  </div>
  <div class="card" id="list"></div>
  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://1-iz5.en.softonic.com/iphone" target="_blank" style="color:var(--coral)">짐싸 (ZIMSSA) / 짐카</a>
  </div>
<script>
const KEY="P10-20260719-007";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function add(){
  const name=document.getElementById('name').value.trim();
  const rate=parseFloat(document.getElementById('rate').value);
  const price=parseFloat(document.getElementById('price').value);
  if(!name||!(rate>0)||!(price>0)){alert('请填写公司名、评分和报价');return;}
  items.push({id:Date.now(),name,rate,price,rev:parseInt(document.getElementById('rev').value)||0});
  document.getElementById('name').value="";document.getElementById('rate').value="";document.getElementById('price').value="";document.getElementById('rev').value="";
  save();
}
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function del(id){items=items.filter(x=>x.id!==id);save();}
function render(){
  const list=document.getElementById('list');
  if(!items.length){list.innerHTML='<b>🚚 比价表</b><p style="font-size:13px;color:var(--muted)">暂无公司</p>';return;}
  const scored=items.map(x=>({...x,val:x.rate/(x.price/1000)}));
  scored.sort((a,b)=>b.val-a.val);
  let html='<b>🚚 比价表（按性价比排序）</b>';
  scored.forEach((it,i)=>{
    const best=i===0?' <span style="color:var(--ok)">★推荐</span>':'';
    html+='<div style="font-size:14px;padding:8px 0;border-bottom:1px dashed var(--line)"><div style="display:flex;justify-content:space-between"><b>'+it.name+best+'</b><span onclick="del('+it.id+')" style="color:var(--coral);cursor:pointer">✕</span></div><div style="font-size:12px;color:var(--muted)">评分 '+it.rate+' · ¥'+it.price+' · 评价 '+it.rev+' · 性价比 '+it.val.toFixed(2)+'</div></div>';
  });
  list.innerHTML=html;
}
render();
</script>
</body>
</html>
