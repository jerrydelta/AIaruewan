<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>大画幅拍摄记录</title>
<style>
:root{
  --coral:#FF6B6B; --coral-dark:#E85555; --ink:#2D2D2D; --muted:#8A8A8A;
  --bg:#F7F7F7; --card:#FFFFFF; --line:#ECECEC; --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">hobby</span><span class="tag">photography</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">大画幅拍摄记录</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Large-format log: zone metering, tilt/shift, reciprocity</p>
  </div>
  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">大画幅一张成本几千到几万日元，记错参数极致命。针对移轴、皮腔延伸、倒易率这些通用 App 算不了的专业项，提供自动计算与本地归档。</p>
  </div>
  <div class="card">
    <b>🛠 工具</b>
    <div class="row">
      <div><label>机身/镜头</label><input id="cam" placeholder="Chamonix 4x5"></div>
      <div><label>焦距(mm)</label><input id="focal" type="number" value="150"></div>
    </div>
    <div class="row">
      <div><label>标称光圈</label><input id="ap" placeholder="f/22"></div>
      <div><label>快门(s)</label><input id="ss" type="number" step="0.1" value="1"></div>
      <div><label>皮腔延伸(mm)</label><input id="ext" type="number" value="0"></div>
    </div>
    <label>区域系统 Zone（II-X）</label>
    <select id="zone"><option>Zone V（中灰）</option><option>Zone III</option><option>Zone VII</option><option>Zone VIII</option><option>Zone II</option><option>Zone X</option></select>
    <button class="btn" onclick="add()">记录这一张</button>
  </div>
  <div class="card" id="list"></div>
  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://apps.apple.com/kr/app/groundglass/id6747068863" target="_blank" style="color:var(--coral)">GroundGlass</a>
  </div>
<script>
const KEY="P6-20260719-018";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function add(){
  const cam=document.getElementById('cam').value.trim()||'未命名';
  const focal=+document.getElementById('focal').value||150;
  const ap=document.getElementById('ap').value.trim()||'f/?';
  const ss=+document.getElementById('ss').value||0;
  const ext=+document.getElementById('ext').value||0;
  const zone=document.getElementById('zone').value;
  const eff=ext>0?(focal/(focal-ext)*1).toFixed(2):'—';
  const effAp=ext>0?(parseFloat(ap.replace('f/',''))*(1+ext/focal)).toFixed(1):ap;
  const rec=ss>=1?('需倒易率补偿 ≈'+(ss*Math.pow(1.3,Math.log2(ss))).toFixed(1)+'s'):'无需补偿';
  items.unshift({cam,focal,ap,ss,ext,zone,effAp,rec,t:new Date().toLocaleDateString('zh-CN'),id:Date.now()});
  save();
}
function del(id){items=items.filter(x=>x.id!==id);save();}
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const el=document.getElementById('list');
  if(!items.length){el.innerHTML='<b>📷 拍摄记录</b><p style="font-size:13px;color:#999">还没有记录。</p>';return;}
  el.innerHTML='<b>📷 已记录 '+items.length+' 张</b>'+items.map(x=>
    '<div style="border-top:1px solid var(--line);padding:8px 0">'+
    '<div style="font-weight:600">'+esc(x.cam)+' · '+x.zone+'</div>'+
    '<div style="font-size:13px;color:#555">'+x.ap+' → 有效光圈 f/'+x.effAp+' ｜ '+x.ss+'s ｜ 皮腔'+x.ext+'mm</div>'+
    '<div style="font-size:12px;color:var(--coral)">'+x.rec+'</div>'+
    '<div style="font-size:11px;color:#999">'+x.t+' <button onclick="del('+x.id+')" style="background:none;border:none;color:#bbb;font-size:11px;cursor:pointer">删</button></div>'+
    '</div>').join('');
}
function esc(s){return (s||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
render();
</script>
</body>
</html>
