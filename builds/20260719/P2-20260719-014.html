<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>韓国語特化個人CRM・名刺管理（리멤버対抗）｜韩人脉CRM</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.item{display:flex;justify-content:space-between;align-items:flex-start;
  padding:10px;border:1px solid var(--line);border-radius:10px;margin-top:8px}
.del{color:var(--muted);font-size:13px;cursor:pointer;border:none;background:none}
.warn{color:var(--coral);font-weight:700}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">relationship</span><span class="tag">contact_manager</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">韓国語特化個人CRM・名刺管理（리멤버対抗）</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Korean lightweight personal-CRM / business-card manager</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">韓国の個人CRM・名刺管理は리멤버(Remember)が約500万ユーザー規模で牽引。営業職・自営業の人脈管理需要確定。痛点：軽量・韓国語特化の代替が薄い。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 명함・인맥 관리</b>
    <input id="name" placeholder="이름">
    <div class="row">
      <input id="company" placeholder="회사">
      <input id="title" placeholder="직함">
    </div>
    <div class="row">
      <select id="strength">
        <option value="강">관계：강</option><option value="중">관계：중</option><option value="약">관계：약</option>
      </select>
      <input id="last" type="date" placeholder="최근 연락일">
    </div>
    <input id="note" placeholder="메모（만난 계기 등）">
    <button class="btn" onclick="add()">추가</button>
  </div>

  <div class="card" id="list"><b>📋 인맥 리스트</b></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.asiae.co.kr/en/print.htm?idxno=2026011309112362844" target="_blank" style="color:var(--coral)">리멤버(Remember) / 월드카드 / CamCard</a>
  </div>

<script>
const KEY="P2-20260719-014";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function add(){
  const name=document.getElementById("name").value.trim();
  if(!name){alert("이름을 입력하세요");return;}
  items.unshift({name,company:document.getElementById("company").value.trim(),
    title:document.getElementById("title").value.trim(),strength:document.getElementById("strength").value,
    last:document.getElementById("last").value||new Date().toLocaleDateString(),note:document.getElementById("note").value.trim()});
  localStorage.setItem(KEY,JSON.stringify(items));
  document.getElementById("name").value="";document.getElementById("company").value="";document.getElementById("title").value="";
  document.getElementById("last").value="";document.getElementById("note").value="";
  render();
}
function del(i){items.splice(i,1);localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const box=document.getElementById("list");
  if(!items.length){box.innerHTML="<b>📋 인맥 리스트</b><p style='font-size:13px;color:var(--muted);margin:6px 0 0'>暂无记录</p>";return;}
  const today=new Date();today.setHours(0,0,0,0);
  box.innerHTML="<b>📋 인맥 리스트（"+items.length+"）</b>"+items.map((it,i)=>{
    const d=it.last?new Date(it.last):null;const diff=d?Math.round((today-d)/86400000):0;
    const w=(diff>90)?"<span class='warn'>⚠ "+diff+"일 미연락</span>":"<span style='font-size:11px;color:var(--muted)'>"+diff+"일전</span>";
    return "<div class='item'><div style='flex:1'><div style='font-size:14px'>"+it.name+(it.company?(" ・ "+it.company):"")+(it.title?(" "+it.title):"")+
      "</div><div style='font-size:11px;color:var(--muted)'>"+it.strength+" ・ "+w+(it.note?(" ・ "+it.note):"")+"</div></div><button class='del' onclick='del("+i+")'>删除</button></div>";
  }).join("");
}
render();
</script>
</body>
</html>
