<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>多语记账（在日外国人）</title>
<style>
:root{
  --coral:#FF6B6B; --coral-dark:#E85555; --ink:#2D2D2D; --muted:#8A8A8A;
  --bg:#F7F7F7; --card:#FFFFFF; --line:#ECECEC; --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.item .t{font-weight:600}.item .s{font-size:13px;color:var(--muted)}
.mini{display:inline-block;padding:6px 10px;border:none;border-radius:8px;font-size:13px;cursor:pointer;margin:6px 6px 0 0}
.mini.del{background:#eee;color:#999}
.sum{font-size:15px;font-weight:600;color:var(--coral)}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">finance</span><span class="tag">personal_accounting</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">多语记账（在日外国人）</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Multilingual expense tracker for foreigners in Japan</p>
  </div>
  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">日本记账 app（マネーフォワード/Zaim）无官方外语界面，手机 app 仅日文，外籍用户门槛高。本工具提供英语/中文界面 + 多币种，自动折算日元本位。</p>
  </div>
  <div class="card">
    <b>🛠 工具 · Add expense / 记账</b>
    <label>Item / 项目</label>
    <input id="mItem" placeholder="e.g. Supermarket / 超市">
    <div class="row">
      <div><label>Amount</label><input id="mAmt" type="number" step="0.01" placeholder="0"></div>
      <div><label>Currency</label><select id="mCur"><option>JPY</option><option>USD</option><option>EUR</option><option>CNY</option></select></div>
    </div>
    <label>Category</label>
    <select id="mCat"><option>Food 餐饮</option><option>Transport 交通</option><option>Shopping 购物</option><option>Rent 房租</option><option>Other 其他</option></select>
    <button class="btn" onclick="addExp()">Save / 保存</button>
  </div>
  <div class="card" id="list">
    <b>📋 汇总（折算 JPY）</b>
    <div id="summary"></div>
    <div id="items" style="margin-top:8px"></div>
  </div>
  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://japanlifestart.com/zt/money-cards/japan-tax-return-software-guide-2026" target="_blank" style="color:var(--coral)">マネーフォワード ME / Zaim</a>
  </div>
<script>
const KEY="P11-20260719-012";
const RATE={"JPY":1,"USD":150,"EUR":165,"CNY":21};
let items = JSON.parse(localStorage.getItem(KEY) || "[]");
function save(){ localStorage.setItem(KEY, JSON.stringify(items)); render(); }
function addExp(){
  const item=document.getElementById('mItem').value.trim();
  const amt=parseFloat(document.getElementById('mAmt').value);
  const cur=document.getElementById('mCur').value;
  const cat=document.getElementById('mCat').value;
  if(!item||isNaN(amt)){ alert('Fill item and amount'); return; }
  const jpy=amt*(RATE[cur]||1);
  items.push({id:Date.now(),item,amt,cur,cat,jpy});
  document.getElementById('mItem').value='';document.getElementById('mAmt').value='';
  save();
}
function del(id){ items=items.filter(x=>x.id!==id); save(); }
function render(){
  const total=items.reduce((s,x)=>s+x.jpy,0);
  document.getElementById('summary').innerHTML='<div class="sum">Total / 合计 ¥'+total.toFixed(0)+' (JPY)</div>';
  const box=document.getElementById('items');
  if(!items.length){ box.innerHTML='<p style="font-size:13px;color:var(--muted)">No records.</p>'; return; }
  box.innerHTML=[...items].reverse().map(x=>
    '<div class="item"><div class="t">'+x.item+' <span style="float:right">'+x.cur+' '+x.amt+'</span></div>'+
    '<div class="s">'+x.cat+' · ≈¥'+x.jpy.toFixed(0)+'<button class="mini del" onclick="del('+x.id+')" style="float:right">Del</button></div></div>'
  ).join('');
}
render();
</script>
</body>
</html>
