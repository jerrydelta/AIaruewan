<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>家庭菜園 病虫害診断 + 防除記録</title>
<style>
:root{
  --coral:#FF6B6B; --coral-dark:#E85555; --ink:#2D2D2D; --muted:#8A8A8A;
  --bg:#F7F7F7; --card:#FFFFFF; --line:#ECECEC; --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.item .t{font-weight:600}.item .s{font-size:13px;color:var(--muted)}
.mini{display:inline-block;padding:6px 10px;border:none;border-radius:8px;font-size:13px;cursor:pointer;margin:6px 6px 0 0}
.mini.ok{background:var(--ok);color:#fff}.mini.del{background:#eee;color:#999}
.due{color:var(--coral);font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">plant</span><span class="tag">pest_control</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">家庭菜園 病虫害診断＋防除記録</h1>
    <p class="h-coral" style="font-size:13px;margin:0">JP home-garden pest diagnosis + spray log (consumerize Raymee)</p>
  </div>
  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">日本農家向 AI 診断（レイミー）已成熟，但家庭園芸者被忽略，需地図・圃場・農薬適用表。家庭用户想要"拍葉诊断 + 家庭可用防除建议 + 簡単喷洒記録"。本工具记录診断与防除。</p>
  </div>
  <div class="card">
    <b>🛠 工具 · 防除 / 診断記録</b>
    <label>作物</label>
    <input id="jName" placeholder="如：トマト / きゅうり">
    <label>症状 / 診断</label>
    <input id="jSym" placeholder="如：葉に白斑（うどんこ病？）">
    <label>家庭可用防除方法</label>
    <input id="jTreat" placeholder="如：食酢希釈スプレー / ベーキングソーダ">
    <label>防除日</label>
    <input id="jDate" type="date">
    <label>次回予定日</label>
    <input id="jNext" type="date">
    <button class="btn" onclick="addLog()">記録する</button>
  </div>
  <div class="card" id="list">
    <b>📋 防除記録</b>
    <div id="items"></div>
  </div>
  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.noukaweb.com/2025-04-15_release" target="_blank" style="color:var(--coral)">レイミー / かんたん栽培記録</a>
  </div>
<script>
const KEY="P11-20260719-005";
let items = JSON.parse(localStorage.getItem(KEY) || "[]");
function save(){ localStorage.setItem(KEY, JSON.stringify(items)); render(); }
function addLog(){
  const name=document.getElementById('jName').value.trim();
  const sym=document.getElementById('jSym').value.trim();
  const treat=document.getElementById('jTreat').value.trim();
  const date=document.getElementById('jDate').value;
  const next=document.getElementById('jNext').value;
  if(!name){ alert('作物を入力してください'); return; }
  items.push({id:Date.now(),name,sym,treat,date,next});
  document.getElementById('jName').value='';document.getElementById('jSym').value='';document.getElementById('jTreat').value='';
  document.getElementById('jDate').value='';document.getElementById('jNext').value='';
  save();
}
function del(id){ items=items.filter(x=>x.id!==id); save(); }
function render(){
  const box=document.getElementById('items');
  if(!items.length){ box.innerHTML='<p style="font-size:13px;color:var(--muted)">記録がありません。</p>'; return; }
  box.innerHTML=[...items].reverse().map(it=>
    '<div class="item"><div class="t">'+it.name+'</div>'+
    '<div class="s">診断：'+(it.sym||'—')+'</div>'+
    '<div class="s">防除：'+(it.treat||'—')+'</div>'+
    '<div class="s">防除日 '+(it.date||'—')+' · 次回 <b class="due">'+(it.next||'—')+'</b></div>'+
    '<button class="mini del" onclick="del('+it.id+')">削除</button></div>'
  ).join('');
}
render();
</script>
</body>
</html>
