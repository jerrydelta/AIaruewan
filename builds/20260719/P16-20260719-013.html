<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>自托管部署向导</title>
<style>
:root{
  --coral:#FF6B6B;
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">tech</span><span class="tag">deploy_tools</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">自托管部署向导</h1>
    <p class="h-coral" style="font-size:13px;margin:0">JA/KO self-hosted PaaS with guided wizard + cheap VPS templates.</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">受 Vercel 等涨价与锁定担忧驱动，"自托管 PaaS"在个人开发者中激增。Coolify（OSS，Vercel 替代品，一行命令导入）获得 GitHub 30k+ stars</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    
<label>应用类型</label><select id="w_app"><option>静态网站</option><option>Node 服务</option><option>数据库</option><option>Docker compose</option></select>
<label>VPS 模板</label><input id="w_vps" placeholder="ConoHa / Kakao Cloud">
<label>域名</label><input id="w_domain" placeholder="app.example.com">
<label>镜像 / 仓库</label><input id="w_img" placeholder="nginx:alpine 或 git repo">
<button class="btn" onclick="gen()">🚀 生成部署命令</button>
<label>生成的一键命令</label>
<textarea id="w_out" rows="4" readonly style="background:#fafafa"></textarea>
<button class="btn" onclick="saveDeploy()" style="background:var(--ok)">保存部署记录</button>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://coolify.io" target="_blank" style="color:var(--coral)">Coolify / Vercel / Railway / Netlify</a>
  </div>

<script>

const KEY="P16-20260719-013";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
let lastCmd='';
function gen(){
  const app=document.getElementById('w_app').value;
  const vps=document.getElementById('w_vps').value.trim()||'VPS';
  const dom=document.getElementById('w_domain').value.trim()||'localhost';
  const img=document.getElementById('w_img').value.trim()||'nginx:alpine';
  let cmd='';
  if(app==='静态网站'){
    cmd='docker run -d --name '+dom.split('.')[0]+' -p 80:80 -e DOMAIN='+dom+' '+img;
  }else if(app==='Node 服务'){
    cmd='docker run -d --name '+dom.split('.')[0]+' -p 3000:3000 -e DOMAIN='+dom+' '+img;
  }else if(app==='数据库'){
    cmd='docker run -d --name db -p 5432:5432 -e POSTGRES_PASSWORD=changeit '+img;
  }else{
    cmd='docker compose -f docker-compose.yml up -d  # 部署于 '+vps;
  }
  lastCmd=cmd;
  document.getElementById('w_out').value=cmd;
}
function saveDeploy(){
  if(!lastCmd){alert('请先生成命令');return;}
  items.push({cmd:lastCmd,added:new Date().toLocaleString()});
  save();
}
function del(i){items.splice(i,1);save();}
function render(){
  const el=document.getElementById('list');
  if(!items.length){el.innerHTML='<p style="font-size:13px;color:var(--muted)">暂无部署记录</p>';return;}
  el.innerHTML='<b>🗒 部署记录（'+items.length+'）</b>'+items.map((it,idx)=>
    '<div style="border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px">'+
    '<pre style="font-size:12px;background:#fafafa;border:1px solid var(--line);border-radius:8px;padding:8px;overflow:auto;white-space:pre-wrap;margin:0">'+esc(it.cmd)+'</pre>'+
    '<button class="btn" style="background:#fff;color:var(--coral);border:1px solid var(--line);margin-top:6px" onclick="del('+idx+')">删除</button>'+
    '</div>'
  ).join('');
}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
render();
</script>
</body>
</html>
