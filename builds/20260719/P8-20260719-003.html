<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>资格试验过去问×AI自动采点×弱点补强</title>
<style>
:root{--coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;--bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.small{font-size:12px;color:var(--muted)}
.del{color:var(--coral);font-size:13px;cursor:pointer;float:right}
.bad{color:#E85555;font-weight:600}
</style>
</head>
<body>
<div class="card">
  <div><span class="tag">education</span><span class="tag">exam_prep</span></div>
  <h1 style="font-size:20px;margin:8px 0 4px">资格试验过去问 × AI采点 × 弱点补强</h1>
  <p class="h-coral" style="font-size:13px;margin:0">Certification past-papers × AI auto-grading × weakness drill</p>
</div>
<div class="card">
  <b>💡 痛点</b>
  <p style="font-size:14px;color:#555;margin:6px 0 0">英检（实用英语技能检定）年考生约 100 万。旺文社已推 AI 自动采分 App，但「过去问＋AI采点＋按弱点追加题目」一体化的轻量工具仍不足。</p>
</div>
<div class="card">
  <b>🛠 工具 · 做题与采点</b>
  <label>科目</label>
  <input id="subj" placeholder="如：阅读理解 / 听力 / 写作">
  <label>题号</label>
  <input id="qno" placeholder="如：Q12">
  <div class="row">
    <div><label>我的答案</label><input id="mine" placeholder="A"></div>
    <div><label>正确答案</label><input id="ans" placeholder="A"></div>
  </div>
  <button class="btn" onclick="addQ()">录入并自动采点</button>
</div>
<div class="card" id="list"></div>
<div class="card" style="font-size:12px;color:var(--muted)">
  <b>来源参考</b><br>
  <a href="https://prtimes.jp/main/html/rd/p/000000302.000055026.html" target="_blank" style="color:var(--coral)">旺文社 英检过去问 / 学びの友 / 英語の友</a>
</div>
<script>
const KEY="P8-20260719-003";
let qs=JSON.parse(localStorage.getItem(KEY)||"[]");
function save(){localStorage.setItem(KEY,JSON.stringify(qs));render();}
function addQ(){const s=subj.value.trim(),q=qno.value.trim(),m=mine.value.trim().toUpperCase(),a=ans.value.trim().toUpperCase();if(!s||!q||!m||!a){alert("请填全四项");return;}const ok=m===a;qs.push({s,q,m,a,ok,t:Date.now()});subj.value=qno.value=mine.value=ans.value="";save();}
function del(i){qs.splice(i,1);save();}
function render(){
  let o="<b>📋 做题记录</b>";
  if(!qs.length)o+="<p class='small'>还没有记录。</p>";
  qs.slice().reverse().forEach((x,i)=>{const idx=qs.length-1-i;o+=`<div class='item'><span class='del' onclick='del(${idx})'>删除</span>${x.s} · ${x.q} — ${x.m} / ${x.a} ${x.ok?"✅":"❌"}</div>`;});
  const by={};qs.forEach(x=>{by[x.s]=by[x.s]||{t:0,r:0};by[x.s].t++;if(x.ok)by[x.s].r++;});
  const keys=Object.keys(by);
  o+="<hr style='border:none;border-top:1px solid var(--line);margin:14px 0'><b>📊 各科目正确率</b>";
  if(!keys.length)o+="<p class='small'>暂无数据。</p>";
  keys.forEach(k=>{const p=Math.round(by[k].r/by[k].t*100);const weak=p<60;o+=`<div class='item'>${k}：<b class='${weak?"bad":""}'>${p}%</b> <span class='small'>（${by[k].r}/${by[k].t}）</span></div>`;});
  const weaks=keys.filter(k=>by[k].r/by[k].t<0.6);
  if(weaks.length){o+="<hr style='border:none;border-top:1px solid var(--line);margin:14px 0'><b>🎯 AI 补强建议</b><p class='small'>以下科目正确率偏低，建议加练：</p>";weaks.forEach(k=>{o+=`<div class='tag'>${k}：每日加练 5 题</div>`;});}
  list.innerHTML=o;
}
render();
</script>
</body>
</html>
