<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>家庭共享组织器</title>
<style>
:root{
  --coral:#FF6B6B;
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}

</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">productivity</span><span class="tag">calendar_planner</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">家庭共享组织器</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Family shared organizer (shared calendar + gamified chores + kids mode)</p>
  </div>
  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">家庭共享组织器是稳定家庭场景，但 gamification + 儿童端体验仍粗糙。</p>
  </div>
  <div class="card">
    <b>🛠 工具</b>
    
<label>家庭任务（chore）</label><input id="chName" placeholder="倒垃圾">
<div class="row"><input id="chWho" placeholder="爸爸"><input id="chPt" type="number" value="5" placeholder="分"></div>
<button class="btn" onclick="addCh()">添加任务</button>
<label>购物清单</label><div class="row"><input id="shItem" placeholder="牛奶"><button class="btn" onclick="addSh()" style="width:auto">加</button></div>
<div id="score" style="font-size:13px;color:#555;margin-top:8px"></div>
  </div>

  <div class="card" id="list"></div>
  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.cozi.com" target="_blank" style="color:var(--coral)">Cozi · Honeydew · Sweepy · Homsy</a>
  </div>
<script>

const KEY='P15-20260719-012';
let items=JSON.parse(localStorage.getItem(KEY)||'[]');
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function addCh(){
 var n=document.getElementById('chName').value.trim();
 var w=document.getElementById('chWho').value.trim()||'某人';
 var p=Number(document.getElementById('chPt').value)||5;
 if(!n){alert('任务');return;}
 items.unshift({id:Date.now(),type:'chore',n:n,w:w,p:p,done:false});
 document.getElementById('chName').value='';document.getElementById('chWho').value='';save();
}
function addSh(){
 var n=document.getElementById('shItem').value.trim();
 if(!n){return;}
 items.unshift({id:Date.now(),type:'shop',n:n,buy:false});
 document.getElementById('shItem').value='';save();
}
function toggle(id){var x=items.find(i=>i.id==id);if(x){if(x.type=='chore')x.done=!x.done;else x.buy=!x.buy;}save();}
function del(id){items=items.filter(i=>i.id!=id);save();}
function render(){
 var box=document.getElementById('list');
 var chores=items.filter(i=>i.type=='chore');
 var shop=items.filter(i=>i.type=='shop');
 var pts=chores.filter(i=>i.done).reduce((s,i)=>s+i.p,0);
 document.getElementById('score').textContent='🏆 已赚 '+pts+' 分（完成 '+(chores.filter(i=>i.done).length)+'/'+chores.length+' 任务）';
 var html='<b>🧹 家庭任务</b>';
 html+=chores.length?chores.map(i=>'<div class="card" style="margin:6px 0;padding:10px"><div style="display:flex;justify-content:space-between"><span style="'+(i.done?'text-decoration:line-through;color:#aaa':'font-weight:600')+'">'+esc(i.n)+'</span><span style="font-size:11px;color:#999">'+esc(i.w)+' · '+i.p+'分</span></div><a style="color:var(--coral);cursor:pointer;font-size:12px" onclick="toggle('+i.id+')">'+(i.done?'↩':'完成')+'</a> <a style="color:#999;cursor:pointer;font-size:12px" onclick="del('+i.id+')">删</a></div>').join(''):'<p style="font-size:13px;color:#999">暂无</p>';
 html+='<b style="display:block;margin-top:10px">🛒 购物清单</b>';
 html+=shop.length?shop.map(i=>'<div class="card" style="margin:6px 0;padding:10px"><div style="display:flex;justify-content:space-between"><span style="'+(i.buy?'text-decoration:line-through;color:#aaa':'')+'">'+esc(i.n)+'</span><a style="color:var(--coral);cursor:pointer;font-size:12px" onclick="toggle('+i.id+')">'+(i.buy?'已买 ✓':'购买')+'</a></div><a style="color:#999;cursor:pointer;font-size:12px" onclick="del('+i.id+')">删</a></div>').join(''):'<p style="font-size:13px;color:#999">暂无</p>';
 box.innerHTML=html;
}
function esc(s){return (s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
render();

</script>
</body>
</html>
