<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>免费跑步数据记录(配速/分段)</title>
<style>
:root{
  --coral:#FF6B6B;        /* 主品牌色 */
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">fitness</span><span class="tag">running_app_gaps</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">免费跑步数据记录(配速/分段)</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Free GPS running app — splits / import</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">跑步app痛点集中：Strava把分段/路线锁进付费墙，Whoop长期缺逐英里配速拆分。免费跑步app仍可受欢迎，说明「核心GPS追踪免费+细分功能」有空间。本工具补齐分段与配速。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:#666;margin:8px 0">记录每次跑步，自动计算平均配速，保存分段数据。</p>
<label>日期</label><input type="date" id="f_rdate" placeholder="">
<label>距离(km)</label><input type="number" id="f_distanceKm" placeholder="如 5">
<label>时长(分钟)</label><input type="number" id="f_timeMin" placeholder="如 28">
<label>分段配速(每km)</label><input type="text" id="f_splits" placeholder="如 5:30,5:40">
<label>备注</label><textarea id="f_note" rows="2" placeholder="路线/天气…"></textarea>
    <button class="btn" onclick="addItem()">保存记录</button>
    <div id="derive" style="font-size:13px;color:var(--coral);margin-top:8px"></div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="#" style="color:var(--coral)">Strava / Nike Run Club / Runkeeper / Whoop / Motera</a>
  </div>

<script>
const KEY="P5-20260719-003";
const FIELDS=[{"label":"日期","key":"rdate"},{"label":"距离(km)","key":"distanceKm"},{"label":"时长(分钟)","key":"timeMin"},{"label":"分段配速(每km)","key":"splits"},{"label":"备注","key":"note"}];
let items = JSON.parse(localStorage.getItem(KEY) || "[]");
function save(){ localStorage.setItem(KEY, JSON.stringify(items)); render(); }
function addItem(){
const v_rdate=document.getElementById('f_rdate').value;
const v_distanceKm=document.getElementById('f_distanceKm').value;
const v_timeMin=document.getElementById('f_timeMin').value;
const v_splits=document.getElementById('f_splits').value;
const v_note=document.getElementById('f_note').value;
  const item={ ts:Date.now() , rdate:v_rdate, distanceKm:v_distanceKm, timeMin:v_timeMin, splits:v_splits, note:v_note };
  items.unshift(item);
  save();
  document.getElementById('f_rdate').value='';
document.getElementById('f_distanceKm').value='';
document.getElementById('f_timeMin').value='';
document.getElementById('f_splits').value='';
document.getElementById('f_note').value='';
  const dv=derive(item);
  document.getElementById('derive').textContent = dv?('已保存 ✓ '+dv):'已保存 ✓';
}
function derive(it){ const d=Number(it.distanceKm)||0, t=Number(it.timeMin)||0; if(!d||!t) return ''; const p=t/d; const m=Math.floor(p), s=Math.round((p-m)*60); return '🏃 配速 '+m+'分'+(s<10?'0':'')+s+'秒/km'; return ''; }
function rowHTML(it){
  let h='<div style="font-size:12px;color:var(--muted)">'+(new Date(it.ts).toLocaleString())+'</div>';
  FIELDS.forEach(f=>{ if(it[f.key]!==''){ h+='<div style="font-size:14px;margin:2px 0"><b>'+f.label+'：</b>'+it[f.key]+'</div>'; } });
  const d=derive(it); if(d) h+='<div style="font-size:13px;color:var(--coral);margin-top:4px">'+d+'</div>';
  return h;
}
function render(){
  const el=document.getElementById('list');
  if(!items.length){ el.innerHTML='<div style="font-size:13px;color:var(--muted)">暂无记录，添加第一条吧。</div>'; return; }
  el.innerHTML='<b style="font-size:13px">📋 记录 ('+items.length+')</b>'+items.map((it,i)=>'<div style="border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:8px">'+rowHTML(it)+'<button class="btn" style="background:#bbb;margin-top:8px" onclick="del('+i+')">删除</button></div>').join('');
}
function del(i){ items.splice(i,1); save(); }
render();

</script>
</body>
</html>
