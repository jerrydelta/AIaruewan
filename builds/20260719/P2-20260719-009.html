<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>韓国フリーランス才能マッチング＋Biz一括発注｜韩自由职业匹配</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.item{display:flex;justify-content:space-between;align-items:flex-start;
  padding:10px;border:1px solid var(--line);border-radius:10px;margin-top:8px}
.del{color:var(--muted);font-size:13px;cursor:pointer;border:none;background:none}
.seg{display:flex;gap:6px;margin:6px 0}
.seg button{flex:1;padding:9px;border:1px solid var(--line);border-radius:10px;background:#fff;font-size:13px;cursor:pointer}
.seg button.on{background:var(--coral);color:#fff;border-color:var(--coral)}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">career</span><span class="tag">freelance_tools</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">韓国フリーランス才能マッチング＋Biz一括発注</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Korean freelance talent marketplace + Biz bulk ordering</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">韓国フリーランス・再能力等マッチング市場でKmongが牽引。2025年営業利益連結38億ウォン・単体43億ウォン(+617%)、Kmong Biz年間GMV100億ウォン突破。痛点：企業が複数案件を一括発注する仕組みと、才能者の技能管理が分断。</p>
  </div>

  <div class="card">
    <div class="seg">
      <button id="t1" class="on" onclick="switchTab('project')">＋プロジェクト</button>
      <button id="t2" onclick="switchTab('talent')">＋タレント</button>
      <button id="t3" onclick="switchTab('match')">🔍マッチ</button>
    </div>
    <div id="fProject">
      <input id="pName" placeholder="プロジェクト名">
      <input id="pSkills" placeholder="必要スキル（カンマ区切り：デザイン,翻訳）">
      <input id="pBudget" type="number" placeholder="予算(ウォン)">
      <button class="btn" onclick="addProject()">登録</button>
    </div>
    <div id="fTalent" style="display:none">
      <input id="tnName" placeholder="タレント名">
      <input id="tnSkills" placeholder="スキル（カンマ区切り）">
      <input id="tnRate" type="number" placeholder="料金(ウォン)">
      <button class="btn" onclick="addTalent()">登録</button>
    </div>
    <div id="fMatch" style="display:none">
      <p style="font-size:13px;color:var(--muted);margin:4px 0">プロジェクトを選ぶと一致するタレントを表示：</p>
      <select id="selProject"></select>
      <div id="matchOut" style="margin-top:8px"></div>
    </div>
  </div>

  <div class="card" id="list"><b>📋 データ</b></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.venturesquare.net/1038540/" target="_blank" style="color:var(--coral)">크몽(Kmong) / 숨고 / 탈잉</a>
  </div>

<script>
const KEY="P2-20260719-009";
let db=JSON.parse(localStorage.getItem(KEY)||'{"projects":[],"talents":[]}');
function switchTab(t){
  document.getElementById("t1").classList.toggle("on",t==="project");
  document.getElementById("t2").classList.toggle("on",t==="talent");
  document.getElementById("t3").classList.toggle("on",t==="match");
  document.getElementById("fProject").style.display=t==="project"?"block":"none";
  document.getElementById("fTalent").style.display=t==="talent"?"block":"none";
  document.getElementById("fMatch").style.display=t==="match"?"block":"none";
  if(t==="match"){fillProjects();document.getElementById("matchOut").innerHTML="";}
}
function splitArr(s){return (s||"").split(/[,，、]/).map(x=>x.trim()).filter(Boolean);}
function addProject(){
  const name=document.getElementById("pName").value.trim();
  if(!name){alert("请输入プロジェクト名");return;}
  db.projects.unshift({name,skills:splitArr(document.getElementById("pSkills").value),budget:document.getElementById("pBudget").value});
  save();document.getElementById("pName").value="";document.getElementById("pSkills").value="";document.getElementById("pBudget").value="";render();
}
function addTalent(){
  const name=document.getElementById("tnName").value.trim();
  if(!name){alert("请输入タレント名");return;}
  db.talents.unshift({name,skills:splitArr(document.getElementById("tnSkills").value),rate:document.getElementById("tnRate").value});
  save();document.getElementById("tnName").value="";document.getElementById("tnSkills").value="";document.getElementById("tnRate").value="";render();
}
function fillProjects(){const s=document.getElementById("selProject");s.innerHTML=db.projects.map((p,i)=>"<option value='"+i+"'>"+p.name+"</option>").join("");}
function match(){
  const i=document.getElementById("selProject").value;
  if(i===""||!db.projects[i]){document.getElementById("matchOut").innerHTML="プロジェクトがありません";return;}
  const ps=db.projects[i].skills;
  const res=db.talents.map(t=>{
    const hit=ps.filter(s=>t.skills.includes(s)).length;
    return {t,score:ps.length?Math.round(hit/ps.length*100):0};
  }).sort((a,b)=>b.score-a.score);
  document.getElementById("matchOut").innerHTML=res.map(r=>"<div class='item'><div style='flex:1'><div style='font-size:14px'>"+r.t.name+
    "</div><div style='font-size:11px;color:var(--muted)'>"+r.t.skills.join("・")+"</div></div><span class='h-coral' style='font-weight:700'>"+r.score+"%</span></div>").join("")||"タレントなし";
}
document.getElementById("selProject").addEventListener("change",match);
function save(){localStorage.setItem(KEY,JSON.stringify(db));}
function render(){
  const box=document.getElementById("list");
  box.innerHTML="<b>📋 プロジェクト("+db.projects.length+")</b>"+db.projects.map(p=>"<div class='item'><div style='flex:1;font-size:14px'>"+p.name+
    "</div><span style='font-size:11px;color:var(--muted)'>"+(p.budget?p.budget+"원":"")+"</span></div>").join("")+
    "<b style='display:block;margin-top:10px'>🎨 タレント("+db.talents.length+")</b>"+db.talents.map(t=>"<div class='item'><div style='flex:1;font-size:14px'>"+t.name+
    "</div><span style='font-size:11px;color:var(--muted)'>"+t.skills.length+"スキル</span></div>").join("");
}
render();
</script>
</body>
</html>
