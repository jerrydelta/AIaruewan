<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>陪伴式专注 · 虚拟同伴（body doubling）</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.timer{font-size:48px;text-align:center;font-weight:700;color:var(--coral);margin:10px 0}
.stat{background:#FFF7F7;border:1px solid #FFE3E3;border-radius:10px;padding:10px;margin-top:8px}
.stat b{color:var(--coral);font-size:18px}
.del{color:var(--muted);font-size:12px;cursor:pointer;border:none;background:none}
.item{border-bottom:1px dashed var(--line);padding:8px 0;font-size:14px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">neurodiversity</span><span class="tag">adhd_tools</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">陪伴式专注 · 虚拟同伴</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Body-doubling focus companion</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">"body doubling（陪伴专注）"是 ADHD 人群高效策略。Focusmate 提供真人视频 coworking；Forest 用种树机制对抗手机分心，累计用户 6000 万。说明"外部约束式专注"需求巨大。</p>
  </div>

  <div class="card">
    <b>🛠 工具（虚拟专注伙伴）</b>
    <label>本次专注任务</label>
    <input type="text" id="task" placeholder="如：写周报 25 分钟">
    <label>时长（分钟）</label>
    <input type="number" id="mins" placeholder="25" step="1" min="1" max="180">
    <div class="timer" id="clock">25:00</div>
    <div class="row">
      <button class="btn" onclick="startTimer()">开始陪伴专注</button>
      <button class="btn" style="background:var(--muted)" onclick="stopTimer()">结束</button>
    </div>
    <div id="buddy" style="text-align:center;font-size:14px;margin-top:8px;color:var(--muted)">🧑‍🤝‍🧑 你的虚拟同伴正在陪你…</div>
    <div class="stat" id="stat">完成会话：0 次 ｜ 累计专注：0 分钟</div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://focusmate.com/" target="_blank" style="color:var(--coral)">Focusmate · Forest · Flow Club</a>
  </div>

<script>
const KEY="P9-20260719-014";
let logs=JSON.parse(localStorage.getItem(KEY)||"[]");
let timer=null,remain=0,total=0;
function fmtMin(s){const m=Math.floor(s/60),ss=s%60;return String(m).padStart(2,"0")+":"+String(ss).padStart(2,"0");}
function updateStat(){
  const sessions=logs.length, mins=logs.reduce((a,b)=>a+b.min,0);
  document.getElementById("stat").innerHTML=`完成会话：<b>${sessions}</b> 次 ｜ 累计专注：<b>${mins}</b> 分钟`;
}
function startTimer(){
  const mins=parseInt(document.getElementById("mins").value)||25;
  const task=document.getElementById("task").value.trim()||"未命名专注";
  total=mins*60;remain=total;
  document.getElementById("clock").textContent=fmtMin(remain);
  if(timer)clearInterval(timer);
  timer=setInterval(()=>{
    remain--;
    document.getElementById("clock").textContent=fmtMin(Math.max(0,remain));
    if(remain<=0){
      clearInterval(timer);timer=null;
      logs.push({task,min:mins,date:new Date().toISOString().slice(0,10)});
      localStorage.setItem(KEY,JSON.stringify(logs));
      document.getElementById("buddy").textContent="🎉 同伴为你鼓掌！本次专注完成";
      render();updateStat();
    }
  },1000);
  document.getElementById("buddy").textContent="🧑‍🤝‍🧑 你的虚拟同伴正在陪你：「"+task+"」";
}
function stopTimer(){
  if(timer){clearInterval(timer);timer=null;}
  document.getElementById("clock").textContent=fmtMin(total||(parseInt(document.getElementById("mins").value)||25)*60);
  document.getElementById("buddy").textContent="⏸ 已暂停";
}
function render(){
  let html="<b>📋 专注记录</b>";
  if(logs.length===0)html+="<p style='font-size:13px;color:var(--muted)'>暂无记录</p>";
  logs.slice().reverse().forEach((l,idx)=>{
    const real=logs.length-1-idx;
    html+=`<div class="item"><div class="row"><div>${l.date}<br>${l.task} · <b class="h-coral">${l.min}min</b></div><button class="del" onclick="del(${real})">删除</button></div></div>`;
  });
  document.getElementById("list").innerHTML=html;
}
function del(i){logs.splice(i,1);localStorage.setItem(KEY,JSON.stringify(logs));render();updateStat();}
render();updateStat();
</script>
</body>
</html>
