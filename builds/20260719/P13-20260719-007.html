<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>婚礼筹备自动排期助手</title>
<style>
:root{
  --coral:#FF6B6B; --coral-dark:#E85555; --ink:#2D2D2D; --muted:#8A8A8A;
  --bg:#F7F7F7; --card:#FFFFFF; --line:#ECECEC; --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.item{display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--line);font-size:14px}
.item:last-child{border-bottom:none}
.del{color:var(--coral);font-size:13px;cursor:pointer}
.sum{font-size:13px;color:var(--muted)}
.done{text-decoration:line-through;color:var(--muted)}
.big{font-size:22px;font-weight:700;color:var(--coral);text-align:center}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">wedding</span><span class="tag">ai_wedding_assistant</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">婚礼筹备自动排期助手</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Wedding-domain AI assistant (auto-schedule + vendor match + copywriting)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">90% 的 2025 年新人考虑用 AI 做婚礼策划，但用 ChatGPT 当免费策划缺婚礼领域结构化。自动排期+供应商匹配+文案是核心缺口。</p>
  </div>

  <div class="card">
    <b>🛠 工具：一键生成筹备时间表</b>
    <label>婚礼日期</label>
    <input type="date" id="wdate">
    <button class="btn" onclick="genPlan()">🤖 生成倒计时排期</button>
    <div id="cd" class="big" style="margin-top:10px"></div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.theappnote.com/blog/cut-wedding-costs-with-budget-apps" target="_blank" style="color:var(--coral)">Zola AI / Joy / Wedding Planner Tools</a>
  </div>

<script>
const KEY="P13-20260719-007";
let plan=JSON.parse(localStorage.getItem(KEY)||"null");
function save(){localStorage.setItem(KEY,JSON.stringify(plan));render();}
function fmt(d){return d.toISOString().slice(0,10);}
function addDays(date,days){const d=new Date(date);d.setDate(d.getDate()+days);return d;}
function genPlan(){
  const w=document.getElementById('wdate').value;
  if(!w){alert('请选择婚礼日期');return;}
  const WD=new Date(w+'T00:00:00');
  const tpl=[
    [365,'订婚公告 / 定档'],
    [300,'预订婚礼场地'],
    [240,'确定摄影 / 摄像'],
    [180,'选购婚纱 / 礼服'],
    [150,'发送请柬 / 建宾客群'],
    [120,'预订婚戒'],
    [90,'试妆 / 试纱'],
    [60,'确定婚礼当天流程'],
    [30,'确认最终出席人数'],
    [14,'婚车 / 住宿安排'],
    [7,'婚礼彩排'],
    [1,'礼包 / 戒指保管']
  ];
  plan={wed:w,tasks:tpl.map(([d,name])=>({date:fmt(addDays(WD,-d)),name,done:false}))};
  save();
}
function toggle(i){plan.tasks[i].done=!plan.tasks[i].done;save();}
function del(i){plan.tasks.splice(i,1);save();}
function render(){
  // 倒计时
  const cd=document.getElementById('cd');
  if(plan){
    const diff=Math.ceil((new Date(plan.wed+'T00:00:00')-new Date())/86400000);
    cd.textContent=diff>0?('距婚礼还有 '+diff+' 天'):'🎉 婚礼日到了！';
  } else cd.textContent='';
  const list=document.getElementById('list');
  if(!plan){list.innerHTML='<div class="sum">选择婚礼日期后生成排期。</div>';return;}
  let html='<b>📅 筹备排期（'+plan.tasks.filter(t=>t.done).length+'/'+plan.tasks.length+' 完成）</b>';
  plan.tasks.forEach((t,i)=>{
    html+='<div class="item"><div class="'+(t.done?'done':'')+'" onclick="toggle('+i+')" style="cursor:pointer"><b>'+t.date+'</b><br><span class="sum">'+t.name+'</span></div><span class="del" onclick="del('+i+')">删</span></div>';
  });
  list.innerHTML=html;
}
render();
</script>
</body>
</html>
