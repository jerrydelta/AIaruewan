<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>用药/健康提醒 App</title>
<style>
:root{
  --coral:#FF6B6B;
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}

</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">productivity</span><span class="tag">automation</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">用药/健康提醒 App</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Medication/health reminder app (multi-drug + family sync + adherence)</p>
  </div>
  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">用药提醒 / 健康管理是高频刚需，老龄化 + 慢病驱动增长，独立 App 已验证收入。</p>
  </div>
  <div class="card">
    <b>🛠 工具</b>
    
<label>药品名称</label><input id="mName" placeholder="二甲双胍">
<label>每日剂量</label><input id="mDose" placeholder="1片 / 500mg">
<label>提醒时间</label><input id="mTime" type="time" value="09:00">
<button class="btn" onclick="addM()">添加药品</button>
<div id="adherence" style="font-size:13px;color:#555;margin-top:8px"></div>
  </div>

  <div class="card" id="list"></div>
  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.medisafe.com" target="_blank" style="color:var(--coral)">Medisafe · Dosecast · MyTherapy · CareClinic</a>
  </div>
<script>

const KEY='P15-20260719-008';
let items=JSON.parse(localStorage.getItem(KEY)||'[]');
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function today(){return new Date().toISOString().slice(0,10);}
function addM(){
 var n=document.getElementById('mName').value.trim();
 var d=document.getElementById('mDose').value.trim();
 var t=document.getElementById('mTime').value;
 if(!n){alert('药名');return;}
 items.push({id:Date.now(),n:n,d:d,t:t,taken:{}});
 document.getElementById('mName').value='';document.getElementById('mDose').value='';save();
}
function take(id){var x=items.find(i=>i.id==id);if(!x)return;var k=today();x.taken[k]=!x.taken[k];save();}
function del(id){items=items.filter(i=>i.id!=id);save();}
function render(){
 var box=document.getElementById('list');
 var tk=today();
 var takenToday=items.filter(i=>i.taken[tk]).length;
 document.getElementById('adherence').textContent='今日已服 '+takenToday+'/'+items.length+' 种药品';
 box.innerHTML='<b>💊 用药清单</b>';
 if(!items.length){box.innerHTML+='<p style="font-size:13px;color:#999">添加药品</p>';return;}
 box.innerHTML+=items.map(i=>'<div class="card" style="margin:6px 0;padding:10px"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:600">'+esc(i.n)+'</span><span style="font-size:11px;color:#999">'+i.t+' · '+esc(i.d)+'</span></div><button class="btn" style="background:'+(i.taken[tk]?'var(--ok)':'var(--coral)')+';margin-top:6px" onclick="take('+i.id+')">'+(i.taken[tk]?'✓ 今日已服':'标记已服')+'</button> <a style="color:#999;cursor:pointer;font-size:12px" onclick="del('+i.id+')">删除</a></div>').join('');
}
function esc(s){return (s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
render();

</script>
</body>
</html>
