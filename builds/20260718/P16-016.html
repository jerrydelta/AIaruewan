<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>韩国申购资格自检+加分计算</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.res{font-size:14px;margin-top:8px;padding:10px;border-radius:10px;background:#FFF7F7}
.res b{color:var(--coral)}
.warn{background:#FFF3E0;color:#9a6b00}
.ok{background:#EAFaf1;color:#1d7a4d}
li{list-style:none;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
ul{padding:0;margin:6px 0 0}
.del{color:var(--muted);font-size:12px;border:none;background:none;cursor:pointer;float:right}
.pill{font-size:11px;padding:1px 7px;border-radius:999px;background:#FFF0F0;color:var(--coral);margin-right:6px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">finance</span><span class="tag">korea_housing_subscription_assistant</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">韩国申购助手·资格+加分</h1>
    <p class="h-coral" style="font-size:13px;margin:0">KR housing-subscription: eligibility + score</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">韩国申购(청약)竞争极激烈、资格复杂（无住宅/世帯/所得资产标准各异），官方청약홈申请期服务器过载、界面繁琐、资格易看错导致后段淘汰。机会：第三方「资格自检+加分计算+日程追踪」助手。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:#777;margin:6px 0 0">填家庭情况 → 资格自检 + 가점(加分)估算；记录关注的申购日程。</p>
    <label>无住宅状态</label>
    <select id="home"><option value="1">无住宅（首次）</option><option value="0">已有住宅</option></select>
    <label>家庭类型</label>
    <select id="hh"><option value="1">单身/无配偶</option><option value="2">夫妇无子女</option><option value="3">有子女(多子女优先)</option></select>
    <label>所属月数（청약통장 가입개월）</label>
    <input type="number" id="months" placeholder="24" inputmode="numeric">
    <label>有无无住宅期限满 2 年？</label>
    <select id="twoyr"><option value="1">是（满足）</option><option value="0">否</option></select>
    <button class="btn" onclick="check()">资格自检+加分</button>
    <div class="res" id="res"></div>
    <hr style="border:none;border-top:1px solid var(--line);margin:14px 0">
    <label>关注申购·名称</label>
    <input type="text" id="sub" placeholder="例 XXアパート 1순위">
    <label>申请截止日</label>
    <input type="date" id="due">
    <button class="btn" onclick="addSub()">＋ 加日程</button>
  </div>

  <div class="card" id="list">
    <b>📅 申购日程</b>
    <ul id="ul"></ul>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://shortnewsdaily.kr/applyhome" target="_blank" style="color:var(--coral)">청약홈(官方) / 청년주택드림</a>
  </div>

<script>
const KEY="P16-016";
let subs=JSON.parse(localStorage.getItem(KEY)||"[]");
function check(){
  const home=document.getElementById("home").value==="1";
  const hh=parseInt(document.getElementById("hh").value);
  const months=parseInt(document.getElementById("months").value)||0;
  const twoyr=document.getElementById("twoyr").value==="1";
  let ok = home && twoyr && months>=6;
  let score=0;
  if(home)score+=10; if(twoyr)score+=10; score+=Math.min(months,60)/12*2; // 每月约2分(上限)
  if(hh===3)score+=15; else if(hh===2)score+=5;
  let html=`<div class="${ok?'ok':'warn'}">${ok?'✅ 基本资格满足，可申一般申购':'⚠ 资格未满：需无住宅+满2年+通账≥6月'}</div>`;
  html+=`预估 가점(加分) <b>${score.toFixed(1)} 点</b>（无住宅10+满期10+所属${score>20?(score-30).toFixed(1):(score-20).toFixed(1)}+家庭${hh===3?15:hh===2?5:0}）`;
  document.getElementById("res").innerHTML=html;
  localStorage.setItem(KEY+"_chk",JSON.stringify({home:document.getElementById("home").value,hh,months,twoyr}));
}
function addSub(){
  const sub=document.getElementById("sub").value.trim();
  const due=document.getElementById("due").value;
  if(!sub||!due){alert("请填全");return;}
  subs.push({sub,due,t:Date.now()});
  document.getElementById("sub").value="";document.getElementById("due").value="";
  save();
}
function del(t){subs=subs.filter(x=>x.t!==t);save();}
function save(){localStorage.setItem(KEY,JSON.stringify(subs));render();}
function render(){
  const ul=document.getElementById("ul");ul.innerHTML="";
  const today=new Date().toISOString().slice(0,10);
  [...subs].sort((a,b)=>a.due<b.due?-1:1).forEach(x=>{
    const days=Math.round((new Date(x.due)-new Date(today))/86400000);
    const li=document.createElement("li");
    li.innerHTML=`<button class="del" onclick="del(${x.t})">删除</button>
      <span class="pill">${days>=0?days+'天後':'已过期'}</span>${x.sub}<br>
      <span style="color:#999;font-size:12px">截止 ${x.due}</span>`;
    ul.appendChild(li);});
}
render();
</script>
</body>
</html>
