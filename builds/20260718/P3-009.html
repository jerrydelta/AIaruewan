<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>50+银发社交活动规划器</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.8;padding:16px;max-width:480px;margin:0 auto;font-size:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:20px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:16px;border:none;border-radius:14px;
  background:var(--coral);color:#fff;font-size:17px;font-weight:600;cursor:pointer;margin-top:10px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:12px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:3px 11px;margin:3px 5px 3px 0}
input,select,textarea{width:100%;padding:14px;border:1px solid var(--line);
  border-radius:12px;font-size:17px;margin-top:8px;background:#fff;color:var(--ink)}
label{font-size:15px;color:var(--muted);display:block;margin-top:12px}
.item{border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:12px}
.item b{color:var(--ink);font-size:17px}.del{color:var(--muted);font-size:14px;float:right;cursor:pointer}
.pill{display:inline-block;font-size:12px;background:#FFF0F0;color:var(--coral);border-radius:999px;padding:2px 10px;margin:3px 4px 0 0}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">social</span><span class="tag">senior_silver_social_jp</span></div>
    <h1 style="font-size:22px;margin:8px 0 4px">50+银发社交·活动规划器</h1>
    <p class="h-coral" style="font-size:15px;margin:0">Senior (50+) social app · 低刺激大按钮</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:15px;color:#555;margin:6px 0 0">日本老龄化下"孤独"成普遍状态。Oshiruko仅允许50岁以上、身份证严格验证，会员破10万，含兴趣群聊、AI聊天助手、线下茶会/研讨会。老年人不习惯X/TikTok，需要大按钮、低刺激、安全慢节奏。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">报名你想参加的银发活动或兴趣群，记录时间地点，本地保存（大按钮、好点）。</p>
    <label>兴趣 / 活动类型</label>
    <select id="kind"><option>茶会</option><option>兴趣群聊</option><option>研讨会</option><option>技能学习</option><option>散步搭子</option></select>
    <label>活动名称</label>
    <input id="name" placeholder="例如：周三农闲茶话会">
    <div style="display:flex;gap:10px">
      <div style="flex:1"><label>日期</label><input id="date" type="date"></div>
      <div style="flex:1"><label>地点</label><input id="place" placeholder="社区中心"></div>
    </div>
    <button class="btn" onclick="add()">报名 / 记录活动</button>
  </div>

  <div class="card" id="list">
    <b>📋 我的银发活动</b>
    <p style="font-size:13px;color:var(--muted);margin:4px 0 0">本地保存，安全私密。</p>
  </div>

  <div class="card" style="font-size:13px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.yeyulingfeng.com/318543.html" target="_blank" style="color:var(--coral)">Oshiruko · 银发社交</a>
  </div>

<script>
const KEY="P3-009";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function add(){
  const kind=document.getElementById("kind").value;
  const name=document.getElementById("name").value.trim();
  if(!name){alert("请填写活动名称");return;}
  const date=document.getElementById("date").value||"未定";
  const place=document.getElementById("place").value.trim()||"未定";
  items.unshift({kind,name,date,place,t:new Date().toLocaleString("zh-CN")});
  localStorage.setItem(KEY,JSON.stringify(items));render();
  document.getElementById("name").value="";document.getElementById("place").value="";
}
function del(i){items.splice(i,1);localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const el=document.getElementById("list");
  let h='<b>📋 我的银发活动</b><p style="font-size:13px;color:var(--muted);margin:4px 0 0">本地保存，安全私密。</p>';
  if(!items.length){h+='<p style="font-size:15px;color:var(--muted);margin-top:8px">还没有活动。</p>';}
  items.forEach((it,i)=>{
    h+='<div class="item"><span class="del" onclick="del('+i+')">删除 ✕</span>'+
       '<span class="pill">'+it.kind+'</span><br>'+
       '<b>'+it.name+'</b><br>'+
       '<span style="font-size:15px;color:#555">'+it.date+' · '+it.place+'</span><br>'+
       '<span style="font-size:12px;color:var(--muted)">'+it.t+'</span></div>';
  });
  el.innerHTML=h;
}
render();
</script>
</body>
</html>
