<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>AIパーソナルトレーニング</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:8px}
.pill{font-size:12px;padding:2px 8px;border-radius:999px;background:#FFF0F0;color:var(--coral)}
.bar{height:8px;background:#FFE9E9;border-radius:999px;overflow:hidden;margin-top:4px}
.bar>i{display:block;height:100%;background:var(--coral)}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">hobby</span><span class="tag">ai_workout_tracker</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">AIパーソナルトレーニング</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Korea-born AI personal trainer for gym beginners with progress tracking</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">ジム初心者は「何をすべきか分からない」「フォーム不安」「高額PT不要」。AIがプロフィール・目標・器材から個別プランを生成し、セット/レップ/重量を自動記録・進捗可視化する需要が高い（Planfitは400万ユーザー）。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:var(--muted);margin:4px 0 0">種目・セット・レップ・重量を記録。部位別のトレーニング量（容量）を可視化。</p>
    <label>種目</label><input id="t-ex" placeholder="例：ベンチプレス">
    <label>部位</label>
    <select id="t-part"><option>胸</option><option>背中</option><option>脚</option><option>肩</option><option>腕</option><option>腹</option><option>全身</option></select>
    <div class="row">
      <div><label>セット</label><input id="t-set" type="number" min="1" placeholder="3"></div>
      <div><label>レップ</label><input id="t-rep" type="number" min="1" placeholder="10"></div>
      <div><label>重量(kg)</label><input id="t-w" type="number" min="0" placeholder="40"></div>
    </div>
    <label>日付</label><input id="t-date" type="date">
    <button class="btn" onclick="addT()">記録する</button>
    <div id="mus" style="margin-top:14px"></div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://planfit.ai/?ref=navto.ai" target="_blank" style="color:var(--coral)">Planfit</a>
  </div>

<script>
const KEY="P8-017";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function addT(){
  const ex=document.getElementById("t-ex").value.trim();
  const part=document.getElementById("t-part").value;
  const set=parseInt(document.getElementById("t-set").value)||0;
  const rep=parseInt(document.getElementById("t-rep").value)||0;
  const w=parseInt(document.getElementById("t-w").value)||0;
  const date=document.getElementById("t-date").value||new Date().toISOString().slice(0,10);
  if(!ex||!set||!rep){alert("種目・セット・レップを入力してください");return;}
  items.push({ex,part,set,rep,w,vol:set*rep*w,date,id:Date.now()});
  document.getElementById("t-ex").value="";document.getElementById("t-set").value="";document.getElementById("t-rep").value="";document.getElementById("t-w").value="";
  save();
}
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const parts=["胸","背中","脚","肩","腕","腹","全身"];
  const vol=parts.map(p=>items.filter(i=>i.part===p).reduce((a,b)=>a+b.vol,0));
  const max=Math.max(1,...vol);
  let html="<b>💪 部位別トレーニング量（kg×回）</b>";
  parts.forEach((p,k)=>{
    const pct=Math.round(vol[k]/max*100);
    html+=`<div style='margin-top:6px'><span class='pill'>${p}</span> <span style='font-size:12px;color:var(--muted)'>${vol[k].toLocaleString()}</span>
      <div class='bar'><i style='width:${pct}%'></i></div></div>`;
  });
  document.getElementById("mus").innerHTML=html;
  const box=document.getElementById("list");
  if(!items.length){box.innerHTML="<b>🏋 ワークアウト履歴</b><p style='font-size:13px;color:var(--muted);margin:6px 0 0'>まだ記録がありません。</p>";return;}
  box.innerHTML="<b>🏋 ワークアウト履歴（"+items.length+"）</b>"+items.slice().reverse().map((i,ri)=>{
    const idx=items.length-1-ri;
    return `<div class='item'><b>${esc(i.ex)}</b> <span class='pill'>${i.part}</span>
      <div style='font-size:13px;color:var(--muted)'>${i.set}×${i.rep} ・ ${i.w}kg ・ 容量${i.vol.toLocaleString()} ・ ${i.date}</div>
      <button class='mini' style='margin-top:4px' onclick='del(${idx})'>削除</button></div>`;
  }).join("");
}
function del(idx){items.splice(idx,1);save();}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
render();
</script>
</body>
</html>
