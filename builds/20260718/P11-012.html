<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>无摄像头共作室</title>
<style>
:root{
  --coral:#FF6B6B;        --coral-dark:#E85555;
  --ink:#2D2D2D;          --muted:#8A8A8A;
  --bg:#F7F7F7;           --card:#FFFFFF;
  --line:#ECECEC;         --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn-sm{padding:7px 10px;font-size:13px;border-radius:9px;margin-top:0;width:auto}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.item h3{margin:0 0 4px;font-size:15px}
.mini{font-size:12px;color:var(--muted)}
.big{font-size:28px;font-weight:700;text-align:center;color:var(--coral);margin:10px 0}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">neurodiversity</span><span class="tag">body_doubling</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">无摄像头共作室</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Camera-free body-doubling coworking</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">Body doubling = 有他人在场时更易开始/坚持任务。Focusmate 500 万+场次但需开摄像头+预约+收费；Beside 做"环境式"无摄像头陪伴。社交焦虑的 ND 用户想要异步、不开摄像头的共作陪伴。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 开始共作</b>
    <label>本场要做的任务</label>
    <input id="task" placeholder="如：整理发票">
    <label>时长（分钟）</label>
    <input id="min" type="number" value="25" min="5">
    <button class="btn" style="background:var(--ok)" onclick="start()">▶ 开始共作（虚拟同伴在线）</button>
    <div id="timer" class="big" style="display:none"></div>
    <button class="btn" id="stopBtn" style="display:none;background:#ccc" onclick="stop()">结束本场</button>
  </div>

  <div class="card">
    <b>📈 共作记录</b>
    <p id="stat" class="mini"></p>
    <div id="list"></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.focusmate.com/?ref=somethingforthat" target="_blank" style="color:var(--coral)">Focusmate / Flown / Beside</a>
  </div>

<script>
const KEY="P11-012";
let log=JSON.parse(localStorage.getItem(KEY)||"[]");
let timer=null, endAt=0, cur={};
function save(){ localStorage.setItem(KEY,JSON.stringify(log)); render(); }
function start(){
  const task=document.getElementById('task').value.trim()||'专注任务';
  const m=+document.getElementById('min').value||25;
  cur={task,min:m,start:Date.now()};
  endAt=Date.now()+m*60000;
  document.getElementById('timer').style.display='block';
  document.getElementById('stopBtn').style.display='block';
  tick();
  timer=setInterval(tick,1000);
}
function tick(){
  const left=Math.max(0,Math.round((endAt-Date.now())/1000));
  const mm=String(Math.floor(left/60)).padStart(2,'0'), ss=String(left%60).padStart(2,'0');
  document.getElementById('timer').textContent=mm+':'+ss;
  if(left<=0) stop(true);
}
function stop(auto){
  clearInterval(timer);
  const used=Math.max(1,Math.round((Date.now()-(cur.start||Date.now()))/60000));
  log.unshift({task:cur.task,min:used,done:!!auto,date:new Date().toLocaleDateString()});
  document.getElementById('timer').style.display='none';
  document.getElementById('stopBtn').style.display='none';
  document.getElementById('task').value='';
  save();
}
function del(i){ log.splice(i,1); save(); }
function render(){
  const box=document.getElementById('list'); box.innerHTML='';
  let total=0;
  log.forEach((l,i)=>{
    total+=l.min;
    const el=document.createElement('div'); el.className='item';
    el.innerHTML='<h3>'+l.task+'</h3><div class="mini">'+l.date+' · '+l.min+' 分钟 · '+(l.done?'✓完成':'■手动结束')+
      '</div><button class="btn btn-sm" style="background:#ccc;margin-top:6px" onclick="del('+i+')">删</button>';
    box.appendChild(el);
  });
  document.getElementById('stat').textContent='累计共作 '+total+' 分钟 · 虚拟同伴始终在场 🤝';
}
render();
</script>
</body>
</html>
