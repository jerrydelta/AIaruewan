<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>家庭资产收纳夹</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.item:last-child{border-bottom:none}
.item .name{flex:1;font-size:15px}
.item .meta{font-size:12px;color:var(--muted)}
.del{color:var(--muted);font-size:18px;background:none;border:none;cursor:pointer}
.warn{color:#E8A33D;font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">home</span><span class="tag">home_management_binder</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">家庭资产收纳夹</h1>
    <p class="h-coral" style="font-size:13px;margin:0">AI home-binder that unifies docs/warranties/maintenance</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">住宅相关文件、保修、维护散落各处，出故障时抓瞎。全球 Homer 用「数字住宅活页夹」统一保修书/收据/设备/维修史，AI 问答+预防提醒，100+ 国 4.9 分。把「家」当资产管理在日本韩国的 SaaS 仍不成熟。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 收录家里的设备与保修</b>
    <label>物品 / 设备名</label><input id="i_name" placeholder="如：海尔冰箱 / 小米电视 / 空调">
    <div class="row">
      <div><label>类别</label><select id="i_cat"><option>大家电</option><option>厨卫</option><option>家具</option><option>数码</option><option>其他</option></select></div>
      <div><label>购买日</label><input id="i_buy" type="date"></div>
    </div>
    <label>保修到期日</label><input id="i_exp" type="date">
    <label>维护备注</label><input id="i_note" placeholder="如：每季清滤网 / 滤芯型号">
    <button class="btn" onclick="add()">＋ 收录</button>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://homer.co/" target="_blank" style="color:var(--coral)">Homer（全球家庭数字活页夹）</a>
  </div>

<script>
const KEY="P10-005";
let items = JSON.parse(localStorage.getItem(KEY) || "[]");
function save(){ localStorage.setItem(KEY, JSON.stringify(items)); render(); }
function add(){
  const name=document.getElementById('i_name').value.trim();
  if(!name)return;
  items.push({id:Date.now(),name,cat:document.getElementById('i_cat').value,
    buy:document.getElementById('i_buy').value,exp:document.getElementById('i_exp').value,
    note:document.getElementById('i_note').value.trim()});
  document.getElementById('i_name').value='';document.getElementById('i_buy').value='';
  document.getElementById('i_exp').value='';document.getElementById('i_note').value='';save();
}
function del(id){items=items.filter(x=>x.id!=id);save();}
function expSoon(d){
  if(!d)return false;
  const days=(new Date(d)-new Date())/86400000;
  return days>=0&&days<=90;
}
function render(){
  const el=document.getElementById('list');
  if(!items.length){el.innerHTML='<p style="font-size:13px;color:var(--muted)">还没有收录物品。</p>';return;}
  const warns=items.filter(i=>expSoon(i.exp)).length;
  el.innerHTML='<b>🏠 我的家当（'+items.length+' 件'+(warns?' · <span class="warn">'+warns+' 件保修 90 天内到期</span>':'')+'）</b>'+
    items.map(i=>'<div class="item"><span class="name">'+esc(i.name)+'<span class="meta"><br>'+i.cat+(i.exp?' · 保至 '+i.exp+(expSoon(i.exp)?' ⚠️':''):'')+(i.note?' · '+i.note:'')+'</span></span><button class="del" onclick="del('+i.id+')">✕</button></div>').join('');
}
function esc(s){return s.replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
render();
</script>
</body>
</html>
