<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>원데이클래ス・ハンドメイド予約</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:8px}
.pill{font-size:12px;padding:2px 8px;border-radius:999px;background:#FFF0F0;color:var(--coral)}
.stat b{color:var(--coral);font-size:18px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">hobby</span><span class="tag">korea_one_day_class</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">원데이클래ス・ハンドメイド予約</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Korea local marketplace: book one-day craft classes + buy handmade goods</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">趣味の起点として「一人では始めにくい」工房体験を気軽に予約・体験したい需要。マカロン・フラワー・キャンドル・アクセサリ等、多ジャンルの원데이클래スとハンドメイド作品購入を一体化したい。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:var(--muted);margin:4px 0 0">予約したクラス・買ったハンドメイドを管理。予定数と支出をまとめます。</p>
    <label>ジャンル</label>
    <select id="o-gen"><option>料理・菓子</option><option>フラワー</option><option>美術</option><option>キャンドル</option><option>香水</option><option>アクセサリ</option><option>編物・刺繍</option><option>購入（ハンドメイド）</option></select>
    <label>工房・クラス名 / 作品名</label><input id="o-name" placeholder="例：ソウル・キャンドル工房">
    <div class="row">
      <div><label>日付</label><input id="o-date" type="date"></div>
      <div><label>価格(円)</label><input id="o-price" type="number" min="0" placeholder="5000"></div>
    </div>
    <label>ステータス</label>
    <select id="o-st"><option>予約</option><option>完了</option><option>購入済</option></select>
    <button class="btn" onclick="addO()">追加する</button>
    <div id="sum" style="margin-top:12px"></div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://softwar.io/app/app-1105301400" target="_blank" style="color:var(--coral)">웬지（Wenzi） - 원데이클래스 & 마켓</a>
  </div>

<script>
const KEY="P8-012";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function addO(){
  const gen=document.getElementById("o-gen").value;
  const name=document.getElementById("o-name").value.trim();
  const date=document.getElementById("o-date").value||new Date().toISOString().slice(0,10);
  const price=parseInt(document.getElementById("o-price").value)||0;
  const st=document.getElementById("o-st").value;
  if(!name){alert("名称を入力してください");return;}
  items.push({gen,name,date,price,st,id:Date.now()});
  document.getElementById("o-name").value="";document.getElementById("o-price").value="";
  save();
}
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const plan=items.filter(i=>i.st==="予約").length;
  const spend=items.reduce((a,b)=>a+b.price,0);
  document.getElementById("sum").innerHTML=`<span class='stat'>予定 <b>${plan}</b> 件</span> ／ <span class='stat'>累計支出 <b>${spend.toLocaleString()}</b> 円</span>`;
  const box=document.getElementById("list");
  if(!items.length){box.innerHTML="<b>🧶 マイ工房リスト</b><p style='font-size:13px;color:var(--muted);margin:6px 0 0'>まだ登録がありません。</p>";return;}
  box.innerHTML="<b>🧶 マイ工房リスト（"+items.length+"）</b>"+items.slice().reverse().map((i,ri)=>{
    const idx=items.length-1-ri;
    return `<div class='item'><b>${esc(i.name)}</b> <span class='pill'>${i.gen}</span>
      <div style='font-size:13px;color:var(--muted)'>${i.st} ・ ${i.date} ・ ${i.price.toLocaleString()}円</div>
      <button class='mini' style='margin-top:6px' onclick='del(${idx})'>削除</button></div>`;
  }).join("");
}
function del(idx){items.splice(idx,1);save();}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
render();
</script>
</body>
</html>
