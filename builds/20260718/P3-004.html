<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>妈妈交友阶段匹配器</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.item b{color:var(--ink)}.del{color:var(--muted);font-size:12px;float:right;cursor:pointer}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">social</span><span class="tag">moms_friendship</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">妈妈交友·阶段匹配器</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Mom friendship app matched by parenting stage</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">成为母亲后的社交隔离是高频刚需。原有社交圈不再共享新现实，孤独感强。Peanut按孩子年龄/育儿理念/兴趣匹配妈妈，覆盖备孕→怀孕→产后全周期，提供无评判社区。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:#555;margin:6px 0 0">填写你的育儿阶段与理念，生成"同阶段妈妈匹配建议"，并可记录已认识的妈妈搭子。</p>
    <div class="row">
      <div><label>孩子年龄</label>
      <select id="age"><option>备孕中</option><option>孕期</option><option>0-1岁</option><option>1-3岁</option><option>3-6岁</option><option>小学生</option></select></div>
      <div><label>育儿理念</label>
      <select id="ph"><option>温和育儿</option><option>科学循证</option><option>佛系放养</option><option>严格规划</option></select></div>
    </div>
    <label>我的兴趣/想聊的话题</label>
    <input id="hobby" placeholder="例如：夜奶崩溃、辅食、职场回归">
    <label>想找的妈妈类型</label>
    <select id="want"><option>同阶段抱团</option><option>过来人前辈</option><option>同城线下面基</option><option>深夜陪聊</option></select>
    <button class="btn" onclick="gen()">生成匹配建议</button>
  </div>

  <div class="card" id="list">
    <b>📋 我的妈妈搭子</b>
    <p style="font-size:12px;color:var(--muted);margin:4px 0 0">本地保存，无评判、无广告。</p>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.bubblic.app/blog/best-apps-to-make-friends-2026.html" target="_blank" style="color:var(--coral)">Peanut · 妈妈社交</a>
  </div>

<script>
const KEY="P3-004";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function gen(){
  const age=document.getElementById("age").value;
  const ph=document.getElementById("ph").value;
  const hobby=document.getElementById("hobby").value.trim();
  const want=document.getElementById("want").value;
  if(!hobby){alert("先写想聊的话题");return;}
  const r="建议优先匹配「"+age+" · "+ph+"」的宝妈，围绕「"+hobby+"」建立连接；采用「"+want+"」方式，降低社交压力。";
  items.unshift({age,ph,hobby,want,r,t:new Date().toLocaleString("zh-CN")});
  localStorage.setItem(KEY,JSON.stringify(items));render();
  document.getElementById("hobby").value="";
}
function del(i){items.splice(i,1);localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const el=document.getElementById("list");
  let h='<b>📋 我的妈妈搭子</b><p style="font-size:12px;color:var(--muted);margin:4px 0 0">本地保存，无评判、无广告。</p>';
  if(!items.length){h+='<p style="font-size:13px;color:var(--muted);margin-top:8px">还没有记录。</p>';}
  items.forEach((it,i)=>{
    h+='<div class="item"><span class="del" onclick="del('+i+')">删除 ✕</span>'+
       '<b>'+it.age+'</b> · '+it.ph+'<br>'+
       '<span style="font-size:13px;color:#555">话题：'+it.hobby+'</span><br>'+
       '<span style="font-size:13px;color:#555">方式：'+it.want+'</span><br>'+
       '<span style="font-size:13px;color:var(--coral)">💡 '+it.r+'</span><br>'+
       '<span style="font-size:11px;color:var(--muted)">'+it.t+'</span></div>';
  });
  el.innerHTML=h;
}
render();
</script>
</body>
</html>
