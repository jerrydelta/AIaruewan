<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>单职业垂直 CRM</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn-ghost{background:#FFF0F0;color:var(--coral);border:1px solid #FFD9D9}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.stat{text-align:center;padding:10px 4px}
.stat b{display:block;font-size:22px;color:var(--coral)}
.stat span{font-size:12px;color:var(--muted)}
.cust{font-size:13px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;margin-top:8px}
.cust .x{float:right;color:var(--coral);cursor:pointer}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">micro_saas</span><span class="tag">vertical_crm_niche</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">单职业垂直 CRM</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Single-profession vertical CRM</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">从业者用 Instagram 私信/电子表格管理混乱。垂直 CRM 为特定工作流定制，通用 CRM 不懂其业务：纹身师 $19-39/月、摄影师 $19-49/月、健身教练 $29-79/月（仅美国超100万私人教练）。选"大公司看不上、单人能做"的细分。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 客户与预约管理</b>
    <label>你的职业</label>
    <select id="prof">
      <option value="纹身师">纹身师（预约+设计确认+定金+护理）</option>
      <option value="摄影师">摄影师（预约+合同+图库+开票）</option>
      <option value="健身教练">健身教练（客户+计划+进度+支付）</option>
      <option value="婚礼策划">婚礼策划（档期+流程+供应商）</option>
    </select>
    <label>客户姓名</label><input id="name" placeholder="如：小林">
    <label>联系方式</label><input id="contact" placeholder="微信 / 电话">
    <div class="row">
      <div><label>下次预约</label><input id="appt" type="date"></div>
      <div><label>状态</label><select id="status"><option value="待跟进">待跟进</option><option value="已预约">已预约</option><option value="进行中">进行中</option><option value="已完成">已完成</option></select></div>
    </div>
    <label>备注 / 项目</label><input id="note" placeholder="如：手臂纹身设计稿确认中">
    <button class="btn" id="add">添加客户</button>
    <div class="row" style="margin-top:10px">
      <div class="stat"><b id="cnt">0</b><span>客户总数</span></div>
      <div class="stat"><b id="soon">0</b><span>7天内预约</span></div>
      <div class="stat"><b id="done">0</b><span>已完成</span></div>
    </div>
  </div>

  <div class="card" id="list">
    <b>📋 客户列表（<span id="pname">纹身师</span>）</b>
    <p id="empty" style="font-size:13px;color:var(--muted);margin:6px 0 0">还没有客户。</p>
    <div id="log"></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.nxcode.io/zh/resources/news/micro-saas-ideas-2026" target="_blank" style="color:var(--coral)">纹身师/摄影师/健身教练 CRM</a>
  </div>

<script>
const KEY="P14-010";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
const $=id=>document.getElementById(id);
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function add(){
  if(!name.value.trim())return;
  items.push({name:name.value.trim(),contact:contact.value.trim(),appt:appt.value,status:status.value,note:note.value.trim(),prof:prof.value});
  name.value=contact.value=note.value="";save();
}
function del(i){items.splice(i,1);save();}
function render(){
  pname.textContent=prof.value;
  cnt.textContent=items.length;
  const now=Date.now(),wk=now+7*864e5;
  soon.textContent=items.filter(x=>x.appt&&new Date(x.appt)>=now&&new Date(x.appt)<=wk).length;
  done.textContent=items.filter(x=>x.status==="已完成").length;
  const list=items.filter(x=>x.prof===prof.value);
  if(list.length)empty.style.display="none";else empty.style.display="block";
  log.innerHTML=list.slice().reverse().map(x=>{
    const idx=items.indexOf(x);
    return `<div class="cust"><span class="x" data-i="${idx}">✕</span>
      <b>${esc(x.name)}</b> <span style="color:var(--muted)">· ${x.status}</span><br>
      <span style="font-size:12px;color:#666">${x.contact||"—"}${x.appt?" · 约"+x.appt:""}${x.note?" · "+esc(x.note):""}</span></div>`;
  }).join("");
  document.querySelectorAll("[data-i]").forEach(b=>b.onclick=()=>del(+b.dataset.i));
}
function esc(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
add.onclick=add; prof.onchange=render;
render();
</script>
</body>
</html>
