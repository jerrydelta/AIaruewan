<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>母婴社区产后修复模块</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.post{border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-top:8px;font-size:14px}
.post .who{font-size:12px;color:var(--coral);font-weight:600}
.post .meta{font-size:11px;color:var(--muted);margin-top:4px}
.course{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:8px}
.course.done{background:#F0FFF6;border-color:#C7EFD6}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">creative</span><span class="tag ai">AI增强</span><span class="tag">postpartum</span><span class="tag">community</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">母婴社区 · 产后修复模块</h1>
    <p class="h-coral" style="font-size:13px;margin:0">2 亿用户社区 · 课程 + 妈妈 UGC 互助</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">新手妈妈既要育儿指导又要产后康复，缺全场景陪伴。宝宝树孕育（超 2 亿用户）产后修复为核心模块：腹直肌/盆底课程 + 专家直播 + 妈妈社区 UGC + 个性化推送。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 妈妈社区发帖</b>
    <label>昵称</label>
    <input id="who" placeholder="例如：二胎妈妈小鹿">
    <label>类型</label>
    <select id="type"><option>经验分享</option><option>求助提问</option><option>打卡鼓励</option><option>避坑提醒</option></select>
    <label>内容</label>
    <textarea id="body" rows="3" placeholder="分享你的产后修复经历或疑问…"></textarea>
    <button class="btn" onclick="addPost()">📣 发布到社区</button>
    <div id="posts"></div>
  </div>

  <div class="card">
    <b>🎓 工具 · 修复课程打卡</b>
    <div id="courses"></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.cnblogs.com/tzmm/p/19449683" target="_blank" style="color:var(--coral)">宝宝树孕育（母婴社区产后修复）</a>
  </div>

<script>
const KEY="P15-011";
const COURSES=["腹直肌闭合跟练","盆底肌凯格尔入门","产后体态矫正","母乳喂养与胸肌放松"];
let state=JSON.parse(localStorage.getItem(KEY)||'{"posts":[],"done":[]}');
function save(){localStorage.setItem(KEY,JSON.stringify(state));render();}
function addPost(){
  const who=document.getElementById("who").value.trim()||"匿名妈妈",body=document.getElementById("body").value.trim();
  if(!body){alert("写点什么再发布吧");return;}
  state.posts.unshift({who,type:document.getElementById("type").value,body,t:new Date().toLocaleString("zh-CN")});
  document.getElementById("body").value="";save();
}
function toggleC(i){const k=state.done.indexOf(i);if(k>=0)state.done.splice(k,1);else state.done.push(i);save();}
function render(){
  const p=document.getElementById("posts");
  p.innerHTML=state.posts.length?'<p style="font-size:13px;color:#666;margin:10px 0 0"><b>社区动态</b></p>':'<p style="font-size:13px;color:#aaa;margin:10px 0 0">还没有帖子，来发第一条～</p>';
  state.posts.forEach(x=>{const d=document.createElement("div");d.className="post";
    d.innerHTML='<div class="who">'+x.who+' · '+x.type+'</div>'+x.body+'<div class="meta">'+x.t+'</div>';p.appendChild(d);});
  const c=document.getElementById("courses");c.innerHTML="";
  COURSES.forEach((name,i)=>{const d=document.createElement("div");d.className="course"+(state.done.includes(i)?" done":"");
    d.innerHTML=(state.done.includes(i)?"✅ ":"○ ")+name;d.onclick=()=>toggleC(i);c.appendChild(d);});
}
render();

// === AI助手模块（用户自带Key模式）===
let aiKey = localStorage.getItem("HY3_API_KEY") || "";
let aiHistory = [];

function toggleAI(id){
  const body = document.getElementById("aiBody_" + id);
  const header = document.getElementById("aiHeader_" + id);
  if(body.classList.contains("collapsed")){
    body.classList.remove("collapsed");
    header.classList.remove("collapsed");
  } else {
    body.classList.add("collapsed");
    header.classList.add("collapsed");
  }
}

function saveKey(id){
  const key = document.getElementById("apiKey_" + id).value.trim();
  if(!key){alert("请输入Key");return;}
  localStorage.setItem("HY3_API_KEY", key);
  aiKey = key;
  document.getElementById("aiKeySection_" + id).style.display="none";
  document.getElementById("aiChatSection_" + id).style.display="block";
}

async function callHy3(messages, id){
  if(!aiKey){alert("请先填写 API Key");return null;}
  const loading = document.createElement("div");
  loading.className = "ai-msg";
  loading.innerHTML = `<div class="role">🤖 AI</div><div class="content"><span class="loading">思考中...</span></div>`;
  document.getElementById("aiMessages_" + id).appendChild(loading);
  
  try {
    const res = await fetch("https://tokenhub.tencentmaas.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + aiKey
      },
      body: JSON.stringify({
        model: "hy3",
        messages: messages,
        temperature: 0.7
      })
    });
    const data = await res.json();
    loading.remove();
    if(data.error){alert("API错误："+data.error.message);return null;}
    return data.choices[0].message.content;
  } catch(e){
    loading.remove();
    alert("调用失败："+e.message);
    return null;
  }
}

function addMsg(role, content, id){
  const box = document.getElementById("aiMessages_" + id);
  if(!box)return;
  const div = document.createElement("div");
  div.className = "ai-msg";
  div.innerHTML = `<div class="role">${role==="user"?"🙋 你":"🤖 AI"}</div><div class="content">${content.replace(/\n/g,"<br>")}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

async function aiChat(id){
  const input = document.getElementById("aiInput_" + id).value.trim();
  if(!input){return;}
  document.getElementById("aiInput_" + id).value = "";
  addMsg("user", input, id);
  const msgs = [
    {role:"system",content:"你是这个工具的AI助手，帮助用户更好地使用本工具，提供专业建议和优化方案。用中文简洁回答。"},
    {role:"user",content:input}
  ];
  const reply = await callHy3(msgs, id);
  if(reply) addMsg("assistant", reply, id);
}

</script>
</body>
</html>
