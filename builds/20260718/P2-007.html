<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>中立 AI 职业顾问 · 匹配打分</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{background:#FAFAFA;border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px;font-size:13px}
.item .del{float:right;color:var(--muted);font-size:12px}
.bar{height:8px;background:#eee;border-radius:99px;overflow:hidden;margin-top:6px}
.bar>i{display:block;height:100%;background:var(--coral)}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">career</span><span class="tag">career_agent</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">中立 AI 职业顾问</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Aggregate · Match Score · Mock Interview</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">日本转职エージェント差评集中：求人数少、担当者强行推荐、联系不上。用户被迫依赖单一 Agent、信息不透明。中立的 AI キャリアアドバイザー——聚合多平台求人、按真实偏好打分、模拟面试，去中介化。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 求人 + 偏好匹配</b>
    <input id="title" placeholder="职位标题">
    <div class="row">
      <select id="platform"><option>リクルート</option><option>キャリアインデックス</option><option>びずりち</option><option>ハローワーク</option><option>其他</option></select>
      <input id="salary" type="number" placeholder="年收万円">
    </div>
    <label>与你偏好的契合度（1-5）</label>
    <div class="row">
      <div><label style="margin-top:0">兴趣</label><input id="m1" type="number" min="1" max="5" value="3"></div>
      <div><label style="margin-top:0">薪资</label><input id="m2" type="number" min="1" max="5" value="3"></div>
      <div><label style="margin-top:0">地点</label><input id="m3" type="number" min="1" max="5" value="3"></div>
      <div><label style="margin-top:0">成长</label><input id="m4" type="number" min="1" max="5" value="3"></div>
    </div>
    <button class="btn" onclick="add()">加入对比</button>
  </div>

  <div class="card">
    <b>🛠 工具 · 模拟面试准备</b>
    <p style="font-size:13px;color:#555;margin:6px 0 0">勾选你想练的方向，生成问题清单。</p>
    <label><input type="checkbox" id="q1" style="width:auto;margin:0 6px 0 0">自我介绍 & 动机</label>
    <label><input type="checkbox" id="q2" style="width:auto;margin:0 6px 0 0">薪资谈判话术</label>
    <label><input type="checkbox" id="q3" style="width:auto;margin:0 6px 0 0">离职理由（不踩雷）</label>
    <label><input type="checkbox" id="q4" style="width:auto;margin:0 6px 0 0">职业规划 3-5 年</label>
    <button class="btn" onclick="mock()">生成题单</button>
    <div id="mockOut" style="font-size:13px;color:#555;margin-top:8px"></div>
  </div>

  <div class="card" id="list">
    <b>📋 求人对比板（按匹配分排序）</b>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://asiro.co.jp/media-career/9783/" target="_blank" style="color:var(--coral)">転職エージェント 比較・評判</a>
  </div>

<script>
const KEY="P2-007";
let items = JSON.parse(localStorage.getItem(KEY) || "[]");
function add(){
  const title=document.getElementById("title").value.trim();
  if(!title){ alert("请填写职位标题"); return; }
  const platform=document.getElementById("platform").value;
  const salary=+document.getElementById("salary").value||0;
  const dims=[+m1.value,+m2.value,+m3.value,+m4.value];
  const score=Math.round(dims.reduce((a,b)=>a+b,0)/4*20);
  items.push({title,platform,salary,score,t:Date.now()});
  localStorage.setItem(KEY,JSON.stringify(items));
  document.getElementById("title").value=""; document.getElementById("salary").value="";
  render();
}
function mock(){
  const map={q1:"请用 1 分钟说清'为何是这家公司 + 为何是你能做'。",q2:"基于市场数据给区间，先报高再让对方靠近。",q3:"聚焦'想挑战更大舞台'，不贬低前公司。",q4:"结合本职技能谈可累积的方向，别空谈。"};
  let out=[];
  ["q1","q2","q3","q4"].forEach(k=>{ if(document.getElementById(k).checked) out.push("• "+map[k]); });
  document.getElementById("mockOut").innerHTML = out.length? out.join("<br>") : "请勾选方向。";
}
function render(){
  const box=document.getElementById("list");
  items.sort((a,b)=>b.score-a.score);
  let h='<b>📋 求人对比板（按匹配分排序）</b>';
  if(items.length===0){ h+='<p style="font-size:13px;color:var(--muted)">还没有加入求人。</p>'; }
  items.forEach((it,i)=>{
    h+='<div class="item"><span class="del" onclick="del('+i+')">删除</span><b>'+it.title+'</b> · '+it.platform+(it.salary?(' · '+it.salary+'万円'):'')+'<br>'+
       '匹配分 <b class="h-coral">'+it.score+'</b>'+
       '<div class="bar"><i style="width:'+it.score+'%"></i></div></div>';
  });
  box.innerHTML=h;
}
function del(i){ items.splice(i,1); localStorage.setItem(KEY,JSON.stringify(items)); render(); }
render();
</script>
</body>
</html>
