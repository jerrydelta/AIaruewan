<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>韩式综合校园App</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.mini{font-size:14px;margin:14px 0 4px;font-weight:600;color:var(--ink);
  border-left:4px solid var(--coral);padding-left:8px}
.item{background:#FBFBFB;border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px;font-size:14px}
.del{color:var(--coral);float:right;font-size:13px;cursor:pointer}
.row{display:flex;gap:8px}.row>*{flex:1}
.seg{display:flex;gap:6px;margin-top:6px}.seg button{flex:1;padding:9px;border:1px solid var(--line);background:#fff;border-radius:10px;font-size:13px;cursor:pointer}
.seg button.on{background:var(--coral);color:#fff;border-color:var(--coral)}
.pink{color:var(--coral)}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">student</span><span class="tag">korean_campus_superapp</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">韩式综合校园App</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Korean all-in-one campus (timetable+GPA+anonymous+secondhand)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">韩国大学校园App高度成熟：학교플래너下载超千万、Everytime支持课表共享+GPA自动计算+匿名公告板。痛点：各校系统割裂、跨校信息孤岛。机会：融合课表+GPA+匿名社区+二手的韩式综合校园App。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <div class="seg" id="seg">
      <button class="on" onclick="sw('gpa',this)">🎓 GPA</button>
      <button onclick="sw('board',this)">💬 匿名墙</button>
      <button onclick="sw('market',this)">🛍 二手</button>
    </div>
    <div id="tab_gpa">
      <div class="row"><div><label>课程</label><input id="g_name" placeholder="如 经营学"></div>
      <div><label>学分</label><input id="g_c" type="number" placeholder="3"></div></div>
      <label>成绩(A+/A/B+/B/C...)</label><input id="g_g" placeholder="A">
      <button class="btn" onclick="addG()">添加课程算GPA</button>
      <p id="gpa_out" style="font-size:14px;margin:8px 0 0"></p>
    </div>
    <div id="tab_board" style="display:none">
      <label>匿名昵称</label><input id="b_name" placeholder="如 隔壁同学">
      <label>吐个槽 / 发公告</label><textarea id="b_msg" rows="2" placeholder="考试推迟了？"></textarea>
      <button class="btn" onclick="addB()">发布(匿名)</button>
    </div>
    <div id="tab_market" style="display:none">
      <label>物品</label><input id="m_name" placeholder="如 教材">
      <div class="row"><div><label>分类</label><select id="m_cat"><option>教材</option><option>电子</option><option>生活</option></select></div>
      <div><label>价(元)</label><input id="m_p" type="number" placeholder="20"></div></div>
      <button class="btn" onclick="addM()">发布</button>
    </div>
  </div>

  <div class="card" id="list"><b>📋 数据</b><div id="box"></div></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://kr.hujiang.com/new/p1415391/" target="_blank" style="color:var(--coral)">Everytime · 학교플래너 · ClassUp · Damda</a>
  </div>

<script>
const KG="P12-005_gpa",KB="P12-005_board",KM="P12-005_market";
let G=JSON.parse(localStorage.getItem(KG)||"[]");
let B=JSON.parse(localStorage.getItem(KB)||"[]");
let M=JSON.parse(localStorage.getItem(KM)||"[]");
const MAP={ "A+":4.3,"A":4.0,"A-":3.7,"B+":3.3,"B":3.0,"B-":2.7,"C+":2.3,"C":2.0,"C-":1.7,"D":1.0,"F":0 };
function sw(t,el){["gpa","board","market"].forEach(x=>document.getElementById("tab_"+x).style.display=x===t?"block":"none");
  document.querySelectorAll("#seg button").forEach(b=>b.classList.remove("on"));el.classList.add("on");render();}
function addG(){const n=document.getElementById("g_name").value.trim(),c=parseFloat(document.getElementById("g_c").value),g=document.getElementById("g_g").value.trim().toUpperCase();
  if(!n||isNaN(c)||!(g in MAP)){alert("课程/学分/等级(A+~F)要完整");return;}G.push({n,c,p:MAP[g]});localStorage.setItem(KG,JSON.stringify(G));render();}
function addB(){const n=document.getElementById("b_name").value.trim()||"匿名",m=document.getElementById("b_msg").value.trim();
  if(!m){alert("说点什么");return;}B.push({n,m,t:new Date().toLocaleString()});localStorage.setItem(KB,JSON.stringify(B));render();}
function addM(){const n=document.getElementById("m_name").value.trim(),c=document.getElementById("m_cat").value,p=document.getElementById("m_p").value;
  if(!n||!p){alert("填物品和价");return;}M.push({n,c,p:+p,t:new Date().toLocaleDateString()});localStorage.setItem(KM,JSON.stringify(M));render();}
function del(arr,k,i){arr.splice(i,1);localStorage.setItem(k,JSON.stringify(arr));render();}
function render(){
  let tc=0,tp=0;G.forEach(x=>{tc+=x.c;tp+=x.c*x.p;});
  document.getElementById("gpa_out").innerHTML=G.length?`已录 ${G.length} 门 · <span class="pink">GPA ≈ ${(tp/tc).toFixed(2)}</span>`:"";
  let h="";
  if(G.length)h+=`<div style="font-size:13px;color:var(--muted);margin-top:8px">🎓 GPA(${G.length})</div>`+G.map((x,i)=>`<div class="item"><span class="del" onclick="del(G,'${KG}',${i})">删</span>${x.n} · ${x.c}学分 · ${x.p}</div>`).join("");
  if(B.length)h+=`<div style="font-size:13px;color:var(--muted);margin-top:8px">💬 匿名墙(${B.length})</div>`+B.slice().reverse().map((x,i)=>`<div class="item"><span class="del" onclick="del(B,'${KB}',${B.length-1-i})">删</span><b>${x.n}</b>：${x.m.replace(/</g,"&lt;")}<br><span style="font-size:12px;color:var(--muted)">${x.t}</span></div>`).join("");
  if(M.length)h+=`<div style="font-size:13px;color:var(--muted);margin-top:8px">🛍 二手(${M.length})</div>`+M.map((x,i)=>`<div class="item"><span class="del" onclick="del(M,'${KM}',${i})">删</span>${x.n} [${x.c}] · <b>¥${x.p}</b></div>`).join("");
  document.getElementById("box").innerHTML=h||"<p style='font-size:13px;color:var(--muted)'>还没有数据。</p>";
}
render();
</script>
</body>
</html>
