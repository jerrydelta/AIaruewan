<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>功能性专注音频</title>
<style>
:root{
  --coral:#FF6B6B;        --coral-dark:#E85555;
  --ink:#2D2D2D;          --muted:#8A8A8A;
  --bg:#F7F7F7;           --card:#FFFFFF;
  --line:#ECECEC;         --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn-sm{padding:7px 10px;font-size:13px;border-radius:9px;margin-top:0;width:auto}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
select,input[type=number]{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
.big{font-size:30px;font-weight:700;text-align:center;color:var(--coral);margin:10px 0}
.mini{font-size:12px;color:var(--muted)}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">neurodiversity</span><span class="tag">adhd_focus_audio</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">功能性专注音频</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Science-backed focus audio (ADHD mode + slider)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">Brain.fm 用神经相位锁定音频提升注意力 beta 波 +119%，月收约 $7；普通音乐反而让 ND 大脑分心。本工具用 WebAudio 实时生成"工程化"环境音（粉噪/布朗噪+低频脉冲），带强度滑块与专注计时——全本地、零付费。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 专注声景</b>
    <label>模式</label>
    <select id="mode">
      <option value="pink">粉噪 · 平稳专注</option>
      <option value="brown">布朗噪 · 深度放松</option>
      <option value="pulse">脉冲 · ADHD 强引导</option>
    </select>
    <label>强度（音量/脉冲密度）</label>
    <input id="intensity" type="range" min="1" max="10" value="5">
    <label>专注时长（分钟）</label>
    <input id="min" type="number" value="25" min="1">
    <button class="btn" id="play" style="background:var(--ok)" onclick="toggle()">▶ 播放并计时</button>
    <div id="timer" class="big" style="display:none"></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.brain.fm/pricing" target="_blank" style="color:var(--coral)">Brain.fm / Focus@Will / Endel</a>
  </div>

<script>
const KEY="P11-016";
let audio=null, ctx=null, timer=null, endAt=0;
function toggle(){
  if(audio){ stop(); return; }
  const mode=document.getElementById('mode').value;
  const intensity=+document.getElementById('intensity').value;
  ctx=new (window.AudioContext||window.webkitAudioContext)();
  const bufferSize=2*ctx.sampleRate;
  const noiseBuf=ctx.createBuffer(1,bufferSize,ctx.sampleRate);
  const out=noiseBuf.getChannelData(0);
  let last=0;
  for(let i=0;i<bufferSize;i++){
    const white=Math.random()*2-1;
    if(mode==='brown'){ last=(last+0.02*white)/1.02; out[i]=last*3.5; }
    else if(mode==='pink'){ out[i]=white*0.4 + (last*0.5); last=out[i]; }
    else { out[i]=white*0.25; }
  }
  const src=ctx.createBufferSource(); src.buffer=noiseBuf; src.loop=true;
  const gain=ctx.createGain(); gain.gain.value=intensity/10*0.5;
  src.connect(gain).connect(ctx.destination); src.start();
  audio={src,gain};
  if(mode==='pulse'){
    audio.lfo=setInterval(()=>{
      gain.gain.setTargetAtTime(intensity/10*0.7, ctx.currentTime, 0.05);
      setTimeout(()=>gain.gain.setTargetAtTime(intensity/10*0.3, ctx.currentTime,0.05),180);
    },500);
  }
  const m=+document.getElementById('min').value||25;
  endAt=Date.now()+m*60000;
  document.getElementById('timer').style.display='block';
  document.getElementById('play').textContent='■ 停止';
  document.getElementById('play').style.background='#ccc';
  tick(); timer=setInterval(tick,1000);
  localStorage.setItem(KEY, JSON.stringify({mode,intensity,min:m,last:Date.now()}));
}
function tick(){
  const left=Math.max(0,Math.round((endAt-Date.now())/1000));
  const mm=String(Math.floor(left/60)).padStart(2,'0'), ss=String(left%60).padStart(2,'0');
  document.getElementById('timer').textContent=mm+':'+ss;
  if(left<=0) stop();
}
function stop(){
  clearInterval(timer); if(audio){ if(audio.lfo)clearInterval(audio.lfo); audio.src.stop(); audio.gain.disconnect(); ctx.close(); audio=null; }
  document.getElementById('timer').style.display='none';
  document.getElementById('play').textContent='▶ 播放并计时';
  document.getElementById('play').style.background='var(--ok)';
}
</script>
</body>
</html>
