<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>游戏化学业规划器</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.mini{font-size:14px;margin:14px 0 4px;font-weight:600;color:var(--ink);
  border-left:4px solid var(--coral);padding-left:8px}
.item{background:#FBFBFB;border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px;font-size:14px}
.del{color:var(--coral);float:right;font-size:13px;cursor:pointer}
.done{text-decoration:line-through;color:var(--muted)}
.row{display:flex;gap:8px}.row>*{flex:1}
.big{font-size:34px;text-align:center;font-weight:700;color:var(--coral);margin:6px 0}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">student</span><span class="tag">study_planner_aggregator</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">游戏化学业规划器</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Gamified all-in-one study planner (timetable+homework+exam+pomodoro)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">学业规划器是全球化刚需：MyStudyLife被2400万学生、197国使用；韩国학교플래너下载超千万。痛点：通用日历不针对学生、多平台切换、deadline遗忘。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <div class="mini">🍅 番茄专注钟</div>
    <div class="big" id="clock">25:00</div>
    <button class="btn" id="startBtn" onclick="toggle()">开始专注</button>
    <p id="focus_stat" style="font-size:13px;color:var(--muted);text-align:center;margin:6px 0 0"></p>

    <div class="mini">✅ 任务清单（课表/作业/考试/兼职）</div>
    <label>任务</label><input id="t_name" placeholder="如 高数作业">
    <div class="row">
      <div><label>类型</label><select id="t_type"><option>作业</option><option>考试</option><option>课表</option><option>兼职</option></select></div>
      <div><label>截止</label><input id="t_due" type="date"></div>
    </div>
    <button class="btn" onclick="addT()">添加任务</button>
    <p id="prog" style="font-size:13px;margin:8px 0 0"></p>
  </div>

  <div class="card" id="list"><b>📋 任务 & 今日专注</b><div id="box"></div></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://apps.apple.com/cn/app/my-study-life-school-planner/id910639339" target="_blank" style="color:var(--coral)">MyStudyLife · Forest专注森林 · 超级课程表</a>
  </div>

<script>
const K="P12-006_tasks",KF="P12-006_focus";
let items=JSON.parse(localStorage.getItem(K)||"[]");
let totalFocus=parseInt(localStorage.getItem(KF)||"0");
let timer=null,left=25*60,running=false;
function toggle(){
  running=!running;document.getElementById("startBtn").textContent=running?"暂停":"继续";
  if(running){timer=setInterval(()=>{left--;if(left<=0){clearInterval(timer);running=false;left=25*60;totalFocus++;localStorage.setItem(KF,totalFocus);document.getElementById("startBtn").textContent="开始专注";render();}update();},1000);}
  else clearInterval(timer);
}
function update(){const m=String(Math.floor(left/60)).padStart(2,"0"),s=String(left%60).padStart(2,"0");document.getElementById("clock").textContent=m+":"+s;}
function addT(){const n=document.getElementById("t_name").value.trim(),ty=document.getElementById("t_type").value,d=document.getElementById("t_due").value;
  if(!n){alert("填任务");return;}items.push({n,ty,d:new Date().toLocaleDateString(),due:d,done:false});localStorage.setItem(K,JSON.stringify(items));render();}
function tog(i){items[i].done=!items[i].done;localStorage.setItem(K,JSON.stringify(items));render();}
function del(i){items.splice(i,1);localStorage.setItem(K,JSON.stringify(items));render();}
function render(){
  document.getElementById("focus_stat").textContent="累计专注 "+totalFocus+" 次（每次+1）";
  const done=items.filter(x=>x.done).length;
  document.getElementById("prog").innerHTML=items.length?`进度 <span class="h-coral">${done}/${items.length}</span>`:"";
  document.getElementById("box").innerHTML=items.length?items.map((x,i)=>`<div class="item"><span class="del" onclick="del(${i})">删</span>
    <span onclick="tog(${i})" class="${x.done?'done':''}">${x.done?'✅':'⭕'} ${x.n} <span style="font-size:12px;color:var(--muted)">[${x.ty}]${x.due?' · '+x.due:''}</span></span></div>`).join(""):"<p style='font-size:13px;color:var(--muted)'>还没有任务。</p>";
}
render();
</script>
</body>
</html>
