<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>本地优先工作台</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn.tab{display:inline-block;width:auto;padding:8px 12px;margin:0 4px 0 0;font-size:13px;background:#fff;color:var(--coral);border:1px solid #FFD9D9}
.btn.tab.on{background:var(--coral);color:#fff}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
input,textarea,select{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
textarea{height:70px}
.item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
.item:last-child{border-bottom:none}
.item .name{flex:1;font-size:14px}
.del{color:var(--muted);font-size:18px;background:none;border:none;cursor:pointer}
.offline{font-size:12px;color:var(--ok);font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">privacy</span><span class="tag">local_first_workspace</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">本地优先工作台</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Cloudless local-first workspace (notes+pw+kanban)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">把数据交给 Evernote/Notion 等云笔记，有托管与锁定担忧。LocArk 把笔记+密码+看板+脑图合一，免登录、无追踪遥测、存储位置自选、主密码加密。让数据「留在自己的存储里」正中隐私用户下怀。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 三个本机模块切换</b>
    <div style="margin-bottom:10px">
      <span class="btn tab on" id="b1" onclick="sw('note')">📝 笔记</span>
      <span class="btn tab" id="b2" onclick="sw('pw')">🔑 密码库</span>
      <span class="btn tab" id="b3" onclick="sw('kan')">🗂 看板</span>
    </div>
    <div id="notePane">
      <textarea id="n_text" placeholder="本地笔记，仅存本机…"></textarea>
      <button class="btn" onclick="addNote()">保存笔记</button>
    </div>
    <div id="pwPane" style="display:none">
      <input id="p_site" placeholder="网站/账号">
      <input id="p_user" placeholder="用户名">
      <div class="row"><div><input id="p_pass" placeholder="密码"></div><div style="flex:0 0 90px"><button class="btn" style="margin-top:6px" onclick="gen()">生成</button></div></div>
      <button class="btn" onclick="addPw()">存入密码库</button>
    </div>
    <div id="kanPane" style="display:none">
      <input id="k_text" placeholder="看板任务">
      <div class="row"><div><select id="k_col"><option>待办</option><option>进行中</option><option>已完成</option></select></div><div style="flex:0 0 80px"><button class="btn" style="margin-top:6px" onclick="addKan()">添加</button></div></div>
    </div>
    <p class="offline" style="margin-top:10px">🔒 全部模块离线存储，无云同步、无追踪。</p>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.microsoft.com/pt-mz/p/locark-private-workspace/9mtg11kchj13" target="_blank" style="color:var(--coral)">LocArk（本地优先私有工作台）</a>
  </div>

<script>
const KEY="P10-011";
let data = JSON.parse(localStorage.getItem(KEY) || '{"note":[],"pw":[],"kan":[]}');
let mode="note";
function save(){localStorage.setItem(KEY,JSON.stringify(data));render();}
function sw(m){mode=m;['note','pw','kan'].forEach(x=>{document.getElementById('b'+({'note':1,'pw':2,'kan':3}[x])).className='btn tab'+(x==m?' on':'');document.getElementById(x+'Pane').style.display=x==m?'':'none';});render();}
function addNote(){const v=document.getElementById('n_text').value.trim();if(!v)return;data.note.unshift({id:Date.now(),t:v});document.getElementById('n_text').value='';save();}
function addPw(){const s=document.getElementById('p_site').value.trim(),u=document.getElementById('p_user').value.trim(),p=document.getElementById('p_pass').value.trim();if(!s||!p)return;data.pw.push({id:Date.now(),s,u,p});['p_site','p_user','p_pass'].forEach(i=>document.getElementById(i).value='');save();}
function addKan(){const v=document.getElementById('k_text').value.trim();if(!v)return;data.kan.push({id:Date.now(),t:v,c:document.getElementById('k_col').value});document.getElementById('k_text').value='';save();}
function gen(){const c='abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%';let s='';for(let i=0;i<14;i++)s+=c[Math.floor(Math.random()*c.length)];document.getElementById('p_pass').value=s;}
function del(k,id){data[k]=data[k].filter(x=>x.id!=id);save();}
function render(){
  const el=document.getElementById('list');let h='';
  if(mode=='note'){h='<b>📝 笔记</b>'+(data.note.length?data.note.map(n=>'<div class="item"><span class="name">'+esc(n.t)+'</span><button class="del" onclick="del(\'note\','+n.id+')">✕</button></div>').join(''):'<p style="font-size:13px;color:var(--muted)">还没有笔记。</p>');}
  if(mode=='pw'){h='<b>🔑 密码库</b>'+(data.pw.length?data.pw.map(p=>'<div class="item"><span class="name">'+esc(p.s)+'<span style="font-size:12px;color:var(--muted)"><br>'+(p.u||'')+' · '+('•'.repeat(p.p.length))+'</span></span><button class="del" onclick="del(\'pw\','+p.id+')">✕</button></div>').join(''):'<p style="font-size:13px;color:var(--muted)">还没有密码。</p>');}
  if(mode=='kan'){h='<b>🗂 看板</b>'+(data.kan.length?data.kan.map(k=>'<div class="item"><span class="name">'+esc(k.t)+'<span style="font-size:12px;color:var(--muted)"> · '+k.c+'</span></span><button class="del" onclick="del(\'kan\','+k.id+')">✕</button></div>').join(''):'<p style="font-size:13px;color:var(--muted)">还没有任务。</p>');}
  el.innerHTML=h;
}
function esc(s){return s.replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
render();
</script>
</body>
</html>
