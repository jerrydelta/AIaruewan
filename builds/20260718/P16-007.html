<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>游戏化零钱储蓄·连胜+动画</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.bar{height:14px;border-radius:999px;background:var(--line);overflow:hidden;margin-top:10px}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--coral),#FFB199);transition:width .5s}
.fish{font-size:30px;text-align:center;margin:4px 0;transition:transform .3s}
.res{font-size:14px;margin-top:8px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">finance</span><span class="tag">mz_gamified_micro_savings</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">游戏化零钱储蓄</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Gamified micro-savings: animation + streak for MZ</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">韩国金融圈疯抢 MZ 用「游戏化储蓄」：토스뱅크 굴비적금每次存入动画鱼下降；하나 타이밍적금用 Widget 攒钱。年轻人不愿用传统死板储蓄。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:#777;margin:6px 0 0">每天存一笔，攒连胜与进度。点「存」看动画反馈 ✨</p>
    <label>目标金额（円/元）</label>
    <input type="number" id="goal" placeholder="例 100000" inputmode="numeric">
    <label>本次存入</label>
    <div class="row">
      <input type="number" id="amt" placeholder="例 1000" inputmode="numeric">
      <button class="btn" style="margin-top:6px" onclick="saveAmt()">🐟 存入</button>
    </div>
    <div class="fish" id="fish">🪸</div>
    <div class="bar"><i id="bar" style="width:0%"></i></div>
    <div class="res" id="res"></div>
  </div>

  <div class="card" id="list">
    <b>🔥 储蓄记录</b>
    <ul id="ul" style="padding:0;margin:6px 0 0;list-style:none"></ul>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.dt.co.kr/article/11608887" target="_blank" style="color:var(--coral)">토스뱅크 굴비적금 / 하나 타이밍 적금 / 카카오뱅크 최애적금</a>
  </div>

<script>
const KEY="P16-007";
let data=JSON.parse(localStorage.getItem(KEY)||'{"goal":0,"total":0,"streak":0,"last":"","logs":[]}');
function fmt(n){return Math.round(n||0).toLocaleString()+"";}
function persist(){
  localStorage.setItem(KEY,JSON.stringify(data));
  const pct=data.goal>0?Math.min(100,data.total/data.goal*100):0;
  document.getElementById("bar").style.width=pct+"%";
  document.getElementById("res").innerHTML=
    `已攒 <b>${fmt(data.total)}</b> / 目标 ${fmt(data.goal)}（${pct.toFixed(0)}%）<br>🔥 连胜 ${data.streak} 天 ｜ 共存 ${data.logs.length} 笔`;
  const ul=document.getElementById("ul");ul.innerHTML="";
  data.logs.slice(0,20).forEach(l=>{const li=document.createElement("li");
    li.style="padding:7px 0;border-bottom:1px solid var(--line);font-size:14px";
    li.innerHTML=`${l.d} · +${fmt(l.a)}`;ul.appendChild(li);});
}
function saveAmt(){
  const goal=parseFloat(document.getElementById("goal").value);
  const amt=parseFloat(document.getElementById("amt").value);
  if(goal>0)data.goal=goal;
  if(!amt||amt<=0){alert("请输入存入金额");return;}
  const today=new Date().toISOString().slice(0,10);
  if(data.last===today)data.streak=data.streak; // 同日不重复加连胜
  else{ data.streak = (data.last && isYesterday(data.last,today))? data.streak+1 : 1; }
  data.last=today; data.total+=amt; data.logs.unshift({d:today,a:amt});
  document.getElementById("amt").value="";
  const f=document.getElementById("fish");
  f.textContent = amt>=data.goal*0.1? "🐳":"🐟";
  f.style.transform="scale(1.4)";setTimeout(()=>f.style.transform="scale(1)",300);
  persist();
}
function isYesterday(last,today){
  const a=new Date(last),b=new Date(today);
  return (b-a)/86400000===1;
}
if(!data.goal)document.getElementById("goal").value="";
persist();
</script>
</body>
</html>
