<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>AI婴儿睡眠预测+记录</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.predict{background:linear-gradient(135deg,#FFF0F0,#FFE3E3);border:1px solid #FFD0D0;border-radius:12px;padding:14px;font-size:15px;margin-top:10px;text-align:center}
.item{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:8px;font-size:14px}
.item .meta{font-size:11px;color:var(--muted);margin-top:4px}
.stat{font-size:14px;color:#555;margin-top:6px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">postpartum</span><span class="tag">baby_sleep</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">AI 婴儿睡眠预测 + 记录</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Huckleberry 式 · SweetSpot 预测 + 语音式记录</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">新生儿睡眠是隐性刚需，父母平均每晚睡眠不足 5 小时。Huckleberry 用 AI 预测睡眠窗口（SweetSpot），被 500 万+ 家庭信赖，月收入约 60 万美元，切中产后脑雾父母"外接大脑"痛点。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 记录一次睡眠</b>
    <label>睡眠类型</label>
    <select id="type"><option>小睡</option><option>夜间长觉</option><option>喂奶后迷糊睡</option></select>
    <label>开始时间</label>
    <input id="start" type="datetime-local">
    <label>结束时间</label>
    <input id="end" type="datetime-local">
    <label>备注（像语音记的一样，选填）</label>
    <input id="note" placeholder="例如：哄了20分钟才睡，中途醒一次">
    <button class="btn" onclick="addSleep()">😴 保存这次睡眠</button>
    <div id="predict"></div>
  </div>

  <div class="card" id="list">
    <b>🌙 睡眠记录 & 统计</b>
    <div class="stat" id="stat"></div>
    <div id="logs"></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.hstong.com/news/hk/detail/25082001503494177" target="_blank" style="color:var(--coral)">Huckleberry（AI 婴儿睡眠）</a>
  </div>

<script>
const KEY="P15-014";
let logs=JSON.parse(localStorage.getItem(KEY)||"[]");
function save(){localStorage.setItem(KEY,JSON.stringify(logs));render();}
function fmt(s){const d=new Date(s);if(isNaN(d))return"";const p=n=>(""+n).padStart(2,"0");return d.getMonth()+1+"-"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes());}
function addSleep(){
  const s=document.getElementById("start").value,e=document.getElementById("end").value;
  if(!s||!e){alert("填好开始和结束时间");return;}
  const mins=Math.max(0,Math.round((new Date(e)-new Date(s))/60000));
  logs.unshift({type:document.getElementById("type").value,start:s,end:e,mins,note:document.getElementById("note").value.trim()});
  document.getElementById("note").value="";save();
}
function delSleep(i){logs.splice(i,1);save();}
function render(){
  const avg=logs.length?Math.round(logs.reduce((a,b)=>a+b.mins,0)/logs.length):0;
  document.getElementById("stat").textContent="共 "+logs.length+" 次 ｜ 平均睡眠 "+avg+" 分钟";
  const pb=document.getElementById("predict");
  if(logs.length){
    const last=logs[0];
    const suggest=new Date(new Date(last.end).getTime()+ (avg?avg*1.4:90)*60000);
    pb.innerHTML='<div class="predict">🌟 下次建议睡眠窗口<br><b>'+fmt(suggest.toISOString().slice(0,16))+'</b><br><span style="font-size:12px;color:#888">基于你最近平均睡眠 '+avg+' 分钟推算</span></div>';
  } else pb.innerHTML="";
  const box=document.getElementById("logs");box.innerHTML=logs.length?'':'<p style="font-size:13px;color:#aaa;margin:8px 0 0">记下第一次睡眠，AI 就能预测下次窗口。</p>';
  logs.slice(0,10).forEach((l,i)=>{const d=document.createElement("div");d.className="item";
    d.innerHTML='<span style="float:right;color:var(--coral);font-size:12px;cursor:pointer" onclick="delSleep('+i+')">删除</span><b>'+l.type+'</b> · '+l.mins+' 分钟<div class="meta">'+fmt(l.start)+' → '+fmt(l.end)+(l.note?' ｜ '+l.note:'')+'</div>';
    box.appendChild(d);});
}
render();
</script>
</body>
</html>
