<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>低误报宠物健康监测</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.item b{color:var(--ink)}.del{color:var(--muted);font-size:12px;float:right;cursor:pointer}
.pill{display:inline-block;font-size:11px;background:#FFF0F0;color:var(--coral);border-radius:999px;padding:1px 8px;margin:2px 3px 0 0}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">pet</span><span class="tag">ai_collar_overpromise</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">低误报宠物健康监测</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Non-invasive low-false-alarm pet health</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">AI宠物项圈热潮翻车：29%敏感猫佩戴后应激软便/拒食，11%误吞零件；算法误判率超40%——猫正常趴卧被判"精神萎靡"。隐私隐患：24h拾音麦克风可录下主人对话。机会：非侵入、低误报、隐私安全的真实健康工具，不制造焦虑。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:#555;margin:6px 0 0">人工记录真实生理信号（非算法猜测），本地保存并形成趋势，附下次复查提醒。</p>
    <div class="row">
      <div><label>宠物</label><input id="pet" placeholder="豆豆"></div>
      <div><label>体重(kg)</label><input id="w" type="number" step="0.1" placeholder="4.2"></div>
    </div>
    <label>食欲</label>
    <select id="app"><option>正常</option><option>略减</option><option>拒食</option></select>
    <label>精神 / 排便</label>
    <select id="spirit"><option>正常</option><option>偏蔫</option><option>应激/异常</option></select>
    <label>下次复查提醒</label>
    <input id="remind" type="date">
    <button class="btn" onclick="add()">记录今日体征</button>
  </div>

  <div class="card" id="list">
    <b>📋 体征记录</b>
    <p style="font-size:12px;color:var(--muted);margin:4px 0 0">本地保存，真实数据、不焦虑。</p>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.toutiao.com/article/7650056579441558051/" target="_blank" style="color:var(--coral)">小佩AI项圈 · 翻车复盘</a>
  </div>

<script>
const KEY="P3-011";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function add(){
  const pet=document.getElementById("pet").value.trim();
  if(!pet){alert("先填宠物名");return;}
  const w=document.getElementById("w").value||"—";
  const app=document.getElementById("app").value;
  const spirit=document.getElementById("spirit").value;
  const remind=document.getElementById("remind").value||"未设";
  const flag=(app==="拒食"||spirit==="应激/异常")?"⚠️ 建议就医":"✅ 观察即可";
  items.unshift({pet,w,app,spirit,remind,flag,t:new Date().toLocaleString("zh-CN")});
  localStorage.setItem(KEY,JSON.stringify(items));render();
}
function del(i){items.splice(i,1);localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const el=document.getElementById("list");
  let h='<b>📋 体征记录</b><p style="font-size:12px;color:var(--muted);margin:4px 0 0">本地保存，真实数据、不焦虑。</p>';
  if(!items.length){h+='<p style="font-size:13px;color:var(--muted);margin-top:8px">还没有记录。</p>';}
  items.forEach((it,i)=>{
    h+='<div class="item"><span class="del" onclick="del('+i+')">删除 ✕</span>'+
       '<b>'+it.pet+'</b> · 体重 '+it.w+'kg<br>'+
       '<span class="pill">食欲 '+it.app+'</span><span class="pill">精神 '+it.spirit+'</span><br>'+
       '<span style="font-size:13px;color:#555">复查：'+it.remind+'</span><br>'+
       '<span style="font-size:13px;color:var(--coral)">'+it.flag+'</span><br>'+
       '<span style="font-size:11px;color:var(--muted)">'+it.t+'</span></div>';
  });
  el.innerHTML=h;
}
render();
</script>
</body>
</html>
