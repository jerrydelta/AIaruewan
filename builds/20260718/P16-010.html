<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>新手NISA·商品匹配+金额模拟</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.res{font-size:14px;margin-top:8px;padding:10px;border-radius:10px;background:#FFF7F7}
.res b{color:var(--coral)}
.courses{display:flex;gap:8px;margin-top:10px}
.course{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:12px;text-align:center}
.course b{display:block;color:var(--coral);font-size:13px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">finance</span><span class="tag">nisa_onboarding_simulator</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">新手 NISA·匹配+模拟</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Beginner NISA matcher + amount simulator</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">新 NISA(2024) 大幅放宽，但初学者卡在「选哪只商品、每月投多少」。りそな「つみたてボックス」用「选目标→设金额/期限→推 4 个课程」降低门槛；楽天积立榜 eMAXIS Slim S&amp;P500/全世界股最热。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:#777;margin:6px 0 0">选目标 → 设金额/期限 → 推课程 + 金额模拟。</p>
    <label>投资目标</label>
    <select id="goal">
      <option value="growth">长期成长（退休/资产形成）</option>
      <option value="global">全球分散（稳健）</option>
      <option value="us">押注美国龙头</option>
      <option value="bond">保值+低波动</option>
    </select>
    <div class="row">
      <div><label>每月(円)</label><input type="number" id="m" placeholder="20000" inputmode="numeric"></div>
      <div><label>年数</label><input type="number" id="y" placeholder="15" inputmode="numeric"></div>
    </div>
    <button class="btn" onclick="sim()">推荐课程+模拟</button>
    <div class="res" id="res"></div>
    <div class="courses" id="courses"></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.resonabank.co.jp/kojin/tsumitatebox/" target="_blank" style="color:var(--coral)">りそな つみたてボックス / 楽天証券 iSPEED / PayPay証券</a>
  </div>

<script>
const KEY="P16-010";
const COURSES={
  growth:[["eMAXIS Slim 全世界株","成長"],["楽天・全米株","米国"],["emaxis Slim 先進国","分散"]],
  global:[["eMAXIS Slim 先進国株","安定"],["SBI・全世界株","廉価"],["たわらノーロード先進国","老舗"]],
  us:[["eMAXIS Slim 米国株(S&P500)","人気No1"],["楽天・全米株(CRSP)","网罗"],["iFree S&P500","低費"]],
  bond:[["eMAXIS Slim 国内債券","安全"],["先進国債券インデックス","分散"],["MRF/MMF","流動"]]
};
const RET={growth:0.06,global:0.05,us:0.07,bond:0.02};
function fmt(n){return Math.round(n||0).toLocaleString("ja-JP")+" 円";}
function sim(){
  const goal=document.getElementById("goal").value;
  const m=parseFloat(document.getElementById("m").value);
  const y=parseFloat(document.getElementById("y").value);
  if(!m||!y){alert("请填每月金额与年数");return;}
  const months=y*12, rm=RET[goal]/12;
  const fv=m*((Math.pow(1+rm,months)-1)/rm);
  const paid=m*months;
  document.getElementById("res").innerHTML=
    `投入 <b>${fmt(paid)}</b> → 预计 <b>${fmt(fv)}</b>（年化 ${(RET[goal]*100).toFixed(0)}%，NISA非税）<br>`+
    `注：新NISA成長投資枠年120万/総額1800万上限内。`;
  const c=document.getElementById("courses");c.innerHTML="";
  COURSES[goal].forEach(x=>{const d=document.createElement("div");d.className="course";
    d.innerHTML=`<b>${x[0]}</b>${x[1]}`;c.appendChild(d);});
  localStorage.setItem(KEY,JSON.stringify({goal,m,y}));
}
const saved=JSON.parse(localStorage.getItem(KEY)||"null");
if(saved){document.getElementById("goal").value=saved.goal;document.getElementById("m").value=saved.m;document.getElementById("y").value=saved.y;}
</script>
</body>
</html>
