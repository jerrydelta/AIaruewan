<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>日本垂直小 SaaS 选题板</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{background:#FAFAFA;border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px;font-size:13px}
.item .del{float:right;color:var(--muted);font-size:12px}
.prog{height:6px;background:#eee;border-radius:99px;overflow:hidden;margin-top:6px}
.prog>i{display:block;height:100%;background:var(--coral)}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">tech</span><span class="tag">indie_dev</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">日本垂直小 SaaS 选题板</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Vertical Micro-SaaS for JP</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">日本开发者讨论"個人開発 2026 仍可行，但'作れば売れる时代'终结"。相性好的分野：小規模 SaaS、AI 活用ツール、業務効率化、デジタルテンプレート、特定コミュニティ向け。痛点：Marketplace 需网络效应，个人难做；技术+营销+顾客理解三者缺一不可。机会在垂直小 SaaS。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 收录社区选题</b>
    <input id="idea" placeholder="面向哪个职业社群？（如：整体师的预约+客户笔记）">
    <div class="row">
      <select id="type">
        <option>小規模SaaS</option><option>AI活用ツール</option><option>業務効率化</option><option>デジタルテンプレート</option>
      </select>
      <input id="price" type="number" placeholder="月額 ¥">
    </div>
    <label>推进度（0-100%）</label>
    <input id="prog" type="number" min="0" max="100" value="0">
    <button class="btn" onclick="add()">收录</button>
  </div>

  <div class="card" id="list">
    <b>📋 我的选题板</b>
    <p style="font-size:12px;color:var(--muted);margin:6px 0 0">共 <b class="h-coral" id="cnt">0</b> 个</p>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://qiita.com/elliot_james/questions/1477a901b0e1469bfc36" target="_blank" style="color:var(--coral)">個人開発は本当にオワコン?</a>
  </div>

<script>
const KEY="P2-018";
let items = JSON.parse(localStorage.getItem(KEY) || "[]");
function add(){
  const idea=document.getElementById("idea").value.trim();
  if(!idea){ alert("填写选题"); return; }
  const type=document.getElementById("type").value;
  const price=+document.getElementById("price").value||0;
  const prog=Math.max(0,Math.min(100,+document.getElementById("prog").value||0));
  items.unshift({idea,type,price,prog,t:Date.now()});
  localStorage.setItem(KEY,JSON.stringify(items));
  document.getElementById("idea").value=""; document.getElementById("price").value=""; document.getElementById("prog").value="0";
  render();
}
function render(){
  const box=document.getElementById("list");
  document.getElementById("cnt").textContent=items.length;
  let h='<b>📋 我的选题板</b><p style="font-size:12px;color:var(--muted);margin:6px 0 0">共 <b class="h-coral" id="cnt">'+items.length+'</b> 个</p>';
  if(items.length===0){ h+='<p style="font-size:13px;color:var(--muted)">还没有选题。</p>'; }
  items.forEach((it,i)=>{
    h+='<div class="item"><span class="del" onclick="del('+i+')">删除</span><b>'+it.idea+'</b><br>'+
       '<span style="color:var(--coral)">'+it.type+'</span> · ¥'+it.price+'/月<br>'+
       '<span style="font-size:11px;color:#777">推进 '+it.prog+'%</span><div class="prog"><i style="width:'+it.prog+'%"></i></div></div>';
  });
  box.innerHTML=h;
}
function del(i){ items.splice(i,1); localStorage.setItem(KEY,JSON.stringify(items)); render(); }
render();
</script>
</body>
</html>
