<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>読書記録・ブクログ風</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:8px}
.pill{font-size:12px;padding:2px 8px;border-radius:999px;background:#FFF0F0;color:var(--coral)}
.stat{display:inline-block;text-align:center;padding:6px 10px}
.stat b{display:block;font-size:18px;color:var(--coral)}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">hobby</span><span class="tag">book_tracking_japan</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">読書記録・ブクログ風</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Japan's largest reading-log app combining tracking + SNS + e-commerce</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">読書量の管理・重複購入防止・感想共有のニーズは普遍。ブクログは登録会員200万人・本データ1.6億件の国内最大級。読了管理と読書傾向の可視化が読書習慣の鍵。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:var(--muted);margin:4px 0 0">本を登録して読書状況を管理。読了数・平均評価・読書傾向をグラフ化。</p>
    <label>タイトル</label><input id="b-title" placeholder="例：人を動かす">
    <label>著者</label><input id="b-author" placeholder="例：デール・カーネギー">
    <label>状態</label>
    <select id="b-status"><option>読書中</option><option>読了</option><option>積読</option></select>
    <label>評価（読了時・1〜5）</label>
    <select id="b-rate"><option value="0">ー</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
    <label>感想（任意）</label><textarea id="b-memo" placeholder="例：説得の原則が腑に落ちた"></textarea>
    <button class="btn" onclick="addB()">本を登録</button>
    <div id="stat" style="margin-top:14px;text-align:center"></div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://prtimes.jp/main/html/rd/p/000000007.000132237.html" target="_blank" style="color:var(--coral)">ブクログ（Booklog） / 読書メーター / Yomoo</a>
  </div>

<script>
const KEY="P8-010";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function addB(){
  const title=document.getElementById("b-title").value.trim();
  const author=document.getElementById("b-author").value.trim();
  const status=document.getElementById("b-status").value;
  const rate=parseInt(document.getElementById("b-rate").value)||0;
  const memo=document.getElementById("b-memo").value.trim();
  if(!title){alert("タイトルを入力してください");return;}
  items.push({title,author,status,rate,memo,id:Date.now()});
  document.getElementById("b-title").value="";document.getElementById("b-author").value="";document.getElementById("b-memo").value="";document.getElementById("b-rate").value="0";
  save();
}
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const done=items.filter(i=>i.status==="読了");
  const avg=done.length?done.reduce((a,b)=>a+b.rate,0)/done.length:0;
  const reading=items.filter(i=>i.status==="読書中").length;
  const stack=items.filter(i=>i.status==="積読").length;
  document.getElementById("stat").innerHTML=
    `<div class='stat'><b>${items.length}</b>登録</div>`+
    `<div class='stat'><b>${done.length}</b>読了</div>`+
    `<div class='stat'><b>${reading}</b>読書中</div>`+
    `<div class='stat'><b>${stack}</b>積読</div><br>`+
    `<div class='stat'><b>${avg.toFixed(1)}</b>平均評価</div>`;
  const box=document.getElementById("list");
  if(!items.length){box.innerHTML="<b>📚 本棚</b><p style='font-size:13px;color:var(--muted);margin:6px 0 0'>まだ本がありません。</p>";return;}
  box.innerHTML="<b>📚 本棚（"+items.length+"冊）</b>"+items.slice().reverse().map((i,ri)=>{
    const idx=items.length-1-ri;
    return `<div class='item'><b>${esc(i.title)}</b> <span class='pill'>${i.status}</span>
      <div style='font-size:13px;color:var(--muted)'>${esc(i.author||'著者不明')}${i.rate?` ・ ★${i.rate}`:''}</div>
      ${i.memo?`<div style='font-size:13px;margin-top:4px'>${esc(i.memo)}</div>`:""}
      <button class='mini' style='margin-top:6px' onclick='del(${idx})'>削除</button></div>`;
  }).join("");
}
function del(idx){items.splice(idx,1);save();}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
render();
</script>
</body>
</html>
