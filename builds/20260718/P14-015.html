<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>电商库存/竞品价格监控</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn-ghost{background:#FFF0F0;color:var(--coral);border:1px solid #FFD9D9}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.stat{text-align:center;padding:10px 4px}
.stat b{display:block;font-size:20px;color:var(--coral)}
.stat span{font-size:12px;color:var(--muted)}
.prod{font-size:13px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;margin-top:8px}
.warn{color:#E85555}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">micro_saas</span><span class="tag">ecommerce_monitoring</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">电商库存 / 竞品价格监控</h1>
    <p class="h-coral" style="font-size:13px;margin:0">E-commerce inventory & price monitoring</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">电商卖家两大隐性痛点：库存告急导致销售损失、不知竞品何时降价。库存警报连接 Shopify/Amazon 在缺货前发警报（$19-49/月）；竞品价格监测器追踪对手价变（$29-79/月）。单点监控，运维轻、留存稳。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 库存预警 + 竞品比价</b>
    <label>商品名</label><input id="pname" placeholder="如：便携榨汁杯">
    <div class="row">
      <div><label>我的库存</label><input id="stock" type="number" value="30"></div>
      <div><label>预警阈值</label><input id="thr" type="number" value="10"></div>
    </div>
    <div class="row">
      <div><label>我的售价</label><input id="myp" type="number" value="99"></div>
      <div><label>竞品最低价</label><input id="cp" type="number" value="89"></div>
    </div>
    <button class="btn" id="add">添加监控</button>
    <div class="row" style="margin-top:10px">
      <div class="stat"><b id="cnt">0</b><span>监控商品</span></div>
      <div class="stat"><b id="low">0</b><span>库存预警</span></div>
      <div class="stat"><b id="price">0</b><span>被压价</span></div>
    </div>
  </div>

  <div class="card" id="list">
    <b>📋 监控看板</b>
    <p id="empty" style="font-size:13px;color:var(--muted);margin:6px 0 0">还没有商品。</p>
    <div id="log"></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.nxcode.io/zh/resources/news/micro-saas-ideas-2026" target="_blank" style="color:var(--coral)">库存警报系统 / 竞争对手价格监测器</a>
  </div>

<script>
const KEY="P14-015";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
const $=id=>document.getElementById(id);
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function add(){
  if(!pname.value.trim())return;
  items.push({pname:pname.value.trim(),stock:+stock.value||0,thr:+thr.value||0,myp:+myp.value||0,cp:+cp.value||0});
  pname.value="";save();
}
function del(i){items.splice(i,1);save();}
function render(){
  cnt.textContent=items.length;
  low.textContent=items.filter(x=>x.stock<=x.thr).length;
  price.textContent=items.filter(x=>x.cp<x.myp).length;
  if(items.length)empty.style.display="none";else empty.style.display="block";
  log.innerHTML=items.slice().reverse().map(x=>{
    const idx=items.indexOf(x);
    const lowW=x.stock<=x.thr;
    const priceW=x.cp<x.myp;
    return `<div class="prod"><span style="float:right;color:var(--coral);cursor:pointer" data-i="${idx}">✕</span>
      <b>${esc(x.pname)}</b><br>
      <span style="font-size:12px;color:#666">库存 ${x.stock} / 阈值 ${x.thr}　|　我 ¥${x.myp} · 竞品 ¥${x.cp}</span><br>
      ${lowW?'<span class="warn">⚠️ 库存告急，快补货！</span> ':''}
      ${priceW?'<span class="warn">⚠️ 竞品更低 ¥'+(x.myp-x.cp)+' ，考虑调价</span>':''}
      ${!lowW&&!priceW?'<span style="color:var(--ok)">✅ 健康</span>':''}</div>`;
  }).join("");
  document.querySelectorAll("[data-i]").forEach(b=>b.onclick=()=>del(+b.dataset.i));
}
function esc(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
const cnt=document.getElementById("cnt"),low=document.getElementById("low"),price=document.getElementById("price");
add.onclick=add;
render();
</script>
</body>
</html>
