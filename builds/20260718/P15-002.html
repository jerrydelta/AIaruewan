<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>母亲专属CBT产后心理打卡</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn.ghost{background:#FFF0F0;color:var(--coral);border:1px solid #FFD9D9}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
.scale{display:flex;gap:4px;margin-top:6px}
.scale button{flex:1;padding:8px 0;border:1px solid var(--line);background:#fff;border-radius:8px;font-size:13px;cursor:pointer}
.scale button.on{background:var(--coral);color:#fff;border-color:var(--coral)}
.item{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:8px;font-size:14px}
.item .meta{font-size:11px;color:var(--muted);margin-top:4px}
.del{color:var(--coral);font-size:12px;float:right;cursor:pointer}
.lesson{background:#FFF8F0;border:1px solid #FFE6CC;border-radius:12px;padding:12px;margin-top:8px;font-size:14px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">postpartum</span><span class="tag">cbt</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">母亲专属 CBT 产后心理打卡</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Mother-focused CBT · 短课程 + 情绪打卡（非治疗）</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">产后心理健康被多数 App 忽略，需要"预防式"支持。约 1/5 新妈经历产后抑郁/焦虑。Canopie 用 CBT 结构化短课程切入——本工具复刻其核心微功能。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 今日情绪打卡</b>
    <label>今天整体心情（1 很难受 → 10 很好）</label>
    <div class="scale" id="moodScale"></div>
    <label>今天最困扰的主题</label>
    <select id="topic">
      <option>焦虑 / 担心</option><option>睡不够的疲惫</option>
      <option>对宝宝的责任压力</option><option>身份转变的失落</option>
      <option>和家人的摩擦</option><option>身体恢复的痛</option>
    </select>
    <label>一句话记录（选填）</label>
    <input id="moodNote" placeholder="今天发生了什么…">
    <button class="btn" onclick="addMood()">✅ 完成今日打卡</button>
  </div>

  <div class="card">
    <b>🧠 工具 · 一次 CBT 思维记录</b>
    <p style="font-size:13px;color:#666;margin:6px 0 0">把"自动冒出来的想法"写下来，再找一个更平衡的角度看它。</p>
    <label>情境（刚才发生了什么）</label>
    <input id="cSit" placeholder="比如：宝宝又哭了，我没接住">
    <label>自动想法（脑子里那句话）</label>
    <input id="cAuto" placeholder="比如：我是个糟糕的妈妈">
    <label>当时的情绪强度 1-10</label>
    <input id="cEmo" type="number" min="1" max="10" value="7">
    <label>更平衡的想法</label>
    <textarea id="cBal" rows="2" placeholder="比如：我累了，但我在尽力，接不住一次不代表失败"></textarea>
    <button class="btn ghost" onclick="addCbt()">💡 保存这次练习</button>
    <div id="lessons"></div>
  </div>

  <div class="card" id="list">
    <b>📅 我的打卡记录</b>
    <div id="moods"></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://joinphoenixhealth.com/resourcecenter/top-10-best-apps-for-maternal-mental-health-support" target="_blank" style="color:var(--coral)">Canopie（母亲 CBT 心理健康 App）</a>
    <p style="margin:6px 0 0">本工具为自我觉察练习，不构成心理治疗。若情绪持续低落请就医。</p>
  </div>

<script>
const KEY="P15-002";
let data=JSON.parse(localStorage.getItem(KEY)||'{"moods":[],"cbts":[]}');
let moodVal=7;
const sc=document.getElementById("moodScale");
for(let i=1;i<=10;i++){const b=document.createElement("button");b.textContent=i;b.onclick=()=>{moodVal=i;[...sc.children].forEach(c=>c.classList.remove("on"));b.classList.add("on");};if(i===7)b.classList.add("on");sc.appendChild(b);}
function save(){localStorage.setItem(KEY,JSON.stringify(data));render();}
function nowStr(){const d=new Date();const p=n=>(""+n).padStart(2,"0");return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes());}
function addMood(){
  data.moods.unshift({mood:moodVal,topic:document.getElementById("topic").value,note:document.getElementById("moodNote").value.trim(),t:nowStr()});
  document.getElementById("moodNote").value="";save();
}
function addCbt(){
  const sit=document.getElementById("cSit").value.trim(),auto=document.getElementById("cAuto").value.trim(),bal=document.getElementById("cBal").value.trim();
  if(!auto){alert("先写下脑子里那句话");return;}
  data.cbts.unshift({sit,auto,emo:+document.getElementById("cEmo").value,bal,t:nowStr()});
  ["cSit","cAuto","cBal"].forEach(id=>document.getElementById(id).value="");save();
}
function delMood(i){data.moods.splice(i,1);save();}
function render(){
  const m=document.getElementById("moods");
  m.innerHTML=data.moods.length?'':'<p style="font-size:13px;color:#aaa;margin:8px 0 0">还没有打卡，今天先来一次？</p>';
  data.moods.forEach((x,i)=>{const d=document.createElement("div");d.className="item";
    d.innerHTML='<span class="del" onclick="delMood('+i+')">删除</span><b>心情 '+x.mood+'/10</b> · '+x.topic+(x.note?'<div style="font-size:13px;color:#555">'+x.note+'</div>':'')+'<div class="meta">'+x.t+'</div>';m.appendChild(d);});
  const L=document.getElementById("lessons");
  L.innerHTML=data.cbts.length?'<p style="font-size:13px;color:#666;margin:12px 0 0"><b>我的平衡练习</b></p>':'';
  data.cbts.slice(0,3).forEach(c=>{const d=document.createElement("div");d.className="lesson";
    d.innerHTML='<div style="font-size:12px;color:#aaa">'+c.t+'</div><b>想法：</b>'+c.auto+'<br><b>更平衡：</b>'+c.bal;L.appendChild(d);});
}
render();
</script>
</body>
</html>
