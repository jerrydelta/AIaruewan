<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>AI志願先アドバイザー</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:8px}
.tier{font-size:12px;padding:2px 8px;border-radius:999px}
.tier.a{background:#FFE9E9;color:var(--coral)}
.tier.b{background:#FFF6E6;color:#E0922A}
.tier.c{background:#E8F7F0;color:var(--ok)}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">education</span><span class="tag">ai_college_application</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">AI志願先アドバイザー</h1>
    <p class="h-coral" style="font-size:13px;margin:0">AI college-admission advisor (cross-market: JP/KR)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">志願先決定は各省ルールが複雑・情報非対称が深刻。日本（大学・学部選び）と韓国（수능後の志願先）ともにAI志願先アドバイザーの導入が遅れている。中国で検証済みの「AI深度検索×志願表自動生成」モデルを日韓へ展開できる。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:var(--muted);margin:4px 0 0">偏差値（模拟）と志望分野から、冲刺・稳妥・保底の3段階志願表を自動生成します（参考モデル）。</p>
    <label>模拟偏差値（40〜80）</label>
    <input id="c-score" type="number" min="40" max="80" placeholder="例：65">
    <label>志望分野</label>
    <select id="c-field"><option>文系</option><option>理系</option><option>医療・看護</option><option>芸術・デザイン</option><option>その他</option></select>
    <label>優先</label>
    <select id="c-pref"><option>専業優先</option><option>院校（名門）優先</option></select>
    <label>リスク許容度</label>
    <select id="c-risk"><option>標準</option><option>保守（保底多め）</option><option>挑戦（冲刺多め）</option></select>
    <button class="btn" onclick="gen()">志願表を生成</button>
    <div id="out" style="margin-top:12px"></div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.moomoo.com/news/post/54175286/is-it-reliable-for-ai-to-assist-in-filling-out" target="_blank" style="color:var(--coral)">夸克高考 / 知乎高考 / Al報志愿（中国）</a>
  </div>

<script>
const KEY="P8-009";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function band(v){return "偏差値"+Math.max(40,Math.min(80,v))+"帯";}
function gen(){
  const s=parseInt(document.getElementById("c-score").value)||0;
  const f=document.getElementById("c-field").value;
  const p=document.getElementById("c-pref").value;
  const r=document.getElementById("c-risk").value;
  if(s<40||s>80){alert("偏差値は40〜80で入力してください");return;}
  let up=8,down=12;
  if(r==="挑戦"){up=14;down=8;}
  if(r==="保守"){up=4;down=16;}
  const plan={
    score:s,field:f,pref:p,risk:r,
    challenge:band(s+up)+"〜"+band(s+up+6),
    safe:band(s-3)+"〜"+band(s+3),
    back:band(s-down)+"〜"+band(s-down+6),
    id:Date.now()
  };
  const prefNote=p==="専業優先"?"専業志望順に並べ、院校名より内容を優先":"院校ブランドを優先し、許容範囲で専業を調整";
  let html="<b>🎓 あなたの志願表（参考）</b>";
  html+=`<div class='item'><span class='tier a'>冲刺</span> <b>${plan.challenge}</b><div style='font-size:13px;color:var(--muted)'>${f}・${prefNote}</div></div>`;
  html+=`<div class='item'><span class='tier b'>稳妥</span> <b>${plan.safe}</b><div style='font-size:13px;color:var(--muted)'>本命。合格確率中心</div></div>`;
  html+=`<div class='item'><span class='tier c'>保底</span> <b>${plan.back}</b><div style='font-size:13px;color:var(--muted)'>確実合格圏を確保</div></div>`;
  html+=`<p style='font-size:12px;color:var(--muted);margin:8px 0 0'>※あくまで偏差値帯の参考モデル。実際の倍率・日程は各自確認を。</p>`;
  document.getElementById("out").innerHTML=html;
  items.push(plan);localStorage.setItem(KEY,JSON.stringify(items));renderList();
}
function renderList(){
  const box=document.getElementById("list");
  if(!items.length){box.innerHTML="<b>🗂 保存した志願表</b><p style='font-size:13px;color:var(--muted);margin:6px 0 0'>まだ生成履歴がありません。</p>";return;}
  box.innerHTML="<b>🗂 保存した志願表（"+items.length+"）</b>"+items.slice().reverse().map((i,ri)=>{
    const idx=items.length-1-ri;
    return `<div class='item' style='padding:8px 10px'><b>偏差値${i.score}・${i.field}</b>
      <div style='font-size:12px;color:var(--muted)'>冲刺${i.challenge} ／ 保底${i.back}</div>
      <button class='mini' style='margin-top:4px' onclick='del(${idx})'>削除</button></div>`;
  }).join("");
}
function del(idx){items.splice(idx,1);localStorage.setItem(KEY,JSON.stringify(items));renderList();}
renderList();
</script>
</body>
</html>
