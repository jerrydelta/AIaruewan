<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>透明无套路冥想计时</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn-ok{background:var(--ok)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.mini{font-size:12px;color:var(--muted)}
.item{background:#FBFBFB;border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.timer{font-size:40px;text-align:center;font-weight:700;color:var(--coral);margin:10px 0}
.price{display:flex;gap:8px;margin-top:8px}
.price>div{flex:1;text-align:center;background:#F3FFF7;border:1px solid #D6F3E3;border-radius:10px;padding:8px;font-size:12px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">spirituality</span><span class="tag">honest_meditation_no_trap</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">透明无套路冥想计时</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Honest-pricing no-trap meditation app</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">冥想 App 的"强制订阅/虚假宣传"是集中差评痛点：Now冥想被曝"一上来就付钱""138 元强制扣费"。用户要的是先免费体验、价格透明、无自动扣费陷阱的工具。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 透明冥想计时</b>
    <div class="price">
      <div>💰 完全免费</div><div>🚫 无订阅</div><div>🚫 无自动扣费</div><div>📴 可离线</div>
    </div>
    <label>冥想场景</label>
    <select id="scene">
      <option value="安睡">🌙 安睡助眠</option>
      <option value="减压">🌿 减压放松</option>
      <option value="专注">🎯 专注提神</option>
      <option value="呼吸">🫁 呼吸觉察</option>
    </select>
    <label>时长（分钟）</label>
    <select id="dur">
      <option value="3">3 分钟</option><option value="5">5 分钟</option>
      <option value="10">10 分钟</option><option value="15">15 分钟</option>
    </select>
    <div class="timer" id="t">03:00</div>
    <button class="btn btn-ok" id="btn" onclick="toggle()">▶ 开始冥想</button>
    <p class="mini" id="hint" style="text-align:center;margin-top:6px">选好场景与时长，点开始。结束自动记录，绝不收费。</p>
  </div>

  <div class="card" id="list"><b>🧘 我的冥想记录</b><div id="items"></div></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://sj.qq.com/appdetail/com.imoblife.now/review" target="_blank" style="color:var(--coral)">Now冥想 / 潮汐（透明定价、无套路冥想）</a>
  </div>

<script>
const KEY="P7-009";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
let timer=null,left=0,total=0;
function fmt(s){const m=String(Math.floor(s/60)).padStart(2,"0");const ss=String(s%60).padStart(2,"0");return m+":"+ss;}
function toggle(){
  if(timer){clearInterval(timer);timer=null;document.getElementById("btn").textContent="▶ 继续";return;}
  if(left===0){total=+document.getElementById("dur").value*60;left=total;}
  document.getElementById("btn").textContent="⏸ 暂停";
  timer=setInterval(()=>{
    left--;document.getElementById("t").textContent=fmt(left);
    if(left<=0){
      clearInterval(timer);timer=null;left=0;
      document.getElementById("t").textContent=fmt(total);
      document.getElementById("btn").textContent="▶ 开始冥想";
      const scene=document.getElementById("scene").value;
      items.unshift({scene,min:+document.getElementById("dur").value,date:new Date().toLocaleDateString("zh-CN")});
      localStorage.setItem(KEY,JSON.stringify(items));render();
      document.getElementById("hint").textContent="🎉 本次冥想完成，已记录。本工具永远免费。";
    }
  },1000);
}
function render(){
  const box=document.getElementById("items");
  const sum=items.reduce((a,b)=>a+b.min,0);
  if(!items.length){box.innerHTML='<p class="mini" style="margin-top:8px">还没有记录，开始第一次冥想吧。</p>';return;}
  box.innerHTML=`<div class="mini" style="margin-bottom:6px">累计冥想 ${sum} 分钟</div>`+items.map(it=>`<div class="item"><div style="font-size:14px">${it.scene} · ${it.min} 分钟</div><div class="mini">${it.date}</div></div>`).join("");
}
render();
</script>
</body>
</html>
