<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>慢旅行/环球规划器</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border-top:1px solid var(--line);padding:10px 0;font-size:14px}
.item:first-child{border-top:none}
.del{background:none;border:none;color:var(--coral);font-size:13px;cursor:pointer;float:right;margin-top:-2px}
.sumbox{background:#FFF7F7;border:1px solid #FFE3E3;border-radius:10px;padding:10px;margin-top:10px;font-size:13px}
.sumbox b{color:var(--coral)}
.chk{display:flex;align-items:center;gap:10px;font-size:15px;padding:8px 0;border-top:1px solid var(--line)}
.chk:first-of-type{border-top:none}
.chk input{width:auto;margin:0}
.chk.done{color:var(--ok);text-decoration:line-through}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">travel</span><span class="tag">slow_travel_cost_planner</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">慢旅行 / 环球规划器</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Slow-travel planner with real cost-of-living data</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">"慢旅行/环球旅行"规划是新兴刚需。多数预算 App 只做记账不做"去哪便宜/能玩多久"的前置规划。基于真实成本数据的规划器是缺口。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 生活成本库 + 可旅行时长 + 装备清单</b>
    <p style="font-size:13px;color:#555;margin:6px 0 0">选国家（内置日均成本），填总预算，算出能旅行多久；装备清单打勾保存。</p>
    <div class="row">
      <div><label>目的地国家</label>
        <select id="country"></select></div>
      <div><label>总预算($)</label><input id="budget" type="number" inputmode="decimal" placeholder="如 6000"></div>
    </div>
    <button class="btn" onclick="addPlan()">＋ 添加行程规划</button>
    <div class="sumbox" id="sum">选国家并填预算后，查看可旅行天数。</div>

    <hr style="border:none;border-top:1px solid var(--line);margin:14px 0">
    <b>🎒 装备清单</b>
    <div id="gear"></div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.bluestacks.com/campaign/leap.plan.budget.travel/fr" target="_blank" style="color:var(--coral)">Leap · NomadNumbers · Nomad Purse</a>
  </div>

<script>
const KEY="P9-018";
const COST={"泰国":35,"越南":30,"印度尼西亚":28,"墨西哥":45,"葡萄牙":70,"土耳其":40,"印度":25,"哥伦比亚":35,"柬埔寨":28,"中国":55};
const GEAR=["护照/签证","银行卡/现金","笔记本电脑","转换插头","常用药","防晒","轻便背包","离岸网络"];
let data=JSON.parse(localStorage.getItem(KEY)||'{"plans":[],"gear":[]}');
function save(){localStorage.setItem(KEY,JSON.stringify(data));render();}
(function fillCountries(){
  let h="";for(const c in COST){h+=`<option value='${c}'>${c}（约 $${COST[c]}/天）</option>`;}
  document.getElementById("country").innerHTML=h;
})();
function addPlan(){
  const c=document.getElementById("country").value;
  const budget=parseFloat(document.getElementById("budget").value);
  if(!budget||budget<=0){alert("请输入总预算");return;}
  const days=Math.floor(budget/COST[c]);
  data.plans.push({c,budget,days});
  document.getElementById("budget").value="";
  save();
}
function toggleGear(i){ if(data.gear.includes(i)) data.gear=data.gear.filter(x=>x!==i); else data.gear.push(i); save(); }
function del(i){data.plans.splice(i,1);save();}
function render(){
  let html="";
  data.plans.forEach((p,i)=>{
    html+=`<div class='item'><button class='del' onclick='del(${i})'>删除</button><b>${p.c}</b> <span class='tag'>$${COST[p.c]}/天</span><div style='font-size:13px;color:#555'>预算 $${p.budget} → 可旅行 <b>${p.days} 天</b></div></div>`;
  });
  document.getElementById("list").innerHTML = data.plans.length
    ? "<b style='font-size:14px'>📒 行程规划（"+data.plans.length+"）</b>"+html
    : "<p style='color:#999;font-size:13px'>暂无规划，添加你的第一个目的地。</p>";
  let sum="";
  data.plans.forEach(p=>{ sum+=`${p.c}: <b>${p.days}天</b> ｜ `; });
  document.getElementById("sum").innerHTML = sum ? "各目的地可旅行：<br>"+sum.slice(0,-2) : "选国家并填预算后，查看可旅行天数。";
  let g="";
  GEAR.forEach((x,i)=>{ const on=data.gear.includes(i);
    g+=`<div class='chk ${on?"done":""}' onclick='toggleGear(${i})'><input type='checkbox' ${on?"checked":""} onchange='event.stopPropagation()' onclick='toggleGear(${i})'> ${x}</div>`;
  });
  document.getElementById("gear").innerHTML=g;
}
render();
</script>
</body>
</html>
