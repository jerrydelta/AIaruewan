<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>宠物优先植物养护</title>
<style>
:root{
  --coral:#FF6B6B;        --coral-dark:#E85555;
  --ink:#2D2D2D;          --muted:#8A8A8A;
  --bg:#F7F7F7;           --card:#FFFFFF;
  --line:#ECECEC;         --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn-sm{padding:7px 10px;font-size:13px;border-radius:9px;margin-top:0}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.item h3{margin:0 0 4px;font-size:15px}
.mini{font-size:12px;color:var(--muted)}
.tox{color:var(--coral);font-weight:600}
.safe{color:var(--ok);font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">creative</span><span class="tag ai">AI增强</span><span class="tag">plant</span><span class="tag">pet_toxic_safety</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">宠物优先植物养护</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Pet-first plant-care (toxicity DB + safe list)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">PictureThis 差异化标注植物对猫狗毒性——绿萝、百合等常见绿植对宠物有毒。养宠家庭怕误食中毒，通用养护 App 对宠物安全强调不足。本工具：毒性速查 + 我的植物安全标注 + 宠物安全购物清单。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 毒性速查</b>
    <input id="q" placeholder="查植物毒性，如：绿萝 / 百合 / 吊兰" oninput="search()">
    <div id="db"></div>
  </div>

  <div class="card">
    <b>🛒 我的植物 & 安全购物清单</b>
    <label>植物名称</label>
    <input id="name" placeholder="如：我家百合">
    <label>对宠物</label>
    <select id="tox">
      <option value="tox">有毒 ⚠</option>
      <option value="safe">安全 ✓</option>
      <option value="unknown">未知</option>
    </select>
    <label>备注</label>
    <input id="note" placeholder="如：放高处，猫够不到">
    <button class="btn" onclick="add()">＋ 加入清单</button>
    <div id="list"></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://insights.nandbox.com/top-8-gardening-apps-in-2025-every-plant-lover-should-try/" target="_blank" style="color:var(--coral)">PictureThis / Planta</a>
  </div>

<script>
const KEY="P11-006";
const DB={
  "绿萝":["tox","误食致口腔灼烧、呕吐，猫狗有毒"], "百合":["tox","对猫极毒，少量即可致肾衰竭"],
  "吊兰":["safe","对猫狗基本安全"], "虎尾兰":["tox","误食轻度呕吐，猫狗有毒"],
  "龟背竹":["tox","草酸钙针晶刺激口腔，猫狗有毒"], "多肉":["safe","多数安全，个别品种慎食"],
  "发财树":["tox","误食呕吐，猫狗有毒"], "波士顿蕨":["safe","对宠物安全"],
  "玫瑰":["safe","花瓣安全，注意刺与农药"], "芦荟":["tox","误食腹泻，猫狗有毒"]
};
let my=JSON.parse(localStorage.getItem(KEY)||"[]");
function save(){ localStorage.setItem(KEY,JSON.stringify(my)); render(); }
function search(){
  const q=document.getElementById('q').value.trim();
  const box=document.getElementById('db'); box.innerHTML='';
  if(!q) return;
  for(const k in DB){
    if(k.includes(q)||q.includes(k)){
      const cls=DB[k][0]==='tox'?'tox':'safe';
      const el=document.createElement('div'); el.className='item';
      el.innerHTML='<h3>'+k+' <span class="'+cls+'">'+(DB[k][0]==='tox'?'有毒 ⚠':'安全 ✓')+'</span></h3>'+
        '<div class="mini">'+DB[k][1]+'</div>';
      box.appendChild(el);
    }
  }
  if(!box.innerHTML) box.innerHTML='<div class="mini">未收录，建议默认按"有毒"防范并咨询兽医</div>';
}
function add(){
  const name=document.getElementById('name').value.trim();
  if(!name){ alert('请填植物名称'); return; }
  my.push({id:Date.now(),name,tox:document.getElementById('tox').value,
    note:document.getElementById('note').value.trim()});
  document.getElementById('name').value='';document.getElementById('note').value='';
  save();
}
function del(id){ my=my.filter(x=>x.id!==id); save(); }
function render(){
  const box=document.getElementById('list'); box.innerHTML='';
  my.forEach(p=>{
    const cls=p.tox==='tox'?'tox':(p.tox==='safe'?'safe':'');
    const lab=p.tox==='tox'?'有毒 ⚠':(p.tox==='safe'?'安全 ✓':'未知');
    const el=document.createElement('div'); el.className='item';
    el.innerHTML='<h3>'+p.name+' <span class="'+cls+'">'+lab+'</span></h3>'+
      (p.note?'<div class="mini">'+p.note+'</div>':'')+
      '<button class="btn btn-sm" style="background:#ccc;width:auto;margin-top:8px" onclick="del('+p.id+')">删除</button>';
    box.appendChild(el);
  });
}
render();

// === AI助手模块（用户自带Key模式）===
let aiKey = localStorage.getItem("HY3_API_KEY") || "";
let aiHistory = [];

function toggleAI(id){
  const body = document.getElementById("aiBody_" + id);
  const header = document.getElementById("aiHeader_" + id);
  if(body.classList.contains("collapsed")){
    body.classList.remove("collapsed");
    header.classList.remove("collapsed");
  } else {
    body.classList.add("collapsed");
    header.classList.add("collapsed");
  }
}

function saveKey(id){
  const key = document.getElementById("apiKey_" + id).value.trim();
  if(!key){alert("请输入Key");return;}
  localStorage.setItem("HY3_API_KEY", key);
  aiKey = key;
  document.getElementById("aiKeySection_" + id).style.display="none";
  document.getElementById("aiChatSection_" + id).style.display="block";
}

async function callHy3(messages, id){
  if(!aiKey){alert("请先填写 API Key");return null;}
  const loading = document.createElement("div");
  loading.className = "ai-msg";
  loading.innerHTML = `<div class="role">🤖 AI</div><div class="content"><span class="loading">思考中...</span></div>`;
  document.getElementById("aiMessages_" + id).appendChild(loading);
  
  try {
    const res = await fetch("https://tokenhub.tencentmaas.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + aiKey
      },
      body: JSON.stringify({
        model: "hy3",
        messages: messages,
        temperature: 0.7
      })
    });
    const data = await res.json();
    loading.remove();
    if(data.error){alert("API错误："+data.error.message);return null;}
    return data.choices[0].message.content;
  } catch(e){
    loading.remove();
    alert("调用失败："+e.message);
    return null;
  }
}

function addMsg(role, content, id){
  const box = document.getElementById("aiMessages_" + id);
  if(!box)return;
  const div = document.createElement("div");
  div.className = "ai-msg";
  div.innerHTML = `<div class="role">${role==="user"?"🙋 你":"🤖 AI"}</div><div class="content">${content.replace(/\n/g,"<br>")}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

async function aiChat(id){
  const input = document.getElementById("aiInput_" + id).value.trim();
  if(!input){return;}
  document.getElementById("aiInput_" + id).value = "";
  addMsg("user", input, id);
  const msgs = [
    {role:"system",content:"你是这个工具的AI助手，帮助用户更好地使用本工具，提供专业建议和优化方案。用中文简洁回答。"},
    {role:"user",content:input}
  ];
  const reply = await callHy3(msgs, id);
  if(reply) addMsg("assistant", reply, id);
}

</script>
</body>
</html>
