<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>AI 求职文书生成器（ES/志望動機）</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.out{background:#FAFAFA;border:1px solid var(--line);border-radius:10px;padding:12px;
  margin-top:10px;font-size:14px;white-space:pre-wrap}
.item{background:#FAFAFA;border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px;font-size:13px}
.item .del{float:right;color:var(--muted);font-size:12px}
.item .open{color:var(--coral);font-size:12px;margin-left:8px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">career</span><span class="tag">ai_resume</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">AI 求职文书生成器</h1>
    <p class="h-coral" style="font-size:13px;margin:0">ES / 志望動機 / 履历 一键草稿</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">学生/转职者"自身经验难以语言化"，ES/简历耗费大量时间。就活 AI 总利用 66.7 万次、访客约 29.6 万人，验证"免费生成→流量→付费"路径成立。痛点真实且已被市场验证。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 文书生成</b>
    <label>目标行业</label>
    <select id="industry">
      <option>IT/互联网</option><option>制造业</option><option>金融/咨询</option>
      <option>零售/电商</option><option>媒体/内容</option><option>教育</option>
    </select>
    <label>申请岗位</label>
    <input id="role" placeholder="如：产品运营 / 软件开发">
    <label>你的一段相关经历</label>
    <textarea id="exp" rows="2" placeholder="如：大学社团拉新 300 人，负责活动策划"></textarea>
    <label>你掌握的技能 / 特质</label>
    <textarea id="skill" rows="2" placeholder="如：数据分析、沟通协调、抗压"></textarea>
    <label>选择生成类型</label>
    <select id="type">
      <option value="es">Entry Sheet（入场 sheet）</option>
      <option value="moti">志望動機</option>
      <option value="resume">履历书要点</option>
    </select>
    <button class="btn" onclick="gen()">生成草稿</button>
    <div class="out" id="out" style="display:none"></div>
    <button class="btn" id="saveBtn" style="display:none" onclick="saveDoc()">保存到我的文书库</button>
  </div>

  <div class="card" id="list">
    <b>📋 我的文书库</b>
    <p style="font-size:12px;color:var(--muted);margin:6px 0 0">本地保存，可随时回看。</p>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.jaic-g.com/news/news/260331/" target="_blank" style="color:var(--coral)">ジェイック 就活AI</a>
  </div>

<script>
const KEY="P2-002";
let items = JSON.parse(localStorage.getItem(KEY) || "[]");
let last=null;
function gen(){
  const ind=document.getElementById("industry").value;
  const role=document.getElementById("role").value.trim()||"（岗位）";
  const exp=document.getElementById("exp").value.trim()||"（请补充经历）";
  const skill=document.getElementById("skill").value.trim()||"（请补充技能）";
  const type=document.getElementById("type").value;
  let text="";
  if(type==="es"){
    text="【ES】"+role+" 岗\n\n■志望理由\n我在"+ind+"领域观察到"+exp+"的实际价值，希望把"+skill+"运用到"+role+"中，为用户创造可量化的改善。\n\n■相关经历\n"+exp+"。从中我锻炼了"+skill+"，也确认了自己适合需要落地与协作的"+role+"工作。";
  }else if(type==="moti"){
    text="【志望動機】\n为何选择"+ind+"行业的"+role+"？\n因为"+exp+"让我看到这个岗位能直接连接"+skill+"与业务结果。\n我的差异化：相比纯执行，我更擅长用"+skill+"发现问题并推进，这正是"+role+"长期需要的。";
  }else{
    text="【履历书要点】\n・经历："+exp+"\n・技能："+skill+"\n・行业："+ind+" / 目标岗："+role+"\n・一句话总结：以"+skill+"为核心能力，面向"+ind+"的"+role+"持续产出。";
  }
  last={ind,role,type,text,t:Date.now()};
  const o=document.getElementById("out");
  o.style.display="block"; o.textContent=text;
  document.getElementById("saveBtn").style.display="block";
}
function saveDoc(){
  if(!last) return;
  items.unshift(last); localStorage.setItem(KEY,JSON.stringify(items)); last=null;
  document.getElementById("out").style.display="none";
  document.getElementById("saveBtn").style.display="none";
  render();
}
function render(){
  const box=document.getElementById("list");
  let h='<b>📋 我的文书库</b><p style="font-size:12px;color:var(--muted);margin:6px 0 0">本地保存，可随时回看。</p>';
  if(items.length===0){ h+='<p style="font-size:13px;color:var(--muted)">还没有保存的文书。</p>'; }
  items.forEach((it,i)=>{
    const tname={es:"ES",moti:"志望動機",resume:"履历"}[it.type];
    h+='<div class="item"><span class="del" onclick="del('+i+')">删除</span><b>'+tname+' · '+it.role+'</b><br>'+
       '<span style="color:#777">'+new Date(it.t).toLocaleString()+'</span>'+
       '<span class="open" onclick="show('+i+')">查看</span></div>';
  });
  box.innerHTML=h;
}
function show(i){ alert(items[i].text); }
function del(i){ items.splice(i,1); localStorage.setItem(KEY,JSON.stringify(items)); render(); }
render();
</script>
</body>
</html>
