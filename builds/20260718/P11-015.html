<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>自闭症家长疗育台</title>
<style>
:root{
  --coral:#FF6B6B;        --coral-dark:#E85555;
  --ink:#2D2D2D;          --muted:#8A8A8A;
  --bg:#F7F7F7;           --card:#FFFFFF;
  --line:#ECECEC;         --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn-sm{padding:7px 10px;font-size:13px;border-radius:9px;margin-top:0;width:auto}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.item h3{margin:0 0 4px;font-size:15px}
.mini{font-size:12px;color:var(--muted)}
.bar{height:10px;background:var(--line);border-radius:999px;overflow:hidden;margin-top:6px}
.bar>i{display:block;height:100%;background:var(--ok)}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">neurodiversity</span><span class="tag">autism_parent_platform</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">自闭症家长疗育台</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Digital therapy platform for autism parents (ABA)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">日本 Uchimaru 打造面向自闭症家长的数字化疗育平台：实时反馈、进度仪表盘、亲子迷你游戏、ABA 奖励系统。疗育昂贵且稀缺，家长需在家可负担的支持。本工具用 ABA 奖励机制帮家长记录孩子的小步进展。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 今天的目标</b>
    <label>孩子姓名</label>
    <input id="child" placeholder="如：小宝" value="小宝">
    <label>今日目标行为</label>
    <input id="goal" placeholder="如：自己穿鞋">
    <label>奖励分值</label>
    <select id="pts"><option>1</option><option selected>2</option><option>3</option><option>5</option></select>
    <button class="btn" onclick="add()">＋ 添加目标</button>
    <div id="list"></div>
  </div>

  <div class="card">
    <b>📊 进度仪表盘</b>
    <p id="stat" class="mini"></p>
    <div class="bar"><i id="bar" style="width:0%"></i></div>
    <div id="history"></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://prtimes.jp/story/detail/xO6QV9tw38B" target="_blank" style="color:var(--coral)">Uchimaru / まるならママもまる</a>
  </div>

<script>
const KEY="P11-015";
let data=JSON.parse(localStorage.getItem(KEY)||'{"goals":[],"pts":0,"done":0}');
function save(){ localStorage.setItem(KEY,JSON.stringify(data)); render(); }
function add(){
  const goal=document.getElementById('goal').value.trim();
  if(!goal){ alert('请填目标'); return; }
  data.goals.push({id:Date.now(),child:document.getElementById('child').value.trim()||'孩子',
    goal,pts:+document.getElementById('pts').value,done:false});
  document.getElementById('goal').value='';
  save();
}
function done(id){
  const g=data.goals.find(x=>x.id===id); if(!g||g.done) return;
  g.done=true; data.pts+=g.pts; data.done++;
  save();
}
function del(id){ data.goals=data.goals.filter(x=>x.id!==id); save(); }
function render(){
  const box=document.getElementById('list'); box.innerHTML='';
  const today=data.goals.filter(g=>!g.done);
  today.forEach(g=>{
    const el=document.createElement('div'); el.className='item';
    el.innerHTML='<h3>'+g.goal+' <span class="mini">· '+g.child+' · +'+g.pts+'分</span></h3>'+
      '<div class="row" style="margin-top:6px">'+
      '<button class="btn btn-sm" style="background:var(--ok)" onclick="done('+g.id+')">✓ 完成+奖励</button>'+
      '<button class="btn btn-sm" style="background:#ccc" onclick="del('+g.id+')">删</button></div>';
    box.appendChild(el);
  });
  const total=Math.max(1,data.goals.length);
  const pct=Math.round(data.done/total*100);
  document.getElementById('stat').textContent='孩子【'+(data.goals[0]?data.goals[0].child:'—')+'】累计 '+data.pts+' 分 · 完成 '+data.done+'/'+data.goals.length+' 个目标';
  document.getElementById('bar').style.width=pct+'%';
  const h=document.getElementById('history'); h.innerHTML='';
  data.goals.slice(-6).reverse().forEach(g=>{
    const d=document.createElement('div'); d.className='mini';
    d.textContent=(g.done?'✅ ':'⬜ ')+g.goal+'（+'+g.pts+'）'; h.appendChild(d);
  });
}
render();
</script>
</body>
</html>
