<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>AI个人关系管理CRM</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn.sub{background:#fff;color:var(--coral);border:1px solid var(--coral)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.contact{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:8px;font-size:13px}
.contact b{color:var(--ink)}.del{color:var(--coral);font-size:12px;float:right;cursor:pointer}
.due{color:var(--coral);font-weight:700}.okc{color:var(--ok);font-weight:700}
small{color:var(--muted)}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">productivity</span><span class="tag">personal_crm_founders</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">AI 个人关系管理 CRM</h1>
    <p class="h-coral" style="font-size:13px;margin:0">AI personal-relationship CRM for founders/freelancers</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">个人 CRM（非销售 CRM）帮独立创始人/自由职业者管理 600+ 人脉上下文。Salesforce/HubSpot 对单人过重且贵，普通通讯录只存名字。本工具离线管理人脉+上下文+跟进提醒（逾期高亮），保住每一段关系。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <label>姓名 / 公司</label>
    <input id="name" placeholder="例如：李雷 · 星河资本">
    <label>关系上下文（怎么认识/聊过什么）</label>
    <input id="ctx" placeholder="例如：上周峰会认识，做SaaS出海">
    <div class="row">
      <div><label>标签</label><select id="tag"><option>投资人</option><option>客户</option><option>同行</option><option>导师</option><option>朋友</option></select></div>
      <div><label>下次跟进</label><input id="due" type="date"></div>
    </div>
    <button class="btn" id="add">添加人脉</button>
  </div>

  <div class="card" id="list"><b>👥 我的关系网（<span id="cnt">0</span>）</b><div id="items"></div></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://getdex.com/blog/personal-crm-for-networking/" target="_blank" style="color:var(--coral)">Dex · Clay · Covve · folk · Monica · Wave Connect</a>
  </div>

<script>
const KEY="P1-011";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function add(){
  const name=document.getElementById("name").value.trim();if(!name)return;
  const ctx=document.getElementById("ctx").value.trim();
  const tag=document.getElementById("tag").value;
  const due=document.getElementById("due").value;
  items.push({name,ctx,tag,due,t:new Date().toLocaleString("zh")});
  localStorage.setItem(KEY,JSON.stringify(items));
  document.getElementById("name").value="";document.getElementById("ctx").value="";document.getElementById("due").value="";
  render();
}
function render(){
  document.getElementById("cnt").textContent=items.length;
  const box=document.getElementById("items");
  if(!items.length){box.innerHTML='<p style="font-size:13px;color:#aaa;margin:6px 0">还没有人脉，添加第一个。</p>';return;}
  const today=new Date().toISOString().slice(0,10);
  box.innerHTML=items.slice().reverse().map((r,i)=>{
    const overdue=r.due&&r.due<today,soon=r.due&&r.due>=today;
    const dueTxt=r.due?`跟进：${overdue?`<span class="due">已逾期 ${r.due}</span>`:(soon?`<span class="okc">待跟进 ${r.due}</span>`:r.due)}`:"未设跟进";
    return `<div class="contact"><span class="del" data-n="${r.name}">删除</span>
      <b>${r.name}</b> <span class="tag">${r.tag}</span><br>
      ${r.ctx?`<small>${r.ctx}</small><br>`:""}${dueTxt}<br><small>${r.t}</small></div>`;
  }).join("");
  box.querySelectorAll(".del").forEach(e=>e.onclick=()=>{items=items.filter(x=>x.name!==e.dataset.n);localStorage.setItem(KEY,JSON.stringify(items));render();});
}
document.getElementById("add").onclick=add;render();
</script>
</body>
</html>
