<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>跨品牌家庭守护看板</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;--warn:#E8920C;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.7;padding:16px;max-width:480px;margin:0 auto;font-size:17px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:16px;border:none;border-radius:14px;
  background:var(--coral);color:#fff;font-size:19px;font-weight:700;cursor:pointer;margin-top:10px}
.btn:active{background:var(--coral-dark)}
.btn-ok{background:var(--ok)}
.tag{display:inline-block;font-size:13px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:3px 11px;margin:2px 5px 2px 0}
input,select,textarea{width:100%;padding:14px;border:1px solid var(--line);
  border-radius:12px;font-size:17px;margin-top:8px;background:#fff;color:var(--ink)}
label{font-size:15px;color:var(--muted);display:block;margin-top:12px;font-weight:600}
.mini{font-size:13px;color:var(--muted)}
.board{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}
.board>div{background:#FFF7F7;border:1px solid #FFE3E3;border-radius:12px;padding:12px}
.board b{display:block;font-size:13px;color:var(--muted);font-weight:600}
.board .v{font-size:18px;font-weight:700;margin-top:4px}
.board .v.warn{color:var(--warn)}
.row{display:flex;gap:10px}.row>*{flex:1}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">creative</span><span class="tag ai">AI增强</span><span class="tag">elderly</span><span class="tag">remote_family_guardian</span></div>
    <h1 style="font-size:22px;margin:8px 0 4px">跨品牌家庭守护看板</h1>
    <p class="h-coral" style="font-size:15px;margin:0">定位 · 用药 · 健康 · 反诈 · 跌倒</p>
  </div>

  <div class="card">
    <b style="font-size:18px">💡 为什么需要</b>
    <p style="font-size:15px;color:#555;margin:6px 0 0">异地子女对父母"远程守护"是跨市场普适刚需。华为/药准时/Apple Watch 各管一段，但工具分散、跨品牌不互通。本看板把父母状态统一在一处。</p>
  </div>

  <div class="card">
    <b style="font-size:18px">👴 更新父母今日状态</b>
    <label>当前位置 / 地址</label>
    <input id="loc" placeholder="如：家中 / 人民路 12 号">
    <label>用药情况</label>
    <select id="med"><option>已按时服药</option><option>漏服一次</option><option>今日无需服药</option></select>
    <label>健康数据（血压/血糖等）</label>
    <input id="health" placeholder="如：血压 125/82，血糖 6.1">
    <label>反诈情况</label>
    <select id="fraud"><option>无异常</option><option>收到可疑信息已忽略</option><option>需子女核实</option></select>
    <label>跌倒 / 安全</label>
    <select id="fall"><option>今日安全</option><option>有一次轻微绊倒</option><option>疑似跌倒，已联系</option></select>
    <button class="btn btn-ok" onclick="save()">📥 更新看板</button>
  </div>

  <div class="card">
    <b style="font-size:18px">📡 子女端统一看板</b>
    <div class="board" id="board"></div>
    <div id="alert" style="margin-top:10px;font-size:15px;font-weight:700"></div>
  </div>

  <div class="card" style="font-size:13px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://k.sina.cn/article_7879923927_1d5ae18d706801gnps.html" target="_blank" style="color:var(--coral)">华为远程守护 / 药准时子女云监督 / Apple Watch 跌倒检测</a>
  </div>

<script>
const KEY="P7-018";
let records=JSON.parse(localStorage.getItem(KEY)||"[]");
function save(){
  const r={
    loc:document.getElementById("loc").value.trim()||"未填",
    med:document.getElementById("med").value,
    health:document.getElementById("health").value.trim()||"未测",
    fraud:document.getElementById("fraud").value,
    fall:document.getElementById("fall").value,
    date:new Date().toLocaleString("zh-CN")
  };
  records.unshift(r);localStorage.setItem(KEY,JSON.stringify(records));render();
}
function render(){
  const box=document.getElementById("board");
  if(!records.length){box.innerHTML='<div style="grid-column:1/3" class="mini">还没有数据，更新一次父母状态吧。</div>';document.getElementById("alert").textContent="";return;}
  const r=records[0];
  const warn=(r.med.includes("漏")||r.fraud.includes("核实")||r.fall.includes("跌倒")||r.fall.includes("绊倒"));
  box.innerHTML=`
    <div><b>📍 位置</b><div class="v">${esc(r.loc)}</div></div>
    <div><b>💊 用药</b><div class="v ${r.med.includes('漏')?'warn':''}">${esc(r.med)}</div></div>
    <div><b>❤ 健康</b><div class="v">${esc(r.health)}</div></div>
    <div><b>🛡 反诈</b><div class="v ${r.fraud.includes('核实')?'warn':''}">${esc(r.fraud)}</div></div>
    <div style="grid-column:1/3"><b>🚨 安全</b><div class="v ${r.fall.includes('跌倒')||r.fall.includes('绊倒')?'warn':''}">${esc(r.fall)}</div></div>`;
  document.getElementById("alert").textContent=warn?"⚠ 有异常项，建议子女尽快联系父母确认！":"✅ 各项状态正常，放心。";
  document.getElementById("alert").style.color=warn?"var(--warn)":"var(--ok)";
}
function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
render();

// === AI助手模块（用户自带Key模式）===
let aiKey = localStorage.getItem("HY3_API_KEY") || "";
let aiHistory = [];

function toggleAI(id){
  const body = document.getElementById("aiBody_" + id);
  const header = document.getElementById("aiHeader_" + id);
  if(body.classList.contains("collapsed")){
    body.classList.remove("collapsed");
    header.classList.remove("collapsed");
  } else {
    body.classList.add("collapsed");
    header.classList.add("collapsed");
  }
}

function saveKey(id){
  const key = document.getElementById("apiKey_" + id).value.trim();
  if(!key){alert("请输入Key");return;}
  localStorage.setItem("HY3_API_KEY", key);
  aiKey = key;
  document.getElementById("aiKeySection_" + id).style.display="none";
  document.getElementById("aiChatSection_" + id).style.display="block";
}

async function callHy3(messages, id){
  if(!aiKey){alert("请先填写 API Key");return null;}
  const loading = document.createElement("div");
  loading.className = "ai-msg";
  loading.innerHTML = `<div class="role">🤖 AI</div><div class="content"><span class="loading">思考中...</span></div>`;
  document.getElementById("aiMessages_" + id).appendChild(loading);
  
  try {
    const res = await fetch("https://tokenhub.tencentmaas.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + aiKey
      },
      body: JSON.stringify({
        model: "hy3",
        messages: messages,
        temperature: 0.7
      })
    });
    const data = await res.json();
    loading.remove();
    if(data.error){alert("API错误："+data.error.message);return null;}
    return data.choices[0].message.content;
  } catch(e){
    loading.remove();
    alert("调用失败："+e.message);
    return null;
  }
}

function addMsg(role, content, id){
  const box = document.getElementById("aiMessages_" + id);
  if(!box)return;
  const div = document.createElement("div");
  div.className = "ai-msg";
  div.innerHTML = `<div class="role">${role==="user"?"🙋 你":"🤖 AI"}</div><div class="content">${content.replace(/\n/g,"<br>")}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

async function aiChat(id){
  const input = document.getElementById("aiInput_" + id).value.trim();
  if(!input){return;}
  document.getElementById("aiInput_" + id).value = "";
  addMsg("user", input, id);
  const msgs = [
    {role:"system",content:"你是这个工具的AI助手，帮助用户更好地使用本工具，提供专业建议和优化方案。用中文简洁回答。"},
    {role:"user",content:input}
  ];
  const reply = await callHy3(msgs, id);
  if(reply) addMsg("assistant", reply, id);
}

</script>
</body>
</html>
