<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>极简客户管理CRM</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.mini{font-size:14px;margin:14px 0 4px;font-weight:600;color:var(--ink);
  border-left:4px solid var(--coral);padding-left:8px}
.item{background:#FBFBFB;border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px;font-size:14px}
.del{color:var(--coral);float:right;font-size:13px;cursor:pointer}
.row{display:flex;gap:8px}.row>*{flex:1}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">business</span><span class="tag">micro_merchant_crm</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">极简客户管理CRM</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Minimalist micro-merchant CRM (profiles+follow-up+ledger)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">个体商户/私域从业者缺轻量CRM：客户助手整合客户建档、跟进记录、业务记账，基础功能永久免费。痛点：大CRM太重太贵，Excel管客户易丢。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <div class="mini">👤 客户建档</div>
    <label>姓名/店名</label><input id="c_name" placeholder="如 李姐水果店">
    <div class="row">
      <div><label>电话</label><input id="c_tel" placeholder="138..."></div>
      <div><label>标签</label><input id="c_tag" placeholder="批发/复购"></div>
    </div>
    <button class="btn" onclick="addC()">建档</button>

    <div class="mini">📝 跟进记录</div>
    <label>选客户</label><select id="sel"></select>
    <label>跟进内容</label><textarea id="c_follow" rows="2" placeholder="如 微信发了新品图，等回复"></textarea>
    <label>本次收支(元，收正支负)</label><input id="c_amt" type="number" placeholder="0">
    <button class="btn" onclick="follow()">保存跟进</button>
  </div>

  <div class="card" id="list"><b>📋 客户 & 台账</b><div id="box"></div></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.124xz.com/chyy07/116327.html" target="_blank" style="color:var(--coral)">客户助手 · 微淼客</a>
  </div>

<script>
const K="P12-012_crm";
let items=JSON.parse(localStorage.getItem(K)||"[]");
function addC(){const n=document.getElementById("c_name").value.trim(),t=document.getElementById("c_tel").value.trim(),g=document.getElementById("c_tag").value.trim();
  if(!n){alert("填客户名");return;}items.push({n,t,g,follow:[],ledger:0});localStorage.setItem(K,JSON.stringify(items));render();}
function follow(){const i=+document.getElementById("sel").value,f=document.getElementById("c_follow").value.trim(),a=parseFloat(document.getElementById("c_amt").value)||0;
  if(isNaN(i)||!items[i]){alert("先建档");return;}
  items[i].follow.push({f,t:new Date().toLocaleDateString()});items[i].ledger+=a;
  localStorage.setItem(K,JSON.stringify(items));render();}
function del(i){items.splice(i,1);localStorage.setItem(K,JSON.stringify(items));render();}
function render(){
  const sel=document.getElementById("sel");sel.innerHTML=items.map((x,i)=>`<option value="${i}">${x.n}</option>`).join("");
  let total=items.reduce((s,x)=>s+x.ledger,0);
  let h=`<p style="font-size:13px">客户 ${items.length} 个 · 收支台账合计 <b>¥${total.toFixed(0)}</b></p>`;
  h+=items.map((x,i)=>`<div class="item"><span class="del" onclick="del(${i})">删</span><b>${x.n}</b> <span style="font-size:12px;color:var(--muted)">${x.g} · ${x.t}</span><br>
    台账 <b style="color:${x.ledger>=0?'var(--ok)':'#E85555'}">¥${x.ledger}</b> · 跟进${x.follow.length}次
    ${x.follow.length?`<div style="font-size:12px;color:var(--muted);margin-top:4px">${x.follow.slice().reverse().map(f=>f.t+"："+f.f).join("<br>")}</div>`:""}</div>`).join("");
  document.getElementById("box").innerHTML=h||"<p style='font-size:13px;color:var(--muted)'>还没有客户。</p>";
}
render();
</script>
</body>
</html>
