<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Edan生物反馈居家产后康复</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn.ghost{background:#FFF0F0;color:var(--coral);border:1px solid #FFD9D9}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.best{background:#FFF8F0;border:1px solid #FFE6CC;border-radius:12px;padding:12px;font-size:14px;margin-top:8px}
.item{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:8px;font-size:14px}
.item .meta{font-size:11px;color:var(--muted);margin-top:4px}
.qa{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:8px;font-size:14px}
.qa .a{font-size:13px;color:var(--ok);margin-top:4px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">postpartum</span><span class="tag">biofeedback</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">Edan 生物反馈居家产康</h1>
    <p class="h-coral" style="font-size:13px;margin:0">凯格尔游戏化训练 + 康复师在线咨询</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">居家盆底训练需硬件反馈才有效，纯软件 App 难坚持。邦妮康复（理邦 Edan）配生物刺激反馈仪，用国际标准凯格尔评估自动生成报告，声音引导 + 图像 + 游戏化训练，可在线咨询康复师。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 凯格尔"收缩保持"挑战</b>
    <p style="font-size:13px;color:#666;margin:6px 0 0">模拟生物反馈：按住按钮收缩，松手休息，记录单次最长保持秒数。</p>
    <button class="btn" id="hold" onmousedown="startHold()" onmouseup="endHold()" ontouchstart="startHold()" ontouchend="endHold()">💪 按住 = 收缩盆底肌</button>
    <p style="font-size:13px;color:#555;text-align:center" id="holdNow">0.0 秒</p>
    <div class="best" id="bestBox">最佳保持：—</div>
    <button class="btn ghost" onclick="saveHold()">💾 保存本次成绩</button>
    <div id="holds"></div>
  </div>

  <div class="card">
    <b>💬 工具 · 康复师咨询记录</b>
    <label>我的问题</label>
    <input id="q" placeholder="例如：第3周训练后有点酸痛正常吗？">
    <label>康复师回复（粘贴 / 手写）</label>
    <textarea id="a" rows="2" placeholder="康复师的建议…"></textarea>
    <button class="btn" onclick="addQA()">📨 保存咨询记录</button>
    <div id="qas"></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://m.crsky.com/mip/soft/732392.html" target="_blank" style="color:var(--coral)">邦妮康复（理邦 Edan 生物刺激反馈）</a>
  </div>

<script>
const KEY="P15-010";
let data=JSON.parse(localStorage.getItem(KEY)||'{"holds":[],"qas":[]}');
let t0=0,cur=0,running=false,timer=null;
function startHold(){running=true;t0=Date.now();timer=setInterval(()=>{cur=(Date.now()-t0)/1000;document.getElementById("holdNow").textContent=cur.toFixed(1)+" 秒";},100);}
function endHold(){if(!running)return;running=false;clearInterval(timer);}
function saveHold(){
  if(cur<0.5){alert("先按住练习一次");return;}
  const best=data.holds.reduce((m,h)=>Math.max(m,h.s),0);
  data.holds.unshift({s:+cur.toFixed(1),t:new Date().toLocaleString("zh-CN")});
  cur=0;document.getElementById("holdNow").textContent="0.0 秒";
  localStorage.setItem(KEY,JSON.stringify(data));render();
}
function addQA(){
  const q=document.getElementById("q").value.trim(),a=document.getElementById("a").value.trim();
  if(!q){alert("先写下你的问题");return;}
  data.qas.unshift({q,a,t:new Date().toLocaleDateString("zh-CN")});
  document.getElementById("q").value="";document.getElementById("a").value="";
  localStorage.setItem(KEY,JSON.stringify(data));render();
}
function render(){
  const best=data.holds.reduce((m,h)=>Math.max(m,h.s),0);
  document.getElementById("bestBox").textContent="最佳保持："+(best?best+" 秒":"—");
  const h=document.getElementById("holds");h.innerHTML=data.holds.length?'<p style="font-size:13px;color:#555;margin-top:10px"><b>挑战记录</b></p>':'';
  data.holds.slice(0,6).forEach(x=>{const d=document.createElement("div");d.className="item";d.innerHTML=x.s+' 秒<div class="meta">'+x.t+'</div>';h.appendChild(d);});
  const q=document.getElementById("qas");q.innerHTML=data.qas.length?'<p style="font-size:13px;color:#555;margin-top:10px"><b>咨询记录</b></p>':'';
  data.qas.slice(0,5).forEach(x=>{const d=document.createElement("div");d.className="qa";d.innerHTML='<b>Q：</b>'+x.q+(x.a?'<div class="a">A：'+x.a+'</div>':'')+'<div class="meta">'+x.t+'</div>';q.appendChild(d);});
}
render();
</script>
</body>
</html>
