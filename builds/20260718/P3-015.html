<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>家庭共享宠物健康档案</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.item b{color:var(--ink)}.del{color:var(--muted);font-size:12px;float:right;cursor:pointer}
.pill{display:inline-block;font-size:11px;background:#FFF0F0;color:var(--coral);border-radius:999px;padding:1px 8px;margin:2px 3px 0 0}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">pet</span><span class="tag">shared_pet_health_record_jp</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">家庭共享宠物健康档案</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Family-shared pet health record</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">日本"ペットノート+"主打家庭共享健康管理：支持多宠物、自定义记录（体重/体温/排便）、疫苗提醒、图表趋势、日记、支出管理，最多与15位家人共享。单一App难覆盖"记录+共享+医疗协同"。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:#555;margin:6px 0 0">记录疫苗/就医/体重等健康项，自动按宠物生成趋势，本地保存（家庭共享版可多人同用本机）。</p>
    <div class="row">
      <div><label>宠物</label><input id="pet" placeholder="豆豆"></div>
      <div><label>记录项</label>
      <select id="item"><option>疫苗</option><option>就医</option><option>体重(kg)</option><option>体温</option><option>排便</option><option>支出</option></select></div>
    </div>
    <div class="row">
      <div><label>数值/说明</label><input id="val" placeholder="如：4.2 或 狂犬疫苗"></div>
      <div><label>日期</label><input id="date" type="date"></div>
    </div>
    <button class="btn" onclick="add()">添加记录</button>
  </div>

  <div class="card" id="list">
    <b>📋 健康档案</b>
    <p style="font-size:12px;color:var(--muted);margin:4px 0 0">本地保存，多宠物可切换查看。</p>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://prtimes.jp/main/html/rd/p/000000029.000162349.html" target="_blank" style="color:var(--coral)">ペットノート+ (Petnote+)</a>
  </div>

<script>
const KEY="P3-015";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function add(){
  const pet=document.getElementById("pet").value.trim();
  if(!pet){alert("先填宠物名");return;}
  const item=document.getElementById("item").value;
  const val=document.getElementById("val").value.trim()||"—";
  const date=document.getElementById("date").value||"未定";
  items.unshift({pet,item,val,date,t:new Date().toLocaleString("zh-CN")});
  localStorage.setItem(KEY,JSON.stringify(items));render();
  document.getElementById("val").value="";
}
function del(i){items.splice(i,1);localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const el=document.getElementById("list");
  let h='<b>📋 健康档案</b><p style="font-size:12px;color:var(--muted);margin:4px 0 0">本地保存，多宠物可切换查看。</p>';
  if(!items.length){h+='<p style="font-size:13px;color:var(--muted);margin-top:8px">还没有记录。</p>';}
  items.forEach((it,i)=>{
    h+='<div class="item"><span class="del" onclick="del('+i+')">删除 ✕</span>'+
       '<span class="pill">'+it.pet+'</span><span class="pill">'+it.item+'</span><br>'+
       '<b>'+it.val+'</b> <span style="font-size:13px;color:#555">'+it.date+'</span><br>'+
       '<span style="font-size:11px;color:var(--muted)">'+it.t+'</span></div>';
  });
  el.innerHTML=h;
}
render();
</script>
</body>
</html>
