<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>下班 2h 副业 SaaS 陪跑</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{background:#FAFAFA;border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px;font-size:13px}
.item .del{float:right;color:var(--muted);font-size:12px}
.kpi{display:flex;gap:8px;margin-top:8px}
.kpi>div{flex:1;background:#FFF7F7;border:1px solid #FFE2E2;border-radius:10px;padding:10px;text-align:center}
.kpi b{font-size:20px;color:var(--coral);display:block}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">tech</span><span class="tag">solo_saas</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">下班 2h 副业 SaaS 陪跑</h1>
    <p class="h-coral" style="font-size:13px;margin:0">After-work 2h Side-SaaS Coach</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">日本个人开发爆发：上班族下班 2h/天，14 天做出翻译比较工具，90 天月收 $4,500；教师 21 天做备课+AI 批改，120 天月收 $12,000。痛点：想做可持续小生意但缺系统设计与获客。机会在模板与陪跑。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 今日 2h 打卡</b>
    <input id="task" placeholder="今天推进了什么">
    <div class="row">
      <input id="mins" type="number" placeholder="实际投入分钟">
      <input id="day" type="number" placeholder="第几天(1-30)">
    </div>
    <button class="btn" onclick="log()">打卡</button>
    <div class="kpi">
      <div><b id="kDays">0</b>累计天</div>
      <div><b id="kMin">0</b>总分钟</div>
      <div><b id="kDay">0</b>当前天</div>
    </div>
  </div>

  <div class="card">
    <b>🛠 工具 · MRR 追踪</b>
    <div class="row">
      <input id="mrr" type="number" placeholder="当前月收 $">
      <input id="goal" type="number" placeholder="目标 $4500">
    </div>
    <button class="btn" onclick="track()">记录月度</button>
    <p style="font-size:12px;color:var(--ok);margin-top:8px" id="mrrMsg"></p>
  </div>

  <div class="card" id="list">
    <b>📋 打卡记录</b>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.atmarketing.tw/replit-agents-5-launched-6-months-solo-founder-era-3-development-revolution" target="_blank" style="color:var(--coral)">Replit Agents 5.0 个人创业潮</a>
  </div>

<script>
const KEY="P2-010";
let items = JSON.parse(localStorage.getItem(KEY) || "[]");
function log(){
  const task=document.getElementById("task").value.trim();
  if(!task){ alert("写点今天推进的内容"); return; }
  const mins=+document.getElementById("mins").value||0;
  const day=+document.getElementById("day").value||(maxDay()+1);
  items.unshift({task,mins,day,t:Date.now()});
  localStorage.setItem(KEY,JSON.stringify(items));
  document.getElementById("task").value=""; document.getElementById("mins").value=""; document.getElementById("day").value="";
  render();
}
function maxDay(){ return items.reduce((m,x)=>Math.max(m,x.day),0); }
function track(){
  const mrr=+document.getElementById("mrr").value||0;
  const goal=+document.getElementById("goal").value||4500;
  const pct=Math.round(mrr/goal*100);
  document.getElementById("mrrMsg").textContent="进度 "+pct+"%（"+mrr+" / "+goal+" $）"+(pct>=100?" 🎉 达标":" 继续加油");
}
function render(){
  const box=document.getElementById("list");
  const totMin=items.reduce((s,x)=>s+x.mins,0);
  document.getElementById("kDays").textContent=items.length;
  document.getElementById("kMin").textContent=totMin;
  document.getElementById("kDay").textContent=maxDay();
  let h='<b>📋 打卡记录</b>';
  if(items.length===0){ h+='<p style="font-size:13px;color:var(--muted)">还没有打卡。</p>'; }
  items.forEach((it,i)=>{
    h+='<div class="item"><span class="del" onclick="del('+i+')">删除</span>Day '+it.day+' · '+it.mins+'min<br>'+it.task+'</div>';
  });
  box.innerHTML=h;
}
function del(i){ items.splice(i,1); localStorage.setItem(KEY,JSON.stringify(items)); render(); }
render();
</script>
</body>
</html>
