<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>母亲自身恢复追踪</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn.ghost{background:#FFF0F0;color:var(--coral);border:1px solid #FFD9D9}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.item{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:8px;font-size:14px}
.item .meta{font-size:11px;color:var(--muted);margin-top:4px}
.del{color:var(--coral);font-size:12px;float:right;cursor:pointer}
textarea#export{font-size:12px;background:#fafafa}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">postpartum</span><span class="tag">fourth_trimester</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">母亲自身恢复追踪</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Mother's-own recovery · 恶露 / 情绪 / 睡眠 / 疼痛 + 医生导出</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">几乎每个产后 App 都在追踪宝宝，1/8 女性有 PPD 症状却没人追踪母亲。Go Go Gaia 追踪母亲自身恢复：恶露、愈合、疼痛、每日情绪、睡眠与症状，并提供医生可导出的数据。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 每日母亲恢复记录</b>
    <label>恶露量</label>
    <select id="lochia"><option>无</option><option>少量（护垫）</option><option>中等</option><option>较多（需产褥垫）</option></select>
    <label>疼痛程度（1 无痛 → 10 剧痛）</label>
    <input id="pain" type="number" min="1" max="10" value="3">
    <label>昨夜睡眠时长（小时）</label>
    <input id="sleep" type="number" step="0.5" value="5">
    <label>今日情绪（1 很低落 → 10 很好）</label>
    <input id="mood" type="number" min="1" max="10" value="6">
    <label>其他症状（盗汗/头痛/精力，选填）</label>
    <input id="sym" placeholder="例如：盗汗明显、有点头痛">
    <button class="btn" onclick="addRec()">📌 保存今日恢复</button>
  </div>

  <div class="card" id="list">
    <b>📋 恢复时间线</b>
    <div id="recs"></div>
    <button class="btn ghost" onclick="genExport()">📤 生成给医生的数据</button>
    <textarea id="export" rows="6" readonly style="margin-top:8px;display:none"></textarea>
    <button class="btn ghost" id="copyBtn" style="display:none" onclick="copyExport()">复制</button>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="http://www.go-go-gaia.com/blog/best-postpartum-tracking-app.html" target="_blank" style="color:var(--coral)">Go Go Gaia（母亲恢复追踪）</a>
  </div>

<script>
const KEY="P15-005";
let recs=JSON.parse(localStorage.getItem(KEY)||"[]");
function save(){localStorage.setItem(KEY,JSON.stringify(recs));render();}
function nowStr(){const d=new Date();const p=n=>(""+n).padStart(2,"0");return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate());}
function addRec(){
  recs.unshift({date:nowStr(),lochia:document.getElementById("lochia").value,pain:+document.getElementById("pain").value,sleep:+document.getElementById("sleep").value,mood:+document.getElementById("mood").value,sym:document.getElementById("sym").value.trim()});
  document.getElementById("sym").value="";save();
}
function delRec(i){recs.splice(i,1);save();}
function genExport(){
  if(!recs.length){alert("还没有记录");return;}
  let t="【母亲产后恢复记录】\n";
  recs.forEach(r=>{t+="· "+r.date+" 恶露:"+r.lochia+" 疼痛:"+r.pain+"/10 睡眠:"+r.sleep+"h 情绪:"+r.mood+"/10"+(r.sym?" 症状:"+r.sym:"")+"\n";});
  const ta=document.getElementById("export");ta.style.display="block";ta.value=t;document.getElementById("copyBtn").style.display="block";
}
function copyExport(){const ta=document.getElementById("export");ta.select();document.execCommand("copy");alert("已复制，可粘贴给医生");}
function render(){
  const box=document.getElementById("recs");
  box.innerHTML=recs.length?'':'<p style="font-size:13px;color:#aaa;margin:8px 0 0">从今天开始，记录妈妈自己的恢复。</p>';
  recs.forEach((r,i)=>{const d=document.createElement("div");d.className="item";
    d.innerHTML='<span class="del" onclick="delRec('+i+')">删除</span><b>'+r.date+'</b><div style="font-size:13px;color:#555">恶露:'+r.lochia+' ｜ 疼痛 '+r.pain+' ｜ 睡眠 '+r.sleep+'h ｜ 情绪 '+r.mood+(r.sym?'<br>症状:'+r.sym:'')+'</div>';
    box.appendChild(d);});
}
render();
</script>
</body>
</html>
