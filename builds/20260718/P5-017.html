<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>走失宠物警报 + 科学找回指南</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:10px;margin-top:10px;font-size:13px}
.item b{color:var(--coral)}
.del{color:var(--muted);font-size:12px;float:right;cursor:pointer}
.check{display:flex;align-items:center;gap:8px;font-size:14px;padding:6px 0;border-bottom:1px solid var(--line)}
.check input{width:auto;margin:0}
.done{text-decoration:line-through;color:var(--muted)}
.kpi b{color:var(--coral)}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">lifestyle</span><span class="tag">lost_pet_finder</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">走失宠物警报 + 科学找回指南</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Localized lost-pet alert + community search guide</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">走失宠物找回 App 是被忽视的刚需:PawBoost 累计助力 100 万+ 宠物团聚,Rescue Squad 注册 700 万+。痛点:宠物走失后主人慌乱、缺乏本地化协同搜寻工具。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:#555;margin:4px 0 10px">登记走失宠物,并照科学找回清单逐项推进。</p>
    <div class="row">
      <div><label>宠物名</label><input id="pname" placeholder="如 旺财"></div>
      <div><label>品种</label><input id="breed" placeholder="如 柯基"></div>
    </div>
    <label>走失地点</label>
    <input id="place" placeholder="如 朝阳公园西门">
    <div class="row">
      <div><label>走失时间</label><input id="ldate" type="date"></div>
      <div><label>状态</label><select id="st"><option>搜寻中</option><option>已找回</option></select></div>
    </div>
    <button class="btn" onclick="add()">发布走失警报</button>
  </div>

  <div class="card" id="list"><b>🚨 走失警报</b><div id="items"></div></div>

  <div class="card">
    <b>🧭 科学找回清单</b>
    <div id="guide"></div>
    <div style="font-size:13px;margin-top:8px">进度: <b class="kpi" id="gp">0/0</b></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://apps.apple.com/us/app/pawboost-lost-and-found-pets/id1131343030" target="_blank" style="color:var(--coral)">PawBoost · Missing Pets · Paw Guide</a>
  </div>

<script>
const KEY="P5-017", GKEY="P5-017-guide";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
const steps=["立即在走失半径1km内步行搜寻","发布带清晰照片的邻里/小区群警报","联系附近宠物医院与收容所","放置带有气味的熟悉物品(衣物/窝)","设置监控诱捕点或监控摄像头","打印并张贴走失启事(含联系方式)"];
let checked=JSON.parse(localStorage.getItem(GKEY)||"[]");
function add(){const pname=pname_.value.trim(), breed=breed_.value.trim(), place=place_.value.trim(), ldate=ldate_.value;
  if(!pname||!place){alert("请填宠物名和走失地点");return;}
  items.unshift({pname,breed,place,ldate,st:st.value});
  localStorage.setItem(KEY,JSON.stringify(items)); pname_.value="";breed_.value="";place_.value=""; render();}
function setSt(i,s){items[i].st=s;localStorage.setItem(KEY,JSON.stringify(items));render();}
function del(i){items.splice(i,1);localStorage.setItem(KEY,JSON.stringify(items));render();}
function toggle(j){if(checked.includes(j))checked=checked.filter(x=>x!==j);else checked.push(j);
  localStorage.setItem(GKEY,JSON.stringify(checked)); renderGuide();}
function renderGuide(){gp.textContent=checked.length+"/"+steps.length;
  guide_.innerHTML=steps.map((s,j)=>`<label class="check"><input type="checkbox" ${checked.includes(j)?'checked':''} onchange="toggle(${j})">
    <span class="${checked.includes(j)?'done':''}">${s}</span></label>`).join("");}
function render(){if(!items.length){items_.innerHTML='<p style="font-size:13px;color:#555;margin:6px 0 0">还没有走失警报。</p>';return;}
  items_.innerHTML=items.map((it,i)=>`<div class="item"><span class="del" onclick="del(${i})">删除</span>
    <b>${it.pname}</b> ${it.breed?("· "+it.breed):""} · <span style="color:${it.st==='已找回'?'var(--ok)':'var(--coral)'}">${it.st}</span><br>
    走失:${it.place} ${it.ldate||''}<br>
    <span onclick="setSt(${i},'已找回')" style="cursor:pointer;font-size:12px;padding:2px 6px;border-radius:8px;background:var(--ok);color:#fff;margin-right:4px">标记已找回</span>
    <span onclick="setSt(${i},'搜寻中')" style="cursor:pointer;font-size:12px;padding:2px 6px;border-radius:8px;background:#f0f0f0;color:#666">仍在搜寻</span></div>`).join("");}
const pname_=document.getElementById("pname"),breed_=document.getElementById("breed"),place_=document.getElementById("place"),
  ldate=document.getElementById("ldate"),st=document.getElementById("st"),
  guide_=document.getElementById("guide"),gp=document.getElementById("gp"),items_=document.getElementById("items");
render(); renderGuide();
</script>
</body>
</html>
