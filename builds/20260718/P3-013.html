<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>宠物看护遛狗订单本</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.item b{color:var(--ink)}.del{color:var(--muted);font-size:12px;float:right;cursor:pointer}
.pill{display:inline-block;font-size:11px;background:#FFF0F0;color:var(--coral);border-radius:999px;padding:1px 8px;margin:2px 3px 0 0}
.sum{font-size:13px;color:var(--ok);margin-top:6px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">pet</span><span class="tag">pet_sitting_marketplace</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">宠物看护·遛狗订单本</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Pet sitting / dog-walking marketplace</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">宠物看护是被验证的巨型市场。Rover 2025年营收约$7.5亿，连接数百万主人与看护者（寄养/遛狗/到访/日托）。亚洲渗透低。机会：宠物看护/遛狗双边平台，都市独居青年+双职工家庭刚需。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:#555;margin:6px 0 0">记录每一单看护/遛狗服务（类型/宠物/日期/费用），自动统计收入，本地保存。</p>
    <label>服务类型</label>
    <select id="type"><option>寄养</option><option>遛狗</option><option>到访喂养</option><option>日托</option></select>
    <div class="row">
      <div><label>宠物</label><input id="pet" placeholder="如：金毛Lucky"></div>
      <div><label>日期</label><input id="date" type="date"></div>
    </div>
    <div class="row">
      <div><label>费用(元)</label><input id="fee" type="number" placeholder="80"></div>
      <div><label>状态</label><select id="st"><option>已完成</option><option>进行中</option><option>已预约</option></select></div>
    </div>
    <button class="btn" onclick="add()">记一单</button>
  </div>

  <div class="card" id="list">
    <b>📋 我的订单本</b>
    <p style="font-size:12px;color:var(--muted);margin:4px 0 0">本地保存，收入一目了然。</p>
    <div class="sum" id="sum"></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.marketgrowthreports.com/blog/mobile-pet-care-companies-425" target="_blank" style="color:var(--coral)">Rover · Wag! · PetBacker</a>
  </div>

<script>
const KEY="P3-013";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function add(){
  const type=document.getElementById("type").value;
  const pet=document.getElementById("pet").value.trim();
  if(!pet){alert("请填宠物");return;}
  const date=document.getElementById("date").value||"未定";
  const fee=parseFloat(document.getElementById("fee").value)||0;
  const st=document.getElementById("st").value;
  items.unshift({type,pet,date,fee,st,t:new Date().toLocaleString("zh-CN")});
  localStorage.setItem(KEY,JSON.stringify(items));render();
  document.getElementById("pet").value="";document.getElementById("fee").value="";
}
function del(i){items.splice(i,1);localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const el=document.getElementById("list");
  let h='<b>📋 我的订单本</b><p style="font-size:12px;color:var(--muted);margin:4px 0 0">本地保存，收入一目了然。</p>';
  let total=0;
  if(!items.length){h+='<p style="font-size:13px;color:var(--muted);margin-top:8px">还没有订单。</p>';}
  items.forEach((it,i)=>{
    if(it.st==="已完成")total+=it.fee;
    h+='<div class="item"><span class="del" onclick="del('+i+')">删除 ✕</span>'+
       '<span class="pill">'+it.type+'</span><span class="pill">'+it.st+'</span><br>'+
       '<b>'+it.pet+'</b><br>'+
       '<span style="font-size:13px;color:#555">'+it.date+' · ¥'+it.fee+'</span><br>'+
       '<span style="font-size:11px;color:var(--muted)">'+it.t+'</span></div>';
  });
  h+='<div class="sum" id="sum">已完单总收入：¥'+total.toFixed(2)+'（共'+items.length+'单）</div>';
  el.innerHTML=h;
}
render();
</script>
</body>
</html>
