<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>引导式呼吸训练</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn-ok{background:var(--ok)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.mini{font-size:12px;color:var(--muted)}
.item{background:#FBFBFB;border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.breath{width:160px;height:160px;border-radius:50%;margin:14px auto;background:radial-gradient(circle,#FFD9D9,#FF6B6B);
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700;
  transition:transform .4s ease;text-align:center;line-height:1.3}
.stat{display:flex;gap:10px;text-align:center;margin-top:8px}
.stat>div{flex:1;background:#FFF7F7;border:1px solid #FFE3E3;border-radius:12px;padding:10px}
.stat b{display:block;font-size:22px;color:var(--coral)}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">spirituality</span><span class="tag">breathwork_coaching</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">引导式呼吸训练</h1>
    <p class="h-coral" style="font-size:13px;margin:0">HRV-adaptive breathwork coaching (guided breathing + biofeedback)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">呼吸训练是冥想之外增速最快的身心实践赛道，2032 年市场将达 $24.4 亿。多数 App 只是计时器，缺乏引导与进度可视化。本工具提供 4-7-8、箱式等引导呼吸 + 训练记录。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 引导呼吸 + 训练记录</b>
    <label>呼吸模式</label>
    <select id="mode">
      <option value="478">4-7-8 助眠呼吸</option>
      <option value="box">箱式呼吸（4-4-4-4 减压）</option>
      <option value="calm">5-5 平衡呼吸</option>
    </select>
    <div class="breath" id="circle">准备</div>
    <button class="btn btn-ok" id="startBtn" onclick="start()">▶ 开始（1 分钟）</button>
    <div class="stat">
      <div><b id="sSess">0</b>完成次数</div>
      <div><b id="sMin">0</b>累计分钟</div>
    </div>
  </div>

  <div class="card" id="list"><b>🫁 训练历史</b><div id="items"></div></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://growthmarketreports.com/report/breathwork-coaching-app-market" target="_blank" style="color:var(--coral)">SOMA Breath / Breathwrk / Othership（呼吸训练 App）</a>
  </div>

<script>
const KEY="P7-006";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
let timer=null,step=0;
const PAT={
  "478":[["吸气",4,1.15],["屏息",7,1.0],["呼气",8,0.7],["放松",1,1.0]],
  "box":[["吸气",4,1.15],["屏息",4,1.0],["呼气",4,0.7],["屏息",4,1.0]],
  "calm":[["吸气",5,1.15],["呼气",5,0.7]]
};
function start(){
  if(timer)return;
  const pat=PAT[document.getElementById("mode").value];
  let total=60,elapsed=0;step=0;
  document.getElementById("startBtn").disabled=true;
  const tick=()=>{
    const ph=pat[step%pat.length];
    document.getElementById("circle").textContent=ph[0];
    document.getElementById("circle").style.transform="scale("+ph[3]+")";
    elapsed+=1;step++;
    if(elapsed>=total){
      clearInterval(timer);timer=null;
      document.getElementById("circle").textContent="完成 ✓";
      document.getElementById("circle").style.transform="scale(1)";
      document.getElementById("startBtn").disabled=false;
      items.unshift({mode:document.getElementById("mode").value,min:1,date:new Date().toLocaleDateString("zh-CN")});
      localStorage.setItem(KEY,JSON.stringify(items));render();
    }
  };
  tick();timer=setInterval(tick,1000);
}
function render(){
  document.getElementById("sSess").textContent=items.length;
  document.getElementById("sMin").textContent=items.reduce((a,b)=>a+b.min,0);
  const box=document.getElementById("items");
  if(!items.length){box.innerHTML='<p class="mini" style="margin-top:8px">还没有训练记录，开始第一次吧。</p>';return;}
  box.innerHTML=items.map(it=>`<div class="item"><div style="font-size:14px">完成 1 分钟 ${it.mode} 呼吸</div><div class="mini">${it.date}</div></div>`).join("");
}
render();
</script>
</body>
</html>
