<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>夫妻家务模板共享管理</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn.s{font-size:13px;padding:8px;margin-top:4px;background:#FFE3E3;color:var(--coral)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
.item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.item:last-child{border-bottom:none}
.item .name{flex:1;font-size:15px}
.item .who{font-size:12px;color:var(--muted)}
.done{text-decoration:line-through;color:var(--muted)}
.chip{display:inline-block;font-size:12px;padding:4px 10px;border:1px solid var(--line);border-radius:999px;margin:3px 3px 0 0;background:#fff;cursor:pointer}
.chip:active{background:#FFF0F0}
.del{color:var(--muted);font-size:18px;background:none;border:none;cursor:pointer}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">home</span><span class="tag">couples_housework_share</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">夫妻家务模板共享管理</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Working-couple housework template &amp; shared-task manager</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">共働き夫婦が家事の可視化・公平分担・引き継ぎで疲弊。日本「カジネコ」用 65 个家事模板自动整理每日任务、夫妻分配、完成记录，朝日广告社本格参入印证需求显性化。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 从模板生成今日清单</b>
    <label>选择家事模板（点选加入今日）</label>
    <div id="tpl"></div>
    <div class="row">
      <div>
        <label>分配给</label>
        <select id="who"><option value="me">我</option><option value="partner">伴侣</option></select>
      </div>
      <div>
        <label>周期</label>
        <select id="freq"><option value="每日">每日</option><option value="每周">每周</option></select>
      </div>
    </div>
    <button class="btn" onclick="add()">＋ 加入今日清单</button>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://filehippo.com/android/download_kazineko-gong-dong-kifu-fu-nojia-shi-gong-you-guan-li-apuri/" target="_blank" style="color:var(--coral)">カジネコ（共働き夫婦の家事共有管理）</a>
  </div>

<script>
const KEY="P10-002";
const TEMPLATES=["做早饭","洗碗","拖地","洗衣服","晒被子","倒垃圾","买菜","陪娃写作业","遛狗","擦窗","换床单","取快递","做晚饭","缴费账单","浇花","整理冰箱"];
let sel=[];
let tasks = JSON.parse(localStorage.getItem(KEY) || "[]");
function save(){ localStorage.setItem(KEY, JSON.stringify(tasks)); render(); }
function renderTpl(){
  document.getElementById('tpl').innerHTML=TEMPLATES.map(n=>
    '<span class="chip" onclick="pick(\''+n+'\')">＋'+n+'</span>').join('');
}
function pick(n){ if(!sel.includes(n))sel.push(n);
  document.getElementById('tpl').innerHTML='<div style="font-size:13px">已选：'+sel.map(s=>'<b>'+s+'</b>').join('、')+' <span style="color:var(--coral);cursor:pointer" onclick="sel=[];renderTpl();document.getElementById(\'tpl\').innerHTML=\'\'">清空</span></div>';
}
function add(){
  if(!sel.length) return;
  const who=document.getElementById('who').value, freq=document.getElementById('freq').value;
  sel.forEach(n=>tasks.push({id:Date.now()+Math.random(),name:n,who,freq,done:false}));
  sel=[];renderTpl();save();
}
function toggle(id){const t=tasks.find(x=>x.id==id);if(t)t.done=!t.done;save();}
function del(id){tasks=tasks.filter(x=>x.id!=id);save();}
function render(){
  const el=document.getElementById('list');
  if(!tasks.length){el.innerHTML='<p style="font-size:13px;color:var(--muted)">今日清单为空，从模板选几条吧。</p>';return;}
  const done=tasks.filter(t=>t.done).length;
  el.innerHTML='<b>📋 今日清单（'+done+'/'+tasks.length+' 已完成）</b>'+
    tasks.map(t=>'<div class="item"><input type="checkbox" '+(t.done?'checked':'')+' onchange="toggle('+t.id+')">'+
    '<span class="name '+(t.done?'done':'')+'">'+esc(t.name)+'</span>'+
    '<span class="who">'+whoL(t.who)+'·'+t.freq+'</span>'+
    '<button class="del" onclick="del('+t.id+')">✕</button></div>').join('');
}
function whoL(w){return w=='me'?'我':'伴侣';}
function esc(s){return s.replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
renderTpl();render();
</script>
</body>
</html>
