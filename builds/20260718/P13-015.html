<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>更年期补充剂+追踪闭环</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{background:#FAFAFA;border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px;font-size:14px}
.item .del{float:right;color:var(--coral);font-size:12px;cursor:pointer}
.streak{text-align:center;font-size:28px;font-weight:700;color:var(--coral);margin:8px 0}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">health</span><span class="tag">menopause_supplement_app</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">更年期补充剂 + 追踪闭环</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Menopause supplement + tracker loop</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">Health & Her（药剂师配方补充剂+免费伴侣 App）提供「更年期私人教练」；Balance 通过订阅反哺免费版；Lila 照片餐记录+AI 营养教练，72% 用户 2 周减重。机会：补充剂品牌+追踪 App 的内容/电商闭环。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 补充剂打卡 + 连续天数</b>
    <label>补充剂名称</label><input id="sname" placeholder="黑升麻提取物">
    <div class="row">
      <div><label>剂量</label><input id="dose" placeholder="80mg"></div>
      <div><label>时间</label>
        <select id="time"><option>早</option><option>中</option><option>晚</option></select></div>
    </div>
    <button class="btn" onclick="addItem()">＋ 加入我的补充剂</button>
    <button class="btn" onclick="checkin()" style="background:#fff;color:var(--coral);border:1px solid var(--coral)">✅ 今日已服用</button>
    <div class="streak" id="streak">连续 0 天</div>
  </div>

  <div class="card" id="list"><b>💊 我的补充剂</b></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://getlila.com/best-perimenopause-apps" target="_blank" style="color:var(--coral)">Health & Her / Balance / Lila</a>
  </div>

<script>
const KEY="P13-015";
let data=JSON.parse(localStorage.getItem(KEY)||'{"sups":[],"last":"","streak":0}');
function addItem(){
  const sname=document.getElementById("sname").value.trim();
  if(!sname){alert("请填写补充剂名称");return;}
  data.sups.push({sname,dose:document.getElementById("dose").value.trim(),time:document.getElementById("time").value,done:false});
  document.getElementById("sname").value="";document.getElementById("dose").value="";
  save();
}
function checkin(){
  const today=new Date().toISOString().slice(0,10);
  if(data.last===today){alert("今天已经打过卡啦");return;}
  if(data.last===yesterday())data.streak++;else data.streak=1;
  data.last=today;
  data.sups.forEach(s=>s.done=true);
  save();
}
function yesterday(){const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);}
function del(i){data.sups.splice(i,1);save();}
function save(){localStorage.setItem(KEY,JSON.stringify(data));render();}
function render(){
  const box=document.getElementById("list");
  let html='<b>💊 我的补充剂</b>';
  if(data.sups.length===0)html+='<p style="font-size:13px;color:#999;margin:8px 0">还没有补充剂。</p>';
  data.sups.forEach((s,i)=>{
    html+=`<div class="item"><span class="del" onclick="del(${i})">删除</span>
      <b>${s.sname}</b> · ${s.dose||'?'} · ${s.time}${s.done?' <span style="color:#3FB984">✓</span>':''}</div>`;
  });
  document.getElementById("streak").innerText="连续 "+data.streak+" 天";
  box.innerHTML=html;
}
render();
</script>
</body>
</html>
