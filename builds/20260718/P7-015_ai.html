<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>适老反诈守护</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;--warn:#E8920C;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.7;padding:16px;max-width:480px;margin:0 auto;font-size:17px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:16px;border:none;border-radius:14px;
  background:var(--coral);color:#fff;font-size:19px;font-weight:700;cursor:pointer;margin-top:10px}
.btn:active{background:var(--coral-dark)}
.btn-ok{background:var(--ok)}
.btn-warn{background:var(--warn)}
.tag{display:inline-block;font-size:13px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:3px 11px;margin:2px 5px 2px 0}
textarea,input{width:100%;padding:14px;border:1px solid var(--line);
  border-radius:12px;font-size:17px;margin-top:8px;background:#fff;color:var(--ink)}
label{font-size:15px;color:var(--muted);display:block;margin-top:12px;font-weight:600}
.mini{font-size:13px;color:var(--muted)}
.item{background:#FBFBFB;border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:12px}
.result{margin-top:10px;border-radius:12px;padding:14px;font-size:16px}
.result.high{background:#FFEDED;border:1px solid #FFB3B3;color:#B22}
.result.low{background:#F3FFF7;border:1px solid #D6F3E3;color:#1c7a45}
.row{display:flex;gap:10px}.row>*{flex:1}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">creative</span><span class="tag ai">AI增强</span><span class="tag">elderly</span><span class="tag">anti_fraud_elderly</span></div>
    <h1 style="font-size:22px;margin:8px 0 4px">适老反诈守护</h1>
    <p class="h-coral" style="font-size:15px;margin:0">识诈检测 · 亲情代管 · 转账冻结</p>
  </div>

  <div class="card">
    <b style="font-size:18px">💡 为什么需要</b>
    <p style="font-size:15px;color:#555;margin:6px 0 0">2024 年中消协老年网络消费"陷阱"居投诉首位，有老人被骗 198 万。本工具帮你识别可疑短信、存好亲情号、随时冻结预警。</p>
  </div>

  <div class="card">
    <b style="font-size:18px">🔍 可疑短信检测</b>
    <label>把收到的短信 / 链接贴这里</label>
    <textarea id="msg" rows="3" placeholder="如：恭喜中奖，点链接领红包，需先转账手续费"></textarea>
    <button class="btn btn-warn" onclick="check()">🔍 检测是否诈骗</button>
    <div id="result"></div>
    <button class="btn btn-ok" id="saveBtn" style="display:none" onclick="save()">📥 存为已核查</button>
  </div>

  <div class="card">
    <b style="font-size:18px">👪 亲情守护号</b>
    <div class="row">
      <div><label>子女姓名</label><input id="fname" placeholder="如：女儿"></div>
      <div><label>电话</label><input id="fphone" placeholder="手机号"></div>
    </div>
    <button class="btn" onclick="addFamily()">➕ 添加亲情号</button>
    <div id="family"></div>
    <button class="btn btn-warn" onclick="freezeAlert()" style="margin-top:12px">🛑 我要冻结转账！</button>
  </div>

  
  <!-- AI助手模块 -->
  <div class="card ai" id="aiCard_P7-015">
    <div class="collapse-header" id="aiHeader_P7-015" onclick="toggleAI('P7-015')" style="font-size:15px;font-weight:600;color:var(--ai-border)">
      🤖 AI 助手（用户自带Key · 零成本）
    </div>
    <div class="collapse-body collapsed" id="aiBody_P7-015" style="max-height:500px;margin-top:10px">
      <div id="aiKeySection_P7-015">
        <label>Hy3 API Key（填写你自己的Key，零成本使用AI）</label>
        <input id="apiKey_P7-015" type="password" placeholder="输入你的 Hy3 API Key" style="margin-bottom:8px">
        <button class="btn ai" onclick="saveKey('P7-015')">保存 Key</button>
        <p style="font-size:11px;color:var(--muted);margin:6px 0 0">Key 仅存储在你的浏览器本地，不会上传到任何服务器。没有Key？<a href="#" style="color:var(--ai-border)">点此免费获取</a>。</p>
      </div>
      <div id="aiChatSection_P7-015" style="display:none;margin-top:10px">
        <div id="aiMessages_P7-015" style="max-height:300px;overflow-y:auto"></div>
        <textarea id="aiInput_P7-015" placeholder="向AI提问..." style="margin-top:8px;height:60px"></textarea>
        <button class="btn ai" onclick="aiChat('P7-015')" style="margin-top:4px">发送</button>
      </div>
    </div>
  </div>

  <div class="card" id="list">
    <b style="font-size:18px">🛡 已核查记录</b>
    <div id="items"></div>
  </div>

  <div class="card" style="font-size:13px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.news.cn/fortune/20250313/409f4c7675e746e982253df3c5413342/c.html" target="_blank" style="color:var(--coral)">国家反诈中心APP / 华为远程守护（适老化反诈）</a>
  </div>

<script>
const KEY="P7-015";
let logs=JSON.parse(localStorage.getItem(KEY)||"[]");
let family=JSON.parse(localStorage.getItem(KEY+"_f")||"[]");
const SCAM=["中奖","红包","转账","手续费","验证码","银行卡","密码","公安局","警官","客服","刷单","投资","稳赚","免费领","福利","熟人借钱","账户异常","点链接","返利","解冻"];
let last=null;
function check(){
  const m=document.getElementById("msg").value.trim();
  if(!m){alert("请先粘贴短信内容");return;}
  const hit=SCAM.filter(w=>m.includes(w));
  const level=hit.length>=2?"high":"low";
  const adv=level==="high"
    ?"⚠ 高风险！命中诈骗关键词："+hit.join("、")+"。切勿转账、勿点链接、勿告知验证码，立即联系亲情号核实。"
    :"✅ 未命中明显诈骗词（"+hit.join("、")+"）。仍请保持警惕，涉及钱款务必先与子女确认。";
  last={msg:m,level,hit,date:new Date().toLocaleDateString("zh-CN")};
  document.getElementById("result").innerHTML=`<div class="result ${level}">${adv}</div>`;
  document.getElementById("saveBtn").style.display="block";
}
function save(){if(!last)return;logs.unshift(last);last=null;localStorage.setItem(KEY,JSON.stringify(logs));document.getElementById("result").innerHTML="";document.getElementById("saveBtn").style.display="none";render();}
function addFamily(){const n=document.getElementById("fname").value.trim(),p=document.getElementById("fphone").value.trim();if(!n||!p){alert("请填姓名和电话");return;}family.push({n,p});localStorage.setItem(KEY+"_f",JSON.stringify(family));document.getElementById("fname").value="";document.getElementById("fphone").value="";renderFamily();}
function freezeAlert(){
  if(!family.length){alert("请先添加亲情号，冻结前先联系子女！");return;}
  const f=family[0];
  if(confirm("已通知子女 "+f.n+"（"+f.p+"）。\n请立即：①挂断陌生来电 ②不操作任何转账 ③让子女帮您联系银行冻结。\n\n拨打 "+f.n+"？")){window.location.href="tel:"+f.p;}
}
function renderFamily(){const box=document.getElementById("family");if(!family.length){box.innerHTML='<p class="mini" style="margin-top:8px;font-size:14px">还没有亲情号。</p>';return;}box.innerHTML=family.map((f,i)=>`<div class="item"><div style="font-size:18px;font-weight:700">${esc(f.n)}</div><div class="mini" style="font-size:15px">${esc(f.p)}</div></div>`).join("");}
function render(){
  const box=document.getElementById("items");
  if(!logs.length){box.innerHTML='<p class="mini" style="margin-top:8px;font-size:14px">还没有核查记录。</p>';return;}
  box.innerHTML=logs.map(it=>`<div class="item"><div style="font-size:16px">${it.level==='high'?'⚠ 高风险':'✅ 低风险'}：${esc(it.msg.slice(0,30))}${it.msg.length>30?'…':''}</div><div class="mini" style="font-size:14px">${it.date}</div></div>`).join("");
}
function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
renderFamily();render();

// === AI助手模块（用户自带Key模式）===
let aiKey = localStorage.getItem("HY3_API_KEY") || "";
let aiHistory = [];

function toggleAI(id){
  const body = document.getElementById("aiBody_" + id);
  const header = document.getElementById("aiHeader_" + id);
  if(body.classList.contains("collapsed")){
    body.classList.remove("collapsed");
    header.classList.remove("collapsed");
  } else {
    body.classList.add("collapsed");
    header.classList.add("collapsed");
  }
}

function saveKey(id){
  const key = document.getElementById("apiKey_" + id).value.trim();
  if(!key){alert("请输入Key");return;}
  localStorage.setItem("HY3_API_KEY", key);
  aiKey = key;
  document.getElementById("aiKeySection_" + id).style.display="none";
  document.getElementById("aiChatSection_" + id).style.display="block";
}

async function callHy3(messages, id){
  if(!aiKey){alert("请先填写 API Key");return null;}
  const loading = document.createElement("div");
  loading.className = "ai-msg";
  loading.innerHTML = `<div class="role">🤖 AI</div><div class="content"><span class="loading">思考中...</span></div>`;
  document.getElementById("aiMessages_" + id).appendChild(loading);
  
  try {
    const res = await fetch("https://tokenhub.tencentmaas.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + aiKey
      },
      body: JSON.stringify({
        model: "hy3",
        messages: messages,
        temperature: 0.7
      })
    });
    const data = await res.json();
    loading.remove();
    if(data.error){alert("API错误："+data.error.message);return null;}
    return data.choices[0].message.content;
  } catch(e){
    loading.remove();
    alert("调用失败："+e.message);
    return null;
  }
}

function addMsg(role, content, id){
  const box = document.getElementById("aiMessages_" + id);
  if(!box)return;
  const div = document.createElement("div");
  div.className = "ai-msg";
  div.innerHTML = `<div class="role">${role==="user"?"🙋 你":"🤖 AI"}</div><div class="content">${content.replace(/\n/g,"<br>")}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

async function aiChat(id){
  const input = document.getElementById("aiInput_" + id).value.trim();
  if(!input){return;}
  document.getElementById("aiInput_" + id).value = "";
  addMsg("user", input, id);
  const msgs = [
    {role:"system",content:"你是这个工具的AI助手，帮助用户更好地使用本工具，提供专业建议和优化方案。用中文简洁回答。"},
    {role:"user",content:input}
  ];
  const reply = await callHy3(msgs, id);
  if(reply) addMsg("assistant", reply, id);
}

</script>
</body>
</html>
