<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>イラスト練習記録・圧力なし</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:8px}
.pill{font-size:12px;padding:2px 8px;border-radius:999px;background:#FFF0F0;color:var(--coral)}
.stat b{color:var(--coral);font-size:18px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">hobby</span><span class="tag">art_practice_tracker</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">イラスト練習記録・圧力なし</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Stress-free illustration practice tracker (no streaks)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">既存の習慣アプリは「連続日数」で自己価値を測り、絵の成長が直線的でない人を追い詰める。5分でも50分でも同等に扱う「ストリーク不要」の静かな練習追跡器が求められている（DŌRI）。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:var(--muted);margin:4px 0 0">連続日数は数えません。練習セッションを優しく記録し、累計時間と回数だけ見せます。</p>
    <label>テーマ（任意）</label><input id="d-theme" placeholder="例：デッサン・人物">
    <div class="row">
      <div><label>練習時間(分)</label><input id="d-min" type="number" min="1" placeholder="20"></div>
      <div><label>日付</label><input id="d-date" type="date"></div>
    </div>
    <label>創作日記（任意）</label><textarea id="d-memo" placeholder="例：影の描き方が少しわかった"></textarea>
    <button class="btn" onclick="addD()">記録する（急いでなくてOK）</button>
    <div id="sum" style="margin-top:12px"></div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://apps.apple.com/cn/app/d%C5%8Dri%E8%89%BA%E6%9C%AF%E7%BB%83%E4%B9%A0%E8%BF%BD%E8%B8%AA%E5%99%A8/id6759549795" target="_blank" style="color:var(--coral)">DŌRI 芸術練習追跡器 / ibisPaint</a>
  </div>

<script>
const KEY="P8-018";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function addD(){
  const theme=document.getElementById("d-theme").value.trim();
  const min=parseInt(document.getElementById("d-min").value)||0;
  const date=document.getElementById("d-date").value||new Date().toISOString().slice(0,10);
  const memo=document.getElementById("d-memo").value.trim();
  if(!min){alert("練習時間を入力してください（5分でも大歓迎）");return;}
  items.push({theme,min,date,memo,id:Date.now()});
  document.getElementById("d-theme").value="";document.getElementById("d-min").value="";document.getElementById("d-memo").value="";
  save();
}
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const total=items.reduce((a,b)=>a+b.min,0);
  document.getElementById("sum").innerHTML=
    `<span class='stat'>累計 <b>${total}</b> 分</span> ／ <span class='stat'>セッション <b>${items.length}</b> 回</span><br>`+
    `<span style='font-size:12px;color:var(--muted)'>連続日数は数えません。描くたびが一歩。</span>`;
  const box=document.getElementById("list");
  if(!items.length){box.innerHTML="<b>🎨 練習ノート</b><p style='font-size:13px;color:var(--muted);margin:6px 0 0'>まだ記録がありません。今日は何分描きますか？</p>";return;}
  box.innerHTML="<b>🎨 練習ノート（"+items.length+"）</b>"+items.slice().reverse().map((i,ri)=>{
    const idx=items.length-1-ri;
    return `<div class='item'>${i.theme?`<b>${esc(i.theme)}</b> `:""}<span class='pill'>${i.min}分</span>
      <div style='font-size:13px;color:var(--muted)'>${i.date}</div>
      ${i.memo?`<div style='font-size:14px;margin-top:4px'>${esc(i.memo)}</div>`:""}
      <button class='mini' style='margin-top:4px' onclick='del(${idx})'>削除</button></div>`;
  }).join("");
}
function del(idx){items.splice(idx,1);save();}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
render();
</script>
</body>
</html>
