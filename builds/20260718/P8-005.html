<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>JLPT特化・艾宾浩斯記憶計画</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:8px}
.pill{font-size:12px;padding:2px 8px;border-radius:999px;background:#FFF0F0;color:var(--coral)}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">education</span><span class="tag">jlpt_prep_app</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">JLPT特化・艾宾浩斯記憶計画</h1>
    <p class="h-coral" style="font-size:13px;margin:0">JLPT-focused app (past papers + AI weak-point analysis + study community)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">単なる単語暗記ではなく「真题＋聴解＋弱点分析」の統合が求められる。JLPT（N1〜N5）合格には、忘却曲線に沿った計画的な復習が鍵。競合は多く、差別化は記憶計画の質。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:var(--muted);margin:4px 0 0">単語を登録すると艾宾浩斯（忘却）曲線に沿って次回復習日を自動計算。今日が復習予定の単語だけ出します。</p>
    <label>単語</label><input id="v-word" placeholder="例：承知する">
    <label>読み</label><input id="v-read" placeholder="例：しょうちする">
    <label>意味</label><input id="v-mean" placeholder="例：知道する・了承する">
    <label>レベル</label>
    <select id="v-lv">
      <option>N5</option><option>N4</option><option>N3</option><option>N2</option><option>N1</option>
    </select>
    <button class="btn" onclick="addV()">単語を登録</button>
    <div id="due" style="margin-top:14px"></div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://apps.apple.com/hk/app/mojitest-jlpt%E6%97%A5%E8%AF%AD%E8%83%BD%E5%8A%9B%E8%80%83%E8%AF%95%E5%A4%87%E8%80%83%E8%83%8C%E5%8D%95%E8%AF%8D/id1258480187" target="_blank" style="color:var(--coral)">MOJiTest / Goukaku / Bunpo</a>
  </div>

<script>
const KEY="P8-005";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
const IV=[1,3,7,16,35,70]; // 艾宾浩斯間隔（日）
function today(){return new Date().toISOString().slice(0,10);}
function addV(){
  const word=document.getElementById("v-word").value.trim();
  const read=document.getElementById("v-read").value.trim();
  const mean=document.getElementById("v-mean").value.trim();
  const lv=document.getElementById("v-lv").value;
  if(!word||!mean){alert("単語と意味は必須です");return;}
  items.push({word,read,mean,lv,box:0,next:today(),id:Date.now()});
  document.getElementById("v-word").value="";document.getElementById("v-read").value="";document.getElementById("v-mean").value="";
  save();
}
function reviewed(id){
  const it=items.find(i=>i.id===id);if(!it)return;
  it.box=Math.min(it.box+1,IV.length-1);
  const d=new Date();d.setDate(d.getDate()+IV[it.box]);
  it.next=d.toISOString().slice(0,10);
  save();
}
function nextDate(id){
  const it=items.find(i=>i.id===id);if(!it)return;
  const d=new Date();d.setDate(d.getDate()+IV[it.box]);
  it.next=d.toISOString().slice(0,10);
  save();
}
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const t=today();
  const due=items.filter(i=>i.next<=t);
  let html="<b>🔔 今日の復習（"+due.length+"語）</b>";
  if(!due.length)html+="<p style='font-size:13px;color:var(--muted);margin:6px 0 0'>今日の予定はありません。登録して計画を始めましょう。</p>";
  due.forEach(i=>{html+=`<div class='item' style='padding:8px 10px'><b>${esc(i.word)}</b> <span class='pill'>${i.lv}</span>
    <div style='font-size:13px;color:var(--muted)'>${esc(i.read||'')} ／ ${esc(i.mean)}</div>
    <button class='mini ok' style='margin-top:6px' onclick='reviewed(${i.id})'>復習した ✓（次へ）</button></div>`;});
  document.getElementById("due").innerHTML=html;

  const box=document.getElementById("list");
  if(!items.length){box.innerHTML="<b>📚 単語庫</b><p style='font-size:13px;color:var(--muted);margin:6px 0 0'>まだ単語がありません。</p>";return;}
  box.innerHTML="<b>📚 単語庫（"+items.length+"語）</b>"+items.map((i,idx)=>
    `<div class='item' style='padding:8px 10px'><b>${esc(i.word)}</b> <span class='pill'>${i.lv}</span>
     <div style='font-size:13px;color:var(--muted)'>${esc(i.read||'')} ／ ${esc(i.mean)}</div>
     <div style='font-size:12px;color:var(--muted)'>次回：${i.next}</div>
     <button class='mini' style='margin-top:4px' onclick='del(${idx})'>削除</button></div>`).join("");
}
function del(idx){items.splice(idx,1);save();}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
render();
</script>
</body>
</html>
