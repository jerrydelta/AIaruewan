<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>入社前职位模拟·适性匹配</title>
<style>
:root{
  --coral:#FF6B6B;        /* 主品牌色 */
  --coral-dark:#E85555;
  --ink:#2D2D2D;
  --muted:#8A8A8A;
  --bg:#F7F7F7;
  --card:#FFFFFF;
  --line:#ECECEC;
  --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
.score-box{text-align:center;background:#FFF7F7;border:1px solid #FFE2E2;border-radius:12px;padding:14px;margin-top:10px}
.score-num{font-size:40px;font-weight:800;color:var(--coral)}
.dim{display:flex;align-items:center;gap:8px;margin-top:8px}
.dim span:first-child{width:88px;font-size:13px;color:#555}
.dim input[type=range]{flex:1;margin-top:0}
.dim b{width:24px;text-align:right;color:var(--coral)}
.item{background:#FAFAFA;border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px;font-size:13px}
.item .del{float:right;color:var(--muted);font-size:12px}
.warn{color:var(--coral-dark);font-size:13px;margin-top:6px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">career</span><span class="tag">job_mismatch</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">入社前职位模拟 · 适性匹配</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Pre-hire Job Simulation + Fit-Matching</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">2026年4月入社的新卒中 46.2% 考虑早期离职，63.5% 的理由是"工作内容与自己不合/无成就感"。现有转职网站只解决"找机会"，不解决"适不适合"。入社前的巨大ギャップ（错配）是核心痛点。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 适性匹配诊断</b>
    <label>目标职位</label>
    <input id="role" placeholder="如：IT营业 / 后端开发 / 市场策划">
    <label>行业</label>
    <input id="industry" placeholder="如：SaaS / 制造业 / 金融">
    <label>对以下维度的真实预期（1=很不合，5=很契合）</label>
    <div class="dim"><span>兴趣契合</span><input type="range" id="d1" min="1" max="5" value="3"><b id="d1v">3</b></div>
    <div class="dim"><span>成就感</span><input type="range" id="d2" min="1" max="5" value="3"><b id="d2v">3</b></div>
    <div class="dim"><span>劳动条件</span><input type="range" id="d3" min="1" max="5" value="3"><b id="d3v">3</b></div>
    <div class="dim"><span>成长环境</span><input type="range" id="d4" min="1" max="5" value="3"><b id="d4v">3</b></div>
    <label>真实日次业务预览（写出你预期每天会做的一件事）</label>
    <textarea id="daily" rows="2" placeholder="如：每天回复20+封客户邮件并整理日报"></textarea>
    <label>对这项业务的预期感受</label>
    <select id="feeling">
      <option value="like">有点期待</option>
      <option value="neutral">说不清</option>
      <option value="dislike">想到就抗拒</option>
    </select>
    <button class="btn" onclick="diagnose()">计算适配分 & 错配预兆</button>
    <div class="score-box" id="result" style="display:none"></div>
  </div>

  <div class="card" id="list">
    <b>📋 我的匹配记录</b>
    <p style="font-size:12px;color:var(--muted);margin:6px 0 0">本地保存，不上传。</p>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://service.gakujo.ne.jp/wp-content/uploads/2026/07/260713-rekatsuenq.pdf" target="_blank" style="color:var(--coral)">学情 2026 新卒早期离职调查</a>
  </div>

<script>
const KEY="P2-001";
["d1","d2","d3","d4"].forEach(id=>{
  const el=document.getElementById(id), v=document.getElementById(id+"v");
  el.oninput=()=>v.textContent=el.value;
});
let items = JSON.parse(localStorage.getItem(KEY) || "[]");
function save(){ localStorage.setItem(KEY, JSON.stringify(items)); render(); }
function diagnose(){
  const role=document.getElementById("role").value.trim()||"未命名职位";
  const d=[+d1.value,+d2.value,+d3.value,+d4.value];
  const avg=(d[0]+d[1]+d[2]+d[3])/4;
  const score=Math.round(avg*20);
  const feeling=document.getElementById("feeling").value;
  const daily=document.getElementById("daily").value.trim();
  let warns=[];
  const names=["兴趣契合","成就感","劳动条件","成长环境"];
  d.forEach((x,i)=>{ if(x<=2) warns.push("「"+names[i]+"」偏低（"+x+"/5），是典型错配预兆"); });
  if(feeling==="dislike") warns.push("对日常业务「想到就抗拒」——这是早期离职最强信号");
  if(feeling==="neutral" && avg<3.5) warns.push("感受模糊且整体分不高，建议先做实习/访谈验证");
  if(warns.length===0) warns.push("四项均衡且感受正面，错配风险较低 ✅");
  const rec={role, score, feeling, daily, warns, t:Date.now()};
  items.unshift(rec);
  save();
  const r=document.getElementById("result");
  r.style.display="block";
  r.innerHTML='<div class="score-num">'+score+'</div><div style="font-size:12px;color:var(--muted)">综合适配分 /100</div>'+
    '<div class="warn">⚠ '+warns.join('<br>⚠ ')+'</div>';
}
function render(){
  const box=document.getElementById("list");
  let h='<b>📋 我的匹配记录</b><p style="font-size:12px;color:var(--muted);margin:6px 0 0">本地保存，不上传。</p>';
  if(items.length===0){ h+='<p style="font-size:13px;color:var(--muted)">还没有记录，做一次诊断吧。</p>'; }
  items.forEach((it,i)=>{
    h+='<div class="item"><span class="del" onclick="del('+i+')">删除</span><b>'+it.role+'</b> · 适配分 <b class="h-coral">'+it.score+'</b><br>'+
       '<span style="color:#777">'+new Date(it.t).toLocaleString()+'</span><br>'+
       '<span style="color:var(--coral-dark)">'+it.warns[0]+'</span></div>';
  });
  box.innerHTML=h;
}
function del(i){ items.splice(i,1); save(); }
render();
</script>
</body>
</html>
