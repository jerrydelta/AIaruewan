<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>软硬服一体个性化产后修复</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.phase{border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-top:8px}
.phase .t{font-weight:600}
.phase.done{background:#F0FFF6;border-color:#C7EFD6}
.bar{height:10px;background:#FFE3E3;border-radius:999px;overflow:hidden;margin-top:10px}
.bar>i{display:block;height:100%;background:var(--coral);width:0}
.report{background:#FFF8F0;border:1px solid #FFE6CC;border-radius:12px;padding:12px;font-size:14px;margin-top:10px;white-space:pre-wrap}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">creative</span><span class="tag ai">AI增强</span><span class="tag">postpartum</span><span class="tag">software_hardware</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">软硬服一体产后修复</h1>
    <p class="h-coral" style="font-size:13px;margin:0">科学分阶 + 硬件同步 + 三甲专家 + AI 报告</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">产后修复需科学分阶 + 专业权威，而非经验主义。如初 APP 以"软件 + 硬件 + 服务"模式提供个性化修复，课程科学分阶（产褥期→理想修复期），整合盆底肌/腹直肌/体态，结合硬件数据、三甲专家与 AI 报告。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 科学分阶课程打卡</b>
    <p style="font-size:13px;color:#666;margin:6px 0 0">完成每节课后勾选，AI 报告会根据进度生成阶段总结。</p>
    <div id="phases"></div>
    <div class="bar"><i id="prog"></i></div>
    <p style="font-size:13px;color:#555;margin-top:6px" id="progTxt"></p>
    <button class="btn" onclick="genAI()">🤖 生成我的 AI 修复报告</button>
    <div id="ai"></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.cnblogs.com/tzmm/p/19449683" target="_blank" style="color:var(--coral)">如初 APP（软硬服一体产后修复）</a>
  </div>

<script>
const KEY="P15-009";
const PH=[
  {t:"产褥期 · 呼吸与盆骨底唤醒",k:"产褥期"},
  {t:"理想修复期 · 腹直肌闭合训练",k:"修复期"},
  {t:"理想修复期 · 盆底肌力量重建",k:"修复期"},
  {t:"巩固期 · 体态与核心整合",k:"巩固期"}
];
let done=JSON.parse(localStorage.getItem(KEY)||"{}");
function save(){localStorage.setItem(KEY,JSON.stringify(done));render();}
function toggle(i){const k="p"+i;if(done[k])delete done[k];else done[k]=1;save();}
function render(){
  const box=document.getElementById("phases");box.innerHTML="";
  PH.forEach((p,i)=>{const d=document.createElement("div");d.className="phase"+(done["p"+i]?" done":"");
    d.innerHTML='<div class="t">'+(done["p"+i]?"✅ ":"○ ")+p.t+'</div><div style="font-size:12px;color:#aaa">'+p.k+'</div>';
    d.onclick=()=>toggle(i);box.appendChild(d);});
  const did=PH.filter((_,i)=>done["p"+i]).length;
  document.getElementById("prog").style.width=Math.round(did/PH.length*100)+"%";
  document.getElementById("progTxt").textContent="已完成 "+did+"/"+PH.length+" 节课";
}
function genAI(){
  const doneList=PH.filter((p,i)=>done["p"+i]).map(p=>p.t);
  const n=doneList.length;
  let txt="【AI 修复阶段报告】\n";
  txt+="完成课程："+n+"/"+PH.length+" 节\n";
  if(n===0){txt+="你还没开始，建议从「产褥期·呼吸与盆骨底唤醒」起步，先唤醒深层肌群。";}
  else{txt+="已掌握：\n· "+doneList.join("\n· ")+"\n\n";
    txt+= n<PH.length? "下一步建议进入「"+PH.find((p,i)=>!done["p"+i]).t+"」，循序渐进更安全。":"🎉 分阶课程全部完成，进入巩固与日常维持阶段。"}
  document.getElementById("ai").innerHTML='<div class="report">'+txt+'</div>';
}
render();

// === AI助手模块（用户自带Key模式）===
let aiKey = localStorage.getItem("HY3_API_KEY") || "";
let aiHistory = [];

function toggleAI(id){
  const body = document.getElementById("aiBody_" + id);
  const header = document.getElementById("aiHeader_" + id);
  if(body.classList.contains("collapsed")){
    body.classList.remove("collapsed");
    header.classList.remove("collapsed");
  } else {
    body.classList.add("collapsed");
    header.classList.add("collapsed");
  }
}

function saveKey(id){
  const key = document.getElementById("apiKey_" + id).value.trim();
  if(!key){alert("请输入Key");return;}
  localStorage.setItem("HY3_API_KEY", key);
  aiKey = key;
  document.getElementById("aiKeySection_" + id).style.display="none";
  document.getElementById("aiChatSection_" + id).style.display="block";
}

async function callHy3(messages, id){
  if(!aiKey){alert("请先填写 API Key");return null;}
  const loading = document.createElement("div");
  loading.className = "ai-msg";
  loading.innerHTML = `<div class="role">🤖 AI</div><div class="content"><span class="loading">思考中...</span></div>`;
  document.getElementById("aiMessages_" + id).appendChild(loading);
  
  try {
    const res = await fetch("https://tokenhub.tencentmaas.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + aiKey
      },
      body: JSON.stringify({
        model: "hy3",
        messages: messages,
        temperature: 0.7
      })
    });
    const data = await res.json();
    loading.remove();
    if(data.error){alert("API错误："+data.error.message);return null;}
    return data.choices[0].message.content;
  } catch(e){
    loading.remove();
    alert("调用失败："+e.message);
    return null;
  }
}

function addMsg(role, content, id){
  const box = document.getElementById("aiMessages_" + id);
  if(!box)return;
  const div = document.createElement("div");
  div.className = "ai-msg";
  div.innerHTML = `<div class="role">${role==="user"?"🙋 你":"🤖 AI"}</div><div class="content">${content.replace(/\n/g,"<br>")}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

async function aiChat(id){
  const input = document.getElementById("aiInput_" + id).value.trim();
  if(!input){return;}
  document.getElementById("aiInput_" + id).value = "";
  addMsg("user", input, id);
  const msgs = [
    {role:"system",content:"你是这个工具的AI助手，帮助用户更好地使用本工具，提供专业建议和优化方案。用中文简洁回答。"},
    {role:"user",content:input}
  ];
  const reply = await callHy3(msgs, id);
  if(reply) addMsg("assistant", reply, id);
}

</script>
</body>
</html>
