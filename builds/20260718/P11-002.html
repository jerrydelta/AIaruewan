<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>极简植物养护提醒器</title>
<style>
:root{
  --coral:#FF6B6B;        --coral-dark:#E85555;
  --ink:#2D2D2D;          --muted:#8A8A8A;
  --bg:#F7F7F7;           --card:#FFFFFF;
  --line:#ECECEC;         --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn-sm{padding:7px 10px;font-size:13px;border-radius:9px;margin-top:0}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.item h3{margin:0 0 4px;font-size:15px}
.mini{font-size:12px;color:var(--muted)}
.due-soon{color:var(--coral);font-weight:600}
.due-ok{color:var(--ok);font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">plant</span><span class="tag">indoor_care_reminder</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">极简植物养护提醒器</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Minimalist plant-care reminder (no subscription wall)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">Planta 高级订阅锁定无限识别与施肥提醒，用户嫌"不值"；Vera 全免费却只能手输。普通植物党想要简单免费的浇水/施肥提醒——本工具一次买断思路的极简版：纯本地、零订阅。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 养护提醒</b>
    <label>植物名称</label>
    <input id="name" placeholder="如：阳台多肉">
    <div class="row">
      <div><label>浇水周期(天)</label><input id="w" type="number" value="10" min="1"></div>
      <div><label>施肥周期(天)</label><input id="f" type="number" value="30" min="1"></div>
    </div>
    <button class="btn" onclick="add()">＋ 添加</button>
    <div id="list"></div>
  </div>

  <div class="card">
    <b>📊 我的植物</b>
    <p id="stat" style="font-size:13px;color:var(--muted)"></p>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://apps.apple.com/de/app/planta-complete-plant-care/id1410126781?l=en" target="_blank" style="color:var(--coral)">Planta / Vera</a>
  </div>

<script>
const KEY="P11-002";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function save(){ localStorage.setItem(KEY,JSON.stringify(items)); render(); }
function today(){ return new Date().toISOString().slice(0,10); }
function addDays(d,n){ let t=new Date(d); t.setDate(t.getDate()+n); return t.toISOString().slice(0,10); }
function left(d){ return Math.round((new Date(d)-new Date(today()))/86400000); }
function add(){
  const name=document.getElementById('name').value.trim();
  if(!name){ alert('请填植物名称'); return; }
  items.push({id:Date.now(),name,w:+document.getElementById('w').value||10,f:+document.getElementById('f').value||30,
    lw:today(),lf:today()});
  document.getElementById('name').value='';
  save();
}
function doIt(id,key,lab){
  const p=items.find(x=>x.id===id); if(!p) return;
  p[key]=today();
  save();
}
function del(id){ items=items.filter(x=>x.id!==id); save(); }
function render(){
  const box=document.getElementById('list'); box.innerHTML='';
  items.forEach(p=>{
    const dw=addDays(p.lw,p.w), df=addDays(p.lf,p.f);
    const lw=left(dw), lf=left(df);
    const el=document.createElement('div'); el.className='item';
    el.innerHTML='<h3>'+p.name+'</h3>'+
      '<div class="mini">💧 浇水：<span class="'+(lw<=1?'due-soon':'due-ok')+'">'+(lw>0?'还有'+lw+'天':'今天/超期')+'</span> · 🌱 施肥：<span class="'+(lf<=1?'due-soon':'due-ok')+'">'+(lf>0?'还有'+lf+'天':'今天/超期')+'</span></div>'+
      '<div class="row" style="margin-top:8px">'+
      '<button class="btn btn-sm" style="background:var(--ok)" onclick="doIt('+p.id+',\'lw\')">已浇水</button>'+
      '<button class="btn btn-sm" style="background:#F0A500;color:#fff" onclick="doIt('+p.id+',\'lf\')">已施肥</button>'+
      '<button class="btn btn-sm" style="background:#ccc" onclick="del('+p.id+')">删</button></div>';
    box.appendChild(el);
  });
  document.getElementById('stat').textContent='共 '+items.length+' 盆 · 浇水/施肥提醒全本地保存';
}
render();
</script>
</body>
</html>
