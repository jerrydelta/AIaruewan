<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>妈妈专属正念冥想</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn.ghost{background:#FFF0F0;color:var(--coral);border:1px solid #FFD9D9}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.med{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:8px}
.med .t{font-weight:600;font-size:15px}
.med .s{font-size:12px;color:var(--muted);margin-top:2px}
.timer{text-align:center;font-size:40px;font-weight:700;color:var(--coral);margin:10px 0}
.item{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:8px;font-size:14px}
.item .meta{font-size:11px;color:var(--muted);margin-top:4px}
.stat{font-size:14px;color:#555;margin-top:6px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">postpartum</span><span class="tag">mindfulness</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">妈妈专属正念冥想</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Mother-specific meditation · 场景化短冥想，5-10 分钟</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">产后冥想被通用 App 忽视，妈妈场景（过度刺激、深夜独处）独特。Nook 在 Expectful 关停后填补空白，登美国 App Store"母亲健康"类 #1、评分 5.0，100+ 妈妈专属冥想，约 $4/月。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 选一段冥想开始</b>
    <label>按场景筛选</label>
    <select id="filter" onchange="renderLib()">
      <option value="">全部场景</option>
      <option>深夜独处</option><option>过度刺激</option><option>喂奶间隙</option><option>焦虑来袭</option><option>入睡困难</option>
    </select>
    <div id="lib"></div>
  </div>

  <div class="card" id="player" style="display:none">
    <b>🎧 冥想进行中</b>
    <div class="timer" id="timer">05:00</div>
    <button class="btn ghost" id="ctrl" onclick="toggleTimer()">⏸ 暂停</button>
    <p style="font-size:12px;color:#aaa;text-align:center" id="pname"></p>
  </div>

  <div class="card" id="list">
    <b>🌿 我的冥想累计</b>
    <div class="stat" id="stat"></div>
    <div id="logs"></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://joinphoenixhealth.com/resourcecenter/top-10-best-apps-for-maternal-mental-health-support" target="_blank" style="color:var(--coral)">Nook（妈妈正念冥想 App）</a>
  </div>

<script>
const KEY="P15-004";
const LIB=[
  {t:"深夜喂奶后的呼吸",s:"深夜独处",m:5},
  {t:"放下"过度刺激"的脑袋",s:"过度刺激",m:10},
  {t:"两口奶之间的 3 分钟",s:"喂奶间隙",m:5},
  {t:"焦虑像浪，让它过去",s:"焦虑来袭",m:10},
  {t:"哄睡后属于自己的安静",s:"入睡困难",m:5},
  {t:"对自己说一句温柔的话",s:"深夜独处",m:5}
];
let logs=JSON.parse(localStorage.getItem(KEY)||"[]");
let timer=null,remain=300,cur=null,running=false;
function save(){localStorage.setItem(KEY,JSON.stringify(logs));render();}
function renderLib(){
  const f=document.getElementById("filter").value;
  const box=document.getElementById("lib");box.innerHTML="";
  LIB.filter(x=>!f||x.s===f).forEach(x=>{
    const d=document.createElement("div");d.className="med";
    d.innerHTML='<div class="t">'+x.t+'</div><div class="s">'+x.s+' · '+x.m+' 分钟</div><button class="btn" style="margin-top:8px" onclick="start(\''+x.t+'\','+x.m+')">开始</button>';
    box.appendChild(d);});
}
function start(name,m){cur={name,m};remain=m*60;running=true;document.getElementById("player").style.display="block";
  document.getElementById("pname").textContent=name;updateTimer();if(timer)clearInterval(timer);timer=setInterval(tick,1000);}
function tick(){if(!running)return;remain--;updateTimer();if(remain<=0){clearInterval(timer);logs.unshift({name:cur.name,min:cur.m,t:new Date().toLocaleString("zh-CN")});save();document.getElementById("player").style.display="none";alert("完成 ✅ 好好抱抱自己。");}}
function toggleTimer(){running=!running;document.getElementById("ctrl").textContent=running?"⏸ 暂停":"▶ 继续";}
function updateTimer(){const m=Math.floor(remain/60),s=remain%60;document.getElementById("timer").textContent=(""+m).padStart(2,"0")+":"+(""+s).padStart(2,"0");}
function render(){
  const total=logs.reduce((a,b)=>a+b.min,0);
  document.getElementById("stat").textContent="累计 "+total+" 分钟 ｜ 已完成 "+logs.length+" 次";
  const box=document.getElementById("logs");box.innerHTML=logs.length?'':'<p style="font-size:13px;color:#aaa;margin:8px 0 0">还没开始，挑一段试试？</p>';
  logs.slice(0,8).forEach(l=>{const d=document.createElement("div");d.className="item";d.innerHTML='<b>'+l.name+'</b> · '+l.min+' 分钟<div class="meta">'+l.t+'</div>';box.appendChild(d);});
}
renderLib();render();
</script>
</body>
</html>
