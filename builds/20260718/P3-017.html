<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>遛狗导航健康记录</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.item b{color:var(--ink)}.del{color:var(--muted);font-size:12px;float:right;cursor:pointer}
.pill{display:inline-block;font-size:11px;background:#FFF0F0;color:var(--coral);border-radius:999px;padding:1px 8px;margin:2px 3px 0 0}
.sum{font-size:13px;color:var(--ok);margin-top:6px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">pet</span><span class="tag">dog_walking_health_jp</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">遛狗导航·健康记录</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Navigation × dog-walking health</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">日本导航App ALKOO做宠物延伸：按犬种/年龄/天气搜遛狗路线，记录每日散步+体调（食欲/体重），支持多宠物与家人共享。都市养犬人缺"科学遛狗+健康记录"一体化。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:#555;margin:6px 0 0">记录每次遛狗路线与体调，自动统计本周遛狗次数，本地保存。</p>
    <div class="row">
      <div><label>狗狗</label><input id="dog" placeholder="Lucky"></div>
      <div><label>天气</label><select id="wx"><option>晴</option><option>阴</option><option>雨</option><option>雪</option><option>热</option></select></div>
    </div>
    <div class="row">
      <div><label>路线</label><input id="route" placeholder="如：滨江公园环线"></div>
      <div><label>距离(km)</label><input id="km" type="number" step="0.1" placeholder="2.5"></div>
    </div>
    <label>体调（食欲/体重/精神）</label>
    <input id="cond" placeholder="例如：食欲好，体重稳定">
    <button class="btn" onclick="add()">记一次遛狗</button>
  </div>

  <div class="card" id="list">
    <b>📋 遛狗记录</b>
    <p style="font-size:12px;color:var(--muted);margin:4px 0 0">本地保存，科学遛狗。</p>
    <div class="sum" id="sum"></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://prtimes.jp/main/html/rd/p/000000502.000026884.html" target="_blank" style="color:var(--coral)">ALKOO by NAVITIME (with わんこ)</a>
  </div>

<script>
const KEY="P3-017";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function add(){
  const dog=document.getElementById("dog").value.trim();
  if(!dog){alert("先填狗狗名");return;}
  const wx=document.getElementById("wx").value;
  const route=document.getElementById("route").value.trim()||"未命名路线";
  const km=parseFloat(document.getElementById("km").value)||0;
  const cond=document.getElementById("cond").value.trim()||"—";
  items.unshift({dog,wx,route,km,cond,t:new Date().toLocaleString("zh-CN")});
  localStorage.setItem(KEY,JSON.stringify(items));render();
  document.getElementById("route").value="";document.getElementById("km").value="";document.getElementById("cond").value="";
}
function del(i){items.splice(i,1);localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const el=document.getElementById("list");
  let h='<b>📋 遛狗记录</b><p style="font-size:12px;color:var(--muted);margin:4px 0 0">本地保存，科学遛狗。</p>';
  let totalKm=0;
  if(!items.length){h+='<p style="font-size:13px;color:var(--muted);margin-top:8px">还没有记录。</p>';}
  items.forEach((it,i)=>{
    totalKm+=it.km;
    h+='<div class="item"><span class="del" onclick="del('+i+')">删除 ✕</span>'+
       '<span class="pill">'+it.wx+'</span> <b>'+it.dog+'</b><br>'+
       '<span style="font-size:13px;color:#555">'+it.route+' · '+it.km+'km</span><br>'+
       '<span style="font-size:13px;color:#555">体调：'+it.cond+'</span><br>'+
       '<span style="font-size:11px;color:var(--muted)">'+it.t+'</span></div>';
  });
  h+='<div class="sum" id="sum">累计遛狗 '+items.length+' 次，共 '+totalKm.toFixed(1)+' km</div>';
  el.innerHTML=h;
}
render();
</script>
</body>
</html>
