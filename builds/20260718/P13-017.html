<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>临床级·医护可用经期健康报告</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{background:#FAFAFA;border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px;font-size:14px}
.item .del{float:right;color:var(--coral);font-size:12px;cursor:pointer}
.report{background:#f4f8ff;border:1px solid #d6e4ff;border-radius:10px;padding:12px;font-size:13px;white-space:pre-wrap;margin-top:10px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">health</span><span class="tag">korean_menstrual_app_quality</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">临床级 · 医护可用经期健康报告</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Clinical-grade, clinician-usable tracker</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">韩国研究：34 款经期 App 91% 可预测周期，但仅 6%（2 款）提供健康筛查信息；消费者与医护评分无显著相关。痛点：多偏美妆/社交，缺临床级健康筛查与医护可用报告。机会：临床级、医护可用报告的追踪器。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 临床级症状记录 + 生成报告</b>
    <label>周期第几天</label><input id="cyc" type="number" placeholder="1">
    <div class="row">
      <div><label>流量 0-4</label><select id="flow"><option>0 无</option><option>1 少</option><option>2 中</option><option>3 多</option><option>4 剧痛</option></select></div>
      <div><label>痛经 0-10</label><input id="cramp" type="number" min="0" max="10" placeholder="3"></div>
    </div>
    <label>健康筛查信号（可多选）</label>
    <div class="row">
      <div><select id="sig"><option>无</option><option>周期>35天</option><option>周期<21天</option><option>经期>7天</option><option>严重痛经</option><option>非经期出血</option></select></div>
      <div><button class="btn" onclick="addSig()" style="margin-top:18px">＋ 标记</button></div>
    </div>
    <div id="siglist" style="font-size:13px;color:var(--coral);margin-top:6px"></div>
    <button class="btn" onclick="addItem()">＋ 记录本日</button>
    <button class="btn" onclick="genReport()" style="background:#fff;color:var(--coral);border:1px solid var(--coral)">📄 生成医护报告</button>
    <div class="report" id="report" style="display:none"></div>
  </div>

  <div class="card" id="list"><b>📅 记录</b></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC10018377/" target="_blank" style="color:var(--coral)">BOM Calendar / Clue / Flo（韩国质量研究）</a>
  </div>

<script>
const KEY="P13-017";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
let sigs=[];
function addSig(){
  const s=document.getElementById("sig").value;
  if(s!=="无"&&!sigs.includes(s)){sigs.push(s);}
  document.getElementById("siglist").innerText="已标记："+(sigs.join("、")||"无");
}
function addItem(){
  items.push({cyc:document.getElementById("cyc").value,flow:document.getElementById("flow").value,cramp:document.getElementById("cramp").value,sigs:[...sigs]});
  ["cyc","cramp"].forEach(id=>document.getElementById(id).value="");
  sigs=[];document.getElementById("siglist").innerText="";
  save();
}
function del(i){items.splice(i,1);save();}
function genReport(){
  const r=document.getElementById("report");
  const allSigs=[...new Set(items.flatMap(x=>x.sigs))];
  r.style.display="block";
  r.innerText=`经期健康筛查报告（共 ${items.length} 天记录）\n`+
    `健康筛查信号：${allSigs.length?allSigs.join("、"):"未标记"}\n`+
    `建议：如出现「周期>35天/非经期出血/严重痛经」请及时就医评估。\n`+
    `（本报告基于自我记录，不能替代医生诊断）`;
}
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const box=document.getElementById("list");
  let html='<b>📅 记录</b>';
  if(items.length===0)html+='<p style="font-size:13px;color:#999;margin:8px 0">还没有记录。</p>';
  [...items].reverse().forEach((x,i)=>{
    const idx=items.length-1-i;
    const s=x.sigs.filter(s=>s!=="无");
    html+=`<div class="item"><span class="del" onclick="del(${idx})">删除</span>
      周期${x.cyc||'?'}天 · 流量${x.flow} · 痛经${x.cramp||'?'}${s.length?(" · ⚠"+s.join("/")):""}</div>`;
  });
  box.innerHTML=html;
}
render();
</script>
</body>
</html>
