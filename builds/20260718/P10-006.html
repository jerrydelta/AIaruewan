<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>公寓管理收支簿</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
.item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.item:last-child{border-bottom:none}
.item .name{flex:1;font-size:15px}
.item .amt{font-size:14px}
.item .in{color:var(--ok);font-weight:600}
.item .out{color:var(--coral);font-weight:600}
.del{color:var(--muted);font-size:18px;background:none;border:none;cursor:pointer}
.sum{font-size:14px;margin-top:8px;padding:10px;background:#F4FBF7;border-radius:10px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">home</span><span class="tag">condo_rental_dx</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">公寓管理收支簿</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Condo/rental management DX app (paperless &amp; transparent)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">日本「GMO 賃貸 DX」获 2025 Good Design 奖、服务 150 万+ 户，把契约/联络/收支报告电子化。公寓管理费市场 8500 亿日元、役员不足、积立金不足（築 30 年超 40% 不充足）。组合运营的无纸化、透明化严重不足。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 记录每笔管理收支</b>
    <label>项目</label><input id="r_name" placeholder="如：管理费 / 维修费 / 保险 / 停车费">
    <div class="row">
      <div><label>金额</label><input id="r_amt" type="number" placeholder="0"></div>
      <div><label>类型</label><select id="r_type"><option value="in">收入</option><option value="out">支出</option></select></div>
    </div>
    <label>日期</label><input id="r_date" type="date">
    <button class="btn" onclick="add()">＋ 记录</button>
    <div class="sum" id="sum"></div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://gmoretech.com/news20251015/" target="_blank" style="color:var(--coral)">GMO 賃貸 DX（公寓/租赁管理数字化）</a>
  </div>

<script>
const KEY="P10-006";
let rec = JSON.parse(localStorage.getItem(KEY) || "[]");
function save(){ localStorage.setItem(KEY, JSON.stringify(rec)); render(); }
function add(){
  const name=document.getElementById('r_name').value.trim();
  const amt=parseFloat(document.getElementById('r_amt').value)||0;
  if(!name||!amt)return;
  rec.push({id:Date.now(),name,amt,type:document.getElementById('r_type').value,date:document.getElementById('r_date').value});
  document.getElementById('r_name').value='';document.getElementById('r_amt').value='';save();
}
function del(id){rec=rec.filter(x=>x.id!=id);save();}
function render(){
  let inc=0,out=0;rec.forEach(r=>r.type=='in'?inc+=r.amt:out+=r.amt);
  document.getElementById('sum').innerHTML='收入 '+inc.toFixed(0)+' · 支出 '+out.toFixed(0)+' · <b>结余 '+(inc-out).toFixed(0)+'</b>';
  const el=document.getElementById('list');
  if(!rec.length){el.innerHTML='<p style="font-size:13px;color:var(--muted)">还没有记录。</p>';return;}
  el.innerHTML='<b>📒 收支流水</b>'+rec.slice().reverse().map(r=>'<div class="item"><span class="name">'+esc(r.name)+'<span style="font-size:12px;color:var(--muted)"><br>'+(r.date||'')+'</span></span><span class="amt '+(r.type=='in'?'in':'out')+'">'+(r.type=='in'?'+':'-')+r.amt+'</span><button class="del" onclick="del('+r.id+')">✕</button></div>').join('');
}
function esc(s){return s.replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
render();
</script>
</body>
</html>
