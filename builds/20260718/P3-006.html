<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>I人慢社交搭子匹配</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.item b{color:var(--ink)}.del{color:var(--muted);font-size:12px;float:right;cursor:pointer}
.pill{display:inline-block;font-size:11px;background:#FFF0F0;color:var(--coral);border-radius:999px;padding:1px 8px;margin:2px 3px 0 0}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">social</span><span class="tag">mbti_introvert_community_cn</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">I人慢社交·搭子匹配</h1>
    <p class="h-coral" style="font-size:13px;margin:0">MBTI introvert (I-person) social community</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">普通社交App的滑卡与跟风让I人疲惫。Pdb是专为社恐/内向者设计的MBTI性格社交App，档案库200万+，慢社交定位："不用尬聊、不用表演外向，用真实性格找同频灵魂"。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:#555;margin:6px 0 0">发布你的"搭子帖"：性格+想找的搭子类型+活跃时间段，慢节奏匹配，本地保存。</p>
    <label>我的MBTI</label>
    <select id="mbti">
      <option>INTJ</option><option>INTP</option><option>INFJ</option><option>INFP</option>
      <option>ISTJ</option><option>ISFJ</option><option>ISTP</option><option>ISFP</option>
      <option>ENTJ</option><option>ENTP</option><option>ENFJ</option><option>ENFP</option>
      <option>ESTJ</option><option>ESFJ</option><option>ESTP</option><option>ESFP</option>
    </select>
    <label>想找的搭子类型</label>
    <select id="type"><option>深夜聊心搭子</option><option>共同爱好搭子</option><option>安静陪伴搭子</option><option>学习/工作搭子</option></select>
    <label>活跃时间段</label>
    <select id="time"><option>深夜 22:00-02:00</option><option>午休碎片</option><option>周末慢聊</option><option>随缘异步</option></select>
    <label>一句话介绍（想法泡泡）</label>
    <input id="bubble" placeholder="例如：INFP，喜欢深夜写点东西，找不评判的听者">
    <button class="btn" onclick="add()">发布搭子帖</button>
  </div>

  <div class="card" id="list">
    <b>📋 我的搭子帖</b>
    <p style="font-size:12px;color:var(--muted);margin:4px 0 0">本地保存，慢社交、不焦虑。</p>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://foxdata.com/cn/app-marketing-analytics/pdb.app/gp/CN/pdb-%E6%80%A7%E6%A0%BC%E6%B5%8B%E8%AF%95-i%E4%BA%BA%E7%A4%BE%E5%8C%BA" target="_blank" style="color:var(--coral)">Pdb：性格测试·I人社区</a>
  </div>

<script>
const KEY="P3-006";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function add(){
  const mbti=document.getElementById("mbti").value;
  const type=document.getElementById("type").value;
  const time=document.getElementById("time").value;
  const bubble=document.getElementById("bubble").value.trim();
  if(!bubble){alert("先写一句话介绍");return;}
  items.unshift({mbti,type,time,bubble,t:new Date().toLocaleString("zh-CN")});
  localStorage.setItem(KEY,JSON.stringify(items));render();
  document.getElementById("bubble").value="";
}
function del(i){items.splice(i,1);localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const el=document.getElementById("list");
  let h='<b>📋 我的搭子帖</b><p style="font-size:12px;color:var(--muted);margin:4px 0 0">本地保存，慢社交、不焦虑。</p>';
  if(!items.length){h+='<p style="font-size:13px;color:var(--muted);margin-top:8px">还没有帖子。</p>';}
  items.forEach((it,i)=>{
    h+='<div class="item"><span class="del" onclick="del('+i+')">删除 ✕</span>'+
       '<span class="pill">'+it.mbti+'</span><span class="pill">'+it.type+'</span><span class="pill">'+it.time+'</span><br>'+
       '<span style="font-size:13px;color:#555">'+it.bubble+'</span><br>'+
       '<span style="font-size:11px;color:var(--muted)">'+it.t+'</span></div>';
  });
  el.innerHTML=h;
}
render();
</script>
</body>
</html>
