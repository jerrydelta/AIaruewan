<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>流动摊贩极简收银</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.mini{font-size:14px;margin:14px 0 4px;font-weight:600;color:var(--ink);
  border-left:4px solid var(--coral);padding-left:8px}
.item{background:#FBFBFB;border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px;font-size:14px}
.del{color:var(--coral);float:right;font-size:13px;cursor:pointer}
.row{display:flex;gap:8px}.row>*{flex:1}
.voice{background:var(--ok);color:#fff;border:none;border-radius:12px;padding:13px;width:100%;font-size:15px;font-weight:600;margin-top:8px;cursor:pointer}
.big{font-size:26px;font-weight:700;color:var(--coral);text-align:center;margin:6px 0}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">business</span><span class="tag">street_vendor_toolkit</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">流动摊贩极简收银</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Minimal cashier for street vendors (voice + offline + daily report)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">流动摊贩/夜市专属工具缺口明显：钱到啦列明"摆摊/流动经营场景"——一部手机完成收款；悦收银一码聚合+实时语音播报。痛点：摊主无收银台、网络不稳、对账靠手工。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <div class="mini">💵 收款（语音播报）</div>
    <div class="row">
      <div><label>金额(元)</label><input id="amt" type="number" placeholder="10"></div>
      <div><label>方式</label><select id="pay"><option>扫码</option><option>现金</option><option>欠款</option></select></div>
    </div>
    <button class="voice" onclick="charge()">🔊 收款并播报</button>
    <button class="btn" onclick="offline()">📴 离线收款(联网同步)</button>
    <div class="big" id="today">今日 ¥0</div>
    <button class="btn" onclick="daily()">📑 生成日报表</button>
    <div class="item" id="rep" style="display:none"></div>
  </div>

  <div class="card" id="list"><b>📋 今日流水</b><div id="box"></div></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://m.jb51.net/softs/1018393.html" target="_blank" style="color:var(--coral)">钱到啦 · 悦收银 · 小麦收银宝 · 通联好老板</a>
  </div>

<script>
const K="P12-017_cash";
let items=JSON.parse(localStorage.getItem(K)||"[]");
const todayStr=()=>new Date().toLocaleDateString();
function charge(){const a=parseFloat(document.getElementById("amt").value),p=document.getElementById("pay").value;
  if(isNaN(a)){alert("金额");return;}items.push({a,p,off:false,t:todayStr()});localStorage.setItem(K,JSON.stringify(items));
  try{speechSynthesis.speak(new SpeechSynthesisUtterance("到账"+a+"元"));}catch(e){}render();}
function offline(){const a=parseFloat(document.getElementById("amt").value),p=document.getElementById("pay").value;
  if(isNaN(a)){alert("金额");return;}items.push({a,p,off:true,t:todayStr()});localStorage.setItem(K,JSON.stringify(items));render();}
function daily(){const td=items.filter(x=>x.t===todayStr());
  const sum=td.reduce((s,x)=>s+x.a,0);
  const by={};td.forEach(x=>by[x.p]=(by[x.p]||0)+x.a);
  const off=td.filter(x=>x.off).length;
  const r=document.getElementById("rep");r.style.display="block";
  r.innerHTML=`📑 日报表(${todayStr()})<br>笔数 ${td.length} · 合计 <b>¥${sum.toFixed(0)}</b><br>`+
    Object.keys(by).map(k=>k+" ¥"+by[k].toFixed(0)).join(" · ")+(off?`<br><span style="color:#E85555">⚠ ${off}笔离线待同步</span>`:"");
}
function del(i){items.splice(i,1);localStorage.setItem(K,JSON.stringify(items));render();}
function render(){
  const td=items.filter(x=>x.t===todayStr());
  document.getElementById("today").textContent="今日 ¥"+td.reduce((s,x)=>s+x.a,0).toFixed(0);
  document.getElementById("box").innerHTML=td.slice().reverse().map((x,i)=>`<div class="item"><span class="del" onclick="del(${items.indexOf(x)})">删</span>${x.t} · ${x.p} · <b>¥${x.a}</b> ${x.off?'<span style="color:#E85555">[离线]</span>':''}</div>`).join("")||"<p style='font-size:13px;color:var(--muted)'>今日暂无。</p>";
}
render();
</script>
</body>
</html>
