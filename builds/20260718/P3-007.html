<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>人+AI伴走婚恋进度器</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.item b{color:var(--ink)}.del{color:var(--muted);font-size:12px;float:right;cursor:pointer}
.pill{display:inline-block;font-size:11px;background:#FFF0F0;color:var(--coral);border-radius:999px;padding:1px 8px;margin:2px 3px 0 0}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">social</span><span class="tag">concierge_matchmaking_jp</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">人+AI伴走婚恋·进度器</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Human+AI concierge matchmaking</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">日本婚活App"应用疲劳"严重：6成以上20-39岁未婚用户感到疲惫，主因是"消息往来负担"与"选择疲劳"。Archers用专属supporter从简历到交往全程陪跑，U25计划¥11,800/月，7成以上1个月内开始交往。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:#555;margin:6px 0 0">记录婚活进度：当前阶段、下一步、supporter备注，生成"伴走时间线"，本地保存。</p>
    <label>当前阶段</label>
    <select id="stage"><option>制作简历</option><option>开始介绍对象</option><option>初次交往中</option><option>稳定交往</option><option>考虑结婚</option></select>
    <label>下一步行动</label>
    <input id="next" placeholder="例如：本周和supporter复盘3位介绍对象">
    <label>supporter 备注</label>
    <textarea id="note" rows="2" placeholder="例如：对方偏好安静型，建议约咖啡厅"></textarea>
    <button class="btn" onclick="add()">记录这一步</button>
  </div>

  <div class="card" id="list">
    <b>📋 我的伴走时间线</b>
    <p style="font-size:12px;color:var(--muted);margin:4px 0 0">本地保存，仅你可见。</p>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://prtimes.jp/main/html/rd/p/000000012.000082992.html" target="_blank" style="color:var(--coral)">アーチャーズ (Archers)</a>
  </div>

<script>
const KEY="P3-007";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function add(){
  const stage=document.getElementById("stage").value;
  const next=document.getElementById("next").value.trim();
  if(!next){alert("先写下一步行动");return;}
  const note=document.getElementById("note").value.trim();
  items.unshift({stage,next,note,t:new Date().toLocaleString("zh-CN")});
  localStorage.setItem(KEY,JSON.stringify(items));render();
  document.getElementById("next").value="";document.getElementById("note").value="";
}
function del(i){items.splice(i,1);localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const el=document.getElementById("list");
  let h='<b>📋 我的伴走时间线</b><p style="font-size:12px;color:var(--muted);margin:4px 0 0">本地保存，仅你可见。</p>';
  if(!items.length){h+='<p style="font-size:13px;color:var(--muted);margin-top:8px">还没有进度记录。</p>';}
  items.forEach((it,i)=>{
    h+='<div class="item"><span class="del" onclick="del('+i+')">删除 ✕</span>'+
       '<span class="pill">'+it.stage+'</span><br>'+
       '<span style="font-size:14px;color:var(--ink)">▸ '+it.next+'</span><br>'+
       (it.note?'<span style="font-size:13px;color:#555">supporter：'+it.note+'</span><br>':'')+
       '<span style="font-size:11px;color:var(--muted)">'+it.t+'</span></div>';
  });
  el.innerHTML=h;
}
render();
</script>
</body>
</html>
