<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>同居家友AA精算器</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.item:last-child{border-bottom:none}
.item .name{flex:1;font-size:15px}
.item .who{font-size:12px;color:var(--muted)}
.del{color:var(--muted);font-size:18px;background:none;border:none;cursor:pointer}
.res{background:#FFF8F0;border:1px solid #FFE0C2;border-radius:12px;padding:12px;margin-top:10px;font-size:14px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">home</span><span class="tag">split_bill_couples</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">同居家友 AA 精算器</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Free split-bill &amp; reimbursement app for couples/roommates</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">「这个月我垫了多少」「到底谁付得多」是同居/合租/夫妻的常见焦虑。日本「シェア家計簿」完全免费、合言葉邀请、离线可记，4.5/5 印证零门槛割り勘需求仍薄。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 记一笔，自动算谁该给谁</b>
    <label>花费说明</label><input id="s_name" placeholder="如：超市采购 / 水电费 / 聚餐">
    <div class="row">
      <div><label>金额</label><input id="s_amt" type="number" placeholder="0"></div>
      <div><label>谁垫付</label><select id="s_pay"><option value="A">A（我）</option><option value="B">B（室友）</option></select></div>
    </div>
    <label>分摊方式</label>
    <select id="s_split"><option value="2">AA 均分（两人）</option><option value="all">全部由垫付人承担</option></select>
    <button class="btn" onclick="add()">＋ 记录</button>
    <div class="res" id="res"></div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://mwm.ai/apps/app/6759816807" target="_blank" style="color:var(--coral)">シェア家計簿（同棲カップルの割り勘精算）</a>
  </div>

<script>
const KEY="P10-004";
let exp = JSON.parse(localStorage.getItem(KEY) || "[]");
function save(){ localStorage.setItem(KEY, JSON.stringify(exp)); render(); }
function add(){
  const name=document.getElementById('s_name').value.trim();
  const amt=parseFloat(document.getElementById('s_amt').value)||0;
  if(!name||!amt)return;
  exp.push({id:Date.now(),name,amt,pay:document.getElementById('s_pay').value,split:document.getElementById('s_split').value});
  document.getElementById('s_name').value='';document.getElementById('s_amt').value='';save();
}
function del(id){exp=exp.filter(x=>x.id!=id);save();}
function calc(){
  let A=0,B=0; // A 应付总额（含垫付）, B 应收...
  exp.forEach(e=>{
    const share=e.split=='2'?e.amt/2:e.amt;
    if(e.pay=='A'){A+=e.amt-share;B-=share;}else{B+=e.amt-share;A-=share;}
  });
  if(Math.abs(A)<0.01&&Math.abs(B)<0.01)return '两人均摊 ✅ 互不欠款';
  const owe=Math.max(A,B)/1;
  const debtor=A>B?'A（我）':'B（室友）', creditor=A>B?'B（室友）':'A（我）';
  return debtor+' 需付给 '+creditor+' '+owe.toFixed(0)+' 元结清';
}
function render(){
  document.getElementById('res').innerHTML=exp.length?('💡 '+calc()):'记录后这里显示清算结果';
  const el=document.getElementById('list');
  if(!exp.length){el.innerHTML='<p style="font-size:13px;color:var(--muted)">还没有记录。</p>';return;}
  el.innerHTML='<b>🧾 记录</b>'+exp.map(e=>'<div class="item"><span class="name">'+esc(e.name)+'</span><span class="who">'+e.amt+'元·'+e.pay+'垫·'+(e.split=='2'?'AA':'独担')+'</span><button class="del" onclick="del('+e.id+')">✕</button></div>').join('');
}
function esc(s){return s.replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
render();
</script>
</body>
</html>
