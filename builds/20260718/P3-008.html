<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>语言交换语伴匹配器</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.item b{color:var(--ink)}.del{color:var(--muted);font-size:12px;float:right;cursor:pointer}
.pill{display:inline-block;font-size:11px;background:#FFF0F0;color:var(--coral);border-radius:999px;padding:1px 8px;margin:2px 3px 0 0}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">social</span><span class="tag">language_exchange_cross_culture</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">语言交换·语伴匹配器</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Language-exchange + cross-cultural friendship</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">语言交换是"顺便交朋友+学外语"的天然社交场景。HelloTalk全球2000万+用户、支持150+语言。痛点：垃圾私信多、被当约会App用、语音卡顿。机会：加"严肃语伴筛选"与"本地线下语聚"差异化。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:#555;margin:6px 0 0">建立你的语伴档案（母语/想学/认真度），系统给出"严肃匹配建议"，本地保存。</p>
    <div class="row">
      <div><label>我的母语</label><input id="nat" placeholder="例如：中文"></div>
      <div><label>想学</label><input id="learn" placeholder="例如：日语"></div>
    </div>
    <label>认真度</label>
    <select id="serious"><option>认真互学</option><option>偶尔聊天</option><option>只交朋友</option><option>找语聚搭子</option></select>
    <label>一句自我介绍</label>
    <textarea id="intro" rows="2" placeholder="例如：在学日语，想找东京的语伴每周语音30分钟"></textarea>
    <button class="btn" onclick="add()">建立语伴档案</button>
  </div>

  <div class="card" id="list">
    <b>📋 我的语伴档案</b>
    <p style="font-size:12px;color:var(--muted);margin:4px 0 0">本地保存，严肃筛选优先。</p>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.compworth.com/company/hellotalk" target="_blank" style="color:var(--coral)">HelloTalk · 语言交换</a>
  </div>

<script>
const KEY="P3-008";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function add(){
  const nat=document.getElementById("nat").value.trim();
  const learn=document.getElementById("learn").value.trim();
  if(!nat||!learn){alert("请填母语和想学的语言");return;}
  const serious=document.getElementById("serious").value;
  const intro=document.getElementById("intro").value.trim();
  const tip="建议优先匹配「"+learn+"母语 / 想学"+nat+"」的对方，达成互学闭环；认真度：「"+serious+"」。";
  items.unshift({nat,learn,serious,intro,tip,t:new Date().toLocaleString("zh-CN")});
  localStorage.setItem(KEY,JSON.stringify(items));render();
  document.getElementById("nat").value="";document.getElementById("learn").value="";document.getElementById("intro").value="";
}
function del(i){items.splice(i,1);localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const el=document.getElementById("list");
  let h='<b>📋 我的语伴档案</b><p style="font-size:12px;color:var(--muted);margin:4px 0 0">本地保存，严肃筛选优先。</p>';
  if(!items.length){h+='<p style="font-size:13px;color:var(--muted);margin-top:8px">还没有档案。</p>';}
  items.forEach((it,i)=>{
    h+='<div class="item"><span class="del" onclick="del('+i+')">删除 ✕</span>'+
       '<span class="pill">'+it.nat+' → '+it.learn+'</span><span class="pill">'+it.serious+'</span><br>'+
       (it.intro?'<span style="font-size:13px;color:#555">'+it.intro+'</span><br>':'')+
       '<span style="font-size:13px;color:var(--coral)">💡 '+it.tip+'</span><br>'+
       '<span style="font-size:11px;color:var(--muted)">'+it.t+'</span></div>';
  });
  el.innerHTML=h;
}
render();
</script>
</body>
</html>
