<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>临床级盆底+核心12周康复</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.bar{height:10px;background:#FFE3E3;border-radius:999px;overflow:hidden;margin-top:8px}
.bar>i{display:block;height:100%;background:var(--coral);width:0}
.week{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;margin-top:6px;font-size:14px}
.week.done{background:#F0FFF6;border-color:#C7EFD6}
.week .n{font-weight:700;color:var(--coral)}
.item{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:8px;font-size:14px}
.item .meta{font-size:11px;color:var(--muted);margin-top:4px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">creative</span><span class="tag ai">AI增强</span><span class="tag">postpartum</span><span class="tag">pelvic_floor</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">临床级盆底 + 核心 12 周康复</h1>
    <p class="h-coral" style="font-size:13px;margin:0">NHS-endorsed 12-week program · 终身买断式自律打卡</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">产后盆底 / 腹直肌修复最重要却最被综合 App 忽视。MUTU System 是临床验证、NHS 背书的 12 周盆底肌 + 核心康复程序，含腹直肌分离评估。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 12 周计划打卡</b>
    <p style="font-size:13px;color:#666;margin:6px 0 0">每周完成训练后勾选，看见自己走到第几周。</p>
    <div id="weeks"></div>
    <div class="bar"><i id="prog"></i></div>
    <p style="font-size:13px;color:#555;margin-top:6px" id="progTxt"></p>
    <label>今日凯格尔收缩次数</label>
    <input id="kegel" type="number" min="0" value="10">
    <button class="btn" onclick="addKegel()">➕ 记录今日凯格尔</button>
    <div id="kegels"></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://fitnessdrum.com/best-postpartum-fitness-workout-programs-apps/" target="_blank" style="color:var(--coral)">MUTU System（NHS 背书盆底核心康复）</a>
    <p style="margin:6px 0 0">运动前请确认医生已许可。腹直肌分离明显者避免卷腹类动作。</p>
  </div>

<script>
const KEY="P15-006";
let state=JSON.parse(localStorage.getItem(KEY)||'{"done":[],"kegels":[]}');
function save(){localStorage.setItem(KEY,JSON.stringify(state));render();}
function nowStr(){const d=new Date();const p=n=>(""+n).padStart(2,"0");return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate());}
function toggleWeek(i){const k=state.done.indexOf(i);if(k>=0)state.done.splice(k,1);else state.done.push(i);save();}
function addKegel(){const n=+document.getElementById("kegel").value;if(n<=0)return;state.kegels.unshift({n,t:nowStr()});document.getElementById("kegel").value=10;save();}
function render(){
  const w=document.getElementById("weeks");w.innerHTML="";
  for(let i=1;i<=12;i++){const d=document.createElement("div");d.className="week"+(state.done.includes(i)?" done":"");
    d.innerHTML='<span class="n">W'+i+'</span><span style="flex:1">第 '+i+' 周 · 盆底 + 核心训练</span>'+(state.done.includes(i)?'✅':'○');
    d.onclick=()=>toggleWeek(i);w.appendChild(d);}
  const pct=Math.round(state.done.length/12*100);
  document.getElementById("prog").style.width=pct+"%";
  document.getElementById("progTxt").textContent="已完成 "+state.done.length+"/12 周（"+pct+"%）";
  const k=document.getElementById("kegels");k.innerHTML=state.kegels.length?'<p style="font-size:13px;color:#555;margin-top:10px"><b>凯格尔记录</b></p>':'';
  state.kegels.slice(0,6).forEach(r=>{const e=document.createElement("div");e.className="item";e.innerHTML=r.n+' 次<div class="meta">'+r.t+'</div>';k.appendChild(e);});
}
render();

// === AI助手模块（用户自带Key模式）===
let aiKey = localStorage.getItem("HY3_API_KEY") || "";
let aiHistory = [];

function toggleAI(id){
  const body = document.getElementById("aiBody_" + id);
  const header = document.getElementById("aiHeader_" + id);
  if(body.classList.contains("collapsed")){
    body.classList.remove("collapsed");
    header.classList.remove("collapsed");
  } else {
    body.classList.add("collapsed");
    header.classList.add("collapsed");
  }
}

function saveKey(id){
  const key = document.getElementById("apiKey_" + id).value.trim();
  if(!key){alert("请输入Key");return;}
  localStorage.setItem("HY3_API_KEY", key);
  aiKey = key;
  document.getElementById("aiKeySection_" + id).style.display="none";
  document.getElementById("aiChatSection_" + id).style.display="block";
}

async function callHy3(messages, id){
  if(!aiKey){alert("请先填写 API Key");return null;}
  const loading = document.createElement("div");
  loading.className = "ai-msg";
  loading.innerHTML = `<div class="role">🤖 AI</div><div class="content"><span class="loading">思考中...</span></div>`;
  document.getElementById("aiMessages_" + id).appendChild(loading);
  
  try {
    const res = await fetch("https://tokenhub.tencentmaas.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + aiKey
      },
      body: JSON.stringify({
        model: "hy3",
        messages: messages,
        temperature: 0.7
      })
    });
    const data = await res.json();
    loading.remove();
    if(data.error){alert("API错误："+data.error.message);return null;}
    return data.choices[0].message.content;
  } catch(e){
    loading.remove();
    alert("调用失败："+e.message);
    return null;
  }
}

function addMsg(role, content, id){
  const box = document.getElementById("aiMessages_" + id);
  if(!box)return;
  const div = document.createElement("div");
  div.className = "ai-msg";
  div.innerHTML = `<div class="role">${role==="user"?"🙋 你":"🤖 AI"}</div><div class="content">${content.replace(/\n/g,"<br>")}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

async function aiChat(id){
  const input = document.getElementById("aiInput_" + id).value.trim();
  if(!input){return;}
  document.getElementById("aiInput_" + id).value = "";
  addMsg("user", input, id);
  const msgs = [
    {role:"system",content:"你是这个工具的AI助手，帮助用户更好地使用本工具，提供专业建议和优化方案。用中文简洁回答。"},
    {role:"user",content:input}
  ];
  const reply = await callHy3(msgs, id);
  if(reply) addMsg("assistant", reply, id);
}

</script>
</body>
</html>
