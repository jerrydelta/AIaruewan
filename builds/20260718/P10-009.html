<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>租房押金风险自检</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.check{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
.check input{width:auto;margin-top:3px}
.res{margin-top:12px;padding:14px;border-radius:12px;font-size:15px;font-weight:600;text-align:center}
.r-low{background:#EAFaf1;color:var(--ok)}
.r-mid{background:#FFF6E5;color:#E8A33D}
.r-high{background:#FDECEC;color:var(--coral)}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">home</span><span class="tag">deposit_fraud_protection</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">租房押金风险自检</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Pre-contract deposit-fraud risk checker app</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">韩国 HUG「안심전세 앱」在签约前可视化全租（jeonse）押金风险：市价、物件风险、房东未返还史、税金滞纳。韩国特有的高额押金诈骗受害频发。此类风险事前核查，对日本（敷金）、中国（租房）同样适用。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 签约前 5 项风险核查</b>
    <label>逐条勾选你确认「不符合 / 不存在」的项（存在风险才勾）</label>
    <label class="check"><input type="checkbox" class="f"> 房东曾有押金未返还纠纷 / 诉讼</label>
    <label class="check"><input type="checkbox" class="f"> 该房产市价明显低于周边（异常便宜）</label>
    <label class="check"><input type="checkbox" class="f"> 房东有税金 / 管理费滞纳记录</label>
    <label class="check"><input type="checkbox" class="f"> 未加入押金保障保险（如 HUG）</label>
    <label class="check"><input type="checkbox" class="f"> 合同期限 / 返还条款不明确</label>
    <button class="btn" onclick="check()">评估风险</button>
    <div id="res"></div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.chosun.com/economy/real_estate/2025/06/30/BPWP3TIA2JGYTKZLHKCLHEOKGA/" target="_blank" style="color:var(--coral)">안심전세 앱 / HUG（韩国押金风险自查）</a>
  </div>

<script>
const KEY="P10-009";
let log = JSON.parse(localStorage.getItem(KEY) || "[]");
function check(){
  const flags=[...document.querySelectorAll('.f')].map(c=>c.checked);
  const hit=flags.filter(Boolean).length;
  let lvl,txt;
  if(hit===0){lvl='r-low';txt='🟢 低风险 · 未发现明显红旗，可谨慎签约';}
  else if(hit<=2){lvl='r-mid';txt='🟡 中风险 · 发现 '+hit+' 项红旗，建议进一步核实房东与合同';}
  else{lvl='r-high';txt='🔴 高风险 · 发现 '+hit+' 项红旗，强烈建议暂缓签约并查证';}
  document.getElementById('res').innerHTML='<div class="res '+lvl+'">'+txt+'</div>';
  log.unshift({id:Date.now(),hit,time:new Date().toLocaleString('zh')});
  localStorage.setItem(KEY,JSON.stringify(log.slice(0,20)));render();
}
function render(){
  const el=document.getElementById('list');
  if(!log.length){el.innerHTML='<p style="font-size:13px;color:var(--muted)">还没有评估记录。</p>';return;}
  el.innerHTML='<b>📋 历史评估</b>'+log.map(l=>'<div style="padding:8px 0;border-bottom:1px solid var(--line);font-size:14px">'+l.time+' · <b>'+l.hit+'</b> 项红旗</div>').join('');
}
render();
</script>
</body>
</html>
