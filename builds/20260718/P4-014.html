<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>跨国异地恋同步观影（弹幕+进度）</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{padding:10px 0;border-bottom:1px solid var(--line);font-size:14px}
.item:last-child{border-bottom:none}
.del{color:var(--coral);font-size:13px;cursor:pointer;border:none;background:none;float:right}
.dm{font-size:13px;padding:6px 0;border-bottom:1px dashed var(--line)}
.dm:last-child{border-bottom:none}
.sel{background:#FFF7F7;border:1px solid #FFE3E3;border-radius:12px;padding:10px;margin:6px 0}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">relationship</span><span class="tag">long_distance_watch</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">跨国异地恋同步观影</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Cross-border LDR synced-watch</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">异地恋三大观影痛点：进度不同步、片源凑不齐（没会员）、各看各的没"一起"感。Teleparty（Netflix同步）、Kast、Rave已验证；国内Syncwe做网盘直挂+弹幕。痛点：跨平台/跨国片源与同步难、互动弱。</p>
  </div>

  <div class="card">
    <b>🛠 工具（共建观影房间）</b>
    <p style="font-size:13px;color:var(--muted);margin:6px 0 2px">约好一部片，记下各自进度时间点，边看边发弹幕。相隔再远也像坐在一起。</p>
    <label>片名</label>
    <input id="movie" placeholder="如：盗梦空间 / 기생충(寄生虫)">
    <div class="row">
      <div><label>平台</label><select id="plat"><option>Netflix</option><option>网盘</option><option>Disney+</option><option>本地文件</option><option>其他</option></select></div>
      <div><label>进度时间点</label><input id="ts" placeholder="如：01:12:30"></div>
    </div>
    <button class="btn" onclick="addRoom()">🎬 开房间/记进度</button>
    <div id="roomBox"></div>
    <label>发条弹幕（选好房间后）</label>
    <input id="dm" placeholder="如：这段太好哭了！">
    <button class="btn" onclick="sendDM()">💬 发弹幕</button>
  </div>

  <div class="card" id="list">
    <b>🎞 观影房间</b>
    <div id="logs" style="margin-top:6px"></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://syncwe.top/couples" target="_blank" style="color:var(--coral)">Teleparty / Kast / Rave / Syncwe</a>
  </div>

<script>
const KEY="P4-014";
let rooms=JSON.parse(localStorage.getItem(KEY)||"[]");
let cur=null;
function addRoom(){
  const movie=document.getElementById("movie").value.trim();
  const plat=document.getElementById("plat").value;
  const ts=document.getElementById("ts").value.trim()||"00:00:00";
  if(!movie){alert("写个片名");return;}
  cur=rooms.length;
  rooms.unshift({movie,plat,ts,dms:[],d:new Date().toISOString().slice(0,10)});
  document.getElementById("movie").value="";document.getElementById("ts").value="";
  save();
}
function sendDM(){
  if(cur===null||!rooms[cur]){alert("先在上面开/选一个房间");return;}
  const t=document.getElementById("dm").value.trim();
  if(!t)return;
  rooms[cur].dms.push({t,time:new Date().toTimeString().slice(0,5)});
  document.getElementById("dm").value="";
  save();
}
function selRoom(i){cur=i;render();}
function delR(i){rooms.splice(i,1);if(cur===i)cur=null;save();}
function save(){localStorage.setItem(KEY,JSON.stringify(rooms));render();}
function render(){
  document.getElementById("roomBox").innerHTML=cur!==null&&rooms[cur]?
    `<div class="sel">📺 当前房间：<b>${rooms[cur].movie}</b> · ${rooms[cur].plat} · ${rooms[cur].ts}<br><small style="color:var(--muted)">弹幕 ${rooms[cur].dms.length} 条</small></div>`:"";
  document.getElementById("logs").innerHTML=rooms.length?rooms.map((r,i)=>
    `<div class="item"><button class="del" onclick="delR(${i})">删除</button><span onclick="selRoom(${i})" style="cursor:pointer">🎬 <b>${r.movie}</b> · ${r.plat} · ${r.ts}</span><br><small style="color:var(--muted)">${r.dms.length?r.dms.map(d=>"["+d.time+"] "+d.t).join("  "):"还没有弹幕"}</small></div>`
  ).join(""):`<p style="color:var(--muted);font-size:13px">还没有观影房间。</p>`;
}
render();
</script>
</body>
</html>
