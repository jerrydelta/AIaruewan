<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>医疗器械级盆底康复+硬件联动</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn.ghost{background:#FFF0F0;color:var(--coral);border:1px solid #FFD9D9}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.report{background:#F0FFF6;border:1px solid #C7EFD6;border-radius:12px;padding:12px;font-size:14px;margin-top:10px}
.item{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:8px;font-size:14px}
.item .meta{font-size:11px;color:var(--muted);margin-top:4px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">postpartum</span><span class="tag">medical_grade</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">医疗器械级盆底康复</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Class-II pelvic rehab · Glazer 评估 + 硬件联动模拟</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">产后 42 天修复、尿失禁需医疗级精准评估，普通 App 不专业。澜渟（麦澜德）具二类医疗器械认证，采用院线同款 Glazer 评估体系，智能硬件联动实时调整电流强度。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 一次 Glazer 式评估记录</b>
    <p style="font-size:13px;color:#666;margin:6px 0 0">模拟院线评估：记录前测最大收缩力、训练后收缩力，自动算出改善比例。</p>
    <label>评估日期</label>
    <input id="gDate" type="date">
    <label>最大收缩保持（秒，前测）</label>
    <input id="pre" type="number" min="0" value="3">
    <label>最大收缩保持（秒，训练后）</label>
    <input id="post" type="number" min="0" value="5">
    <label>硬件反馈强度档位（1-5）</label>
    <input id="hw" type="number" min="1" max="5" value="3">
    <button class="btn" onclick="addGlazer()">📊 保存评估</button>
    <div id="reports"></div>
  </div>

  <div class="card" id="list">
    <b>📈 评估历史</b>
    <div id="glazers"></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.cnblogs.com/tzmm/p/19449683" target="_blank" style="color:var(--coral)">澜渟（二类医疗器械盆底康复）</a>
    <p style="margin:6px 0 0">本工具仅做记录与趋势观察，不能替代医疗器械与医生评估。</p>
  </div>

<script>
const KEY="P15-008";
let gs=JSON.parse(localStorage.getItem(KEY)||"[]");
function save(){localStorage.setItem(KEY,JSON.stringify(gs));render();}
function addGlazer(){
  const pre=+document.getElementById("pre").value,post=+document.getElementById("post").value;
  const improve=pre>0?Math.round((post-pre)/pre*100):0;
  gs.unshift({date:document.getElementById("gDate").value||new Date().toISOString().slice(0,10),pre,post,improve,hw:+document.getElementById("hw").value});
  save();
}
function delG(i){gs.splice(i,1);save();}
function render(){
  const r=document.getElementById("reports");
  if(gs.length){const last=gs[0];r.innerHTML='<div class="report">最近一次：前测 '+last.pre+'s → 训练后 '+last.post+'s，<b>改善 '+last.improve+'%</b>（硬件档位 '+last.hw+'）</div>';}
  else r.innerHTML="";
  const box=document.getElementById("glazers");
  box.innerHTML=gs.length?'':'<p style="font-size:13px;color:#aaa;margin:8px 0 0">做第一次评估，记录你的基线。</p>';
  gs.forEach((g,i)=>{const d=document.createElement("div");d.className="item";
    d.innerHTML='<span style="float:right;color:var(--coral);font-size:12px;cursor:pointer" onclick="delG('+i+')">删除</span><b>'+g.date+'</b><div style="font-size:13px;color:#555">'+g.pre+'s → '+g.post+'s（改善 '+g.improve+'%）· 档位 '+g.hw+'</div>';
    box.appendChild(d);});
}
render();
</script>
</body>
</html>
