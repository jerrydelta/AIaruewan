<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>透明轻量进销存</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.mini{font-size:14px;margin:14px 0 4px;font-weight:600;color:var(--ink);
  border-left:4px solid var(--coral);padding-left:8px}
.item{background:#FBFBFB;border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px;font-size:14px}
.del{color:var(--coral);float:right;font-size:13px;cursor:pointer}
.row{display:flex;gap:8px}.row>*{flex:1}
.warn{color:#E85555;font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">business</span><span class="tag">transparent_pricing_inventory</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">透明轻量进销存</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Transparent all-inclusive, ad-free lightweight inventory/ERP</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">超80%企业分不清ERP与进销存，陷入三大隐形坑——功能堆砌、假免费锁数据、隐形消费（年费3000-8000元却总投入远超预期）。痛点：小微要"小而美"透明一价全包。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <div class="mini">📦 商品库存</div>
    <label>商品名</label><input id="p_name" placeholder="如 保温杯">
    <div class="row">
      <div><label>进价</label><input id="p_in" type="number" placeholder="20"></div>
      <div><label>售价</label><input id="p_out" type="number" placeholder="39"></div>
    </div>
    <div class="row">
      <div><label>库存量</label><input id="p_qty" type="number" placeholder="50"></div>
      <div><label>预警线</label><input id="p_warn" type="number" placeholder="10"></div>
    </div>
    <button class="btn" onclick="addP()">入库</button>

    <div class="mini">🧾 开单（销售出库）</div>
    <label>选商品</label><select id="sel"></select>
    <div class="row">
      <div><label>数量</label><input id="s_qty" type="number" value="1"></div>
      <div><label>类型</label><select id="s_type"><option>销售</option><option>进货</option></select></div>
    </div>
    <button class="btn" onclick="sell()">记一笔流水</button>
    <p id="stat" style="font-size:14px;margin:8px 0 0"></p>
  </div>

  <div class="card" id="list"><b>📋 库存 & 流水</b><div id="box"></div></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.xiangguohe.com/hangye/4136.html" target="_blank" style="color:var(--coral)">象过河进销存 · 金蝶AI星辰 · 橙子库存通</a>
  </div>

<script>
const KP="P12-010_stock",KF="P12-010_flow";
let P=JSON.parse(localStorage.getItem(KP)||"[]");
let F=JSON.parse(localStorage.getItem(KF)||"[]");
function addP(){const n=document.getElementById("p_name").value.trim(),inP=+document.getElementById("p_in").value,out=+document.getElementById("p_out").value,q=+document.getElementById("p_qty").value,w=+document.getElementById("p_warn").value;
  if(!n||isNaN(inP)||isNaN(out)){alert("填名称/进价/售价");return;}
  P.push({n,inP,out,q,w:isNaN(w)?0:w});localStorage.setItem(KP,JSON.stringify(P));render();}
function sell(){const i=+document.getElementById("sel").value,q=+document.getElementById("s_qty").value,ty=document.getElementById("s_type").value;
  if(isNaN(i)||!P[i]){alert("先选商品");return;}
  if(ty==="销售"){if(P[i].q<q){alert("库存不足");return;}P[i].q-=q;F.push({n:P[i].n,q,ty,amt:P[i].out*q,t:new Date().toLocaleDateString()});}
  else{P[i].q+=q;F.push({n:P[i].n,q,ty,amt:-P[i].inP*q,t:new Date().toLocaleDateString()});}
  localStorage.setItem(KP,JSON.stringify(P));localStorage.setItem(KF,JSON.stringify(F));render();}
function delP(i){P.splice(i,1);localStorage.setItem(KP,JSON.stringify(P));render();}
function render(){
  const sel=document.getElementById("sel");sel.innerHTML=P.map((x,i)=>`<option value="${i}">${x.n}(库存${x.q})</option>`).join("");
  let profit=0;F.forEach(f=>profit+=f.amt);
  document.getElementById("stat").innerHTML=`累计毛利 <b>¥${profit.toFixed(0)}</b> · 流水 ${F.length} 笔`;
  let h=P.map((x,i)=>`<div class="item"><span class="del" onclick="delP(${i})">删</span><b>${x.n}</b> · 进¥${x.inP}/售¥${x.out}<br>库存 <b>${x.q}</b> ${x.q<=x.w?`<span class="warn">⚠ 低于预警${x.w}</span>`:""}</div>`).join("");
  if(F.length)h+=`<div style="font-size:13px;color:var(--muted);margin-top:8px">流水</div>`+F.slice().reverse().map(f=>`<div class="item">${f.t} · ${f.ty} ${f.n} ×${f.q} · ¥${f.amt}</div>`).join("");
  document.getElementById("box").innerHTML=h||"<p style='font-size:13px;color:var(--muted)'>还没有商品。</p>";
}
render();
</script>
</body>
</html>
