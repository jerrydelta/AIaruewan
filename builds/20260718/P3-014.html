<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>宠物每日养护灵感本</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.item b{color:var(--ink)}.del{color:var(--muted);font-size:12px;float:right;cursor:pointer}
.pill{display:inline-block;font-size:11px;background:#FFF0F0;color:var(--coral);border-radius:999px;padding:1px 8px;margin:2px 3px 0 0}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">pet</span><span class="tag">dog_content_app_jp</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">宠物每日养护·灵感本</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Content + community + e-commerce pet media</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">日本"いぬのきもち"(Benesse)以43票绝对第一，按宠物年龄/季节推送每日建议、训练/饲养文章每日更新、照片投稿社区。机会：内容+社区+电商的宠物媒体模式，可搬去中国。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:#555;margin:6px 0 0">收藏今日养护建议/文章，写自己的笔记，按犬/猫分类，本地保存。</p>
    <div class="row">
      <div><label>宠物类型</label>
      <select id="kind"><option>狗狗</option><option>猫咪</option><option>其他</option></select></div>
      <div><label>分类</label>
      <select id="cat"><option>训练</option><option>健康</option><option>饮食</option><option>季节护理</option><option>好物</option></select></div>
    </div>
    <label>今日建议 / 文章标题</label>
    <input id="title" placeholder="例如：夏天遛狗避开柏油路烫伤脚垫">
    <label>我的笔记</label>
    <textarea id="note" rows="2" placeholder="例如：晚8点后遛，带湿毛巾"></textarea>
    <button class="btn" onclick="add()">收藏这条</button>
  </div>

  <div class="card" id="list">
    <b>📋 我的养护灵感本</b>
    <p style="font-size:12px;color:var(--muted);margin:4px 0 0">本地保存，随时回看。</p>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://prtimes.jp/main/html/rd/p/000000029.000162349.html" target="_blank" style="color:var(--coral)">いぬのきもち・ねこのきもち (Benesse)</a>
  </div>

<script>
const KEY="P3-014";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function add(){
  const kind=document.getElementById("kind").value;
  const cat=document.getElementById("cat").value;
  const title=document.getElementById("title").value.trim();
  if(!title){alert("先写标题");return;}
  const note=document.getElementById("note").value.trim();
  items.unshift({kind,cat,title,note,t:new Date().toLocaleString("zh-CN")});
  localStorage.setItem(KEY,JSON.stringify(items));render();
  document.getElementById("title").value="";document.getElementById("note").value="";
}
function del(i){items.splice(i,1);localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const el=document.getElementById("list");
  let h='<b>📋 我的养护灵感本</b><p style="font-size:12px;color:var(--muted);margin:4px 0 0">本地保存，随时回看。</p>';
  if(!items.length){h+='<p style="font-size:13px;color:var(--muted);margin-top:8px">还没有收藏。</p>';}
  items.forEach((it,i)=>{
    h+='<div class="item"><span class="del" onclick="del('+i+')">删除 ✕</span>'+
       '<span class="pill">'+it.kind+'</span><span class="pill">'+it.cat+'</span><br>'+
       '<b>'+it.title+'</b><br>'+
       (it.note?'<span style="font-size:13px;color:#555">📝 '+it.note+'</span><br>':'')+
       '<span style="font-size:11px;color:var(--muted)">'+it.t+'</span></div>';
  });
  el.innerHTML=h;
}
render();
</script>
</body>
</html>
