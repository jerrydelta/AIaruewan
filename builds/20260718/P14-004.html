<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>色情/性成瘾恢复</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn-ghost{background:#FFF0F0;color:var(--coral);border:1px solid #FFD9D9}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.stat{text-align:center;padding:10px 4px}
.stat b{display:block;font-size:24px;color:var(--coral)}
.stat span{font-size:12px;color:var(--muted)}
.tree{font-size:30px;text-align:center;letter-spacing:4px;margin:6px 0}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">addiction_recovery</span><span class="tag">porn_recovery</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">色情 / 性成瘾恢复</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Porn/sex addiction recovery</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">复吸后"进度归零"打击大，用户需要无羞耻、结构性改变。Unlust 用个性化 AI 恢复计划 + 不重置进度的"恢复树"连击追踪，安装到付费转化 15%，MRR 近 $2K。日本 NHK 2024 专题使话题升温。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 恢复树连击 + 冲动记录</b>
    <label>恢复开始日（连击从这里算，复吸不清零）</label>
    <input id="start" type="date">
    <div class="row" style="margin-top:10px">
      <div class="stat"><b id="streak">0</b><span>当前连击天数</span></div>
      <div class="stat"><b id="lapse">0</b><span>复吸次数</span></div>
      <div class="stat"><b id="total">0</b><span>累计天数</span></div>
    </div>
    <div class="tree" id="tree">🌱</div>
    <hr style="border:none;border-top:1px solid var(--line);margin:12px 0">
    <b style="font-size:14px">记录一次冲动 / 复吸</b>
    <label>类型</label>
    <select id="type"><option value="urge">冲动（挺住了）</option><option value="lapse">复吸（记一次，不归零）</option></select>
    <label>诱因</label>
    <input id="trigger" placeholder="如：深夜独处 / 压力 / 无聊">
    <label>应对方式</label>
    <input id="cope" placeholder="如：做了20个俯卧撑 / 出门散步">
    <button class="btn" id="add">记录</button>
  </div>

  <div class="card" id="list">
    <b>📋 恢复日志</b>
    <p id="empty" style="font-size:13px;color:var(--muted);margin:6px 0 0">还没有记录。</p>
    <div id="log"></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://trustmrr.com/startup/unlust" target="_blank" style="color:var(--coral)">Unlust / Relay / QuitHub</a>
  </div>

<script>
const KEY="P14-004";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
const $=id=>document.getElementById(id);
const todayStr=()=>new Date().toISOString().slice(0,10);
if(!start.value) start.value=todayStr();
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function add(){
  items.push({t:Date.now(),day:todayStr(),type:type.value,trigger:trigger.value.trim(),cope:cope.value.trim()});
  trigger.value="";cope.value="";save();
}
function render(){
  const s=start.value;
  const elapsed=s?Math.max(0,Math.floor((Date.now()-new Date(s))/864e5)):0;
  const lapses=items.filter(x=>x.type==="lapse").length;
  // 连击：距开始日天数 - 复吸占用天数(每次复吸算打断1天，但按需求"不归零"，这里用累计天数展示)
  streak.textContent=elapsed;
  lapse.textContent=lapses;
  total.textContent=items.length;
  const lvl=elapsed<3?"🌱":elapsed<14?"🌿":elapsed<30?"🌳":elapsed<90?"🌲":"🌴";
  tree.textContent=lvl;
  if(items.length)empty.style.display="none";else empty.style.display="block";
  log.innerHTML=items.slice().reverse().map(x=>{
    const tag=x.type==="lapse"?'<span style="color:#E85555">复吸</span>':'<span class="h-coral">挺住</span>';
    return `<div style="font-size:13px;padding:5px 0;border-bottom:1px solid var(--line)">
      ${x.day} ${tag} ${x.trigger?("· 诱因:"+esc(x.trigger)):""} ${x.cope?("→ "+esc(x.cope)):""}</div>`;
  }).join("");
}
function esc(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
add.onclick=add;
render();
</script>
</body>
</html>
