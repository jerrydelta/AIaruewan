<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>韩国个体户매출管理</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.mini{font-size:14px;margin:14px 0 4px;font-weight:600;color:var(--ink);
  border-left:4px solid var(--coral);padding-left:8px}
.item{background:#FBFBFB;border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px;font-size:14px}
.del{color:var(--coral);float:right;font-size:13px;cursor:pointer}
.row{display:flex;gap:8px}.row>*{flex:1}
.kr{color:var(--coral);font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">business</span><span class="tag">korea_selfemployed_sales</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">韩国个体户 매출 管理</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Korean self-employed sales/deposit tracker + KakaoTalk report</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">韩国个体户매출管理刚需强：Bizzle面向300万자영업 사장님，提供当日입금/매출/결제취소 알림、카카오톡 주/월 리포트。痛点：个体户看不到实时매출、对账靠手工。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <div class="mini">💰 매출 / 입금 기록</div>
    <div class="row">
      <div><label>유형</label><select id="ty"><option>매출</option><option>입금</option><option>결제취소</option></select></div>
      <div><label>금액(원)</label><input id="amt" type="number" placeholder="50000"></div>
    </div>
    <label>메모</label><input id="memo" placeholder="예: 카페 아메리카노 10잔">
    <button class="btn" onclick="add()">기록</button>

    <div class="mini">📊 카카오톡 리포트</div>
    <button class="btn" onclick="report('week')">주간 리포트</button>
    <button class="btn" onclick="report('month')">월간 리포트</button>
    <div class="item" id="rep" style="display:none"></div>
  </div>

  <div class="card" id="list"><b>📋 매출 기록</b><div id="box"></div></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="http://bizzle-j9uoez.appstor.io/" target="_blank" style="color:var(--coral)">Bizzle(비즐)</a>
  </div>

<script>
const K="P12-014_sales";
let items=JSON.parse(localStorage.getItem(K)||"[]");
function add(){const ty=document.getElementById("ty").value,a=parseFloat(document.getElementById("amt").value),m=document.getElementById("memo").value.trim();
  if(isNaN(a)){alert("금액 입력");return;}
  const sign=ty==="결제취소"?-1:1;
  items.push({ty,a:a*sign,raw:a,m,t:new Date().toLocaleDateString()});localStorage.setItem(K,JSON.stringify(items));render();}
function report(span){const now=new Date(),cut=new Date(now);
  if(span==="week")cut.setDate(now.getDate()-7);else cut.setMonth(now.getMonth()-1);
  const f=items.filter(x=>new Date(x.t)>=cut);
  const sale=f.filter(x=>x.ty!=="결제취소").reduce((s,x)=>s+x.a,0);
  const cancel=f.filter(x=>x.ty==="결제취소").reduce((s,x)=>s+Math.abs(x.a),0);
  const r=document.getElementById("rep");r.style.display="block";
  r.innerHTML=`<span class="kr">📨 카카오톡 ${span==="week"?"주간":"월간"} 리포트</span><br>
    기간매출: <b>₩${sale.toLocaleString()}</b><br>결제취소: <span style="color:#E85555">₩${cancel.toLocaleString()}</span><br>순매출: <b>₩${(sale-cancel).toLocaleString()}</b> · ${f.length}건`;
}
function del(i){items.splice(i,1);localStorage.setItem(K,JSON.stringify(items));render();}
function render(){
  const sale=items.filter(x=>x.ty!=="결제취소").reduce((s,x)=>s+x.a,0);
  const cancel=items.filter(x=>x.ty==="결제취소").reduce((s,x)=>s+Math.abs(x.a),0);
  let h=`<p style="font-size:13px">총매출 ₩${sale.toLocaleString()} · 취소 ₩${cancel.toLocaleString()} · ${items.length}건</p>`;
  h+=items.slice().reverse().map((x,i)=>`<div class="item"><span class="del" onclick="del(${items.length-1-i})">삭제</span>${x.t} · <b>${x.ty}</b> ${x.raw>=0?'+':''}₩${x.raw.toLocaleString()}<br><span style="font-size:12px;color:var(--muted)">${x.m}</span></div>`).join("");
  document.getElementById("box").innerHTML=h||"<p style='font-size:13px;color:var(--muted)'>기록이 없습니다.</p>";
}
render();
</script>
</body>
</html>
