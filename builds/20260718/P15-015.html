<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>AI婴儿睡眠训练</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn.ghost{background:#FFF0F0;color:var(--coral);border:1px solid #FFD9D9}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.item{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:8px;font-size:14px}
.item .meta{font-size:11px;color:var(--muted);margin-top:4px}
.stat{font-size:14px;color:#555;margin-top:6px}
.note{font-size:12px;color:#888;margin-top:6px}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">postpartum</span><span class="tag">ai_sleep_training</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">AI 婴儿睡眠训练</h1>
    <p class="h-coral" style="font-size:13px;margin:0">对标 Huckleberry · 更稳预测 + 手动校准</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">Napper 用 AI 训练婴儿睡眠（年费 $70，月流水约 30 万），但 Reddit 用户反馈模式切换期预测需频繁手动校准。机会：更稳的 AI 预测 + 更低摩擦。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 每日睡眠训练打卡</b>
    <label>今天睡眠次数</label>
    <input id="count" type="number" min="0" value="4">
    <label>平均单次时长（分钟）</label>
    <input id="dur" type="number" min="0" value="60">
    <label>当前睡眠模式</label>
    <select id="mode"><option>3 次/日（小月龄）</option><option>2 次/日（过渡）</option><option>1-2 次/日（更接近成人）</option></select>
    <label>手动校准：下次预测窗口偏移（分钟，负=提前）</label>
    <input id="calib" type="number" value="0">
    <button class="btn" onclick="addDay()">📌 记录今天</button>
    <div id="predict"></div>
  </div>

  <div class="card" id="list">
    <b>📈 训练进展</b>
    <div class="stat" id="stat"></div>
    <div id="logs"></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.hstong.com/news/hk/detail/25082001503494177" target="_blank" style="color:var(--coral)">Napper（AI 婴儿睡眠训练）</a>
  </div>

<script>
const KEY="P15-015";
let logs=JSON.parse(localStorage.getItem(KEY)||"[]");
function save(){localStorage.setItem(KEY,JSON.stringify(logs));render();}
function nowStr(){const d=new Date();const p=n=>(""+n).padStart(2,"0");return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate());}
const awakeMin={"3 次/日（小月龄）":90,"2 次/日（过渡）":120,"1-2 次/日（更接近成人）":150};
function addDay(){
  const mode=document.getElementById("mode").value;
  const count=+document.getElementById("count").value,dur=+document.getElementById("dur").value,calib=+document.getElementById("calib").value;
  logs.unshift({date:nowStr(),mode,count,dur,calib});save();
}
function delDay(i){logs.splice(i,1);save();}
function fmt(d){const p=n=>(""+n).padStart(2,"0");return (d.getMonth()+1)+"-"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes());}
function render(){
  const pb=document.getElementById("predict");
  if(logs.length){
    const last=logs[0];
    const base=new Date();base.setMinutes(base.getMinutes()+awakeMin[last.mode]+last.calib);
    pb.innerHTML='<div class="note">基于最近模式「'+last.mode+'」及手动校准，预测下次入睡窗口约：<br><b style="font-size:16px;color:var(--coral)">'+fmt(base)+'</b></div>';
  } else pb.innerHTML="";
  const totalSleep=logs.reduce((a,b)=>a+b.count*b.dur,0);
  document.getElementById("stat").textContent=logs.length?("累计训练 "+logs.length+" 天 ｜ 近一天睡眠约 "+(logs[0].count*logs[0].dur)+" 分钟"):"还没有记录";
  const box=document.getElementById("logs");box.innerHTML=logs.length?'':'<p style="font-size:13px;color:#aaa;margin:8px 0 0">每天记一笔，预测会越来越准。</p>';
  logs.slice(0,10).forEach((l,i)=>{const d=document.createElement("div");d.className="item";
    d.innerHTML='<span style="float:right;color:var(--coral);font-size:12px;cursor:pointer" onclick="delDay('+i+')">删除</span><b>'+l.date+'</b> · '+l.mode+'<div class="meta">'+l.count+' 次 × '+l.dur+' 分 ｜ 校准 '+l.calib+' 分</div>';
    box.appendChild(d);});
}
render();
</script>
</body>
</html>
