<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>家庭家务游戏榜</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn.s{font-size:13px;padding:8px;background:#FFE3E3;color:var(--coral)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
.item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.item:last-child{border-bottom:none}
.item .name{flex:1;font-size:15px}
.item .who{font-size:12px;color:var(--muted)}
.done{text-decoration:line-through;color:var(--muted)}
.del{color:var(--muted);font-size:18px;background:none;border:none;cursor:pointer}
.stat{display:flex;gap:8px;margin-top:8px}
.stat>div{flex:1;background:#FFF8F0;border-radius:12px;padding:10px;text-align:center}
.stat b{font-size:20px;color:var(--coral);display:block}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">creative</span><span class="tag ai">AI增强</span><span class="tag">home</span><span class="tag">family_housework_gamified</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">家庭家务游戏榜</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Gamified family housework-sharing app</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">韩国统计显示约 70% 家务集中在妻子。GDSC 团队「홈워크」用家务登记+担当+周/月分析+轮盘重分配+存钱罐激励家庭参与。游戏化（轮盘、存钱罐）促参与，日中亦可复制。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 接任务、做任务、攒积分</b>
    <label>家务</label><input id="g_name" placeholder="如：洗碗 / 拖地 / 倒垃圾">
    <label>分配给家庭成员</label><input id="g_who" placeholder="如：爸爸 / 妈妈 / 哥哥">
    <label>完成奖励积分</label><input id="g_pts" type="number" value="1">
    <button class="btn" onclick="add()">＋ 派活</button>
    <div class="stat" id="stat"></div>
  </div>

  
  <!-- AI助手模块 -->
  <div class="card ai" id="aiCard_P10-008">
    <div class="collapse-header" id="aiHeader_P10-008" onclick="toggleAI('P10-008')" style="font-size:15px;font-weight:600;color:var(--ai-border)">
      🤖 AI 助手（用户自带Key · 零成本）
    </div>
    <div class="collapse-body collapsed" id="aiBody_P10-008" style="max-height:500px;margin-top:10px">
      <div id="aiKeySection_P10-008">
        <label>Hy3 API Key（填写你自己的Key，零成本使用AI）</label>
        <input id="apiKey_P10-008" type="password" placeholder="输入你的 Hy3 API Key" style="margin-bottom:8px">
        <button class="btn ai" onclick="saveKey('P10-008')">保存 Key</button>
        <p style="font-size:11px;color:var(--muted);margin:6px 0 0">Key 仅存储在你的浏览器本地，不会上传到任何服务器。没有Key？<a href="#" style="color:var(--ai-border)">点此免费获取</a>。</p>
      </div>
      <div id="aiChatSection_P10-008" style="display:none;margin-top:10px">
        <div id="aiMessages_P10-008" style="max-height:300px;overflow-y:auto"></div>
        <textarea id="aiInput_P10-008" placeholder="向AI提问..." style="margin-top:8px;height:60px"></textarea>
        <button class="btn ai" onclick="aiChat('P10-008')" style="margin-top:4px">发送</button>
      </div>
    </div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://github.com/GDSC-Homework/Homework_Back/blob/main/README.md" target="_blank" style="color:var(--coral)">홈워크 HomeWork（韩国家庭游戏化家务）</a>
  </div>

<script>
const KEY="P10-008";
let tasks = JSON.parse(localStorage.getItem(KEY) || "[]");
function save(){ localStorage.setItem(KEY, JSON.stringify(tasks)); render(); }
function add(){
  const name=document.getElementById('g_name').value.trim();
  const who=document.getElementById('g_who').value.trim();
  const pts=parseInt(document.getElementById('g_pts').value)||1;
  if(!name||!who)return;
  tasks.push({id:Date.now(),name,who,pts,done:false});
  document.getElementById('g_name').value='';document.getElementById('g_who').value='';save();
}
function toggle(id){const t=tasks.find(x=>x.id==id);if(t)t.done=!t.done;save();}
function del(id){tasks=tasks.filter(x=>x.id!=id);save();}
function render(){
  const scores={};
  tasks.forEach(t=>{scores[t.who]=(scores[t.who]||0)+(t.done?t.pts:0);});
  const names=Object.keys(scores);
  document.getElementById('stat').innerHTML=names.length?names.map(n=>'<div><b>'+scores[n]+'</b>'+esc(n)+'分</div>').join(''):'<div style="flex:1;text-align:center;color:var(--muted)">还没有成员积分</div>';
  const el=document.getElementById('list');
  if(!tasks.length){el.innerHTML='<p style="font-size:13px;color:var(--muted)">还没有派活。</p>';return;}
  el.innerHTML='<b>🎮 家务榜</b>'+tasks.map(t=>'<div class="item"><input type="checkbox" '+(t.done?'checked':'')+' onchange="toggle('+t.id+')"><span class="name '+(t.done?'done':'')+'">'+esc(t.name)+'</span><span class="who">'+esc(t.who)+'·'+t.pts+'分</span><button class="del" onclick="del('+t.id+')">✕</button></div>').join('');
}
function esc(s){return s.replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
render();

// === AI助手模块（用户自带Key模式）===
let aiKey = localStorage.getItem("HY3_API_KEY") || "";
let aiHistory = [];

function toggleAI(id){
  const body = document.getElementById("aiBody_" + id);
  const header = document.getElementById("aiHeader_" + id);
  if(body.classList.contains("collapsed")){
    body.classList.remove("collapsed");
    header.classList.remove("collapsed");
  } else {
    body.classList.add("collapsed");
    header.classList.add("collapsed");
  }
}

function saveKey(id){
  const key = document.getElementById("apiKey_" + id).value.trim();
  if(!key){alert("请输入Key");return;}
  localStorage.setItem("HY3_API_KEY", key);
  aiKey = key;
  document.getElementById("aiKeySection_" + id).style.display="none";
  document.getElementById("aiChatSection_" + id).style.display="block";
}

async function callHy3(messages, id){
  if(!aiKey){alert("请先填写 API Key");return null;}
  const loading = document.createElement("div");
  loading.className = "ai-msg";
  loading.innerHTML = `<div class="role">🤖 AI</div><div class="content"><span class="loading">思考中...</span></div>`;
  document.getElementById("aiMessages_" + id).appendChild(loading);
  
  try {
    const res = await fetch("https://tokenhub.tencentmaas.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + aiKey
      },
      body: JSON.stringify({
        model: "hy3",
        messages: messages,
        temperature: 0.7
      })
    });
    const data = await res.json();
    loading.remove();
    if(data.error){alert("API错误："+data.error.message);return null;}
    return data.choices[0].message.content;
  } catch(e){
    loading.remove();
    alert("调用失败："+e.message);
    return null;
  }
}

function addMsg(role, content, id){
  const box = document.getElementById("aiMessages_" + id);
  if(!box)return;
  const div = document.createElement("div");
  div.className = "ai-msg";
  div.innerHTML = `<div class="role">${role==="user"?"🙋 你":"🤖 AI"}</div><div class="content">${content.replace(/\n/g,"<br>")}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

async function aiChat(id){
  const input = document.getElementById("aiInput_" + id).value.trim();
  if(!input){return;}
  document.getElementById("aiInput_" + id).value = "";
  addMsg("user", input, id);
  const msgs = [
    {role:"system",content:"你是这个工具的AI助手，帮助用户更好地使用本工具，提供专业建议和优化方案。用中文简洁回答。"},
    {role:"user",content:input}
  ];
  const reply = await callHy3(msgs, id);
  if(reply) addMsg("assistant", reply, id);
}

</script>
</body>
</html>
