<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>涂色页 SKU 矩阵规划器</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:10px;margin-top:10px;font-size:13px}
.item b{color:var(--coral)}
.del{color:var(--muted);font-size:12px;float:right;cursor:pointer}
.kpi{display:flex;gap:8px;margin-top:8px}
.kpi div{flex:1;background:#FFF7F7;border:1px solid #FFE3E3;border-radius:10px;padding:8px;text-align:center}
.kpi b{display:block;font-size:18px;color:var(--coral)}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">digital_product</span><span class="tag">coloring_pages</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">涂色页 SKU 矩阵规划器</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Niche printable coloring-page matrix on Etsy</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">数字涂色页(成人/儿童)是 Etsy 增长型被动收入:某店铺售出 111,000+ 份、单价 $1-420;AI 生成独特设计可快速扩充 SKU。痛点:成人解压涂色、亲子活动需求旺但同质化。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <p style="font-size:13px;color:#555;margin:4px 0 10px">搭建你的涂色页主题矩阵,估算 SKU 总量与月收入潜力。</p>
    <label>主题</label>
    <input id="name" placeholder="如 治愈系植物 / 节日圣诞 / 文化图腾">
    <div class="row">
      <div><label>受众</label>
        <select id="aud"><option>成人解压</option><option>儿童亲子</option><option>通用</option></select>
      </div>
      <div><label>页数/SKU</label><input id="sku" type="number" value="10"></div>
    </div>
    <div class="row">
      <div><label>单价($)</label><input id="price" type="number" value="3.5"></div>
      <div><label>预估月销(套)</label><input id="vol" type="number" value="200"></div>
    </div>
    <button class="btn" onclick="add()">加入矩阵</button>
    <div class="kpi">
      <div><b id="kSku">0</b>总SKU</div>
      <div><b id="kRev">$0</b>月预估</div>
      <div><b id="kTheme">0</b>主题</div>
    </div>
  </div>

  <div class="card" id="list"><b>🎨 主题矩阵</b><div id="items"></div></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://dicloak.com/tc/blog-detail/1166day-best-10-digital-products-you-can-sell-using-ai--make-money-online" target="_blank" style="color:var(--coral)">Etsy 涂色页 AI 生成案例</a>
  </div>

<script>
const KEY="P5-006";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function calc(){const sku=items.reduce((a,b)=>a+b.sku,0);
  const rev=items.reduce((a,b)=>a+b.sku*b.price*b.vol,0);
  kSku.textContent=sku; kTheme.textContent=items.length; kRev.textContent="$"+rev.toFixed(0);}
function add(){const name=name_.value.trim()||"未命名主题";
  items.push({name,aud:aud.value,sku:+(+sku.value||0),price:+(+price.value||0),vol:+(+vol.value||0)});
  localStorage.setItem(KEY,JSON.stringify(items)); name_.value=""; render(); calc();}
function del(i){items.splice(i,1);localStorage.setItem(KEY,JSON.stringify(items));render();calc();}
function render(){if(!items.length){items_.innerHTML='<p style="font-size:13px;color:#555;margin:6px 0 0">还没有主题。</p>';return;}
  items_.innerHTML=items.map((it,i)=>`<div class="item"><span class="del" onclick="del(${i})">删除</span>
    <b>${it.name}</b> · ${it.aud}<br>${it.sku} 页/SKU · $${it.price} · 月销估 ${it.vol} → $${(it.sku*it.price*it.vol).toFixed(0)}</div>`).join("");}
const name_=document.getElementById("name");
render(); calc();
</script>
</body>
</html>
