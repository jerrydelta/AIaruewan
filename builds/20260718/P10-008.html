<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>家庭家务游戏榜</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn.s{font-size:13px;padding:8px;background:#FFE3E3;color:var(--coral)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
.item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.item:last-child{border-bottom:none}
.item .name{flex:1;font-size:15px}
.item .who{font-size:12px;color:var(--muted)}
.done{text-decoration:line-through;color:var(--muted)}
.del{color:var(--muted);font-size:18px;background:none;border:none;cursor:pointer}
.stat{display:flex;gap:8px;margin-top:8px}
.stat>div{flex:1;background:#FFF8F0;border-radius:12px;padding:10px;text-align:center}
.stat b{font-size:20px;color:var(--coral);display:block}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">home</span><span class="tag">family_housework_gamified</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">家庭家务游戏榜</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Gamified family housework-sharing app</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">韩国统计显示约 70% 家务集中在妻子。GDSC 团队「홈워크」用家务登记+担当+周/月分析+轮盘重分配+存钱罐激励家庭参与。游戏化（轮盘、存钱罐）促参与，日中亦可复制。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 接任务、做任务、攒积分</b>
    <label>家务</label><input id="g_name" placeholder="如：洗碗 / 拖地 / 倒垃圾">
    <label>分配给家庭成员</label><input id="g_who" placeholder="如：爸爸 / 妈妈 / 哥哥">
    <label>完成奖励积分</label><input id="g_pts" type="number" value="1">
    <button class="btn" onclick="add()">＋ 派活</button>
    <div class="stat" id="stat"></div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://github.com/GDSC-Homework/Homework_Back/blob/main/README.md" target="_blank" style="color:var(--coral)">홈워크 HomeWork（韩国家庭游戏化家务）</a>
  </div>

<script>
const KEY="P10-008";
let tasks = JSON.parse(localStorage.getItem(KEY) || "[]");
function save(){ localStorage.setItem(KEY, JSON.stringify(tasks)); render(); }
function add(){
  const name=document.getElementById('g_name').value.trim();
  const who=document.getElementById('g_who').value.trim();
  const pts=parseInt(document.getElementById('g_pts').value)||1;
  if(!name||!who)return;
  tasks.push({id:Date.now(),name,who,pts,done:false});
  document.getElementById('g_name').value='';document.getElementById('g_who').value='';save();
}
function toggle(id){const t=tasks.find(x=>x.id==id);if(t)t.done=!t.done;save();}
function del(id){tasks=tasks.filter(x=>x.id!=id);save();}
function render(){
  const scores={};
  tasks.forEach(t=>{scores[t.who]=(scores[t.who]||0)+(t.done?t.pts:0);});
  const names=Object.keys(scores);
  document.getElementById('stat').innerHTML=names.length?names.map(n=>'<div><b>'+scores[n]+'</b>'+esc(n)+'分</div>').join(''):'<div style="flex:1;text-align:center;color:var(--muted)">还没有成员积分</div>';
  const el=document.getElementById('list');
  if(!tasks.length){el.innerHTML='<p style="font-size:13px;color:var(--muted)">还没有派活。</p>';return;}
  el.innerHTML='<b>🎮 家务榜</b>'+tasks.map(t=>'<div class="item"><input type="checkbox" '+(t.done?'checked':'')+' onchange="toggle('+t.id+')"><span class="name '+(t.done?'done':'')+'">'+esc(t.name)+'</span><span class="who">'+esc(t.who)+'·'+t.pts+'分</span><button class="del" onclick="del('+t.id+')">✕</button></div>').join('');
}
function esc(s){return s.replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
render();
</script>
</body>
</html>
