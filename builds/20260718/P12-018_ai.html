<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>全流程小店助手</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.mini{font-size:14px;margin:14px 0 4px;font-weight:600;color:var(--ink);
  border-left:4px solid var(--coral);padding-left:8px}
.item{background:#FBFBFB;border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px;font-size:14px}
.del{color:var(--coral);float:right;font-size:13px;cursor:pointer}
.row{display:flex;gap:8px}.row>*{flex:1}
.seg{display:flex;gap:6px;margin-top:6px}.seg button{flex:1;padding:9px;border:1px solid var(--line);background:#fff;border-radius:10px;font-size:13px;cursor:pointer}
.seg button.on{background:var(--coral);color:#fff;border-color:var(--coral)}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">creative</span><span class="tag ai">AI增强</span><span class="tag">business</span><span class="tag">all_in_one_shop_assistant</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">全流程小店助手</h1>
    <p class="h-coral" style="font-size:13px;margin:0">End-to-end shop assistant (site-selection to daily ops)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">小店"从0到1"全流程助手需求强：开店助手覆盖开店筹备+日常+数据，基础永久免费。痛点：新手店主不会用复杂工具、筹备与经营脱节。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <div class="seg" id="seg">
      <button class="on" onclick="sw('loc',this)">📍 选址</button>
      <button onclick="sw('stock',this)">📦 库存</button>
      <button onclick="sw('member',this)">👥 会员</button>
    </div>
    <div id="tab_loc">
      <label>商圈/位置</label><input id="l_name" placeholder="如 大学城步行街">
      <label>日预估客流</label><input id="l_flow" type="number" placeholder="500">
      <label>月租金(元)</label><input id="l_rent" type="number" placeholder="8000">
      <button class="btn" onclick="addL()">记选址</button>
      <p id="loc_score" style="font-size:13px;margin:6px 0 0"></p>
    </div>
    <div id="tab_stock" style="display:none">
      <label>商品</label><input id="s_name" placeholder="如 矿泉水">
      <div class="row"><div><label>进价</label><input id="s_in" type="number" placeholder="1"></div>
      <div><label>库存</label><input id="s_qty" type="number" placeholder="50"></div></div>
      <button class="btn" onclick="addS()">入库</button>
    </div>
    <div id="tab_member" style="display:none">
      <label>会员名</label><input id="m_name" placeholder="如 王阿姨">
      <label>手机号</label><input id="m_tel" placeholder="138...">
      <button class="btn" onclick="addM()">加会员</button>
    </div>
  </div>

  
  <!-- AI助手模块 -->
  <div class="card ai" id="aiCard_P12-018">
    <div class="collapse-header" id="aiHeader_P12-018" onclick="toggleAI('P12-018')" style="font-size:15px;font-weight:600;color:var(--ai-border)">
      🤖 AI 助手（用户自带Key · 零成本）
    </div>
    <div class="collapse-body collapsed" id="aiBody_P12-018" style="max-height:500px;margin-top:10px">
      <div id="aiKeySection_P12-018">
        <label>Hy3 API Key（填写你自己的Key，零成本使用AI）</label>
        <input id="apiKey_P12-018" type="password" placeholder="输入你的 Hy3 API Key" style="margin-bottom:8px">
        <button class="btn ai" onclick="saveKey('P12-018')">保存 Key</button>
        <p style="font-size:11px;color:var(--muted);margin:6px 0 0">Key 仅存储在你的浏览器本地，不会上传到任何服务器。没有Key？<a href="#" style="color:var(--ai-border)">点此免费获取</a>。</p>
      </div>
      <div id="aiChatSection_P12-018" style="display:none;margin-top:10px">
        <div id="aiMessages_P12-018" style="max-height:300px;overflow-y:auto"></div>
        <textarea id="aiInput_P12-018" placeholder="向AI提问..." style="margin-top:8px;height:60px"></textarea>
        <button class="btn ai" onclick="aiChat('P12-018')" style="margin-top:4px">发送</button>
      </div>
    </div>
  </div>

  <div class="card" id="list"><b>📋 小店数据</b><div id="box"></div></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.77xz.com/softs08/106997.html" target="_blank" style="color:var(--coral)">开店助手 · 捷易商</a>
  </div>

<script>
const KL="P12-018_loc",KS="P12-018_stock",KM="P12-018_member";
let L=JSON.parse(localStorage.getItem(KL)||"[]");
let S=JSON.parse(localStorage.getItem(KS)||"[]");
let M=JSON.parse(localStorage.getItem(KM)||"[]");
function sw(t,el){["loc","stock","member"].forEach(x=>document.getElementById("tab_"+x).style.display=x===t?"block":"none");
  document.querySelectorAll("#seg button").forEach(b=>b.classList.remove("on"));el.classList.add("on");render();}
function addL(){const n=document.getElementById("l_name").value.trim(),f=+document.getElementById("l_flow").value,r=+document.getElementById("l_rent").value;
  if(!n||isNaN(f)||isNaN(r)){alert("填完整");return;}
  const score=Math.round(f/ (r/1000) /10); // 客流/租金(千元) 简化评分
  L.push({n,f,r,score,t:new Date().toLocaleDateString()});localStorage.setItem(KL,JSON.stringify(L));render();}
function addS(){const n=document.getElementById("s_name").value.trim(),inP=+document.getElementById("s_in").value,q=+document.getElementById("s_qty").value;
  if(!n||isNaN(q)){alert("填商品库存");return;}S.push({n,inP,q});localStorage.setItem(KS,JSON.stringify(S));render();}
function addM(){const n=document.getElementById("m_name").value.trim(),t=document.getElementById("m_tel").value.trim();
  if(!n){alert("填会员名");return;}M.push({n,t,t:new Date().toLocaleDateString()});localStorage.setItem(KM,JSON.stringify(M));render();}
function del(arr,k,i){arr.splice(i,1);localStorage.setItem(k,JSON.stringify(arr));render();}
function render(){
  const last=L[L.length-1];
  document.getElementById("loc_score").innerHTML=last?`最近选址评分 <b>${last.score}</b>（客流/租金，越高越好）`:"";
  let h="";
  if(L.length)h+=`<div style="font-size:13px;color:var(--muted);margin-top:6px">📍 选址(${L.length})</div>`+L.map((x,i)=>`<div class="item"><span class="del" onclick="del(L,'${KL}',${i})">删</span><b>${x.n}</b> · 客流${x.f} · 租¥${x.r} · 评分<b>${x.score}</b></div>`).join("");
  if(S.length)h+=`<div style="font-size:13px;color:var(--muted);margin-top:6px">📦 库存(${S.length})</div>`+S.map((x,i)=>`<div class="item"><span class="del" onclick="del(S,'${KS}',${i})">删</span>${x.n} · 进¥${x.inP} · 库存<b>${x.q}</b></div>`).join("");
  if(M.length)h+=`<div style="font-size:13px;color:var(--muted);margin-top:6px">👥 会员(${M.length})</div>`+M.map((x,i)=>`<div class="item"><span class="del" onclick="del(M,'${KM}',${i})">删</span>${x.n} · ${x.t}</div>`).join("");
  document.getElementById("box").innerHTML=h||"<p style='font-size:13px;color:var(--muted)'>还没有数据。</p>";
}
render();

// === AI助手模块（用户自带Key模式）===
let aiKey = localStorage.getItem("HY3_API_KEY") || "";
let aiHistory = [];

function toggleAI(id){
  const body = document.getElementById("aiBody_" + id);
  const header = document.getElementById("aiHeader_" + id);
  if(body.classList.contains("collapsed")){
    body.classList.remove("collapsed");
    header.classList.remove("collapsed");
  } else {
    body.classList.add("collapsed");
    header.classList.add("collapsed");
  }
}

function saveKey(id){
  const key = document.getElementById("apiKey_" + id).value.trim();
  if(!key){alert("请输入Key");return;}
  localStorage.setItem("HY3_API_KEY", key);
  aiKey = key;
  document.getElementById("aiKeySection_" + id).style.display="none";
  document.getElementById("aiChatSection_" + id).style.display="block";
}

async function callHy3(messages, id){
  if(!aiKey){alert("请先填写 API Key");return null;}
  const loading = document.createElement("div");
  loading.className = "ai-msg";
  loading.innerHTML = `<div class="role">🤖 AI</div><div class="content"><span class="loading">思考中...</span></div>`;
  document.getElementById("aiMessages_" + id).appendChild(loading);
  
  try {
    const res = await fetch("https://tokenhub.tencentmaas.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + aiKey
      },
      body: JSON.stringify({
        model: "hy3",
        messages: messages,
        temperature: 0.7
      })
    });
    const data = await res.json();
    loading.remove();
    if(data.error){alert("API错误："+data.error.message);return null;}
    return data.choices[0].message.content;
  } catch(e){
    loading.remove();
    alert("调用失败："+e.message);
    return null;
  }
}

function addMsg(role, content, id){
  const box = document.getElementById("aiMessages_" + id);
  if(!box)return;
  const div = document.createElement("div");
  div.className = "ai-msg";
  div.innerHTML = `<div class="role">${role==="user"?"🙋 你":"🤖 AI"}</div><div class="content">${content.replace(/\n/g,"<br>")}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

async function aiChat(id){
  const input = document.getElementById("aiInput_" + id).value.trim();
  if(!input){return;}
  document.getElementById("aiInput_" + id).value = "";
  addMsg("user", input, id);
  const msgs = [
    {role:"system",content:"你是这个工具的AI助手，帮助用户更好地使用本工具，提供专业建议和优化方案。用中文简洁回答。"},
    {role:"user",content:input}
  ];
  const reply = await callHy3(msgs, id);
  if(reply) addMsg("assistant", reply, id);
}

</script>
</body>
</html>
