<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>婚前新娘焦虑陪伴管家</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{background:#FAFAFA;border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px;font-size:14px}
.item .del{float:right;color:var(--coral);font-size:12px;cursor:pointer}
.breath{text-align:center;font-size:48px;color:var(--coral);margin:10px 0;font-weight:700}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">wedding</span><span class="tag">prewedding_emotional</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">婚前新娘焦虑陪伴管家</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Pre-wedding bride anxiety companion</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">测试 37 款婚礼 App 发现致命盲区：功能高度同质化，却没人做「情绪管理」。73% 新娘在婚前一个月出现焦虑峰值，现有工具零应对——只覆盖决策焦虑第一层，忽略社交压力与当天失控恐惧。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 每日焦虑记录 + 呼吸练习</b>
    <label>日期</label><input id="date" type="date">
    <label>今日焦虑值（1 平静 → 10 崩溃）</label>
    <input id="level" type="range" min="1" max="10" value="5" oninput="document.getElementById('lv').innerText=this.value">
    <div style="text-align:center;font-size:30px;color:var(--coral);font-weight:700" id="lv">5</div>
    <label>今天在担心什么？</label>
    <textarea id="note" rows="2" placeholder="比如：怕亲戚当众起哄"></textarea>
    <button class="btn" onclick="addItem()">＋ 记录今天</button>

    <div style="margin-top:14px;border-top:1px dashed var(--line);padding-top:12px">
      <b>🧘 1 分钟呼吸练习</b>
      <div class="breath" id="br">准备</div>
      <button class="btn" onclick="breathe()">开始呼吸</button>
    </div>
  </div>

  <div class="card" id="list"><b>📈 焦虑记录</b></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.163.com/dy/article/KS74GPHM05561FZ3_pdya11y.html" target="_blank" style="color:var(--coral)">婚礼纪 / 找我婚礼 竞品复盘</a>
  </div>

<script>
const KEY="P13-004";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
if(!document.getElementById("date").value)document.getElementById("date").valueAsDate=new Date();
function addItem(){
  const date=document.getElementById("date").value;
  const level=parseInt(document.getElementById("level").value);
  const note=document.getElementById("note").value.trim();
  items.push({date,level,note});
  document.getElementById("note").value="";
  save();
}
function del(i){items.splice(i,1);save();}
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
let brTimer=null;
function breathe(){
  const el=document.getElementById("br");
  const steps=[["吸气 4 秒",4000],["屏息 4 秒",4000],["呼气 6 秒",6000],["放松",2000]];
  let s=0;clearInterval(brTimer);
  el.innerText=steps[0][0];
  brTimer=setInterval(()=>{s=(s+1)%steps.length;el.innerText=steps[s][0];},steps[s][1]);
  setTimeout(()=>{clearInterval(brTimer);el.innerText="完成 ✨";},16000);
}
function render(){
  const box=document.getElementById("list");
  let html='<b>📈 焦虑记录</b>';
  if(items.length===0){html+='<p style="font-size:13px;color:#999;margin:8px 0">还没有记录。</p>';}
  const avg=items.reduce((s,x)=>s+x.level,0)/(items.length||1);
  [...items].reverse().forEach((x,i)=>{
    const idx=items.length-1-i;
    html+=`<div class="item"><span class="del" onclick="del(${idx})">删除</span>
      <b>${x.date}</b> · 焦虑 ${x.level}/10<br>${x.note||'<span style="color:#999">（无备注）</span>'}</div>`;
  });
  html+=`<div style="display:flex;justify-content:space-between;font-size:14px;padding-top:8px;border-top:1px dashed var(--line)">
    <span>记录次数</span><b>${items.length}</b></div>`;
  html+=`<div style="display:flex;justify-content:space-between;font-size:14px">
    <span>平均焦虑</span><b class="h-coral">${avg.toFixed(1)}/10</b></div>`;
  box.innerHTML=html;
}
render();
</script>
</body>
</html>
