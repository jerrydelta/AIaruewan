<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>适老无障碍零工报税引导工具</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
body.big{font-size:19px}
body.big input,body.big select{font-size:19px;padding:14px}
body.big .btn{font-size:18px;padding:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:14px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border-top:1px solid var(--line);padding:10px 0;font-size:14px}
.item:first-child{border-top:none}
.del{background:none;border:none;color:var(--coral);font-size:13px;cursor:pointer;float:right;margin-top:-2px}
.sumbox{background:#FFF7F7;border:1px solid #FFE3E3;border-radius:10px;padding:10px;margin-top:10px;font-size:14px}
.sumbox b{color:var(--coral)}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">gig_economy</span><span class="tag">china_low_education_gig_tax</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">适老无障碍零工报税引导</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Accessible tax-filing micro-app for gig workers</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">我国农民工近 3 亿、66.7% 为初中以下学历，灵活就业群体普遍用不好个税 App。政策认知盲区、无弹窗提醒致滞纳金、专业术语难懂，该群体"不会用/不敢用/不想用"。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 通俗引导式报税 + 大字模式</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">用大白话一步步问，自动算出能退还是该补，并设置申报提醒。</p>
    <button class="btn" id="bigBtn" onclick="toggleBig()" style="background:#FFF0F0;color:var(--coral);border:1px solid #FFD9D9">🔠 切换大字模式</button>
    <label>① 你去年一共挣了多少钱（元）？</label>
    <input id="inc" type="number" inputmode="decimal" placeholder="比如 80000">
    <label>② 单位或平台已经帮你交过多少税（元）？</label>
    <input id="paid" type="number" inputmode="decimal" placeholder="比如 3000">
    <label>③ 你有没有租房 / 养 60 岁以上老人 / 在上学（元/月，没有填 0）？</label>
    <input id="ded" type="number" inputmode="decimal" placeholder="比如 1500">
    <button class="btn" onclick="calc()">算一算我能退还是该补</button>
    <div class="sumbox" id="res">填完上面三步，点按钮看看结果。</div>
    <hr style="border:none;border-top:1px solid var(--line);margin:14px 0">
    <label>④ 设个申报提醒日期（别错过汇算期）</label>
    <input id="rdate" type="date">
    <button class="btn" onclick="addRemind()">＋ 记下调提醒</button>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.sohu.com/a/996552121_119038" target="_blank" style="color:var(--coral)">个人所得税 APP（对照参考）</a>
  </div>

<script>
const KEY="P9-006";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function toggleBig(){ document.body.classList.toggle("big");
  document.getElementById("bigBtn").textContent=document.body.classList.contains("big")?"🔠 关闭大字模式":"🔠 切换大字模式"; }
function computeTax(t){ if(t<=0)return 0; if(t<=36000)return t*0.03; if(t<=144000)return t*0.10-2520; if(t<=300000)return t*0.20-16920; return t*0.25-31920; }
function calc(){
  const inc=parseFloat(document.getElementById("inc").value)||0;
  const paid=parseFloat(document.getElementById("paid").value)||0;
  const ded=(parseFloat(document.getElementById("ded").value)||0)*12;
  const taxable=Math.max(0,inc-60000-ded);
  const due=computeTax(taxable);
  const diff=paid-due;
  let msg=`算出来你去年该交税 <b>${due.toFixed(0)}</b> 元。<br>`;
  if(diff>0) msg+=`已经多交了，可以退回来 <b>${diff.toFixed(0)}</b> 元，快去报税领钱！`;
  else if(diff<0) msg+=`还差 <b>${(-diff).toFixed(0)}</b> 元要补上，别拖到收滞纳金。`;
  else msg+=`正好持平，不用退也不用补。`;
  document.getElementById("res").innerHTML=msg;
}
function addRemind(){
  const d=document.getElementById("rdate").value;
  if(!d){alert("请选择提醒日期");return;}
  const today=new Date(); const t=new Date(d);
  const days=Math.ceil((t-today)/86400000);
  items.push({d,days});
  save();
}
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function del(i){items.splice(i,1);save();}
function render(){
  let html="";
  items.slice().reverse().forEach((it,i)=>{
    const idx=items.length-1-i;
    const tip=it.days>0?`还有 ${it.days} 天`:it.days===0?"就是今天！":"已过期";
    html+=`<div class='item'><button class='del' onclick='del(${idx})'>删除</button>📅 申报提醒 <b>${it.d}</b> <span class='tag'>${tip}</span></div>`;
  });
  document.getElementById("list").innerHTML = items.length
    ? "<b style='font-size:14px'>🔔 我的申报提醒（"+items.length+" 条）</b>"+html
    : "<p style='color:#999;font-size:13px'>还没设提醒，汇算期前设一个别忘。</p>";
}
render();
</script>
</body>
</html>
