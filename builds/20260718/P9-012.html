<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>跨境行李寄存网络+提前显址</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border-top:1px solid var(--line);padding:10px 0;font-size:14px}
.item:first-child{border-top:none}
.del{background:none;border:none;color:var(--coral);font-size:13px;cursor:pointer;float:right;margin-top:-2px}
.sumbox{background:#FFF7F7;border:1px solid #FFE3E3;border-radius:10px;padding:10px;margin-top:10px;font-size:13px}
.sumbox b{color:var(--coral)}
.chip{display:inline-block;font-size:12px;background:#F2F2F2;border:none;border-radius:8px;padding:6px 10px;margin:3px 4px 0 0;cursor:pointer}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">travel</span><span class="tag">luggage_storage</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">跨境行李寄存 + 提前显址</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Cross-border luggage storage + upfront address</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">全球行李寄存已验证（Bounce 覆盖 4000 城），但跨境旅客在陌生城市找点难、地址付费后才显示（途简单差评）、保障不一。提前显址 + 配送增值是缺口。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 寄存点记录 + 提前显址 + 费用合计</b>
    <p style="font-size:13px;color:#555;margin:6px 0 0">记录每个寄存点的城市、网点、地址（提前可见）、单价/天、天数与配送费，自动算总费用。</p>
    <label>快捷选城市</label>
    <div>
      <button class="chip" onclick="document.getElementById('city').value='东京'">东京</button>
      <button class="chip" onclick="document.getElementById('city').value='巴黎'">巴黎</button>
      <button class="chip" onclick="document.getElementById('city').value='伦敦'">伦敦</button>
      <button class="chip" onclick="document.getElementById('city').value='纽约'">纽约</button>
      <button class="chip" onclick="document.getElementById('city').value='上海'">上海</button>
    </div>
    <label>城市</label><input id="city" placeholder="如 东京">
    <label>网点名</label><input id="spot" placeholder="如 新宿站西口">
    <label>地址（提前显址）</label><input id="addr" placeholder="如 东京都新宿区西新宿1-1">
    <div class="row">
      <div><label>单价/天($)</label><input id="price" type="number" inputmode="decimal" placeholder="如 5"></div>
      <div><label>天数</label><input id="days" type="number" inputmode="numeric" placeholder="如 2"></div>
    </div>
    <label>配送至下一站费($，无填0)</label><input id="ship" type="number" inputmode="decimal" placeholder="0">
    <button class="btn" onclick="add()">＋ 添加寄存</button>
    <div class="sumbox">寄存总支出：<b id="total">$0</b></div>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://zh.bounce.com/" target="_blank" style="color:var(--coral)">Bounce · 途简单 · BAOBAO寄存</a>
  </div>

<script>
const KEY="P9-012";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function add(){
  const city=document.getElementById("city").value.trim();
  const spot=document.getElementById("spot").value.trim();
  const addr=document.getElementById("addr").value.trim();
  const price=parseFloat(document.getElementById("price").value)||0;
  const days=parseInt(document.getElementById("days").value)||0;
  const ship=parseFloat(document.getElementById("ship").value)||0;
  if(!city||!spot){alert("请填写城市与网点");return;}
  const fee=price*days+ship;
  items.push({city,spot,addr,price,days,ship,fee});
  ["city","spot","addr","price","days","ship"].forEach(id=>document.getElementById(id).value="");
  save();
}
function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}
function del(i){items.splice(i,1);save();}
function render(){
  let total=0,html="";
  items.forEach((it,i)=>{ total+=it.fee;
    html+=`<div class='item'><button class='del' onclick='del(${i})'>删除</button><b>${it.city} · ${it.spot}</b> <span class='tag'>$${it.fee.toFixed(0)}</span><div style='font-size:13px;color:#555'>📍 ${it.addr||"未填地址"}</div><div style='font-size:13px;color:#555'>$${it.price}/天 × ${it.days}天${it.ship?(" + 配送 $"+it.ship):""}</div></div>`;
  });
  document.getElementById("list").innerHTML = items.length
    ? "<b style='font-size:14px'>📒 寄存记录（"+items.length+" 处）</b>"+html
    : "<p style='color:#999;font-size:13px'>暂无记录，添加你的第一个寄存点。</p>";
  document.getElementById("total").textContent="$"+total.toFixed(0);
}
render();
</script>
</body>
</html>
