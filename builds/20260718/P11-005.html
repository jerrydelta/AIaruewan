<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>极简植物管家</title>
<style>
:root{
  --coral:#FF6B6B;        --coral-dark:#E85555;
  --ink:#2D2D2D;          --muted:#8A8A8A;
  --bg:#F7F7F7;           --card:#FFFFFF;
  --line:#ECECEC;         --ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn-sm{padding:7px 10px;font-size:13px;border-radius:9px;margin-top:0}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.item h3{margin:0 0 4px;font-size:15px}
.mini{font-size:12px;color:var(--muted)}
.due-soon{color:var(--coral);font-weight:600}
.due-ok{color:var(--ok);font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">plant</span><span class="tag">minimalist_jp_app_gap</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">极简植物管家</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Minimalist plant app (fair free tier + batch)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">口袋植物(pokeplant)走红但免费仅 6 盆太少、无批量浇水、日历弱；PlantTrace 用户求好友花园。极简 App 免费额度太小导致转化犹豫，又缺批量与社交。本工具主打：不限盆数 + 一键批量浇水 + 养护日志。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 我的植物</b>
    <label>植物名称</label>
    <input id="name" placeholder="如：书房龟背竹">
    <label>浇水周期（天）</label>
    <input id="w" type="number" value="7" min="1">
    <button class="btn" onclick="add()">＋ 添加</button>
    <button class="btn" style="background:var(--ok)" onclick="waterAll()">💧 一键批量浇水</button>
    <div id="list"></div>
  </div>

  <div class="card">
    <b>📋 养护日志 & 统计</b>
    <p id="stat" class="mini"></p>
    <div id="logs"></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://www.yeyulingfeng.com/261474.html" target="_blank" style="color:var(--coral)">pokeplant / 口袋植物 / PlantTrace / 植迹</a>
  </div>

<script>
const KEY="P11-005";
let data=JSON.parse(localStorage.getItem(KEY)||'{"plants":[],"logs":[]}');
function save(){ localStorage.setItem(KEY,JSON.stringify(data)); render(); }
function today(){ return new Date().toISOString().slice(0,10); }
function addDays(d,n){ let t=new Date(d); t.setDate(t.getDate()+n); return t.toISOString().slice(0,10); }
function left(d){ return Math.round((new Date(d)-new Date(today()))/86400000); }
function add(){
  const name=document.getElementById('name').value.trim();
  if(!name){ alert('请填植物名称'); return; }
  data.plants.push({id:Date.now(),name,w:+document.getElementById('w').value||7,last:today()});
  document.getElementById('name').value='';
  save();
}
function water(id){
  const p=data.plants.find(x=>x.id===id); if(!p) return;
  p.last=today(); data.logs.unshift({n:p.name,d:today(),t:'浇水'}); save();
}
function waterAll(){
  if(!data.plants.length){ alert('还没有植物'); return; }
  const td=today();
  data.plants.forEach(p=>p.last=td);
  data.logs.unshift({n:'全部',d:td,t:'批量浇水'}); save();
}
function log(id){
  const p=data.plants.find(x=>x.id===id); if(!p) return;
  const t=prompt('给【'+p.name+'】记一条：','换盆/施肥/黄叶观察…');
  if(t&&t.trim()){ data.logs.unshift({n:p.name,d:today(),t:t.trim()}); save(); }
}
function del(id){ data.plants=data.plants.filter(x=>x.id!==id); save(); }
function render(){
  const box=document.getElementById('list'); box.innerHTML='';
  data.plants.forEach(p=>{
    const due=addDays(p.last,p.w), l=left(due);
    const el=document.createElement('div'); el.className='item';
    el.innerHTML='<h3>'+p.name+'</h3>'+
      '<div class="mini">下次浇水：<span class="'+(l<=1?'due-soon':'due-ok')+'">'+(l>0?'还有'+l+'天':'今天/超期')+'</span></div>'+
      '<div class="row" style="margin-top:8px">'+
      '<button class="btn btn-sm" style="background:var(--ok)" onclick="water('+p.id+')">浇水</button>'+
      '<button class="btn btn-sm" onclick="log('+p.id+')">记</button>'+
      '<button class="btn btn-sm" style="background:#ccc" onclick="del('+p.id+')">删</button></div>';
    box.appendChild(el);
  });
  document.getElementById('stat').textContent='共 '+data.plants.length+' 盆 · 不限免费额度';
  const lg=document.getElementById('logs'); lg.innerHTML='';
  data.logs.slice(0,15).forEach(l=>{
    const d=document.createElement('div'); d.className='mini';
    d.textContent='· '+l.d+' 【'+l.n+'】'+l.t; lg.appendChild(d);
  });
}
render();
</script>
</body>
</html>
