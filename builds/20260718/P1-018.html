<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>拍小票自动记账C端AI记账</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.btn.sub{background:#fff;color:var(--coral);border:1px solid var(--coral)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}.row>*{flex:1}
.exp{border:1px solid var(--line);border-radius:12px;padding:10px;margin-top:8px;font-size:13px}
.exp b{color:var(--ink)}.del{color:var(--coral);font-size:12px;float:right;cursor:pointer}
.stat{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--line)}
.sum{display:flex;justify-content:space-between;font-weight:700;padding:8px 0;border-top:2px solid var(--coral);margin-top:6px}
.bar{height:8px;border-radius:4px;background:var(--coral);display:inline-block;vertical-align:middle}
small{color:var(--muted)}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">productivity</span><span class="tag">ai_receipt_scanner_consumer</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">拍小票自动记账（C 端）</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Consumer AI expense tracker from receipts</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">咔皮记账用多模态大模型支持拍小票截图自动记账，上线半年破百万用户、2026 年 1 月超 500 万。个人记账手动录入繁琐、易弃用。本工具离线模拟"拍小票即记"：快速录入金额/类别/账户，自动汇总+分类分析+预算预警。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 快速记账（模拟拍照识别）</b>
    <div class="row">
      <div><label>金额</label><input id="amt" type="number" step="0.01" placeholder="58.00"></div>
      <div><label>类别</label><select id="cat"><option>餐饮</option><option>交通</option><option>购物</option><option>居住</option><option>娱乐</option><option>医疗</option><option>其他</option></select></div>
    </div>
    <div class="row">
      <div><label>账户</label><select id="acc"><option>微信</option><option>支付宝</option><option>信用卡</option><option>现金</option></select></div>
      <div><label>日期</label><input id="d" type="date"></div>
    </div>
    <label>备注（或粘贴小票识别文字）</label>
    <input id="note" placeholder="例如：午餐 麦当劳">
    <button class="btn" id="add">记一笔</button>
    <label>本月预算</label>
    <input id="budget" type="number" value="3000">
  </div>

  <div class="card">
    <b>📊 消费分析</b>
    <div class="sum"><span>本月支出</span><span class="h-coral" id="tot">0.00</span></div>
    <div id="bycat"></div>
    <p id="warn" class="h-coral" style="font-weight:700;min-height:18px"></p>
  </div>

  <div class="card" id="list"><b>🧾 流水（<span id="cnt">0</span>）</b><div id="items"></div></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://baike.baidu.com/item/%E5%92%94%E7%9A%AE%E8%AE%B0%E8%B4%A6/67925683" target="_blank" style="color:var(--coral)">咔皮记账 · ReceiptsAI · 商汤日日新</a>
  </div>

<script>
const KEY="P1-018";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function add(){
  const amt=parseFloat(document.getElementById("amt").value);if(isNaN(amt)){alert("请填金额");return;}
  const cat=document.getElementById("cat").value,acc=document.getElementById("acc").value;
  const d=document.getElementById("d").value||new Date().toISOString().slice(0,10);
  const note=document.getElementById("note").value.trim();
  items.push({amt,cat,acc,d,note,t:Date.now()});localStorage.setItem(KEY,JSON.stringify(items));
  ["amt","note"].forEach(id=>document.getElementById(id).value="");render();
}
function render(){
  document.getElementById("cnt").textContent=items.length;
  const box=document.getElementById("items");
  const tot=items.reduce((a,r)=>a+r.amt,0);
  document.getElementById("tot").textContent=tot.toFixed(2);
  // 分类
  const by={};items.forEach(r=>by[r.cat]=(by[r.cat]||0)+r.amt);
  const max=Math.max(1,...Object.values(by));
  document.getElementById("bycat").innerHTML=Object.entries(by).map(([k,v])=>
    `<div class="stat"><span>${k}</span><span>${v.toFixed(2)} <span class="bar" style="width:${Math.round(v/max*60)}px"></span></span></div>`).join("");
  const bud=parseFloat(document.getElementById("budget").value)||0;
  document.getElementById("warn").textContent=bud&&tot>bud?`⚠ 已超预算 ${(tot-bud).toFixed(2)}！`:"";
  if(!items.length){box.innerHTML='<p style="font-size:13px;color:#aaa;margin:6px 0">还没有流水。</p>';return;}
  box.innerHTML=items.slice().reverse().map((r,i)=>`<div class="exp"><span class="del" data-i="${i}">删除</span>
    <b>${r.amt.toFixed(2)}</b> <span class="tag">${r.cat}</span> <span class="tag">${r.acc}</span><br>
    <small>${r.d} ${r.note?"· "+r.note:""}</small></div>`).join("");
  box.querySelectorAll(".del").forEach(e=>e.onclick=()=>{items.splice(+e.dataset.i,1);localStorage.setItem(KEY,JSON.stringify(items));render();});
}
document.getElementById("add").onclick=add;
document.getElementById("budget").oninput=render;
render();
</script>
</body>
</html>
