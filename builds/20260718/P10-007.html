<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>离线家用物品清单</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.row{display:flex;gap:8px}
.row>*{flex:1}
.item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.item:last-child{border-bottom:none}
.item .name{flex:1;font-size:15px}
.item .meta{font-size:12px;color:var(--muted)}
.del{color:var(--muted);font-size:18px;background:none;border:none;cursor:pointer}
.offline{font-size:12px;color:var(--ok);font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">home</span><span class="tag">offline_home_inventory</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">离线家用物品清单</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Offline, on-device home inventory &amp; belongings manager</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">搬家、保险、保修时总想不起「什么东西、什么时候买的」。日本 Stokki 等本地优先应用全数据端末内保存、离线可用、端到端加密。隐私优先的离线家庭清单仍未被满足。</p>
  </div>

  <div class="card">
    <b>🛠 工具 · 拍照式物品登记（全部存本机）</b>
    <label>物品名</label><input id="n_name" placeholder="如：戴森吸尘器 / 乐高套装">
    <div class="row">
      <div><label>房间</label><select id="n_room"><option>客厅</option><option>卧室</option><option>厨房</option><option>书房</option><option>储藏间</option></select></div>
      <div><label>购买日</label><input id="n_buy" type="date"></div>
    </div>
    <label>备注（型号/保修）</label><input id="n_note" placeholder="型号、保固到期等">
    <button class="btn" onclick="add()">＋ 登记</button>
    <p class="offline" style="margin-top:10px">🔒 本工具完全离线，数据仅存本机 localStorage，不联网、不上传。</p>
  </div>

  <div class="card" id="list"></div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://apps.apple.com/us/app/stokki-home-hobby-inventory/id6751776606" target="_blank" style="color:var(--coral)">Stokki / NestHive / Home Scout（离线家庭库存）</a>
  </div>

<script>
const KEY="P10-007";
let items = JSON.parse(localStorage.getItem(KEY) || "[]");
function save(){ localStorage.setItem(KEY, JSON.stringify(items)); render(); }
function add(){
  const name=document.getElementById('n_name').value.trim();
  if(!name)return;
  items.push({id:Date.now(),name,room:document.getElementById('n_room').value,
    buy:document.getElementById('n_buy').value,note:document.getElementById('n_note').value.trim()});
  document.getElementById('n_name').value='';document.getElementById('n_buy').value='';document.getElementById('n_note').value='';save();
}
function del(id){items=items.filter(x=>x.id!=id);save();}
function render(){
  const el=document.getElementById('list');
  if(!items.length){el.innerHTML='<p style="font-size:13px;color:var(--muted)">还没有登记物品。</p>';return;}
  el.innerHTML='<b>📦 本机物品（'+items.length+' 件）</b>'+items.map(i=>
    '<div class="item"><span class="name">'+esc(i.name)+'<span class="meta"><br>'+i.room+(i.buy?' · '+i.buy:'')+(i.note?' · '+i.note:'')+'</span></span><button class="del" onclick="del('+i.id+')">✕</button></div>').join('');
}
function esc(s){return s.replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
render();
</script>
</body>
</html>
