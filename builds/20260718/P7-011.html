<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>老年陪伴需求登记</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.7;padding:16px;max-width:480px;margin:0 auto;font-size:17px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:16px;border:none;border-radius:14px;
  background:var(--coral);color:#fff;font-size:19px;font-weight:700;cursor:pointer;margin-top:10px}
.btn:active{background:var(--coral-dark)}
.btn-ok{background:var(--ok)}
.tag{display:inline-block;font-size:13px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:3px 11px;margin:2px 5px 2px 0}
input,select,textarea{width:100%;padding:14px;border:1px solid var(--line);
  border-radius:12px;font-size:17px;margin-top:8px;background:#fff;color:var(--ink)}
label{font-size:15px;color:var(--muted);display:block;margin-top:12px;font-weight:600}
.mini{font-size:13px;color:var(--muted)}
.item{background:#FBFBFB;border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:12px}
.item .nm{font-size:19px;font-weight:700}
.row{display:flex;gap:10px}.row>*{flex:1}
.badge{display:inline-block;font-size:14px;padding:3px 10px;border-radius:999px;background:#EEE;color:#666}
.badge.ok{background:#E6F7EF;color:var(--ok)}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">elderly</span><span class="tag">companionship_marketplace</span></div>
    <h1 style="font-size:22px;margin:8px 0 4px">老年陪伴需求登记</h1>
    <p class="h-coral" style="font-size:15px;margin:0">陪聊 · 接送 · 家政 · 宠物陪伴</p>
  </div>

  <div class="card">
    <b style="font-size:18px">💡 为什么需要</b>
    <p style="font-size:15px;color:#555;margin:6px 0 0">Papa 用"共享儿子"模式把大学生与独居老人匹配，做非医疗陪伴，估值 $14 亿。本工具帮你登记需要的陪伴，并跟踪是否已安排。</p>
  </div>

  <div class="card">
    <b style="font-size:18px">🛠 登记一项陪伴需求</b>
    <label>需要哪种陪伴</label>
    <select id="type">
      <option>陪聊说话</option><option>去医院接送</option><option>帮忙买菜/家政</option>
      <option>遛狗/宠物陪伴</option><option>教用手机</option>
    </select>
    <label>期望时间</label>
    <input id="when" placeholder="如：本周三上午">
    <label>备注</label>
    <textarea id="note" rows="2" placeholder="特殊需要或地点"></textarea>
    <button class="btn" onclick="add()">➕ 登记需求</button>
  </div>

  <div class="card" id="list">
    <b style="font-size:18px">📋 我的陪伴安排</b>
    <div id="items"></div>
  </div>

  <div class="card" style="font-size:13px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://tech.sina.cn/2025-10-29/detail-infvpqht0429299.d.html" target="_blank" style="color:var(--coral)">Papa / Honor（老年非医疗陪伴撮合平台）</a>
  </div>

<script>
const KEY="P7-011";
let items=JSON.parse(localStorage.getItem(KEY)||"[]");
function add(){
  const type=document.getElementById("type").value;
  const when=document.getElementById("when").value.trim();
  const note=document.getElementById("note").value.trim();
  if(!when){alert("请填写期望时间");return;}
  items.unshift({id:Date.now(),type,when,note,status:"待安排"});
  document.getElementById("when").value="";document.getElementById("note").value="";
  localStorage.setItem(KEY,JSON.stringify(items));render();
}
function setStatus(id,s){const it=items.find(x=>x.id===id);if(it){it.status=s;localStorage.setItem(KEY,JSON.stringify(items));render();}}
function del(id){items=items.filter(x=>x.id!==id);localStorage.setItem(KEY,JSON.stringify(items));render();}
function render(){
  const box=document.getElementById("items");
  if(!items.length){box.innerHTML='<p class="mini" style="margin-top:8px;font-size:14px">还没有需求，先登记一项吧。</p>';return;}
  box.innerHTML=items.map(it=>`
    <div class="item">
      <div class="nm">${esc(it.type)}</div>
      <div class="mini" style="font-size:15px;margin-top:4px">时间：${esc(it.when)}</div>
      ${it.note?`<div class="mini" style="font-size:14px">备注：${esc(it.note)}</div>`:""}
      <div style="margin-top:8px"><span class="badge ${it.status==='已完成'?'ok':''}">${it.status}</span></div>
      <div class="row" style="margin-top:10px">
        <button class="btn" style="margin-top:0;background:#FFE9B0;color:#7a5a00" onclick="setStatus(${it.id},'已安排')">已安排</button>
        <button class="btn btn-ok" style="margin-top:0" onclick="setStatus(${it.id},'已完成')">已完成</button>
        <button class="btn" style="margin-top:0;background:#EEE;color:#888;width:auto;padding:16px 18px" onclick="del(${it.id})">删</button>
      </div>
    </div>`).join("");
}
function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
render();
</script>
</body>
</html>
