<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>校园LBS二手交易</title>
<style>
:root{
  --coral:#FF6B6B;--coral-dark:#E85555;--ink:#2D2D2D;--muted:#8A8A8A;
  --bg:#F7F7F7;--card:#FFFFFF;--line:#ECECEC;--ok:#3FB984;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.6;padding:16px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.h-coral{color:var(--coral)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--coral);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:var(--coral-dark)}
.tag{display:inline-block;font-size:11px;color:var(--coral);
  background:#FFF0F0;border:1px solid #FFD9D9;border-radius:999px;padding:2px 9px;margin:2px 4px 2px 0}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;margin-top:6px;background:#fff;color:var(--ink)}
label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
.mini{font-size:14px;margin:14px 0 4px;font-weight:600;color:var(--ink);
  border-left:4px solid var(--coral);padding-left:8px}
.item{background:#FBFBFB;border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px;font-size:14px}
.del{color:var(--coral);float:right;font-size:13px;cursor:pointer}
.row{display:flex;gap:8px}.row>*{flex:1}
.near{color:var(--ok);font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <div><span class="tag">student</span><span class="tag">campus_secondhand_lbs</span></div>
    <h1 style="font-size:20px;margin:8px 0 4px">校园LBS二手交易</h1>
    <p class="h-coral" style="font-size:13px;margin:0">Campus LBS secondhand (student-ID + escrow + in-person check)</p>
  </div>

  <div class="card">
    <b>💡 痛点</b>
    <p style="font-size:14px;color:#555;margin:6px 0 0">校园闲置市场庞大但渠道缺位：89%有闲置处理需求，但超70%被丢弃、仅<30%有效流转。痛点：隐私泄露（最高频）、无资金担保、纠纷率>15%、图文不符维权难。</p>
  </div>

  <div class="card">
    <b>🛠 工具</b>
    <div class="mini">📦 发布闲置（学号实名 + 距离）</div>
    <label>商品名</label><input id="g_name" placeholder="如 九成新教材">
    <div class="row">
      <div><label>分类</label><select id="g_cat"><option>教材</option><option>宿舍用品</option><option>电子</option><option>体育</option><option>其他</option></select></div>
      <div><label>价格(元)</label><input id="g_price" type="number" placeholder="30"></div>
    </div>
    <div class="row">
      <div><label>学号(实名)</label><input id="g_sid" placeholder="2023xxxx"></div>
      <div><label>距你(公里)</label><input id="g_km" type="number" step="0.1" placeholder="0.5"></div>
    </div>
    <button class="btn" onclick="addG()">发布</button>
    <div class="mini">🔎 按距离筛选</div>
    <label>只看 N 公里内</label><input id="f_km" type="number" step="0.1" value="3" oninput="render()">
  </div>

  <div class="card" id="list">
    <b>📋 在售商品（学号实名 · 资金担保）</b>
    <div id="box"></div>
  </div>

  <div class="card" style="font-size:12px;color:var(--muted)">
    <b>来源参考</b><br>
    <a href="https://m.voc.com.cn/xhn/news/202512/31171304.html" target="_blank" style="color:var(--coral)">智享校园 · Puces（校园二手调研）</a>
  </div>

<script>
const K="P12-003_goods";
let items=JSON.parse(localStorage.getItem(K)||"[]");
function addG(){
  const name=document.getElementById("g_name").value.trim();
  const cat=document.getElementById("g_cat").value;
  const price=parseFloat(document.getElementById("g_price").value);
  const sid=document.getElementById("g_sid").value.trim();
  const km=parseFloat(document.getElementById("g_km").value);
  if(!name||isNaN(price)||!sid){alert("请填商品名/价格/学号");return;}
  items.push({name,cat,price,sid,km:isNaN(km)?0:km,t:new Date().toLocaleDateString()});
  localStorage.setItem(K,JSON.stringify(items));render();
}
function del(i){items.splice(i,1);localStorage.setItem(K,JSON.stringify(items));render();}
function render(){
  const f=parseFloat(document.getElementById("f_km").value)||3;
  const shown=items.filter(x=>x.km<=f).sort((a,b)=>a.km-b.km);
  if(!items.length){document.getElementById("box").innerHTML="<p style='font-size:13px;color:var(--muted)'>还没有商品。</p>";return;}
  document.getElementById("box").innerHTML=`<p style="font-size:12px;color:var(--muted)">共 ${items.length} 件，符合 ${f}km 内 ${shown.length} 件</p>`+
    shown.map(x=>{
      const i=items.indexOf(x);
      return `<div class="item"><span class="del" onclick="del(${i})">下架</span>
        <b>${x.name}</b> <span style="font-size:12px;color:var(--muted)">[${x.cat}]</span><br>
        价 <b>¥${x.price}</b> · 学号 ${x.sid.slice(0,4)}**** <span class="${x.km<=f?'near':''}">· ${x.km}km</span><br>
        <span style="font-size:12px;color:var(--muted)">🛡 资金担保 · 当面验货 · ${x.t}</span></div>`;
    }).join("");
}
render();
</script>
</body>
</html>
